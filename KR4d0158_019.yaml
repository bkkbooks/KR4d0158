body:
  text: 筠谿集巻十九宋李彌遜撰詩一百二十六首次韻學士兄秋初四首冲融日脚未全收一葉飛黄滿眼秋謾向登臨追宋玉苦吟誰廣畔牢愁樹冷饑蟬猶亂吟風簷琴瑟露寒侵妻孥工作無衣態却恨清砧動好音葉葉彫梧陣陣風疎雲全放月華濃故人不寄江頭信看盡飛鴻斷復縱何日刀頭水石間婆娑猶得一官閑杖藜早晩尋幽處望斷秋空不見山張從之許玉友輙用其七夕所賦韻以簡之四壁蕭蕭一味愁了無從事到青州殷勤獨有張公子為遣玉人寛鬂秋和學士秋懐一十五首却暑回飇入暮林衰蟬無力尚㣲吟不湏更問秋多少著蘂黄花已可簮雨滋時物各欣榮小立方塘看水生無數遊魚隨去住不容濠上有餘清旋落簷花夜正喧參横斗轉有更傳了無人跡妨真夢枕簟同參一味禪厚顔衰暑未甘衰秋事于人却有期怯雨垂蕉全披靡受風踈葦强扶持十年行地一虛舟過眼風塵幾度秋華髪半從身外老故山時得夢中遊生涯自有餐霞法歸計新傳種樹書人境不應容拓落五松山脚是吾廬秋凈霜空露曉姿水光山氣摠供詩筆端幻出滄州趨頼有騷人慰所思身世浮雲任去留老來於此更悠悠却因削跡風波地耳底風雲得暫休靈均投老寄瀟湘身後聲名日月光被謗早知縁薏苡引年誰復念菖陽便靣南臺繚繞山晩雲歸盡逺空閑晴嵐遍染參差玉若比嵩陽季孟間飽飯茶甌到手空緩尋芳事夕陽風旋移緑竹深藏筍漫長秋風逺避叢信手繙書老更便巻書覓酒便頽然一生百斛無餘事只有殘書未忍捐執手群歌田舍兒年豐米價不嫌低飽舂白雪已歸市晩割黄雲猶枕畦官居城郭枕山根嬉語兒童亦帶村老子癡頑甘避俗欲從社叟學方言漫漫長言去不分欲於何處望閶門寄聲蓮社還相憶㡬日歸鴻下故園史惪夫作渚雲亭蘇養直有詩余初未識蘇次其韻以寄之二首逢人但説逃禪晉句裏風烟帶九秋七字鏗鏘快先覩夢魂竟下荻花洲新亭花木低几杖葉幄已成藏逺山小渚雲生夜深月十分秋思五湖間春晚舟行三首桑椹初生栁葉穠薫風咄咄逼春工物華過眼真堪恨緑髪今成一老翁病眼看花似夢中可堪紅紫半成空一年三月春餘幾枕上那聞昨夜風融融春日覺身閑急水浮舟下石灣此去知心唯杜宇與君結伴老家山過來賢閣有感面熟前山小髻螺綵衣竹馬舊經過回頭四十年前事清淚空如白髮多題大儒寮小閣青鞋踏盡劍鋩山借枕僧房落照間髙屋慿虚聽泉語嶺雲應似我身閑過鉛山鵝湖登妙峰亭松葢筠幢護石門净居塵境此間分不湏更覓南行路已向髙峰見惪雲過鉛山石井抱石寒泉湧帝青净涵窟宅駐鯢鯨誰知潤物功無盡只見岩腰鑑様平道逰武夷遇雨既渡復回明日竟逰九曲而行因留二首人間何地寄衰翁偶到神山一葦中可是仙君謝逋客船頭無處避剛風渡口回舟未忍移净坊聽雨坐題詩餘齡倘有尋真路試與披雲問鳯兒次韻翁士特題得閑軒寒音珊珊落回溪脩竹似與長風期虚聲㠶影往來地幽絶自有閑人知逰玉華洞歩出山門日已西昏鴉寒並隔巢枝更尋陳迹穿隂洞蘚壁闕關真屈竒次韻公曄見招浪走長年百念灰不知春信海邉來新詩喚起逃愁夢病眼花前得暫開聞子規客裏春秋過半生子規枝上最關情南來故國一萬里却笑子規猶亂鳴石門寺前溪上有亭余榜以通幽陳丞有詩次韻三首欲將老眼飽烟雲深處更有藤蘿捫故人聲迹應自絶不寄一行山巨源榜亭居士泰饒舌不放老禪藏好山君來重説七言偈幽事與我長相關茶甌放手送歸客屋上鳴禽猶喚人山僧别我月中去不過虎溪君莫嗔雨中登北樓白首登臨海一隅晩風吹雨上髭鬚日邉不見平安使雲影滿川山有無近聞諸山例關堂石門老偶煮黄精以詩為寄次韻以戯之束縳齋魚晝掩關長鑱斸雪草泥間竹爐石鼎甘分賸分與衰翁却病顔正月十五日與兄弟清坐燈下不飲取黄精荔子甘實食之童稚繞膝嬉笑喧雜亦足慰岑寂戯作三絶句紀之滿床緗帙照青燈碧眼相看老弟兄不見栁枝羅酒脯旋燒榾柮煮黄精江城無地可開顔學剪星裘閉戸看手劈方紅調兒女漫將一笑當追歡龍樓曽侍赭黄衣内豎傳柑拜舞時空嗅清香愁永夜夢魂何處覓丹墀晩歩獨至西溪三首睡起方床日未斜旋移屐齒破晴沙石欄獨立數歸鳥髙樹無風落柿花十日不一見此君春筍滿林深閉門杖藜特特穿苔徑問訊南堦添㡬根我來點檢春蹤跡山北山南緑暗叢留與騷人做愁本花根一㸃著泥紅久雨二首夜雨翻盆曉未停看山兩眼㡬時青不知溪靣添多少水滿方池漲緑萍帶雨山雲不肻明草泥封徑斷人行竹林縱有鳥飛路十日不聞鶗鴂聲月出惪甫席上作次韻二首萬境全歸一瞬中山河日月盡含容若將明暗分迷悟公案從今又一重世界重重一網中澄溪上下見天容不知萬丈寒光底却到青冥是㡬重席上信筆六首春眠不覺夜來風桃蕚猶霑未盡紅愁絶小湖山畔路同雲疎雨晩濛濛春雲無緒不禁風小立中庭數落紅還似江南斷腸處楊花十里雪濛濛春衫更怯晩來風凖擬衰顔借酒紅到得杯行愁不飲燭紅隱隱睡濛濛游絲無力繫春風水靣從飄㸃點紅晚渡舟横人獨立厨烟著栁細濛濛花神不管勒花風開盡深紅到淺紅未放逰人偷眼看已驚紅雨亂濛濛老來萬事耳邉風慚愧燈花未結紅欲把一尊聊自解空花入眼暗濛濛次韻巖起緑蕚梅三首六言平生始識真梅不數朱唇皓肌小立寒梢注目幽香已着人衣枝上未聞睍睆杯中初荐屠蘇誰遣雲英蕚緑臨風揺曳輕裾太清不着㣲雲氷雪精神占春詩老自知風格淺紅未可驕人次韻公立承事見貺佳什竹外孤亭思渺然與君持酒傲壺天不須五斗稱焦遂一酌髙談駭四筵一杯之後公立詩成故云彦定知縣府判池有雙蓮置酒其上坐客有詩姑以三絶塞責剪剪髙荷舞翠雲並逰湘女駐波心誰知羅韈無虚歩來聽薫風百里琹傾國從來少並芳人間那得兩巫陽丹青不解傳真態恐是菱花對晚粧蕙蘭同氣猶爭長姚魏齊名各一家不似優曇照寒水一莖能現四邉花次韻林仲和筠莊交情金石半途分霜後孤芳獨見君盡倒濃漓澆磊磈胸中着我半山雲西山莫解忘憂不數萱長鑱斸雨護雲根采薇勁節於今在知是夷齊數世孫筠荘青青谷口自披榛斷取他方寶界新彌勒同龕把茅下客來不識住庵人筠谷借屋何如退結廬籜龍環水小方壺孤髙不貴封千戸獨笑輪囷秩大夫筠堂攀枝結葉蔽朝寒病鶴摧頹老骨山安得虎頭癡絶手蘧廬置我水雲間筠庵瑣碎金中踏薜蘿出雲苔壁手摩挲飛鴻送盡不知暝烏鵲窺林日下坡筠榭疉疊重重兩岸山鈎連秀色上琅玕孤亭四壁靣烟雨人與白鷗分暮寒筠亭愛笋從嗔不出山看成修影泛㣲瀾此君臭味唯風月底事湏除數百竿筠溪鏡中白髪負長纓一釣連鼇我不能賸種長竿繞溪緑得魚君看積如陵釣臺平攀天面一彎月下視山腹三重茅更欲移居入霄漢却憎棲鳥占林梢小平富沙道中征衣猶帶去年塵入眼溪山似故人社鷰秋鴻應共笑是翁如我往來頻玉山道中有感二首溪繞長山屋繞溪隔林樓閣暮鐘遲青燈一枕家山夢鏡裏平明滿靣絲寂寞新阡草未長一身千里路茫茫秋風解染愁人淚楓葉能紅菊亦黄迎仙道中二首楓林慘淡逺山㣲全是江南欲雪時極目諸天雲一色只無六出上寒枝壺山孤秀似西山道上歸人洗眼看我到西山山有伴不知誰伴此山閑同坐客賦席上牡丹酴醿海棠三首品題芳事有春工姚魏風流勝淺紅莫傍沉香亭北看只宜巵酒對山翁珊瑚碧樹小明月散作人間無盡香伏雨闌風渾不惜為君髙處踞胡床臙脂着雨弄餘妍力挽春暉上舞筵誰道捲紗紅映肉杜陵正欲補遺篇西山雨中獨宿寄粹之窈窕山房水様清定迴燈影暗還明對床不見逃禪晉竹雨聲中夢不成奉懐粹之戯成期人不至傷秋晩覓句無工愁夜長誰與寒忩催好夢㡬重白㲲一盂香送慶侍者之净衆風揺頂笠曉山隈覓法心如未熟梅去路兩肩擔不起㑹看撒手得空回岳公來住湧泉願為出化者十八人原上座因行袖詩謁筠溪老人風致清逺可愛臨行索偈書以贈之屐聲何土遣瞿曇示病溪翁為掃庵簷葡香中一盂飯不妨歸去飽同參送黄龍取經化士駞經白馬㡬萬里不似黄龍行路難出得塵中一經巻大千沙界掌中看晩投大雲峰二首山根籬落枕溪流岸竹欹斜繫小舟一叚黃雲秔稻熟牧兒腰笛倒騎牛髙樹風生晩徑秋平沙無日下鳬鷗野舫邀月渡溪北古寺僧歸鐘鼓樓春隂遣興老去逢時秪自驚春風三過小長汀壯心更事已全白短髪耐愁猶半青釀雨山雲昏敗屋喚晴風竹響寒㕔干戈南北歸無路付與身隨水上萍申伯坐上屡成佳語句獨未見和惪久貽信中之作次韻得句情懐勝好官敢勞筆力謾追攀清新氣味經三沐煅煉工夫到九還自是吟邉有丘壑不因行處在江山慿君倚馬移東道為促金釵理鬂鬟過留侯廟倚劒懸弓黙運籌終令敵國寢戈矛八年楚業守歸漢三萬齊冠不愧留壯歳早從黃石計功成却伴赤松逰當時不與人間棄應有文風靜九州過南泉長橋矯矯長虹枕海腰波臣守護敢傾揺東西地盡惟逢水早晩人歸不礙潮靜夜魚龍出宫闕清江逰女上雲霄詩人謾詫鯨鯢句功比呉松百倍喬紹興已未發臨安偶成君休更問小行年浮水虚舟已信縁拂袖家山湏及早着鞭春色已輸先吾廬竹暗閩山月别墅花迷浙歩船欲學少陵閑事業晴忩㸃檢白雲編題趙幹江行初雪圖𤓰歩西頭水拍天白鷗波上寄長年箇中認得江南手十里黄蘆雪打船謁奉天超公法師作二首赤雲葉葉掛林丘道上黄塵没馬頭隔水净坊人不到抱崖松栢暗藏秋杯水能令重百鈞阿師心法妙通神維摩正苦衆生病為洗無邉熱惱塵次韻王才元少師借園春風朱雀橋邉路只許逰蜂獨往來缺二字園花兼巷栁却尋芳事到酴醿次韻春日即事小雨絲絲欲網春落花狼藉近黄昏車塵不到張羅地宿鳥聲中自掩門次韻王才元少師雜花五首春風著物本無殊姑射偏成玉雪膚獨笑浮花媚凡目水邉疎影不勝孤梅酒染凝脂蜜染香一枝聊發次公狂小樓凖擬來仙馭明日紅雲繞樹芳杏嫩蘂商量漸滿枝劉郎對境久忘機折來不擬供樽爼要與游蜂作伴歸桃桃紅深淺漫成堆猶喜霜葩綴舊枝喚取張盧來共醉莫隨風雨便分披李不禁花惱曲江頭欲對清尊舞沐猴留得春紅撩客恨争如庭草解忘憂偶成蘧然真夢午鐘回獨倚風軒數落梅鼻觀得香無處覓僧忩寂寂定初開野水旁邉不繫舟偶隨波浪信沉浮如今却向來時路預買閑塘着狎鷗公華以北山荔子見寄因念昔逰慨然懐歸戱成筠籠百里故人情多病文園眼倍醒未放茶甌三百顆夢魂先過小長汀病中初見梅花馳送季申樞密併以二絶老幹踈枝不耐冬喜聞芳信擾青紅應縁技癢争春力不待鉛華破曉風病眼逢花不忍窺飛奴走送已嫌遲定知着意憐纎瘦不放春心落别枝題范才元湘江詩畫詩才好入江南妙畫手工傳渭北詩一叚澄心巻湘水吟軒長對喚船時次韻郎中弟見寄筠溪岸上千竿竹夢想猶疑玉笋斑只欠吾家小居士杖藜風雨亦來還病着先尋丘首地林松已約野僧栽他年地下從諸老何必人間詠八哀卜夀穴于横山凝雲飛雪暗鄉城遥想鴒原老弟兄解道因風吹栁絮詩成吟咏許誰聽女兄亦在無錫十年不踏横山路日望白雲千里思宰木可圍人更老長鑱猶記共栽時驥子摛詞苦未工粉袍勍敵氣如虹欲收一戰追諸父政恐神錐未易同青春不與老相期歸雁聲中數别離折栁西城真旦暮鏡中白髪已如斯窮秋璧月才圓後猶憶桑弧初掛年千里一尊懽稚子祝君從我傲壺天西林葉幄已蔵鴉若比蝸牛信可誇更約此君成莫逆北忩髙卧看紛華浮木隨流誰見招春江無盡水雲遥只今瘴海投閑地魑魅為鄰盗正驕季子論才到履駒十年不調可憐渠自聞馬祖今非佛不似潜夫但著書題福州與春亭使君同樂在新亭吏退心田水様清恰似春風吹百卉白紅無數不知名次韻趙表之道中見梅之作二首近水疎籬竹半侵枝南枝北弄晴隂不因老眼分明見辜負凌寒一寸心不是先争特特開只縁沙際欲春迴行人浪起空華想一夜歸心着夢催智道者入閩作大縁事一住數年將歸以偈送之道者南行作勝縁下窮有際上諸天却來踏着銅峰路可費虚抛買屐錢送玿公長老赴南劒光孝之請好手逢場了不同五家宗外立家風玿師一句當機語不道楊岐栗棘逢嗣知客逺訪筠溪留旬餘將歸以偈送之剥啄君來破鬰陶解包相對煑溪毛一坡脩竹無窮意可但靈雲只見桃出山白霧蒼烟晝不分竹風梢雨亂紛紛杖藜來往成何事添我胸中一壑雲筠荘落成分韻得意字離離頷下髭短白不可薙焉能老行路結屋聊自芘溪横衆山繞左右松竹翳山華如幽人獨秀不取媚客來飲以漓累觴亦復醉欲眠子姑去自占十畆翠不為溝壑憂不作子孫計旁觀大笑之不解箇中意筠谿集巻十九
