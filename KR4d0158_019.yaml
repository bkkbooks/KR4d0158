body:
  text: 筠溪集卷十九宋李彌遜撰詩一百二十六首次韻學士兄秋初四首沖融日腳未全收一葉飛黃滿眼秋謾向登臨追宋玉苦吟誰廣畔牢愁樹冷飢蟬猶亂吟風簷琴瑟露寒侵妻孥工作無衣態却恨清砧動好音葉葉雕梧陳陳風疏雲全放月華濃故人不寄江頭信看盡飛鴻斷復縱何日刀頭水石間婆娑猶得一官間杖藜早晚尋幽處望斷秋空不見山張從之許玉友輒用其七夕所賦韻以簡之四壁蕭蕭一味愁了無從事到青州殷勤獨有張公子為遣玉人寬鬢秋和學士秋懷一十五首却暑回飇入暮林衰蟬無力尚微吟不須更問秋多少著蘂黃花已可簮雨滋時物各欣榮小立方塘看水生無數遊魚隨去住不容濠上有餘清旋落簷花夜正喧參橫斗轉有更傳了無人迹妨真夢枕簟同參一味禪厚顔衰暑未甘衰秋事于人却有期怯雨垂蕉全披靡受風踈葦強扶持十年行地一虛舟過眼風塵幾度秋華髮半從身外老故山時得夢中遊生涯自有餐霞法歸計新傳種樹書人境不應容拓落五松山腳是吾廬秋淨霜空露曉姿水光山氣總供詩筆端幻出滄州趨賴有騷人慰所思身世浮雲任去留老來於此更悠悠却因削迹風波地耳底風雲得暫休靈均投老寄瀟湘身後聲名日月光被謗早知緣薏苡引年誰復念菖陽便靣南臺繚繞山晚雲歸盡逺空間晴嵐遍染參差玉若比嵩陽季孟間飽飯茶甌到手空緩尋芳事夕陽風旋移緑竹深藏筍漫長秋風逺避叢信手翻書老更便卷書覓酒便頽然一生百斛無餘事只有殘書未忍捐執手群歌田舍兒年豐米價不嫌低飽舂白雪已歸市晚割黃雲猶枕畦官居城郭枕山根嬉語兒童亦帶村老子癡頑甘避俗欲從社叟學方言漫漫長言去不分欲於何處望閶門寄聲蓮社還相憶幾日歸鴻下故園史德夫作渚雲亭蘇養直有詩余初未識蘇次其韻以寄之二首逢人但説逃禪晉句裏風煙帶九秋七字鏗鏘快先覩夢魂竟下荻花洲新亭花木低几杖葉幄已成藏逺山小渚雲生夜深月十分秋思五湖間春晚舟行三首桑椹初生栁葉穠薰風咄咄逼春工物華過眼真堪恨緑髮今成一老翁病眼看花似夢中可堪紅紫半成空一年三月春餘幾枕上那聞昨夜風融融春日覺身間急水浮舟下石灣此去知心唯杜宇與君結伴老家山過來賢閣有感面熟前山小髻螺綵衣竹馬舊經過回頭四十年前事清淚空如白髮多題大儒寮小閣青鞋踏盡劍鋩山借枕僧房落照間髙屋慿虛聽泉語嶺雲應似我身間過鉛山鵝湖登妙峰亭松蓋筠幢護石門淨居塵境此間分不須更覓南行路已向髙峰見德雲過鉛山石井抱石寒泉湧帝青淨涵窟宅駐鯢鯨誰知潤物功無盡只見岩腰鑑樣平道逰武夷遇雨既渡復回明日竟逰九曲而行因留二首人間何地寄衰翁偶到神山一葦中可是仙君謝逋客船頭無處避剛風渡口回舟未忍移淨坊聽雨坐題詩餘齡倘有尋真路試與披雲問鳯兒次韻翁士特題得間軒寒音珊珊落回溪修竹似與長風期虛聲帆影往來地幽絶自有間人知逰玉華洞步出山門日已西昏鴉寒並隔巢枝更尋陳迹穿隂洞蘚壁闕關真屈竒次韻公曄見招浪走長年百念灰不知春信海邉來新詩喚起逃愁夢病眼花前得暫開聞子規客裏春秋過半生子規枝上最關情南來故國一萬里却笑子規猶亂鳴石門寺前溪上有亭余榜以通幽陳丞有詩次韻三首欲將老眼飽煙雲深處更有藤蘿捫故人聲迹應自絶不寄一行山巨源榜亭居士泰饒舌不放老禪藏好山君來重説七言偈幽事與我長相關茶甌放手送歸客屋上鳴禽猶喚人山僧别我月中去不過虎溪君莫嗔雨中登北樓白首登臨海一隅晚風吹雨上髭鬚日邉不見平安使雲影滿川山有無近聞諸山例關堂石門老偶煮黃精以詩為寄次韻以戲之束縳齋魚晝掩關長鑱斸雪草泥間竹爐石鼎甘分賸分與衰翁却病顔正月十五日與兄弟清坐燈下不飲取黃精荔子甘實食之童稚繞膝嬉笑喧雜亦足慰岑寂戲作三絶句紀之滿床緗帙照青燈碧眼相看老弟兄不見栁枝羅酒脯旋燒榾柮煮黃精江城無地可開顔學剪星裘閉戶看手劈方紅調兒女漫將一笑當追歡龍樓曽侍赭黃衣內豎傳柑拜舞時空嗅清香愁永夜夢魂何處覓丹墀晚步獨至西溪三首睡起方床日未斜旋移屐齒破晴沙石欄獨立數歸鳥髙樹無風落柿花十日不一見此君春筍滿林深閉門杖藜特特穿苔徑問訊南階添幾根我來點檢春蹤迹山北山南緑暗叢留與騷人做愁本花根一點著泥紅久雨二首夜雨翻盆曉未停看山兩眼幾時青不知溪靣添多少水滿方池漲緑萍帶雨山雲不肻明草泥封徑斷人行竹林縱有鳥飛路十日不聞鶗鴂聲月出德甫席上作次韻二首萬境全歸一瞬中山河日月盡含容若將明暗分迷悟公案從今又一重世界重重一網中澄溪上下見天容不知萬丈寒光底却到青冥是幾重席上信筆六首春眠不覺夜來風桃蕚猶霑未盡紅愁絶小湖山畔路同雲疏雨晚濛濛春雲無緒不禁風小立中庭數落紅還似江南斷腸處楊花十里雪濛濛春衫更怯晚來風凖擬衰顔借酒紅到得杯行愁不飲燭紅隱隱睡濛濛遊絲無力繫春風水靣從飄點點紅晚渡舟橫人獨立厨煙著栁細濛濛花神不管勒花風開盡深紅到淺紅未放逰人偷眼看已驚紅雨亂濛濛老來萬事耳邉風慚愧燈花未結紅欲把一尊聊自解空花入眼暗濛濛次韻巖起緑蕚梅三首六言平生始識真梅不數朱唇皓肌小立寒梢注目幽香已著人衣枝上未聞睍睆杯中初荐屠蘇誰遣雲英蕚緑臨風搖曳輕裾太清不著微雲氷雪精神占春詩老自知風格淺紅未可驕人次韻公立承事見貺佳什竹外孤亭思渺然與君持酒傲壺天不須五斗稱焦遂一酌髙談駭四筵一杯之後公立詩成故云彥定知縣府判池有雙蓮置酒其上坐客有詩姑以三絶塞責剪剪髙荷舞翠雲並逰湘女駐波心誰知羅襪無虛步來聽薰風百里琴傾國從來少並芳人間那得兩巫陽丹青不解傳真態恐是菱花對晚粧蕙蘭同氣猶爭長姚魏齊名各一家不似優曇照寒水一莖能現四邉花次韻林仲和筠莊交情金石半途分霜後孤芳獨見君盡倒濃漓澆磊磈胸中著我半山雲西山莫解忘憂不數萱長鑱斸雨護雲根采薇徑節於今在知是夷齊數世孫筠莊青青谷口自披榛斷取他方寶界新彌勒同龕把茅下客來不識住庵人筠谷借屋何如退結廬籜龍環水小方壺孤髙不貴封千戶獨笑輪囷秩大夫筠堂攀枝結葉蔽朝寒病鶴摧頽老骨山安得虎頭癡絶手蘧廬置我水雲間筠庵瑣碎金中踏薜蘿出雲苔壁手摩挲飛鴻送盡不知暝烏鵲窺林日下坡筠榭疉疊重重兩岸山鈎連秀色上琅玕孤亭四壁靣煙雨人與白鷗分暮寒筠亭愛笋從嗔不出山看成修影泛微瀾此君臭味唯風月底事須除數百竿筠溪鏡中白髮負長纓一釣連鼇我不能賸種長竿繞溪緑得魚君看積如陵釣臺平攀天面一彎月下視山腹三重茅更欲移居入霄漢却憎棲鳥占林梢小平富沙道中征衣猶帶去年塵入眼溪山似故人社燕秋鴻應共笑是翁如我往來頻玉山道中有感二首溪繞長山屋繞溪隔林樓閣暮鐘遲青燈一枕家山夢鏡裏平明滿靣絲寂寞新阡草未長一身千里路茫茫秋風解染愁人淚楓葉能紅菊亦黃迎仙道中二首楓林慘淡逺山微全是江南欲雪時極目諸天雲一色只無六出上寒枝壺山孤秀似西山道上歸人洗眼看我到西山山有伴不知誰伴此山間同坐客賦席上牡丹酴醿海棠三首品題芳事有春工姚魏風流勝淺紅莫傍沉香亭北看只宜巵酒對山翁珊瑚碧樹小明月散作人間無盡香伏雨闌風渾不惜為君髙處踞胡床胭脂著雨弄餘妍力挽春暉上舞筵誰道捲紗紅映肉杜陵正欲補遺篇西山雨中獨宿寄粹之窈窕山房水樣清定回燈影暗還明對床不見逃禪晉竹雨聲中夢不成奉懷粹之戲成期人不至傷秋晚覓句無工愁夜長誰與寒忩催好夢幾重白㲲一盂香送慶侍者之淨衆風搖頂笠曉山隈覓法心如未熟梅去路兩肩擔不起會看撒手得空回嶽公來住湧泉願為出化者十八人原上座因行袖詩謁筠溪老人風致清逺可愛臨行索偈書以贈之屐聲何土遣瞿曇示病溪翁為掃庵簷葡香中一盂飯不妨歸去飽同參送黃龍取經化士駝經白馬幾萬里不似黃龍行路難出得塵中一經卷大千沙界掌中看晚投大雲峰二首山根籬落枕溪流岸竹欹斜繫小舟一假黃雲粳稻熟牧兒腰笛倒騎牛髙樹風生晚徑秋平沙無日下鳬鷗野舫邀月渡溪北古寺僧歸鐘鼓樓春隂遣興老去逢時秪自驚春風三過小長汀壯心更事已全白短髮耐愁猶半青釀雨山雲昏敗屋喚晴風竹響寒廳干戈南北歸無路付與身隨水上萍申伯坐上屢成佳語句獨未見和德久貽信中之作次韻得句情懷勝好官敢勞筆力謾追攀清新氣味經三沐煅煉工夫到九還自是吟邉有丘壑不因行處在江山慿君倚馬移東道為促金叉理鬢鬟過留侯廟倚劒懸弓默運籌終令敵國寢戈矛八年楚業守歸漢三萬齊冠不愧留壯歲早從黃石計功成却伴赤松逰當時不與人間棄應有文風靜九州過南泉長橋矯矯長虹枕海腰波臣守護敢傾搖東西地盡惟逢水早晚人歸不礙潮靜夜魚龍出宫闕清江逰女上雲霄詩人謾詫鯨鯢句功比吳松百倍喬紹興已未發臨安偶成君休更問小行年浮水虛舟已信緣拂袖家山須及早著鞭春色已輸先吾廬竹暗閩山月别墅花迷浙步船欲學少陵間事業晴忩點檢白雲編題趙幹江行初雪圖瓜步西頭水拍天白鷗波上寄長年箇中認得江南手十里黃蘆雪打船謁奉天超公法師作二首赤雲葉葉挂林丘道上黃塵沒馬頭隔水淨坊人不到抱崖松柏暗藏秋杯水能令重百鈞阿師心法妙通神維摩正苦衆生病為洗無邉熱惱塵次韻王才元少師借園春風朱雀橋邉路只許逰蜂獨往來缺二字園花兼巷栁却尋芳事到酴醿次韻春日即事小雨絲絲欲網春落花狼藉近黃昏車塵不到張羅地宿鳥聲中自掩門次韻王才元少師雜花五首春風著物本無殊姑射偏成玉雪膚獨笑浮花媚凡目水邉疏影不勝孤梅酒染凝脂蜜染香一枝聊發次公狂小樓凖擬來仙馭明日紅雲繞樹芳杏嫩蘂商量漸滿枝劉郎對境久忘機折來不擬供樽爼要與遊蜂作伴歸桃桃紅深淺漫成堆猶喜霜葩綴舊枝喚取張盧來共醉莫隨風雨便分披李不禁花惱曲江頭欲對清尊舞沐猴留得春紅撩客恨爭如庭草解忘憂偶成蘧然真夢午鐘回獨倚風軒數落梅鼻觀得香無處覓僧忩寂寂定初開野水旁邉不繫舟偶隨波浪信沉浮如今却向來時路預買間塘著狎鷗公華以北山荔子見寄因念昔逰慨然懷歸戲成筠籠百里故人情多病文園眼倍醒未放茶甌三百顆夢魂先過小長汀病中初見梅花馳送季申樞密併以二絶老幹踈枝不耐冬喜聞芳信擾青紅應緣技癢爭春力不待鉛華破曉風病眼逢花不忍窺飛奴走送已嫌遲定知著意憐纎瘦不放春心落别枝題范才元湘江詩畫詩才好入江南妙畫手工傳渭北詩一假澄心卷湘水吟軒長對喚船時次韻郎中弟見寄筠溪岸上千竿竹夢想猶疑玉笋斑只欠吾家小居士杖藜風雨亦來還病著先尋丘首地林松已約野僧栽他年地下從諸老何必人間詠八哀卜夀穴于橫山凝雲飛雪暗鄉城遙想鴒原老弟兄解道因風吹栁絮詩成吟咏許誰聽女兄亦在無錫十年不踏橫山路日望白雲千里思宰木可圍人更老長鑱猶記共栽時驥子摛詞苦未工粉袍勍敵氣如虹欲收一戰追諸父政恐神錐未易同青春不與老相期歸雁聲中數别離折栁西城真旦暮鏡中白髮已如斯窮秋璧月才圓後猶憶桑弧初挂年千里一尊歡稚子祝君從我傲壺天西林葉幄已藏鴉若比蝸牛信可誇更約此君成莫逆北忩髙卧看紛華浮木隨流誰見招春江無盡水雲遙只今瘴海投間地魑魅為鄰盜正驕季子論才到履駒十年不調可憐渠自聞馬祖今非佛不似潛夫但著書題福州與春亭使君同樂在新亭吏退心田水樣清恰似春風吹百卉白紅無數不知名次韻趙表之道中見梅之作二首近水疏籬竹半侵枝南枝北弄晴隂不因老眼分明見辜負凌寒一寸心不是先爭特特開只緣沙際欲春回行人浪起空華想一夜歸心著夢催智道者入閩作大緣事一住數年將歸以偈送之道者南行作勝緣下窮有際上諸天却來踏著銅峰路可費虛拋買屐錢送玿公長老赴南劒光孝之請好手逢場了不同五家宗外立家風玿師一句當機語不道楊岐栗棘逢嗣知客逺訪筠溪留旬餘將歸以偈送之剝啄君來破鬱陶解包相對煮溪毛一坡修竹無窮意可但靈雲只見桃出山白霧蒼煙晝不分竹風梢雨亂紛紛杖藜來往成何事添我胸中一壑雲筠莊落成分韻得意字離離頷下髭短白不可剃焉能老行路結屋聊自芘溪橫衆山繞左右松竹翳山華如幽人獨秀不取媚客來飲以漓纍觴亦復醉欲眠子姑去自占十畝翠不為溝壑憂不作子孫計旁觀大笑之不解箇中意筠溪集卷十九
