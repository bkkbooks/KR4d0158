body:
  text: 筠溪集卷六宋李彌遜撰表十一首謝賜厯日表臣某言今月初四日准都進奏院遞到紹興六年厯日一卷伏蒙聖恩賜臣者宿離不貸欽承堯厯之頒度數有常端履夏時之正慶萬年之神䇿浹四海之歡謠臣某誠惶誠懼頓首頓首恭惟皇帝陛下厯數在躬乾坤合德出日納日不忘欽若之誠先天後天自得彛倫之叙乃誕敷於至化用丕冒於遐方臣敢不恪奉王正率循邦典務農問俗共陶仁夀之風趨事赴功咸樂舒長之日臣無任瞻天望聖激切屏營之至謝中書舍人表臣某言伏奉告命授臣試中書舍人仍改賜章服者記言東省巳愧冒居掌制西垣豈虞躐授特出聖神之斷靡容僂傴而趨得寵若驚以榮為懼臣某誠惶誠懼頓首頓首伏念臣學而未達器則易盈曾非適用之才徒有在君之志山林半世既荒翰墨之畦蒲栁餘生久脫衣冠之械敢謂一麾而出守寖叨三字之劇遷職在出綸工無破的况三年不言之際而欲孚於黔黎當四郊多壘之時必將感於悍武窺聱牙灝噩之作見坦明深厚之風非賢孰能豈臣足辦此蓋伏遇皇帝陛下神功不宰善貸且誠天監無私容光必照將大明於黜陟用洪濟於艱難察臣孤忠屢陳却顧之䇿憐臣疏直尚寬逆耳之誅逮兹成命之中頒曽乏先容之借助銜恩若此圖報云何臣敢不載繹舊聞益堅素履去鞶帨之飾逺規於聖模進藥石之言上酬於帝力庶收晚節以畢頽齡臣無任感天荷聖激切屏營之至謝户部侍郎表臣某言伏奉誥命除臣尚書户部侍郎賜衣帶者詞垣闕二字誤許言揚民部劇遷復承人乏感深涕隕恩重命輕臣某誠惶誠懼頓首頓首伏念臣識昧逺猷器慚大受雖周行之蚤置亦煩使之備更善課蔑聞徒勞奚補兹從逺服驟對清光初無動聽之言每孤前席之寵薦叨優渥盡出淵衷具言語侍從之臣已非素望應錢穀甲兵之問豈所嘗聞本宜置散以投閒乃類安繁而戀劇矧帑廩乏九年之蓄而里閭幾太半之輸廟謨方切於箸籌邦寄實資於鞭算詎容精擇猥及非才此蓋伏遇皇帝陛下道大兼容智周旁燭窽言不聽坐收綜核之權宅心克知用廣圖回之略如臣冥陋亦玷寵靈束以修鏐既光華于朝著被之珍服益安燠於身章異數便蕃微躬局蹐臣敢不務存國體力究利源斂不及民固難周於調度生之者衆其敢怠於講求儻效涓塵誓捐頂踵臣無任感天荷聖激切屛營之至漳州謝表備官二省曽蔑效于涓塵假守一麾亦濫分於民社恩隆莫避感激難名中謝伏念臣志與齒衰材非時急蒙知特達受任超踰方當馳騖有為之秋殆匪貪冒養疴之所仰聖明之從欲揣愚戇以知難自謀謂何敢薄淮陽之治引分而往豈厭承明之遊震懼方深寵綏不替此蓋伏遇皇帝陛下用人惟已以道觀能憐臣日奉內朝雖乏獻納論思之效察臣老諳民事庶消嘆息愁恨之聲錫以延閣之榮付以外藩之便載循忝切愈積凌兢臣敢不盡布寬條少俾願治長於為郡諒慚前志之稱逺不忘君誓殫晚節之報謝宫觀表一麾出守自貽曠敗之譏十䇿受薪猶竊便安之祿拊膺知懼隕涕銜恩臣某誠惶誠懼頓首頓首伏念臣器小易盈才疏多忤逢時可仕徒自誓以捐軀擇善不明或未能于寡過誤被聖神之親簡濫從英俊之後塵引分知難近免乘軒之刺卧疴治事終懷負乘之羞尚屈明刑姑從薄責此蓋伏遇皇帝陛下堯雲兼覆湯網全疏仁霑草木之微信感豚魚之異念寸蓬之舊物憐小巳之孤忠假以餘波收其末路臣敢不誅鋤往咎澡雪邪思樂只丘園雖迫桑榆之晚景譬之犬馬難忘軒陛之心謝轉官表置散丘園方念曠官之咎疏恩軒陛遽懷增秩之榮拜命若驚拊躬知懼中謝伏念臣間間淺局斷斷小材學敢窺於聖門仕親逢於真主偶脫抱關之役濫從持槖之聮問馬不知愧徒勞而無補使年莫紀驚壯志之易衰但虞飽食以窮年豈意收功于纍日此蓋伏遇皇帝陛下神心獨運天德普臨闢四門以來聰明開一面以存忠厚三載考績示黜陟之至公八柄馭臣振疲癃於已棄臣敢不稍鞭駑緩仰稱龍光頂踵為期益勵匪躬之節晨昏是省力求治巳之規賀太后冊禮成表誕布徽章備陳寶冊盡宫闈之至養得寰宇之歡心恭惟皇帝陛下德協舜躬化循堯道愛由親始欽崇聖后之尊政自身修力致王家之假天心助順民德歸仁惟孝弟通於神明逺介兩宫之福以忠順行於蠻貊將迎萬里之還臣職在清都身拘遐裔想天顔之有喜徒切葵心望宸陛以無階莫伸燕賀謝落徽猷閣直學士表蠢愚抵罪宜加勿宥之刑睿智行仁但舉惟輕之典感深隕涕悸極薰心中謝伏念臣末學書生焉知文誥偶司獻納誤被咨詢不裁小子之章幾敗乃公之事才疏意廣雖自誓於捐軀位卑言高顧不容于擢髮落上界星辰之直竊真寺香火之官敢謂皇慈曲全微物此蓋伏遇皇帝陛下離明必照漢廣兼容念嘗侍於軒墀恩不忘於簮履貸其舊惡鑒此孤忠臣敢不盡雪往愆力規前識乾坤施大豈頂踵之能酬犬馬齒衰或桑榆之可冀謝宫觀表三年吏隱慚坐食之無功再命祠官獲偷安而省事銜恩則厚撫已何堪伏念臣性本戇愚晚加疵病政宜置之丘壑况已迫於桑榆畏詩人素餐之譏佩老氏知止之戒南辰北極謹香火於晨昏十束三鍾糜㪷升於嵗月固巳踰其分量將何補於涓埃此蓋伏遇皇帝陛下大集王勳克寬聖度如日月之必照與天地之同流曲全螻蟻之生俾盡犬馬之力臣敢不勉遵古訓痛念昨非溝壑未填誓益堅於臣節雲天在望懷未報之君恩又一丘內訟僅存湖海之餘生三嵗終更復玷洞宫之散吏拜恩知懼撫巳何堪中謝伏念臣才本無竒學非可用由志道而不聞其要故當幾而不見其先動或至於觸藩愚有同於抱甕飲氷食蘖每懷晞驥之心就日望雲尤切傾葵之念敢謂乾坤之覆幬曲全螻蟻之生成盡匿衆瑕稍捐寸祿幾類畫墁而食尚虞致冦之譏此蓋伏遇皇帝陛下哲以知人寬而得衆致中和以為治布仁夀以成風收此微蹤置之鴻化臣敢不誓堅晚節益勵初心雖在桑榆理難回於羲馭譬之犬馬老猶戀於君軒代人乞致仕表臣聞難進易退者聖門之高風虧盈益謙者天道之深戒敢干睿聽仰罄忱誠中謝伏念臣禀性迂疏逢時開泰少霑仕籍每嘗膽於百為晚躐禁途誓捐軀於一節應錢穀之問於軍旅之際分民社之寄於凋瘵之餘冀黽勉於涓塵徒侵尋於嵗月猶千里遂江湖之願而十年奉香火之遊飽及妻孥賞均嗣息顧推恩之至此宜圖報之若何今則齒髮俱衰形容頓改功名日逺志願空違身既難於造朝年亦踰於謝事茍貪榮而竊食必速過以招憂伏惟皇帝陛下器使羣材生成庶類念敝帷之舊猶可以施張知老馬之疲豈堪於鞭䇿許還官政俾遂生經儻溝壑之未填或筋骸之可强狀三首勘當徐公裕狀勘台州臨海縣百姓楊杲狀論前任知縣胡某與寄居台州官徐殿撰結親令貼書朱彥假作徐殿撰幹當人名目冒請安居益等七十户桑地事尋索到兩浙轉運司公案拖照得朱彥係是鄉貼書經州陳首稱前任胡知縣指揮為徐殿撰借名告首安居益等桑地事將稅租簿㸃對除豁有稅地段外以出剩畝步依條立稅租令見佃人户承佃追以前租課入官其告人只合結賞後來徐殿撰又令幹當人作朱彥正身經州陳狀再乞承佃行下台州結絶未曽申到今來據楊杲狀論訴本部契勘徐殿撰係形勢之家寄居台州輒敢計屬縣官令公人冒作本家幹當人名目告首人户冒占官田本家却行承佃及至楊杲等經運司陳論運司定奪本官尚敢占據詞訴不已除楊杲等冒占官田事已符下兩浙轉運司委官更行打量詣實從本司將冒占不納稅租田畝數目拘收依條别召人承佃其以前冒占不納稅租亦合依條科斷罪訖追納入官外所有徐殿撰身為士夫不顧亷恥交結縣官詭名告訴違法規利若不懲戒無以為四方士俗之戒伏望朝廷詳酌特賜指揮施行勘當樓瑮狀契勘近承都省批下故左朝奉大夫樓辨男樓玘狀訴兄瑮不收認為弟事送本部勘當本部拖照前後公案見得樓玘的是自幼過房為樓辨之子後來所生所養父母皆殁樓瑮逐出其弟將父合行致仕恩澤䕃已子其保官巳自陳首昨來明州紹興四年五月內兩次定奪及紹興府再斷樓玘令依舊在樓辨房下事理已得公當後來明州於紹興六年八月內却斷歸樓异房下委是偏曲致樓玘復經都省陳訴本部竊詳樓瑮之意止為欲奪恩澤蔭補已子并欲自占財産逼逐其弟略不體其父平昔養育之意况樓辨曽任侍從官樓异亦係朝士身殁之後樓瑮不顧義理敗壞士風屢興詞訟紊煩朝廷若不懲戒無以勵俗本部已勘當樓玘合依舊為樓辨之子外欲望朝廷詳酌樓瑮不孝不義之罪特賜懲罰以為四方風俗之戒乞罷人吏贍家錢待罪狀右某承紹興八年七月二十七日尚書省劄子户部申承詳定一司敕令所申備准尚書省批送下本所劄子申明百司人吏贍家錢庫務官食錢乞特賜住罷如百司人吏日後遇有差出及將來車駕回京日合取朝廷指揮權時量給贍家錢後批勘㑹上件錢係一時支破見行取㑹外即不須修立為法與見修祿令别無相妨紹興八年六月十二日送詳定一司敕令所照㑹施行申部勘㑹百司人吏等昨在東京差撥分畨前來南京承指揮支破贍家錢并庫務官日支食錢係一時指揮支破今承前項批狀指揮切慮並合住罷除已行下糧料院權住放行聽候朝廷指揮伏望朝廷詳酌指揮施行伏候指揮右勘㑹官吏請給若無朝廷指揮即不合一面住罷今劄付户部照㑹遵依見行條法指揮施行失當實某之罪伏望朝廷特賜敷奏罷黜施行某見居家聽候指揮謹具申尚書省謹狀筠溪集卷六
