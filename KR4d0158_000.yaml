body:
  text: 筠溪集目録别集類三宋卷一奏議卷二奏議卷三奏議卷四外制卷五外制卷六表狀卷七書啓卷八議古卷九議古卷十議古卷十一詩卷十二詩卷十三詩卷十四詩卷十五詩卷十六詩卷十七詩卷十八詩卷十九詩卷二十挽詩卷二十一雜著題跋卷二十二銘贊序記卷二十三祭文卷二十四墓志銘塔銘附樂府臣等謹案筠溪集二十四卷樂府一卷宋李彌遜撰彌遜字似之連江人居吳縣與兄彌大弟彌正俱負重名大觀三年上舍第一髙宗朝試中書舍人再任户部侍郎以爭和議忤秦檜乞歸事迹具宋史本傳集首有樓鑰序稱其歸隱西山十六年不復有仕宦意詠詩自娛筆力愈偉朱子嘗跋其宿觀妙堂詩後亦傾倒甚至蓋其人其文俱卓然有以自立矣彌遜自號筠溪子筠溪者其居連江時所居之地集中有筠溪圖跋序其始末甚明宋史藝文志載彌遜集亦名筠溪可以互證此本題曰竹溪集考諸家著録皆無此名知為傳寫之誤今仍改題曰筠溪集以復其舊焉乾隆四十四年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀筠溪集原序士大夫種學績文孰不欲流傳於後資稟有厚薄用力有淺深固不可誣然須器度過人則自應髙勝有非勤苦之所能強進者此可與知者道耳筠溪先生以父兄之賢少有聲於太學一夕厠有同舍投繯於梁間公時年才十七八略無懼意亟解其繫卧而枕於股上親撫摩而噓呵之會有後至者怪而問焉徐語其故馳報齋中羣士競篝火而來相與抱持而歸竟全其生即日名動京師弱冠遂為大觀三年上舍第一人繼登科其才固足以得此天報亦昭昭矣公之器度絶人逺甚如許加以問學之懿其發為文章顧豈淺見者所能及也政和間以南宫舍人使契丹擢左史用訐直貶宣和末知冀州獨能堅壁以抗虜暴靖康漕江東平叛卒之變入紹興為饒吉二州七年復立左螭尋掌書命雄深之文黼藻王度四方傳誦之論事封駮皆人所難又以力闢和議益與時忤遷戶簉丐外補去國之際猶拳拳以立國待夷狄之大計為言竟請祠以歸隱福之連江西山凡十六年不復有仕宦意哦詩自娛筆力愈偉居間憂世著議古數十篇雖泛論古事而皆關於當世利病深切著明有范太史唐鑑之遺風乃心王室惜乎用之之不盡也逮今將一甲子公之孫珏以郎曹典大藩今居江西憲臺方迎奉老親而當寇攘驚危中竭力不少顧避琪以上舍魁決科克繼大門為京口二車皆有時名有以知公之澤未艾也二孫以鑰遊從之厚出公遺文二十四卷求序鑰晚進何足以測識前輩所藴以平日慕用之誠幸託名於不腐敢謹書之公諱彌遜字似之晜仲六人文字為一門之盛兄尚書彌大弟太史彌正俱負重望筠溪則公自號云嘉定四年閏月初吉正奉大夫參知政事兼太子賓客樓鑰序
