body:
  text: 筠谿集卷十宋李彌遜撰議古魏武破袁紹建安五年曹公軍官渡袁紹依沙塠為屯東西數十里公亦分營與相當合戰不利時公兵不滿萬傷者十二二紹復進臨官渡起土山地道公亦於内作之以相應紹射營中矢如雨下行者皆蒙楯衆大懼時公糧少與荀彧書議欲還許彧以為紹悉衆聚官渡欲與公決勝敗公以至弱當至彊若不能制必為所乘是天下之大機也且紹布衣之雄也能聚人而不能用夫以公之神武明哲而輔以大順何向而不濟公從之紹運穀車數千乗至公用荀攸計遣徐晃史渙邀擊大破之盡燒其車公與紹相拒連月雖比戰斬將然衆少糧盡士卒疲乏公謂運者曰却十五日為汝破紹不復勞汝矣冬十月紹遣軍運糓使淳于瓊等五人將兵萬餘人送之宿紹營北四十里紹謀臣許攸貪財紹不能足來奔因説公擊瓊等左右疑之荀攸賈詡勸公公乃留曹洪守自將步騎五千人夜往㑹明至瓊望見公兵少出陣門外公急擊之瓊退保營遂攻之紹遣騎救瓊左右或言賊騎稍進請分兵拒之公怒曰賊在背後乃白士卒皆殊死戰大破瓊等皆斬之紹初聞公之擊瓊謂長子譚曰就彼攻瓊等吾攻拔其營彼固無所歸矣乃使張郃高覽攻曹洪郃等聞瓊破遂來降紹衆大潰紹及譚弃軍走渡河追之不及盡收其輜重圖書珍寶虜其衆冀州諸郡多舉城邑降者初桓帝時有黄星見於楚宋之分遼東殷馗善天文言後五十嵗當有真人起於梁沛之間其鋒不可當至是凡五十年而公破紹天下莫敵矣議曰昆陽淝水之戰皆以孤軍抗百萬之師將士戮力以乗天時一舉而王業定官渡之役向使視衆寡為强弱料虚實為勝負謀士不盡其智戰士不竭其力臨敵卻顧務為茍全則指揮之間成敗分矣漢楚之勢決於鴻溝利害無以易此荀彧一言而魏武之功成方之良平不為過也魏武征三郡烏丸建安十年袁尚袁熙奔三郡烏丸曹公將征之鑿渠自呼沱入泒水名平虜渠又從泃河口鑿入潞河名泉州渠以通海十二年北征三郡烏丸諸將皆曰袁尚亡虜耳夷狄貪而無親豈為尚困今深入征之劉備必説劉表以襲許萬一為變事不可悔惟郭嘉策表必不能任備勸公行夏五月至無終秋七月大水傍海道不通田疇請為鄉導公從之引軍出盧龍塞塞外道絶不通乃壍山堙谷五百餘里經白檀歴平剛涉鮮卑庭東指栁城未至二百里虜乃知之尚熙與蹋頓遼西單于樓班右北平單于能臣抵之等將數萬騎逆軍八月登白狼山卒與虜遇衆甚盛公車重在後被甲者少左右皆懼公登高望虜陣不整乃縱兵擊之使張遼為先鋒虜衆大崩斬蹋頓及名王已下胡漢降者二十餘萬口遼東單于速僕丸及遼西北平諸豪棄其種人與尚熙奔遼東衆尚有數千騎初遼東太守公孫康恃逺不服及公破烏丸或説公遂征之尚兄弟可擒也公曰吾方使康斬送尚熙首不煩兵矣九月公引兵自栁城還康即斬尚熙及速僕丸等縳其首諸將問公還而康斬送尚熙何也公曰彼素畏尚等吾急之則并力緩之則自相圖其勢然也議曰夷狄逺在要荒之外可以威懷而不可以利畜異時中國强盛乘勝深入𢷬其腹心使之落膽内附固不為難一失其御則倒持太阿彼將來乘我矣故王者之治逺人不服則修文徳以來之又曰内修政事外攘夷狄未聞以中國之大萬民之衆而受制於夷狄者也魏武行三郡如歸市致熙尚如拉枯可謂英武矣然天下未定勒兵逺掠深入它人之境乗危攻堅徼倖一勝亦兵家之所忌有徳者所不為也荀彧郭嘉言曹袁勝敗袁紹與曹操書辭語驕慢謂荀彧郭嘉曰今將討不義而力不敵何如對曰劉項之不敵公所知也漢祖惟智勝項羽故羽雖强終為所禽今紹有十敗紹雖强無能為也紹繁禮多儀公體任自然此道勝也紹以逆動公奉順以率天下此義勝也桓靈以來政失於寛以寛濟寛故不懾公糾之以猛而天下知制此治勝也紹外寛内忌用人而疑之所任唯親戚子弟公外易簡而内機明用人無疑惟才所宜不問逺近此度勝也紹多謀少決失在後事公䇿得輒行應變無窮此謀勝也紹因累世之資高議揖讓以收名譽士之好信飾外者多歸之公以至心待人不為虚美士之忠正逺見而有實者皆願為用此徳勝也紹見人饑寒恤念之形於顔色其所不見慮或不及公於目前小事時有所忽至於大事與四海接恩之所加皆過其望雖所不見慮無不周此仁勝也紹大臣爭權讒言惑亂公御下以道浸潤不行此明勝也紹是非不可知公所是進之以禮所不是正之以法此文勝也紹好為虚勢不知兵要公以少克衆用兵如神軍人恃之敵人畏之此武勝也操笑曰如卿所言孤何徳以堪之議曰自古創業之君中興之主必有英資明略足以駕御豪傑馴服姦雄然後王業可定至其陳師鞠旅攻城掠地一勝一敗未可以得失論也故高帝厄於鴻門敗於睢水圍於滎陽獨以寛大長者誅不義立有功與天下同利遂有海内漢末羣雄競逐分鋒爭雄以窺神器袁紹魏武才略相去顧何啻倍蓰耶至荀郭之稱則未免於諛然而善乎其論勝敗也陳羣勸魏明帝罷力役魏青龍三年帝好土功既作許昌宫又治洛陽宫起昭陽太極殿築總章觀高十餘丈力役不巳農桑失業司空陳羣上疏曰昔劉備自成都至白水多作傳舎興費人役太祖知其疲民也今中國勞力亦吳蜀之所願此安危之機也帝答曰王業宫室亦宜並立滅賊之後但當罷守禦耳豈可復興役耶是固君之職蕭何之大畧也羣曰昔漢祖唯與項羽爭天下羽已滅宫室燒焚是以蕭何建武庫太倉皆是要急然髙祖猶非其壯麗今二虜未平誠不宜與古同也漢明帝欲起徳陽殿鍾離意諫即用其言後乃復作之殿成謂羣臣曰鍾離尚書在不得成此殿也夫王者豈憚一臣蓋為百姓也今臣曾不能少凝聖聽不及意逺矣帝乃為之少著減省議曰酇侯佐佑高帝以取天下鎭撫餉餽曾無遺䇿而當安危未定百姓勞苦之時乃壯麗宫室欲以重威何失之甚耶後世誇大之君得以援古成其侈心固知帝王之作不可茍如此一有過舉世非之流毒蓋未已也未央之役高帝猶非其過度魏明方且效尤抑又甚焉二君之賢否又可知也孫䇿有兼并之志孫堅四男䇿權翊匡䇿年十餘嵗已交結知名周瑜與䇿同年亦英達夙成聞䇿聲問自舒來造焉便推結分好及堅死䇿年十七乃徙居江都結納豪傑有復讎之志袁術以䇿舅吳景領丹陽太守以䇿從兄賁為丹陽都尉䇿見術泣涕曰亡父昔長沙入討董卓與明使君同盟結好欲自憑結願垂察其誠術甚竒之然未肯還其父兵後復往見術術以堅餘兵千餘人還䇿表拜懷義校尉䇿騎士有罪逃入術營隱於内廏䇿指使人就斬之訖詣術謝術曰兵人奸叛當共疾之何為謝也由是軍中益畏憚之後䇿自將討祖郎於零陵擒之䇿謂郎曰爾昔襲孤碎孤馬鞍今創軍立事除棄宿恨惟取能用與天下通爾非但汝汝勿恐怖即破其械署門下曹掾又討太史慈於勇里擒之解縛捉其手曰卿有烈義天下智士也署門下督軍及還祖郎太史慈俱在前導軍中以為榮㑹劉繇卒於豫章衆欲奉豫章太守華歆為主䇿命慈往撫安之左右皆曰慈必北去不還慈果如期而歸謂䇿曰華子魚良徳也然無它方規自守而已策撫掌大笑遂有兼并之志議曰自古衰亂之世綱常既隳豪俊並起强凌弱衆暴寡更勝迭負不相臣僕必有兼人之畧可以坐制六合然後姦雄縮手不約而附孫䇿少有大志多所結納威名蓋衆及勝敵擒虜乃能棄私憤採公望破械釋縛收其所長天下之士傾心焉觀其豁達大度駕馭豪傑同符高祖使天假之年終始大業則決機兩陣之間爭衡天下肯與曹劉並駕而已哉劉備取蜀扶風法正為劉璋軍議校尉璋不能用又益州别駕張松與正善自負其才時璋不足以有為常竊嘆息松勸璋結劉備璋然之黄權諫曰劉佐軍有驍名今請到欲以部曲遇之則不滿其心欲以賔客禮待則一國不容二君若客有泰山之安則主有累卵之危不若閉境以待時清璋不聽法正至荆州陰獻䇿於劉備曰以明將軍之英才乗劉牧之懦弱以取益州猶反掌也龎統亦言之備曰今與吾為水火者曹操也操以急吾以寛操以暴吾以仁操以譎吾以忠每與操反事乃可成爾今以小利而失信義於天下奈何統曰離亂之時固非一道所能定也且兼弱攻昧逆取順守古人所貴若事成之後封以大國何負於信今日不取終為人利爾備以為然乃將步卒數萬人入益州備至巴郡巴郡太守嚴顔拊心歎曰此所謂獨坐窮山放虎自衛者也議曰漢末三雄鼎立勢相吞噬劉璋以懦弱之質乃欲奄有巴蜀固不能保而又開門延敵以速其禍眞放虎自衛也利害之間至於甚微雖智者有不能察至璋之暗亦甚矣黄權之諫可謂知機然刑政不足以齊内智畧不足以威逺百姓不附賢能皆有引去之心而欲閉境自守有是理哉諸葛亮嚴刑治蜀諸葛亮佐劉備治蜀頗尚嚴峻人多怨嘆者法正謂亮曰昔高祖入闗約法三章秦民知徳今君假借威力跨據一州初有其國未垂惠撫且客主之義宜相降下願緩刑弛禁以慰其望亮曰君知其一未知其二秦以無道政苛民怨匹夫大呼天下土崩高祖因之可以𢎞濟劉璋暗弱自焉已來有累世之恩文法羈縻互相承奉徳政不舉威刑不肅蜀土人士專權自恣君臣之道漸以陵替寵之以位位極則賤順之以恩恩竭則慢所以致敝實由於此今吾威之以法法行則知恩限之以爵爵加則知榮榮恩並濟上下有節為治之要於斯為著矣議曰酒誥殷之迪諸臣惟工乃湎於酒勿庸殺之大司㓂刑新國用輕典以其未習於教也劉璋暗弱豈彼民之罪耶借曰徳政不舉振其綱可也威刑不肅收其枋可也人士專權殱其魁可也烏在嚴刑峻法以起怨嘆之風哉武侯於是失政刑矣譙周諫後主譙周仕漢為太子家令後主頗出游觀増廣聲樂上疏諫曰王莾之敗豪傑並起以爭神器才智之士思望所歸未必其勢之廣狹惟其徳之厚薄也於時更始公孫述等多已廣大然莫不快情恣欲怠於為善世祖初入河北馮異等勸之曰當行人所不能為者遂務理寃獄崇節儉北州歌嘆聲布四達於是鄧禹自南陽追之吳漢㓂恂素未之識舉兵助之其餘望風慕徳邳彤耿純劉植之徒至於襁負而至不可勝數故能以弱為强而成帝業及在洛陽嘗欲小出銚期進諫即時還車及潁川盜起㓂恂請世祖身往臨聞言即行故非急務欲小出不敢至於急務欲自安不為帝者之為善也如此今漢遭厄運天下三分雄哲之士思望之時也臣願陛下復行人所不為者以副人望後主不聽議曰周公戒成王以無淫於觀於逸於遊於田况創業中興之主乎善哉異等之説人君當行人所不能為也易曰有過物者必濟故小過之後繼之既濟成湯之繫夏臺文王之居羑里下至小白之起即墨勾踐之保㑹稽皆大過人者未聞居撓弱之時為因循之政而能復已墜之緒者也後主承先世㡬成之業不知克自抑畏以持守之而自暇自逸怠於為善其能有國乎王導請元帝引江南之望晉元帝徙鎭建康吳人不附居月餘庶士莫有至者王導為司馬患之㑹王敦來朝導謂之曰瑯琊王仁徳雖厚而名論猶輕兄威風已振宜有以匡濟者㑹三月上巳帝親觀褉乗肩􅓅具威儀敦導及諸名勝皆騎從吳人紀瞻顧榮皆江南之望竊覘之見其如此咸驚懼乃相率拜於道左導因進計曰古之王者莫不賔禮故老存問風俗虚已傾心以招俊乂况天下喪亂九州分裂大業草創急於得人夫顧榮賀循此土之望未若引之以結人心二子既至則無不來矣帝乃使導躬造循榮二人皆應命而至由是吳㑹風靡百姓歸心焉自此之後漸相崇奉君臣之禮始定議曰元帝當懷愍之禍國勢凌夷方以瑯琊王徙鎭建康而欲恢復海宇成中興之圖存亡之㡬間不容髮唯帝能虛心以聽導導能傾身下賢收一方之望以結人心故不期月王業遂定維天未厭晉徳實啟帝謨而導之功不可誣也夫得天下在得民得民在得賢二老歸而周室興四皓起而漢嗣定必然之理也後世貪功固位之臣方且忌賢嫉能拒人於千里之外而欲持危扶顚吾未之信也熊逺疏晉元帝太興元年詔羣工卿士各陳得失御史中丞熊逺上疏以為胡賊猾夏梓宫未返而不能遣軍進討一失也羣官不以賊讎未報為恥務在調戯飲食而已二失也選官用人不料實徳惟在名望不求才幹惟事請託當官以治事為俗吏奉法為苛刻盡禮為諂諛從容為高妙放蕩為達士驕蹇為簡雅三失也世之所惡者陸沈泥滓時之所善者翺翔雲霄是以萬機未整風俗為薄朝廷羣司以從順為善相違見貶安得朝有辨爭之臣士無禄仕之志乎古之取士敷奏以言今光禄不試甚違古義又舉賢不出世族用法不及權貴是以才不濟務姦無所懲若此道不改求以救亂難矣議曰興衰撥亂猶治膏肓之疾先後緩急逺近詳畧差之毫釐則繆矣一官曠猶一脈之絶一事廢猶一支之不舉尚可復理乎晉室之興尚放達士驕蹇而不惇本務實以求成效國祚微弱元帝厭亂悔禍刻意圖治其失猶如此蓋偷惰之久習以成風牢不可革為治者可不鑒諸唐方鎭及神䇿軍方鎭者節度使之兵也原其始起於邊將之屯防者唐初兵之戍邊者大曰軍小曰守捉曰城曰鎭而總之曰道道有大將一人曰大總管巳而更曰大都督至高宗永徽以後都督帶使持節者始謂之節度使景雲接乎開元朔方隴右河東河西諸鎭皆置節度使安禄山犯京師肅宗起靈武而諸鎭之兵共起誅賊其後禄山子慶緒及史思明父子繼起中國大亂肅宗命李光弼等討之號九節度之師久之大盜既滅而武夫戰卒以功起行陣列為侯王者皆除節度使由是方鎭相望於内地大者連州十餘小者猶兼三四兵驕則逐帥帥强則叛上天子熟視不能制矣上元中以衙軍使衛伯玉為神䇿軍節度使鎭陜州魚朝恩以觀軍容使監其軍初哥舒翰破吐蕃臨洮西之磨環川即其地置神䇿軍以成如璆為軍使及禄山反如璆以伯玉將兵若干赴難伯玉與朝恩皆屯於陜即詔伯玉所部兵號神䇿軍以伯玉為節度使後伯玉罷軍遂統於觀軍容使廣徳二年代宗避吐蕃幸陜朝恩舉在陜兵與神䇿軍迎扈悉號神䇿軍天子幸其營及京師平朝恩遂以軍歸禁中自將之吐蕃復入㓂朝恩又以神䇿軍屯苑中自是寖盛分為左右廂勢居北軍右遂為天子禁軍非它軍比朝恩乃以觀軍容宣慰處置使知神䇿軍兵馬使議曰兵猶火也弗戢將自焚有天下者固不可以弛兵茍失其御則反以起禍肅宗用諸鎮之兵以誅賊而方鎭由是强代宗幸神䇿營以避吐蕃之難而神䇿自是寖盛及其末也外制於藩臣内制於䆠堅天子孤弱竟以滅亡軍政之弊無甚於此為國者可不鑒諸屈突通事兩君屈突通仕隋文帝為左驍騎大將軍隋政亂高祖起代王遣通守河東戰久不下高祖留兵圍之遂濟河破其將桑顯和盡得其衆通勢蹙或説之降曰吾蒙國厚恩事二主安可逃難獨有死報爾每自摩其頸曰要當為國家受人一刀其訓勉士卒必流涕故力雖窮而人尚為之奮感俄聞京師平家盡没乃留顯和保潼闗率兵將如洛既行而顯和來降竇琮段志𤣥精騎追及於稠桑通結陣拒之琮縱其子夀往諭使降通大呼曰昔與汝父子今則讎也命左右射之顯和呼其衆曰京師陷諸君皆家闗西為何復東衆皆捨兵通知不免遂下馬東南向再拜號泣曰臣力屈兵敗不負陛下遂被擒送長安帝勞曰何相見晚耶泣曰通不能盡人臣之節故至此為本朝羞帝曰忠臣也釋之授兵部尚書蔣國公為秦王行軍元帥從討王世充時通二子在洛帝曰今以東洛屬公如二子何通曰臣老矣不足當重任然疇昔陛下釋俘纍加恩禮以蒙更生是時口與心誓以死許國今日之行正當先驅二兒死自其分終不以私害義帝太息曰烈士徇義吾今見之議曰屈突將軍素以方嚴稱其臨師誓衆摩頸待刃以死報國士卒為之流涕及潼闗之敗遂至屈膝就擒終為臣僕雖云兵敗力屈而受以美官居之不疑身既不能死獨視子夀詮輕於狗彘君臣父子之間慚徳多矣人臣之節莫難於死事平居忠憤自許孰敢愛死一旦斧鉞在前膽落氣喪忍恥求活此蓋常人之情爾史氏謂通盡節於隋固不可而曰惟一心可事兩君而無慊豈所以戒亂臣賊子哉太宗以事出李勣唐李勣字懋功本姓徐氏隋大業末從李密襲黎陽守之武徳元年宻歸朝廷髙祖授勣黎州總管賜姓附宗正屬籍後從秦王伐東都破劉黒闥徐圓朗討輔公祏太宗即位累遷光禄大夫行并州大都督府長史治并十六年以威肅聞帝嘗曰煬帝不擇人守邊勞中國築長城以備虜今我用勣守并突厥不敢南賢長城逺矣晉王為皇太子授詹事俄同中書門下三品帝曰兒方位東宫公舊長史以宫事相委勿以資屈為嫌也勣既忠力帝謂可託大事嘗暴疾醫曰用鬚灰可治帝乃自剪鬚和藥及愈入謝頓首流血帝曰吾為社稷計何謝為後留宴顧曰朕思屬孤幼無易公者公昔不遺李宻豈負朕哉俄大醉帝親解衣覆之帝疾謂太子曰爾於勣無恩今以事出之我死宜即授以僕射彼必致死力矣乃授疊州都督高宗立召授開府儀同三司同中書門下參掌機宻遂為尚書左僕射議曰勣自武徳初束身歸朝從秦王討平諸㓂以成大業可謂有功王室矣太宗將屬以孤幼故遇之非羣臣比至剪鬚藥之解衣覆之豈無意哉然君臣之間惟誠能使之盡心既與之戮力艱難知其可託大事則當任之不疑茍以為非才改命可也乃無罪而出之以移恩於太子是以智籠之恐非所以訓臣下也施之勣尚不可推此以待忠賢失其心矣豈能致彼死力哉狄仁傑感悟武后卒復唐嗣唐武后欲以武三思為太子以問宰相衆莫敢對狄仁傑曰臣觀天意未厭唐徳比匈奴犯邊陛下使梁王三思募勇士於市踰月不及千人廬陵王代之不浹日輒五萬今欲繼統非廬陵王不可后怒罷議久之召謂曰朕數夢雙陸不勝何也於是仁傑與王方慶俱在同辭對曰雙陸不勝無子也天其意者儆陛下乎且太子天下本本一搖天下危矣文皇帝身蹈鋒鏑勤勞而有天下傳之子孫先帝寢疾詔陛下監國陛下掩神器而取之十有餘年又欲以三思為後且姑姪與母子孰親陛下立廬陵王則千秋萬嵗後常享宗廟三思立廟不附姑后感悟即日遣徐彦伯迎廬陵王於房州王至后匿王帳中召見仁傑語廬陵事仁傑敷請切至涕下不能止后乃使王出曰還爾太子仁傑降拜頓首曰太子歸未有知者人言紛紛何所信后然之更令太子舎龍門具禮迎還中外大悦初吉頊李昭徳數請還太子后意不回惟仁傑每以母子天性為言后雖忮忍不能無感故卒復唐嗣議曰武后擅有天下在位日久變置之謀既成而仁傑一言遂反唐祚難矣蓋后知為身謀而不知為天下計仁傑為天下計而借后之利害以悟其心故言之出不得不為之感動也自古無不可諫之君無不可回之事在進言者得其道而已郭汾陽不懷私忿安思順為朔方節度時郭汾陽李臨淮俱為牙門都將二人不相能雖同盤飲食常睇不相視不交一言及汾陽代思順臨淮欲亡去計未決旬日詔臨淮分汾陽半兵東出趙魏臨淮入請曰一死固甘乞免妻子汾陽趨下執手上堂曰今國亂主遷非公不能東伐豈懷私忿時耶及别執手泣涕相勉以忠義訖平劇盜實二公之力議曰李郭之將牙門位不足以相制才不足以相髙其不相能固人之常情也及當國家之大計則不以私忿害其能且勉以忠義泣涕從之訖其成功以平社稷之難非忠於君信於友能若是歟退之謂平居詡詡强笑語以相取下一旦臨小利害僅如毛髮比反眼若不相識者聞子厚之風亦可少愧汾陽之賢豈特無愧於子厚乎段秀實圖朱泚段秀實罷節度使召為司農卿朱泚反以秀實失兵必恨憤且素有人望使騎往迎之秀實與子弟訣而入泚喜曰公來吾事成矣秀實曰將士東往宴賜不豐有司過爾人主何與之公本以忠義聞天下今變起倉卒當諭衆以禍福掃清宫室迎乗輿公之職也泚黙然秀實知不可乃陽與合陰結將軍劉海賔姚令言都虞候何明禮欲圖泚三人者皆秀實素所厚㑹源休教泚偽迎天子遣將韓旻領精鋭師三千疾馳奉天秀實以為宗社之危不容喘乃遣人諭大使岐靈岳竊取令言印不獲乃倒用司農印追其兵旻至絡繹得符還秀實謂海賔曰旻之來吾等無遺類我當直搏殺賊不然則死乃約事急為繼而令明禮應於外翌日泚召秀實計事源休姚令言李忠臣李子平皆在坐秀實戎服與休並語至僣位勃然起執休腕奪其象笏奮而前大罵曰狂賊可磔萬段我豈從汝反耶遂擊之泚舉臂捍笏中顙流血衊面匐匍走賊衆未敢動而海賔等無至者秀實大呼曰我不同反胡不殺我遂遇害議曰廉介之士知逺害以潔已而不能犯難以盡忠剛毅之士知輕身以成名而不能忍死以濟事泚之迎秀實使其牢辭謝使郤而不行固可以潔已而乃奮不顧身提忠義而往説之犯難以盡忠也知其不可取一死易若反掌固可以成名而乃陽與之合陰結所厚以圖泚忍死以濟事也至其偽迎天子宗社之危不容喘始決死以回韓旻之師徳宗之不墮賊計秀實之力也惜乎海賔之謀成矣而秀實發於倉卒外不及應不能手搏賊以成其志亦小不忍之故歟然其奪笏擊泚唾面大罵亦足以快忠誼之憤史稱英烈之言如嚴霜烈日可畏之至信哉陽城上疏論裴延齡罪唐陽城及進士第隱中條山徳宗召拜右諫議大夫遣長安尉楊寧齎束帛詣其家城褐衣到闗下辭讓帝遣中人持緋衣衣之召見賜帛五十匹初城未起縉紳想見風采既興草茅處諫諍官士以為且死職天下益憚之及受命它諫官論事苛細紛紜帝厭苦而城寖聞得失且熟猶未肯言韓愈作諍臣論譏切之城不屑方與二弟延賔客日夜劇飲客欲諫止者城揣知其情强飲客客辭即自飲滿客不得巳與酬酢或醉仆席上城或先醉卧客懷中不能聽客語無得開言常以木枕衣衾質錢人重其賢爭售之每約二弟吾所俸入而可度月食米㡬何薪菜鹽㡬錢先具之餘送酒家無留也服無贏副客或稱其佳可愛輒喜舉授之有陳萇者候其得俸常往稱錢之美月有獲焉居位八年人不能窺其際及裴延齡誣逐陸贄張滂李充等帝怒甚無敢言城聞曰吾諫官不可令天子殺無罪大臣乃約拾遺王仲舒守延英閣上疏極論延齡罪慷慨引誼申直贄等累日不止聞者寒懼城言愈勵帝大怒召宰相抵城罪順宗方為皇太子為開救良久得免敕宰相諭遣然帝意不已遂欲相延齡城顯語曰延齡為宰相吾當取白麻壞之哭於庭帝不相延齡城力也坐是下遷國子司業議曰善諫者猶治水不杜其漸則浸淫決泆漫不可制甚者君被惡名身受顯戮顧雖盡忠何補於治耶陽城居位八年當徳宗播遷之餘亡以自勵逺忠賢親諂佞過失多矣乃不能出一言有所救正至延齡之寵成陸贄之讒入始抗章極論延齡僅以不相而贄竟免城亦繼逐於是崔損李齊運韋執誼之徒並進君側不復有人矣其所由來豈一朝一夕之故哉愈作諍臣論非獨有譏於時其欲以為後世誡乎李綘對憲宗用賢李絳元和中為翰林學士帝怪前世任賢以致治今無賢可任何也對曰聖王選當代之人極其才分自可致治豈借賢異代治今日之人哉天子不以已能蓋人痛折節下士則天下賢者乃出帝曰何知其必賢而任之對曰知人誠難堯舜以為病然循其名騐以事所得十七夫任言而辨廉措事不阿容無希望依違之辭無邪媚愉悦之容此近於賢矣賢則當任任則當久賢者中立而寡助舉其類則不肖者怨杜邪徑則懷姦者疾一制度則貴戚毁傷正過失則人君疏忌夫用賢豈容易哉帝曰卿言得之矣帝毎有詢訪隨事補益所言無不聽遂欲以相而倖臣吐突承璀寵方盛忌其進陰有毁短帝乃出承璀淮南監軍翌日拜絳中書侍郎同中書門下平章事後絳以足疾求免罷為禮部尚書帝乃召承璀於淮南議曰自古願治之君未嘗不欲進賢退不肖而賢者未易進不肖者未易退惑於忠邪之辨故也蓋君子難於進而不阿意以求合禮貌衰則去之小人逢君以固寵植黨以示私假義理之言以飾其姦必行而後已故君子之道常不勝夫用言豈容易哉絳之言是也憲宗知絳之賢承璀之姦黜承璀而相絳固善矣及絳之罷而即召承璀何惑之甚歟是徒以無賢可任為患而有賢不能任也𢎞志之禍殆有以致之嗚呼史稱憲宗剛明果斷能用忠謀而於進退賢不肖之際且爾况庸君暗主無意於治者耶光啟時契丹不敢近邊契丹在開元天寶間使朝獻者無慮二十故事以范陽節度為押奚契丹使自至徳後藩鎮擅地務自安鄣戍斥堠益謹不生事於邊奚契丹亦鮮入㓂嵗選酋豪數十人長安朝㑹每引見賜與有秩其下率數百皆駐館幽州至徳寶應時再朝獻大厯中十三貞元間三元和中七太和開成間凡四然天子惡其外附回鶻不復官爵渠長㑹昌二年回鶻破契丹酋屈戍始復内附拜雲麾將軍為易鶻所與舊印賜唐新印曰奉國契丹之印光啟時天下盜與北疆多故因入㓂幽薊劉仁恭窮師踰摘星山討之嵗燎塞下草使不得留牧馬多死契丹乃乞盟獻良馬求牧地仁恭許之復敗約入㓂劉守光戍平州契丹以萬騎入光偽與和張飲具於野伏發擒其大將羣胡慟願納馬五千以贖不許其酋欽徳輸重賂求之乃與盟十年不敢近邊議曰唐得藩鎮之助致蕃夷不敢㓂邊然終唐之禍卒由藩鎭國朝鑒之悉廢不用至使逺虜攻犯京師去來之易甚於由廊廡而升堂陛抑屏翰之不嚴故歟為國之道猶良醫之施砭劑當損其過補其不及茍膠不知變其致患必矣筠谿集巻十
