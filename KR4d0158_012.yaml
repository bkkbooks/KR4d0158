body:
  text: 筠溪集卷十二宋李彌遜撰詩四十五首次韻連江陳丞閔雨春雨兩甲子夏雨知復多牟麥已受弊波及秫與禾禾秫尚有望霖霪人告瘥雲師扶風伯斥去煩撝訶后土不得乾浸欲乖時和山翁食病粟一飽寧憂他軍儲涸鄰國奈此黔赤何誰為四逹聰黜陟分兩科陳謨坐臯夔禦侮用牧頗上當天公心立致擊壤歌次韻陳蹈元種竹池上之什冶容多嫵媚徑節自髙尚絶知尤物美寧似此君放疏蕖望修竹凛凛丈人行雖然合九奏未必遺一唱移根拂雲姿作伴滿月相客來與周旋一洗眼中瘴蒸哉太丘徒風味晉人上五言落凡目失喜狂欲恙渭川植千畝玉井開十丈并吞羅心胸出語還自狀我窮海濵卧局促隱霧瘴逺公有佳招子猷得真飬風庭散鳬鶩倘許共清曠茗碗煩屢移早秫行可釀石門竹生岩下拳曲無取衆方笑之蹈元乃獨諷詠嘉嘆託物興懷有古人之風輒用韻以廣其志農丞免官歸門第冷於鐵屬國埋邊塵旁觀為心折一朝百僚上衆目仰光潔賢愚雜平居髙士見錯節君看岩下竹九曲困岩穴風雷頭角露歘蔽夏日烈男兒未蓋棺不用傷歇滅感物思故人長吟賴詩傑送王三十六機宜召赴行在煙昏海樹春草木有秋色登臨翻百憂念子將逺適子如楸柏桑那有十圍杙長年百僚底許國心自赤明光一朝去櫪驥得暫釋邊塵暗江水此事未聞昔咨詢勤衮衣謀議困肉食將軍縱失伍戰士輕笑百腥風鬱義氣血汚土花碧機牙不先壞百發怒未息近聞管夷吾御敵富長䇿能持一鈎金力轉萬鈞石子行勿俟駕當寧方側席時危急良籌如救火下積置身倘有地膚髮詎足惜王綱有關紐著處在一拍言大終少成圖多易生惑向來宣對間未必有可績徐行要好步遇險各努力明年取金印快我歌壤擊次韻仲輔山中之作崖隂坐清暝目為山光注妙意不可名悠然與心晤疏泉石中鳴落葉衣上住冷風起虛籟還向無中去三生聽鐘魚偶失來時步佛屋倚秋風團團兩桂樹却疑此境中曽是經行處黃蘗歸途以碧潭清皎潔為韻分得碧字真歇泛舟先歸苦為捫蘿行正坐愛山癖振衣雲中樹洗耳泉上石稍尋優鉢林偶旁瞿曇宅溪橫走羊腸山轉回龍脊兩難伴榰笻二老共飛錫望迷落葉秋坐斷蒲團夕雲歸繞忩明香盡出簷碧希聲發岩竇妙觀生墻壁塵緣苦椎板勝事成今昔離家月垂鈎歸路月挂壁師今一帆輕我向百里役船子罷持橈趙州行驀直尚書兄結廬羣玉之下數年誅茅封植盡得勝槩僕解官鄱陽巾車來謁徘徊不忍去慨然有俱隱之志作羣玉五詠末章以見志云樵谷蝸牛負空軀能避外物觸微生寄寰宇天地容粒粟岩棲小天下俯仰心自足採薪百不憂髙視賢版築豈無潭潭居違已詎所欲赤松留侯帷幄勳平勃未足數晚從赤松君雅志在輕舉公今卜真逰百藴未一吐古來賢達人不必同出處那知無心雲解作及時雨百花洲芳洲面林薄山響疏泉落小緑綴肥梅疏青隕驚籜周遭不盈丈思與江湖廓幽人百慮空獨立聽鳴壑物我偶俱忘何必知魚樂梅塢嘉木開繁隂疊障圍空翠蟠根得疏梅凛凛有髙致餘芳敢追扳薰蕕不同器相期忘機友共結棲真計清姿固可人所樂在真味浮金峰浮金鎖佳氣不挂凡子目髙人有餘清别墅廣新築有懷鴻雁行風月伴幽獨還為稻粱謀去傍蒹葭宿歸飛會有時分我一忩緑早行飛鳴屋上烏入我夢中聽遲明月方昃平曉風更靜遊雲四山幕止水萬象鏡身如走空塵南北了不定次韻劉寬夫向來志功名唯恐著鞭後老來倦軒冕待兔但知守晨昏課朱墨歲月計升斗微官成底事坐費白駒晝晚從松竹逰忘言到心友十年成莫逆百念付烏有誰念愚溪愚未種栁州栁有如壓粳核責以出醇酎蒼官與青士賴爾對巵酒不知我形穢浪處珠玉右劉侯妙雕琢真是運斤手鵬風若有待豹霧恐難久清池環小翠一室僅十肘胸中著雲夢不數渭川畝嗟豫逺世心大似與君偶擬歌于蒍于擊節和鳴玖覔句了不工青燈坐搔首次韻劉寬夫題學士進此庵道人清淨觀夢幻閲諸有成心自得師論世方結友默如彼上人語合亡是叟問焉一得三疑者十居九人情置氷炭賦性甚杞栁一波失源流六鑿開戶牖客塵不暫住習氣既悠久聞言雖轉頭遇事還掣肘志目或中眉畫虎終類狗我持測海心來聽談天口尚迷指端月那辨日中斗如抽一繭絲欲縳千牛首勉賡進此歌代斫恐傷手青原臺與兄弟同賦髙臺瞰層碧岫幌森筠幢恍如青原人覿面呼老龎胡為未免俗儒冠學為邦曽無白雨手但補百歲腔平生愛山癖至老成膏肓窮源偶會意夜半力欲扛一存短豆戀心境不得雙坐曠燕巢幕覽勝猿窺忩故山如故人未見心已降脂車蠟兩屐煙雲恣衝撞竹根掃三徑荷鍤懸酒缸外物不可必斯言有如江次韻見獨知宗朝議見貽之什遙遙幽人居宛在蒼林間霜華駐秋清風月喧晝間臞仙厭山寂按竹俯人寰面會良獨少語酣遂忘還豈無紛華地心事了不關詩成若鳴琴志在水與山君看陌上塵工作頷下斑何如對茗碗泉罌煮潺潺次韻明甫西園之什莫作園上紅寧為徑中緑多花必早雕依依不如竹一枝寄他林翛然傲華屋填飢飯秋英借健膏石斛坐斷百懶身無心問雞足輕飇自何來破我池面緑龍牙可方床清夢繞修竹苦遭鳥將雛咿喔丈人屋兩家餉濁醪誰能問斗斛妙意不可名杯深睡初足次韻明甫西山之詠秋畦靄黃雲神用報力穡腰鐮誰家子喜見眼中碧我車返山阿木落山更寂年登妻啼飢掩戶坐太息不知多田翁安用作弦直已矣復何言兹理斷可析浩歌出長林披榛㩦子姪才彥置酒筠溪明甫有詩次其韻曳杖循清池浩歌理憂端憂端不可解遇酒即暫歡聮綿九疑髙置我胸中蟠一澆豈易得橡栗無朝餐赤鯉信久絶白鷗盟亦寒何人過子雲慰此風月間杯行不停手共惜良夜闌陶然竹根卧衾枕天地間西山次林尉韻凱之半癡黠我來癡更深手除一塊土坐待千畝隂三年客東都髙山但鳴琴歸來見此君挺挺環蒼琛居然覺影穢髮白况已森浮生關朝市渠用多籯金無煩北山移自濯塵土襟茂樹獨箕踞清流恣窺臨蝶遊入窈窕蛇捕尋崎嶔鞭鸞叩門誰亂我風竹音能回折腰態來和支頤吟妙香闕一字壑源慰子千古心霜天麗初日石壁乾餘霖相㩦步林杪煙中見孤岑望後德新弟邀池上酒闌浩歌潮落人散粹之即席成詩次韻和之平生七不堪造物不能令從人較癡黠百負未一勝一丘收桑榆外物聽衰盛解纓清泠上稍覺塵土淨孤飛團團月我似靈府瑩偶逢一坳水即現大圓鏡杯中見山緑夜午覺已正喧呼衆賔歡嗑嗒四谷應新詩帶潮湍浩歌起人定褰衣踏清影藻荇耿深徑江山有精色逺目不知暝欲去還復留蘋梢惹歸艇六月四日飯石門風雷大作而雨不成滴戲以詩趣之疾風捲落葉六月秋欲變雲生澗底松雷走岩下電雨華如棼絲熟視乃不見借令車軸飛來救龜兆遍常暘起民瘼吻噪不得咽寄言行空龍若藥須暝眩再用久旱望雨韻髙田黃欲枯下田青欲變三更轆轤聲挈水急於電汙池魚不逰坎井蛙自見助苗敢辭勞人力詎能遍那憂日一食正懼李三咽微雲不成雨但作眼中眩次韻葉觀文逰鼓山謝公憂民餘妙語繼兩禪兹逰瞰滄溟宛在一葉蓮木密虛可步石立髙莫緣從來看山眼一洗俱茫然蓬萊如有無空翠蒙雲煙却疑浩蕩中天津渺歸船﨑嶇訪幽勝衆象爭相鮮凌髙寓逺目孤雲共軒軿歸來擁寒衾耳底灑鳴泉覔句了不工青燈暗孤眠次韻葉觀文東禪開堂閩山多勝地列屋栖髙禪妙供積香苾寶華散金蓮往時入㕓手來見住世緣遼遼百年後慧炬無復然我公具正眼為續旃檀煙諸方坐老衲具足世法船少開迷雲昏氛埃遂澄鮮我來偶相值杖履參髙軿拈花起一笑歸去跨林泉從兹竹隂下飽飯縱橫眠次韻葉觀文逰賢沙鳯池安國之作春雲覆老屋孤僧正安禪繽紛雨天花云是千嵗蓮誰知天上相來結林下緣倘徉愛亭隂灌木蒼虬然古意弔鳯穴祖風契漁船豐隆亦解事一掃千林煙光風尚駘蕩芳物俱蕃鮮詩成喚阿買平處凌羲軿登臨賴陶寫可但思平泉郊原問農事柔桑起蠶眠次韻葉觀文再賦逰靈源桃花二洞之作雙旌耀林丘小隊喧笳鼓鞭鸞相招㩦拂石共容與愛山晉羊祜好士漢何武胸中補天石筆下修月斧追遊愧後乘遇景詫先覩捫參或三嘆探穴聊一俯會意時目成忘言但心許徐行詎敢留有語不得吐真逰未易再外物何足數酒盡倘可繼君歌為君舞二山行有底急路轉乃爾長輿肩憩清蔭屐齒尋幽芳突兀見古殿委蛇度飛梁餘紅點澗色新絲浮岩光入徑出鳥道僧居儼蜂房前山去未了後騎低可望逢人貴同氣偶地忘殊方徑催文字飲稍近花草香語味寫素隱詩工發深長湛輩欣有得折楊愧成章次韻富季申樞密半生類猿狙褁以周公服炙手安敢近唾面未為辱天公亦解事縱之走林谷長年飽煙霞形影自相逐晚從我公逰在側愧珠玉公居廊廟間排難不枚卜挺然國蓍龜盛事紀湘竹愛間能幾時天道七日復吾儕三折肱顧步敢求速願公膏澤流長保薪十束負暄撫稚子一飯倘能續胡椒縱可營安用八百斛暇日約諸友生飯於石泉以講居貧之䇿樞密富丈欣然肯顧賔至者七人次方德順和貧士韻人賦一章崔嵬孔明柏結隂衆所依移根天衢上曽撫日月暉如何去大厦却繞烏鵲飛終當煩萬牛挽取廊廟歸鄭公澤既逺何以慰調飢公其踵前修一洗貧士悲季申夕郎冨文采早嵗從君軒承明久厭直著書效文園十年坐蘭若鼻觀參晨煙撑腸正患多教外更窮研豈惟寄絶交對客今忘言肯違蓮社友來從竹林賢堯翁寧生但叩角馬卿亦能琴托物寫孤憤舉世誰知音敲門喚良友舍木森十尋茶甌荐甘薺索酒那得斟非無膏粱子此藥聖所欽誰知半刺史而有尊堯心彥融一言悟漢祖千戶遂封婁士窮必有遇榮悴交相酬堂堂張公子謝事幾嵗周不作折腰能每懷糊口憂才華賈馬上風味陶謝儔舌在吾不患已矣勿浪求仲宗廣文負才名閉戶衆莫干長安不肯近詎肯卑小官㸑無欲清人日昃未及餐借書紛滿席不顧坐客寒斯人抱長飢我輩亦厚顔何當置君側用表賢士關彥錫方子困海江長松隱蒿蓬多能隱所長最喜五字工好古逺所紹結友久益恭寒飢了不慍清問與我同縱今四壁立未效一錢通長鑱斸山雲君去吾亦從德順樞君有美子酷愛栁栁州作詩陋元白欲擬晉魏儔情知鸞鳯穴不宿燕雀流簡編正在目冠冕奚足憂傳家一經力造物行見酬江蘺與辟芷終當荐靈修子立次韻王才元少師酴醿繁隂雪作堆新葉帷尚隘一薰有餘清三嗅詎可廢淡然不爭妍晚乃入鑒裁風流巵酒間頴脫衆香內緱仙厭繁華醉卧日炙背經旬被花惱妙語擊環珮曉來雨翻盆春事逐破塊誰憐青銅錢相期世紛外次韻王才元少師招逰東山客有不至者遂巳促其尋盟我從西山居不作東山夢聨綿翠光浮逺目不暇送飄飄貴公子萬卷輒成誦髙懷到林丘杖履邀我從褰裳欲從之未發神巳動何人折柬客不結蓮社供勝逰遂缺休一簣真可痛詩成美六逸敘事一一中但慚猿狙杙乃與杞梓共閩山寒更青森木閟隂洞鹿澗清自流醴井淺可弄尋幽當及辰為樂要與衆兹逰倘再卜勇往不待風徑須理百屣日日聽鞭鳯再用王才元少師韻十年趂飛蓬來作海邉夢曾無竹馬迎長辦栁車送長鬚乞米收驥子學詩誦自公弭節歸許我執鞭從聽詩鬼神泣看劍星辰動歡留文字飲靜憩苾芻供辨疑每及爭攻短不憚痛搜竒至旁求探賾或竒中誰知煙霞姿肯與塵土共長風起青冥逸思攪空洞豈無酒百船可待角三弄不勞行炙人一見散花衆敢違江山招寧受兒女風可但東山佳西池有儀鳯次韻王才元陪季申樞密諸公逰東山之作遊雲本無心時為晴山留我曹等雲間亦作尋山逰駕言出城闕古寺聊相投摩挲鑄金像不知幾春秋行行及佳境真成上揚州追隨况當人華胄皆通侯髙名邁姚宋餘事卑曹劉向來金鑾御一一親垂旒如何丘壑中乃與猿鶴儔寒威靳山秀幽處不可求清溪訪鹿迹古澗窺龍頭枯藤路斷磴未上吳牛愁人言昔仙去疑是竹務猷雲昏看山眼欲展還復收伊豫岩穴走南北萬里遒煙霞入膏肓瞑眩不可瘳群公上界侣解后天南陬敢言同心臭長抱躐等羞心知造物戲駑駘間驊騮鶴書偶未下愛日尚可偷花風起羣萌枝上春欲流更催小槽紅一笑非人謀與德洪明甫伯與暮春六日同登烏石飲於浴鴉池琴侍以石上坐忘歸分韻得石字老懷不知春但愛逺峰碧乘髙恣遐觀未快雙目擊稍為松根坐遂與參井逼女媧補天餘墜此百鍊石摩挲蒼蘚䀶上有鴉沿迹引觴起自斟盞面不容滴舉頭挽飛雲頗覺天半窄追隨二三子顧我獨衰白向來舞雩春勝踐同今昔偶忘千嵗憂共此一笑適次韻趙表之水口道中我從楚江來不見閩江大雲山路嶮巇水石勢澎湃舟行屈曲間溪面浮百怪篙師力推拏如下吾儂拜丈人入吾閩險阻嘗一帶風霜經幾時鬚髮乃爾奈營營復何求赫赫祗自賣如何遣諸緣直飬以無害秋風著蒲栁物態亦榮憩終當從公遊萬法等成壞杖藜欵禪房還盡三生債次韻趙表之久别相會於福唐見貽之什十年海南年世味嘗欲遍昔為擔板癡今作繞指轉誰能濯我纓人欲唾其面故人千里來髙義動深眷問答不及已驚我神髮變功名眼中花日月弦上箭公今已超然富貴非所願南逰訪知識氣習要百煉授我不死術老骨倘可健是身走空雷當作如是見題葉擇甫繡壁軒閩山固多竒會意一峯足豈徒快登臨政欲伴幽獨丈人隱禪關忩戶閉秋緑簷間絶壁起秀色近可掬丹黃與白紅楓櫟間花木微雲一過之繡錦初脫軸是翁貧不憂朝飯罄儲粟隻雞呼近社笑傲杯中玉酒酣自起舞身外置榮辱君家大兒手千障入縑幅何妨寫顛崖老樹傍髙屋他年明光歸展玩長在目筠溪集卷十二
