body:
  text: 筠溪集卷二十四宋李彌遜撰墓志銘龍圖閣直學士右通奉大夫致仕葉公墓志銘士之懷才負能居無事時茍效一官束以法令不得騁雖賢且智無以踰人至於遇事遇時應倉卒之變衆人睥睨愕立無所措手足非有過物之才不能濟也靖康初四方多事經費百出國用之入如雪見睍日積日消朝廷患之擇能臣得葉公成甫試以經理之事今上即位遂登崇之公純靜明練先事有謀不疾不徐而以辦給自為庫部郎即掌賦歷左司郎中江淮發運使户部侍郎本部尚書周旋四三年間方時難虞調度多出不測未嘗以錢榖之問至廟堂天子賴之一日不使去左右諸大夫國人皆以足國裕民知公而公惕然不自為得蓋其所存者大以心計稱非公志也方且抗章力陳治道大略曰絶害源以安百姓明賞罰以勵士卒立紀綱以基中興正心誠意以祈天悔禍今敵人侵軼下詔求言天下之士咸獻其忠未聞行一直言旌一讜論人君不聞公言即巳聞而不行四方失望志士解體後有詔令其孰信之如此求政事之修夷狄之服難矣自古言利之臣未嘗及此較短量長可同日語哉上方嘉納且有將用意會言事官與公有隙誣公買公女為妾事下吏吏煅煉求合烏府意獄具乃公為左司時同舍郎有姓同者誤指為公也事白請去猶力雖清議以謂當留而公志不可奪乃以龍圖閣直學士知泉州未幾除平江府不行遂以丘壑終焉噫如公可謂有過物者不得盡其才亦所遇然耶公諱份成甫其字也世居金陵五季之亂南徙延平金紫公又遷平江因家焉曽祖昭映贈通議大夫妣曹氏清源郡太君祖棐恭贈金紫光祿大夫妣陳氏廣平郡夫人父唐懿通直郎贈少傅妣朱氏越國夫人熙寧中以經術造士少傅公登甲科名聲卓然出諸儒上公幼修謹不好弄居父母喪哀毁如成人金紫公愛特異嘗撫之曰大吾門其此兒乎及長種學績文遇事窮核根源不為口耳學再試不第用金紫公蔭入官調鄆州須城開封陳留兩縣主簿杭州臨安丞知開封府考城縣京畿提舉常平司管幹官編修六典檢閲文字開封府刑曹掾衢州司録事提舉京西茶鹽召為庫部郎官開封少尹自是通顯矣須城郡獄久不理檄公主之富民何氏毆人限內致死而驗實無傷郡侯疑其行賂必欲處以死公曰殺人者死法也今疑似之間論以極典可乎郡侯悟卒杖遣之壽昌愚民假浮圖氏説聚衆為擾當路者欲入其罪且授之意公持法甚力不為變臨安到官三日有旨令丞例罷先是使者隂擲前官之失命下誤及公公怡然去官不復辨陳留地多鹹鹵公募民開墾假之資而薄其斂未期年瘠地二千頃盡為膏壤西成公田所括民田之餘收其入為應奉費因以侵擾民甚病之事有關京畿者長檄公往且勉以善事貴人速化之術也公曰人各有能有不能此非僕所能辭不行六典置局館中公下馬閉閣不與事接編剗之餘取未見書讀之有會意手自抄録洎去職所閲幾至千種公為掾位在諸曹下會尹京者以慘酷為治觀望貴近侮慢官僚凡有咨決附吏以白故得容其姦公聞得見必為辨曲直面折力爭衆人危之尹亦為屈延福官池畜􅗌鶒千餘不日盡死徽廟疑有致毒者并按經由諸門連逮二百餘人公鞫治得情坐所飼之物非宜列上皆從輕釋中牟縣百姓事紫姑神服用僣擬為有司所録主議者張大其事欲致之死以為巳功公察其情止於詭衆利財爾白尹不聽乃裁書規切之曰置數百家糜潰之地明公所宜動心也不然幸因對以某書聞尹如公言書奏徽廟惻然曰姑如所鞫以公治獄平允進秩一等制詞褒焉中貴人有攘人巳雇乳婢欲反坐被奪之家者公直之移送廷尉廷尉阿附乃以失實為公罪併坐視囚不謹奪兩官免公領鹽司會更法客鹽見存者毁棄州縣欲投之水公曰蠧殘民用失信商賈此何法也陳於朝令所部勿棄以俟報迄如所請公以庫部出使京西會主上登極南都調度未充公函至京師發户部及內帑錢帛不淹時大集凡賞賚給豫無乏事者兼密院賞功司川陜去朝廷道逺理賞者無慮數千輩吏乞取小不如意必擲細故往返詰問動更嵗月公建議令主將具功伐差等報守帥監司守帥監司核實上省部省部按檄即行嚴為賞罰通糾偽濫人皆便之除江淮發運使專一措置户部財用上謂宰相曰葉某明於吏事心計尤長且留行闕以備官使其被上知遇如此異時提舉一行事務廣置官屬月給錢數百萬為公使美官要職皆有所遺至是公以二卿兼之因入奏曰上巡幸出不得巳御府供須各有司存事務職在區處次舍分撥舟車此外宣索乞皆寢罷月給公使鐫十之九減官屬十七人獻議者請以鈔法行於福建下公議公曰鈔法之行非民便也一立成額後不登不免取之百姓又沿海亡命賴魚鹽以活今奪之食而繩以峻法幾何而不為盜又請𣙜閩中酒如中州法公曰六飛駐蹕江浙福建乃根本地八州之民以酒為生者十室八九一收其源人盡失業非固根本之道當白時相怒見於色謂公掠美為鄉里地公不與較徐告之曰事有可否人有所見朝廷使有司議是求可否於下必欲行之徑付外可也明日對榻前以力病求去上意眷留詔纍下乃止樓船留章安適授衣時軍士有自陳於宰相者上以問公對素辦上喜即處分給之初駕幸四明偶出倉卒官吏奔散雖父子不能相保公獨冒萬死間關海嶠拱衛黃屋不敢須臾後先自公扈從上慮錢榖不繼每對輒問公曰臣雖無用必不使上貽主憂及退不見有所陳啓而食足事濟上嘗對輔臣稱公靜而辦故詔有器識沉靜不動聲色之語上以方隅未靖為憂一日召宰輔從臣詢以禦敵之䇿衆默默公獨越次而對慷慨感激切中機會凡人所難言者必陳之左右股栗上亦為之動聽遷本部尚書辭乃建言人主以清心省事為本以節用愛人為先凡無名之費不急之務皆所當去因條具諸郡以軍興一時科調遂為例及户部近嵗取諸外非舊制者一切罷之公自入總户部纍上章言州縣之政病於民者如平江一郡於常賦外巧為色目以斂户物力不三十千月一斛較嵗稅不啻十倍又言圭田古有之今或無田而責其租甚亡謂也又言縣置吏既溢額且用家人承文書縣有百吏吏家五人是五百遊手待哺一邑也凡二十餘事雖家至户到所不能知者公皆縷陳而力除之逺近受賜焉泉州當凋瘵之餘公私匱竭公政事一趣簡儉上下安之范汝為據建安辛企宗以制置使屯兵福州大其軍食而責於旁郡公曰吾州民力屈矣擾之恐生變上其事獲減民賴以蘇郡兵驕恣日久前後守將多務姑息公至一裁以法郡廩給米軍士有稱陳腐者什百相和遂至喧閧公俄至諭以理衆大驚捕誅為首者無敢異言有告郡卒為變公密有處而示以間暇郡僚恐請以巡尉自衛公曰是無能為也謝遣之未離席悉捕以至其為首者七人一郡帖然市人不知也踰年丐奉祠章四上乃得請愛福唐佳山水有終焉意乃於西郊因山築室環以花竹樓觀上下極登覽之勝以普光明榜之日誦華嚴於其間雖肩輿出入亦以自隨菴亭堂室皆以妙嚴境界名之與家人輩遊息其間杖䇿還從以一僕遇諸途者不知其為天子從臣也紹興丁卯夏秋苦眩瞀之疾上章告老冬十有一月四日疾不起享年七十有二聞者莫不悼善人之云亡也娶江氏諫議大夫公望之女封淑人子男一人櫻孝而才以克家稱今為右朝請郎女一人適右迪公郎坑冶司檢踏官朱稱稱之子大亮將仕郎皆公推異姓恩所任也孫男二人大亷右迪功郎福建路安撫司準備差使大猷登仕郎它以恩命及中外親族者凡九人惟公慈祥孝友見推宗黨純誠篤信見重朋友平居謙恭語若不出諸口及其臨事挺然直前無所顧隱不能詡詡相媚悅與王公遊雖觴豆之間一有不合必正色危言以直之遇善類淡然出肺肝唯恐其去世俗之交偶坐終日至不吐一辭公自躋顯仕其所施設不圖赫赫之功為所甚難絶口不自衒鬻胸中蘊蓄未嘗先事有言故平生知公所存者少而公亦不自以為慍也積官通奉大夫職為龍圖閣直學士封南陽郡公邑二千四百户食實封一百户將以十九年八月十七日葬於劒浦丘坑曽祖之域櫻也持長樂吳元美之狀來請銘吳信人也出公門惟舊嘗曰南陽公自為小官時作邑治獄愛民之心一本之誠及中興之初專任大計前後建議勤勤為民一意以固邦本其設心何如也噫其真知公者哉某生後於公十有三年登公之堂最晚而公遇之若長者親之若弟昆今其亡捨我孰銘銘曰惟時需才如渴如慕及其成功亦在所遇桔橰待旱撬則備雨曰聖與賢毋必毋固偉哉南陽詩禮之緒一出而仕乃職邦賦逢此百為臨難必赴遂登尊榮亦所遇故惟公之德直而能恕除民之瘼去國之蠧有義有仁公其殆庶人或惜之不跌而仆脫身急流夢閲世務見晉光明於一切處當易簀時視死不懼巖巖閩山衆靈所護百年而歸既安且固朝奉大夫朱公宜人葉氏墓志銘夫人姓葉氏其先縉雲郡麗水人曽大父縓大父才冠父育皆隱德不仕夫人生二十年歸朝奉大夫朱瓛歸十有八年而公亡公亡二十八年而夫人殁始夫人之歸大夫公方諱窮夫人處之晏如嵗時奉祭祀接賓客供伏臘豐儉中禮悉以身任大夫弟未有室者為求其配姊未嫁者擇可妻妻之凡闑之內事無不舉未嘗以不足為歎大夫之喪擕諸孤自京師護以歸險阻千里盡力襄事既葬會二子以疾死卜人曰葬非其地夫人罄家資為改卜即與次子屏居甘藜藿撫視長養相與為命方幼授之書既壯訓以義及其入官才而文言行有物則夫人力也夫人在子官舍平居從容戒之所與遊必賢必仁客至度可欵子則入告每告輒喜亟為設觴豆具肴核嘯詠終日朝夕不厭雖家無儲至鬻筓髢中物略無難色性莊重嚴徑樂施豫使人知其勞逸故閨門嗃嗃不少自縱弛而上下歡輯僮御終其身不忍去晚喜佛書坐宴默若無所契臨終數日語其子以後事泪屬纊無一語亂者用大夫公恩始封崇德縣君纍封至宜人子男三人長曰似右從事郎先夫人十九年卒次子稱右從事郎福建路安撫大使司準備差遣幼子早卒女一人適故司農卿黃鍔封令人孫男一人大亮將仕郎夫人之亡實紹興十二年正月二十一日稱將以是年十月二十三日祔於大夫公之兆狀其行來請銘銘曰溫而能制兮潔而可親夫得淑女兮子有嚴君從夫欲貴兮從子欲壽不充其身兮必大其後和州褒山佛眼禪師塔銘江淮之南有大禪師號曰佛眼道行聞於朝敕居和州之褒禪山踰年以疾辭歸隱蔣山之東堂逺近奔湊執弟子禮以求法者不知幾何人名山大剎馳使延請者方來而未巳也宣和二年冬至之前一日飯食訖整衣趺坐合掌加額怡然而逝其徒哀慕如亡津梁如失舟楫莫知攸濟嗣法兄佛果大師克勤狀師之行且謂某曰師之於公風聞而悅一言而契今其逝公實見之知師莫若公是宜為銘乃序而銘云師姓李氏名清逺蜀之臨卭人捨家十四受具嘗依毗尼師究其説因讀法華經至是法非思量分别之所能解持以問講師莫能對乃曰義學名相非所以了生死大事遂捐舊習南遊江淮間遍歷禪席聞舒州太平演道者為世第一流宗師徑造其室恭事勤請既入益堅演深竒之謂可以𢎞持法忍壁立不少假冀其深造師七年未嘗妄發一語一日有所契洞徹超詣機辨峻捷莫當其鋒自是釋子爭歸之而師益靜默自晦不自為得隱居四面山大中庵屬天下新崇寧萬壽寺方擇人以處舒守王公渙之迎師住持未幾引去會龍門虛席遂補處焉居十有二年遷住褒禪山三領名剎所至莫不興起其在龍門道望尤振四方學者皆曰吾必師龍門由是雲集至居無所容師不起於坐而化湫隘為巨剎壯者效筋力智者授軌度富者施資財初不祈也師嚴正靜重淡泊寡言笑動有矩則至出語和懌中節人服膺之其為教則簡易深密絶蹊徑離文字不滯於空無汗漫之説不以見聞言語辨博為事使人洞真源履實際非大有所契證不妄許可平居以道自任不從事於務嘗曰長老但端居方丈傳道而巳與士大夫遊不為世利屈茍道合則欣然造之不爾雖過門或不得見公卿大人高之樞密鄧公洵武聞其風奏錫紫衣師名司諫陳公瓘見所傳語法歎曰諸佛心宗衆生性海逺公涵泳深矣皆未識師也况其親炙者乎與佛果佛鑑同門莫逆道價相高世稱東山二勤一逺云嘗宗百門義著圓融禮文又托楞嚴法華著普門禮文並行于世其參學得法者無慮數十人士圭善悟為之首而宿松無著道人李法慧頗臻其奧師壽五十有四僧臘四十將逝謂其徒曰諸方老宿必留偈辭世世可辭耶直將安往逮終無一言初在龍門作靈光臺以會葬苾芻之火化者且自為志曰余它日亦藏於此後門人函骨以歸龍門龍門人悲且喜奉之如生以宣和三年正月壬寅塔成銘曰大智唯心無南北祖一離其源遂開牖户守玄尚同執解隨趣岐行派流既倒莫遡洪融混合演得其醇師則嗣之道益以尊如收全潮衆波莫分如舉大地萬有以陳用晦而明厥問四馳覺迷解繆逺邇是依用捨孰測動言有規嚴以治已夷以示機端居叢林唯道是則化行事修不失靜默大興龍門蠱壞以飾洞明真源深履實際圓融普門並照兼利最後説法不立一偈嗚呼師乎孰識其歸淵澄月現舟行岸移於一舉手示大慈悲元珠在前罔象莫窺後學誰師靈光之碑宣州昭亭山廣教寺訥公禪師塔銘昭亭山廣教寺住持師守衲壽七十六僧臘四十五以宣和四年三月十有八日無疾終闍維得舍利五色不可數計其弟子虛藻等即奉師骨塔於寺之西南隅一分以葬金峯師之舊隱踰月塔成虛藻持余友人卲搏暘叔狀來請銘狀曰師族鄭氏其先吳人本衣冠子業進士有聲場屋間性剛志潔不喜接世俗事視紛華淡如也聞棲霞山雲渺庵主能以出世法導人因往依焉後遊錢塘淨慈寺得圓覺几案間披卷恍然若獲舊物誦至今者妄身當在何處心目開明踊躍自喜乃棄儒衣冠禮圓照本公為苾芻師具遊方至圓通秀公室圓通知其法器一見許之決剔疑情卒為印可在熙寧元豐間圓照圓通道行當世巨公要人咸所嚴事而師實出其門叢林學者尊之皆以訥叔稱焉住蕪湖吉祥院江寧能仁寺繼遷華藏皆當路以師道價敦請之非師志也嘗曰比丘辭親割愛出離世網當以因緣果報為念詎宜俯仰世權執事住持為人役耶故所至未幾輒辭去隱居於宣之涇縣邑人王文誼為築室金峯以居凡十有六年宣和辛丑龍圖閣學士毗陵錢公即來鎮是邦會廣教住持虛席公曰此唐相國裴公隱地斷際禪師道場也冝得道行為衆欽信者居之無如訥者辭老且病公卒以禮致之師雖久於自晦一旦復出四方釋子摳衣問道雲集輻輳方來不巳而師遽逝矣惜哉師逝之前二日嘗以頂相封授其徒既而啓封得偈二十言有違世之意其於死生際了了如此師為人徑直精敏勇於踐履禪觀之外博極羣書賦詩屬文自號莫莫翁有集行於世作大藏節要二十門門門為之序節宗鏡録十卷擬寒山詩數百篇浩博淵奧事理並舉皆以寓教觀者獲益焉噫余之愚且從師未久固不足知師而暘叔深於禪者其言炳炳可考則師之行信矣惟浮圖氏以真實不二為宗以謙卑慈忍為行以戒定寂默為修至其弊則流而為詭為戾為貪又其弊則誕惑不根捷給尚口訾慢自我好為人師浸以相承不知其失而道日隱矣如是習者怠信者疑使人得以議其教是豈教之罪也以狀考之師則無是殆所謂明於宗篤於行而得其所以修者歟嗚呼亦難矣哉是冝銘又師之嗣法兄法藏卓公視余為猶子故余之諸父從師遊者衆師亡之夕見夢於余若有所屬者則銘師尚可辭耶銘曰真離誕勝日翳昏疇始離之莠暨薰沿非傳異益放紛惟師友德合於渾堅持所修修所聞塵銷覺圓靜以醇死而不亡法中尊大智禪師塔銘政和五年嵗在乙未十一月十有八日大智禪師希覺示寂不病不恟無有恐怖以清淨水盥身垢已顧大衆云一切諸相皆歸壞滅言訖而冥其嗣子法淵號曰慈覺於後七年於寶勝寺作窣堵波藏其遺骨稽首來謁筠溪居士請為之銘居士於法未得自在不能悉知是大比丘諸微妙行復告慈覺為我宣説汝師所得何法我當為汝稱揚讚歎於是慈覺良久答曰我觀世間以及我身諸所有法因緣和合衆妄發生譬如幻師見所幻人了無可取及諸取者况復有得而可言説我今若言如是為法如是非法是為謗師及謗如來然念我昔起心修行菩薩梵行勤求如來無上正覺於善知識生尊重心恭事懇請無有疲厭以是力故得大辨才能知一切出世世間諸言辭海亦能普出百千種音於一偈一句乃至一字廣演無量難解最上勝義自謂巳得無礙法門持以求證諸大導師咸皆稱讚與我受記令我信心益自堅固最後得見大智比丘彼時見我説此法門而作是言善男子無以聲音語言而作佛事勿謂如來正法眼藏而可言説末世衆生以取捨心希望成道唯益多聞增長我見我今默示汝三昧無有一法不從此出而實無有一可得法我時豁然證無所證拔猶豫箭截疑惑網了知一切不從外來雖復與我最初法門不見分别是非二相而令我心轉加調淨如炬得火普皆光焰如舟得楫無所繫著我即於彼大智師前歡喜踴躍頭面作禮而自歎言善財南行還見普賢從初發心所入佛剎不及普賢一毛孔中一念所入諸佛剎海微塵數倍我於大智亦復如是故我今者欲以一法為汝演説實不可得又我嘗聞是大智師夙植德本久修勝行於過去中親近承事佛印比丘佛印為言心境俱亡復是何物即於彼時證是三昧解力廣大信眼明徹直趣菩提淨出離道證燈相然復以示我非唯示我亦以深心起大慈悲於未諸證悉以方便種種開示因此願力入菩提場三十九年四領寶剎所至興起度大弟子嗣法住世皆能於是三昧轉大法輪紹隆佛種無有窮盡居士聞巳得未曽有即為慈覺以偈讚言飢者易為食無復嗜正味辛酸及苦鹹自視皆甜相至其屬厭時不起更食想享以衆妙膳而反生惡憎衆生苦輪回樂法求解脫因樂轉生愛增長我慢山聞聲及見色得少便為足而於正法中乃作空寂怖縱橫斜見材閉障出離道自謂巳證得不知流轉因良哉大智師與衆作依怙能於不二門示現無相法減惑斷諸見聞此正覺知如持具足器盛滿甘露食隨取得飽足歷劫有無盡衆生知正味永不念它食唯趣一乘道餘二即非真剎那滅阿秖十方亦銷隕如是大智師在處俱現前雖復示涅槃而實未嘗滅故我與慈覺歷耳得千悟言説永不窮稽首第一義筠溪集卷二十四
