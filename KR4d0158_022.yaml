body:
  text: 筠溪集卷二十二宋李彌遜撰銘富子立誠身齋銘物不可得而正曰正巳巳不可得而正曰正心反身而誠以合乎真盡天之道而施諸人其感如神子其書諸紳富修仲學古齋銘稼也圃也亦周其身箕也裘也不違其親有君焉俾榮而尊有民焉俾厚而醇誰其師之惟古之人富南叔靜明齋銘火善晦傳薪而不昧淵善審鑒物而不隱君子能定泛然事物之應勿用其明而守其靜李嵩老端虛齋銘端者有隅不為世趨虛者若愚受人有餘甫也避俗清淵藏珠有是二善其學日腴淡然與古為友紛黃卷以自娛曰吾斯之未能信人其捨諸蘇粹之所惠百衲琴銘琴百衲衆響合虛而清絃外聲以娛吾老子孫其永寶蘇粹之吟龍琴銘木中有龍叩之雷聲衆人不識三年不鳴蘇子得之將發其英養之以和平無使聽者驚林明甫所贈研銘淵中之藏石中之藴賦以方圓造化所靳發為文章古今不磷林子以歸我我以比玉潤張仲宗研銘清而不臞其質也溫而不腴其文也歷萬險而不磨閲世之久也出衆巧於無盡寫物之工也誰其有之張子仲宗也而銘之者筠溪老漁也葉子謙研銘方而虛圓而隅玉質而石膚君子是如贊筠莊真隱自贊其行巳也方其居心也廓泛然遊世應而不酢是子政宜置之丘壑普濟歸寂禪師真贊善哉歸寂尊住世本悲願慈眼視衆生有緣悉皆度樂迦無動轉人見自開闔光明一瞬中銷我心目咎妙德不思議是故應頂禮慈蔭性空禪師真贊善哉性空尊正定坐道場巍巍金剛身不壞本來相四大各有還示汝無還者不離一毫端智者當自見此法妙難思是故應頂禮慧慈獨覺禪師真贊善哉獨覺尊具衆最勝行全身藏北斗復見百億身慧日及甘澍能救世間苦衆生願未盡赴感靡不周善巧無有邊是故應頂禮楊岐會禪師真贊樂迦羅眼遼天鼻喝下全機失臨濟端公演公俱錯會從此兒孫遍天地褒禪佛眼禪師逺公真贊團團無縫塔貌出世間樣五祖親聞平地雷龍門自起無風浪殺人活人手縱橫不作機關呈伎倆傳家一喝付兒孫堛塞虛空沒欄障眼中著意不逢渠出入諸人面門上雲居悟公真贊二首逺之子演之孫持心以介接物以溫其真純之機一字不立也似演其虛寂之守一絲不挂也似逺諸方老成見而則之筠翁聞風而悅之平生悟鐵壁佛眼覷不見坐脫不記年却向箇中現大似龍間老古錐覿面機鋒急如電聖泉嶽公真贊金剛圈栗棘蓬不用間家具排圓悟斥妙喜不傍人門户稜稜寶劒倚空寒觸著面門沒回互放行把住總由渠不負楊岐親囑付玉泉山懿公真贊穿得衲僧鼻孔立得叢林榜樣正法眼從楊岐來作家曲為圜悟唱普明居士同參妙喜老人同行是為知庵矮師叔萬古巍巍真實相承天文公真贊不喫趙州茶不打禾州鼓擊碎楊岐栗棘蓬平地機關起佛祖逆行順行總逢渠八面玲瓏沒回互諸方那得此老翁識者名之小圜悟壽山惠通一老真贊手中能幻妙喜界鉢裏常開具足城處處逢渠人不識只緣眉目太分明序送卲公緝還鄉序宣城古名郡而負山帶江行者以阻四方之士大夫非職事走未嘗輒至故俗尚簡不相友事宣和壬寅僕從季氏來丞兹邑始至屏居念咎不多與人還往正晝闔户繹編帙成或熟寐通瞑百不一問相栩栩自樂也賓至則謹冠履正紳笏偶坐寒溫而退日雖數不敢怠間而彌月一接人亦不以岑寂自嘆既數月卲生緝者來見貌甚間服甚野頰顴竦特眉目濯濯秀發余固竒之後纍見益親出其文有典則誦其學知閫奧叩其胸中足以相表裏始與之友於是出有與並驅居有與共席朝莫有與辨是非考古今以講習唱酬嘯詠於間暇也稍不與接則介然於懷若有所失矣一日謂余僕親官滿當歸而田疇未墾室廬未闢其敢以貽父兄憂請以身先且曰僕野人是行若圜鑿之赴方將岸巾負耒從老農之後以終吾身當世之所為吾弗為也余聞而愀然為之改容曰噫余之窮於斯得子以忘其獨今去我是造物之益窮我也雖然子之行職也余不得而止子之説則不可願有以告夫學之為王者事子其知之古人未嘗不欲仕也而必以正必由其道不幸而行躓言沮則視去其位猶脫屣之易樂於畎畝飢且死不怨固未有誦聖人之言學其道可以行而終止者今子桐梓之拱把楸柏桑之三圍四圍者也不盡其材充其有以施諸人而以無用為全獨善為德者畫也以余之愚學不足以飾身其敢責人以所不能然隱居以求其志行義以逹其道嘗聞其語矣吾子勉夫送秀化士還金陵序天寧端禪老遣化士法秀自金陵來謁余余方諱窮無以供其求將還請言為贐因語之云昔維摩詰遣化菩薩詣衆香國香積如來持衆香鉢盛滿香飯而以與之悉飽會中菩薩諸大弟子八萬四千人與彼國來九百萬菩薩虛空地神釋梵四衆各各厭足我今施子以孔雀瓶滿中擎空歸餉會衆彼飯有量而空無盡彼飯能飽一毗耶城而空性周遍無所不在假使舉恆沙界末以為塵一一塵中一毗耶城一一城中有如是衆隨取隨與至百千劫無有窮盡况一天寧耶則我與子所作佛事是最上施是不可思議施於十方如來同一法施比前功德百千萬億分所不及一未易以算數譬喻計也子歸持我所施與語子者謝端并求北山老人為作證明送慶侍者遊諸方序慶上座十六受具戒十八遊諸方遇本分宗師指直截根蒂正因正受不枉工夫踏著路頭須臾進步從入者勿著一塵不可得少為足放意外求增長見山畨成過咎要令舌端生荆棘筆下長蓬蒿拈頌代别且置一邊異時呵佛罵祖不讓於師八面四方何憂不契居士俗人不知向上事以自病故衆生病三十年後當信斯言珍重舍人林公時敷集句後序章句之士溺於所長以自窘束不肯棄繩度壞藩維放乎大肆求夫忘其所能寓於不得巳合衆巧收天地萬物之竒以為功未有也介翁深於詩不自立户牖其欣於所遇悲於所感賦事體物酬餞贄贈一取它人語而櫽括之章成千態萬狀貫穿妥帖不見罅隙皆足以發難顯之情至其奔放曲折莫可排障浩浩汨汨行於地中是豈章句士所能為哉自風雅之變建安諸子南朝鮑庾謝輩至唐以詩鳴者何止數百人獨杜子美上薄風騷盡得古今體勢其它旁門異派如沈宋韓柳賀白韋應物劉禹錫李商隱杜牧張籍盧同韓偓溫庭筠之流其精深雄健間淡放逸綺麗軟美變怪各自為家而元輕白俗郊寒島瘦後世或以為譏乃欲奴僕命之拔其尤揉而置之關紐間使出一口如將狼如探虎如陳市人噫可以為難矣集句唐人號為四體國朝石曼卿始以為名至元豐臨川王文公進乎技矣東坡好為高世説雅不與臨川相能故有鴻鵠家雞之比自是靡然不復相尚其後學詩者流聞於膏馥之餘爬羅牽挽僅相比屬則揣意語近似而命之題雖形模具存真木偶人愔愔無復生氣觀介翁之作失喜自賀不意復見前輩向使坐筌蘅蘭蕊之室享笙竽琴瑟之奏登魴鯉牛心熊掌而膾炙之不足喻其美且樂也介翁敏博而文讀書過眼輒誦自著及訓解卷百有竒煨燼之餘唯此藁存其所用詩上下數百年凡二百八十家且曰惜哉使我不得置東坡山谷語於其間也其受才廓逹雄鷔大而難用立朝不避怨嫉宦不遂抱其藴以死樂天嘗嘆陳子昻杜甫各死於一拾遺詩人之蹇古以為恨翁為泮宫先生於東平僕時在諸生中及後讐書天祿翁為道山長翁沒二十年得其子敡妻之嗚呼僕也從翁之久之親而不得見此詩於翁之未沒而親炙論辨範模之戚焉不解於心故書其後以志福州仁王謨老語録序豫舊觀東坡南華寺詩意明上座非凡僧後二十年始識之於姑熟隱淨方丈時夢堂新成尚虛數與豫偶坐堂上味其言非凡僧也其後退居堂中故衲子多以夢堂稱之自是諸子得髓得皮名滿四方矣紹興乙丑偶居福之仁王謨公始來補處是剎相從五六年間叩之益深真夢堂子也夫祖意不立文字然非言句無以顯機亦無以觀來學與奪之柄正在於此從上祖師古尊宿拈頌代别的有深旨謨公早得夢堂不言之妙而嘗學詩於郭祥正李端叔二俱不立自成一家故其語言三昧超出有無諸方所不及焉侍者元嗣録其上堂小參問答之語請敘於豫豫老病不能為文姑述其父子相知之舊授之記福州連江縣新學記長樂居海南服視中州為支郡連江又居郡之隅余之先實家焉自三世祖出居越百年而歸始至往拜於學顧基宇庳陋在水之湄嵗以大浸土穿木支鳥鼠不可遊跪奠既降趨而出懼將壓焉因喟然曰人之於窮達命也物之於屈伸時也事之廢興成壞相循於無窮抑亦有數存焉古者國有學黨遂有庠序在泮之盛頌於魯僖而後世至有城闕之嘆亦豈人力之所能致乎國朝慶歷三年始詔天下立學繼承緝熙至於大備爰自軍旅之興天下靡然賤者荷戈貴者橫槊俎豆之事不講有官君子至以學校為諱通都大邑僅有名存而况于遐方逺服乎兹縣小而地偏政久不理蠧弊百孔牢不可破異時有令而才如治棼如雕朽能起民瘼屏吏姦巳足稱良奚暇議此哉是可嘆也紹興戊午余官中朝友人林日華以書見貽曰幸矣吾邑之得賢令尹也不簡不苛不溺於近事之叢脞者剔抉之弊之盤結者芟夷之居未三月邑以大治閔舊學之廢將改作焉我卜於衆得東南爽塏之地背長汀而面雲居前案三山符古語胡蝶水中之讖可基焉又帥諸鄉老好事者陳元禮林芘林錞之徒得緡錢萬有竒以代公家之費告於尹尹喜以十一月丙午既經營之矣越明年秋七月學成以圖來求為記視其基高以固度其宇深以崇重門修廊巍殿中峙駕説有堂翻經有閣居有齋休有亭繚以周墻蔭以嘉樹閎壯之規煥若在目嗚呼事之廢興成壞誠有數焉以前日之陋庸詎知今日之麗耶雖然非尹之力能及是乎其所以惠此百里者深矣百里之士宜若之何而報尹也余聞學者所以求夫在我者而巳故孔子舉一隅孟子先自得大學之道以正心誠意為本至見於事業發為文章用則施及天下不用則藏諸身猶足以垂訓於後世亦推此而巳去古既逺聖人之道不得其傳士知尊記問之師而不知學其所當學至玩嵗愒日盡心於雕篆鞶帨之習以為干祿計幸而得之則曰此儒者之效絶學可矣豈不大惑歟今邑之士遊息於黌宇之下誦詩讀書參稽百家六藝之説以求其所當學異時躐賢科登膴仕見於有行以聖賢為師而不為世儒之陋則不負尹矣可不勉夫噫學校王政之本也視其廢興治亂之所繫焉余之出守也自北而南至延平延平之學成至溫陵溫陵之學成至漳漳之士子有移學之請余從而移之連江邑也亦以學成來告會建言者謂當修文事請增葺天下郡邑學舍朝廷從之余喜斯文之未墜王道之復行也故因為之記而書之令尹括蒼林覺也記之者邑人李某也福州乾元寺度僧記浮圖氏以空寂無我為宗三世諸佛諸大菩薩因地行願皆由衆心起故其為教慈忍悲施悉以利它不求自利悖是而行非如來之像法既衰人鮮知道其徒熾然以希求心行違律事穹廬沃壤文衣豐食薄衆人之奉以厚已拔一毛而利衆不為也福州乾元住持紹宗與寺僧法圭者募諸信士得錢六十萬有竒不以供它費貧不給者悉以貸豫收其贏度有功於衆者二人將自此始嵗以為常也昔佛在舍衛次第巡乞不生高下違順二想施者受者如出一心與諸衆生共作佛事不聞約與而羡取之雖然能使積者散貧者給惰者勸賴以獲益者衆尚庶幾焉悲夫今浮圖之類戕物自恣不為其所當為而宗輩或能推利它之心故為書之支提山天冠應現記南海之濱有大寶山名曰支提衆山圍繞於其中聞有大菩薩號曰天冠與千衆俱往昔吳越有大檀那諡曰忠懿建阿蘭若集瞿曇子莊嚴佛事是諸菩薩現諸實相令諸衆生起諸信根爾時普現念念思惟諦觀是身衆妄和合貪嗔及癡增長我見誓截疑網趣出離道與其同學招隱居士各各將子稽首來謁經過險絶無有疲懈詣彼化城尋求寶所至寶所已而不見寶了知菩薩空寂為家以無所住故名常住作是念已顧瞻之間有二馴獸純白無染如師子兒回旋中林奮迅而去香雲既升天容開闔山巔木杪皆有精色復有梵音發於山谷鏗鋐鏜鞳如撞巨鐘四十有二復有寶光現於峯頂熒煌曄曜如燃巨燈十目爭覩於是住山善秀比丘為居士言我從昔來長養衆善坐菩薩場多歷年所未嘗得聞如是種種諸殊妙善晝夜六時應念俱至汝今為我稱揚讚嘆令諸未悟生精進心居士聞已歡喜踊躍重宣此義而作偈言我觀大覺中如海衆漚發衆生佛菩薩同一三摩提背覺合諸妄展轉生內塵調御天人師方便破諸暗還汝一精明塵銷覺圓淨譬如逃虛子捨父久復還受之具足器了不從外得我行支提山詣佛所住處巖巒水草樹但作世間相非唯所見亡亦無能見者天冠妙智力惠我大三昧撞鐘及燃燈衆相自呈露我見此光時眼根得清淨我聞此音時耳根得解脫見聞如幻翳斯語未真實如是千菩薩不可以相見一切唯心起莫作聖解觀音聲及光影亦復無自性不從有中生不從無中滅一鐘既發揚一切聲亦然一燈既顯照一切色亦然聞聲及見色天冠即現前一剎既周遍一切剎亦然大千恆河沙一沙一佛剎一剎一支提常住菩薩衆如是一一剎復有諸恆河一一塵沙中復有如是境旋聞返自照悉現妙明中無人亦無佛十方亦銷隕如海衆漚滅寂湛了不動法界同廣大歷劫無有盡我作如是説用報慈忍恩虛空不可名我亦未嘗説未來見聞者應作如是觀太平道院新造三乘小像記嶽陽節度使西外宗正趙公端禮於太平道院新造三乘小像以釋迦如來居中彌勒在左無量壽在右面如滿月身相端直優鉢曇華為菩提座六大菩薩慈容粹和補陀大士無畏自在復有住世十六大阿羅漢各以願力現諸神變復有四大天王威德堅忍却諸魔事復有二金剛神勇猛可怖守護正法復於别龕示現旃檀端相如來巍巍堂堂如星中月寶華莊嚴幢蓋間錯散諸香雲彌覆其上恍如靈山一會正在目中公初以紹興巳巳三月得無量壽舊像於太平主僧了心極愛重之塗以金碧粲然一新不踰月有持彌勒與六菩薩至者即以萬金易之於是始有求中尊意明日宗長乃以來獻既喜且駭其後每有所求應念輒至若有神授至七月畢集是諸衆像純以紫金旃檀寶香所成工巧之妙侔於造化或有損缺為補治之或有殘剝為粉飾之小大修短各中規度如出一手有目以來所未嘗見四衆瞻仰莫不驚歎此大竒特希有之事我觀往昔諸佛出興於世皆以一大事故普為人天宣説妙法作諸勝因華嚴界中七處九會其它或在耆闍崛山或在室羅筏城或在給孤獨園不可勝舉皆是時節因緣今百年廢壞之餘一旦復聚與正法時了無二相殆非偶然以公直心為德具衆善根於宰官中作大方便是故三乘同時出現咸欲使公覩兹殊異發菩提心悟此色身如芭蕉堅觀諸妄境如境中像了無一法是真實者離世間樂安住法樂漸次精進至安樂國見者聞者同證此道普現居士作是語時不唯此會諸法中王乃至一鄰虛塵所現億萬世界河沙諸佛皆共讚言如是如是宣州涇縣銅峯瑞應塔記浮圖氏以莊嚴作佛事華嚴經中演説一佛出現十方大梵天王各以衆寶種種香雲來興供養皆是稱性所現量同虛空無有邊際像法住世衆世根力不能作大因緣如來為説舉手低頭皆成佛道乃至聚沙建立佛塔如庵末羅果所安輪蓋如娑矩羅華所獲功德與彼梵天等無有異蓋緣一念所起周遍法界剎那之間成就現前如一毫端衆鐵圍了無大小成壞之相是故如來作如是説宣城山水之麗冠於東南涇川又為宣城之冠有大寶聚名曰銅峯皇祐間有僧可照一住四十六年其後華藏禪師守訥退居兹山始建伽藍增廣勝概乃於南山瑞峯之巔作窣堵波始基會郡將錢公即以廣教延師遂寢爰有日智比丘以大勇猛欲成師志乃與邑士包整張公起共為勸緣鬼神獻竒山川助勝冨者供資財貧者施工力纍級分楹金石間錯橫筌架芷欄楯交映巍巍煌煌崇高顯明逺近上下無不快覩於人天中作大智炬創見者得證悟巳悟者得覺了不五年間成兹勝事以宣和甲辰春告畢乃於三月天雨寶華秋七月復現金燈時普現居士南遊是城聞所未覩故以瑞應榜之後二十六年居士於福城東見日智比丘云我以慈力哀憫有生罹此兵刀諸大苦厄欲令解脫為收遺骸幾及十萬所過名山飯僧百萬衆供幽明水陸幾二百會募衆誦經三百萬藏開華嚴場結會一百萬人漸次遊行以至於此居士聞巳稽首讚言是大比丘於往世中單修三摩提故得如幻三昧悟諸如來成道涅槃種種諸相皆是幻化三界所現六道四生種種諸趣皆依幻立五濁世中生死善惡種種諸業皆從幻生是故由衆生心起是悲願作諸勝緣咸度脫之譬如幻工作衆像雖知一一唯我心造了無實體亦加嚴飾畢竟成就若是比丘於一切處見有一法非幻化者則為住相則有希求不能發如是無礙大願作如是無量功德當知是人不見有佛不見有衆生乃至不見有我身心二相作者受者皆悉同於龜毛兔角是為不可思議居士於此幻化境中乃復如是分别言説稱讚莊嚴佛塔功德亦復稱讚日智比丘如是難行之行如以衆色繪畫虛空與諸如來同一方便若以相觀無有是處筠溪集卷二十二
