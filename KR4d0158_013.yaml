body:
  text: 筠谿集巻十三宋李彌遜撰詩五十四首陪館中同舍遊方池分韻得香字紅蕖碧水如曲江醉惱諸人欲斷腸波光花氣來無旁人面生春酒面凉男兒莫遣兩鬂霜何妨騎馬似知章銀鈎未落片雲黒定有六丁呼阿香贈朱少章堂堂如叟雲夢胸筆端日夜生雲風地臨嵩少萃竒秀雕鎪彷彿窮天功捷如接猱健搏虎嫵媚清切歸深雄六丁不取四天黒隂山直恐喧雷公寄題翠樊亭何斯舉所居何郎愛山知貴目不着芒鞋踏空谷誅茅結竹凾丈間坐揖崔嵬遶江緑我亦尋幽不憚逺半世一身隨轉轂峰巒過眼已成夢南北空嗟髀消肉羨公登亭如厯塊睥睨乾坤輕一芥春繁嫵媚發竒姿秋凈孤髙見真態固知靜者自超詣世上憧憧良足隘智愚何止三十里咫尺湏論百千界四時秀色供盤礴筆下雲烟醉中落雕鎪苦欲覷天巧造物有靈應作惡蓬萊方壺或上下紛紛陵谷今非昨倘令夸子與霄遁胸中頼有藏山壑贈别竹西王彦升居士參軍四壁生秋草鬂毛不似秋先老終隨烟霞學巢由一室安能事除掃竹西舊説青雲客詩思長留意無極塵埃不見㐮陽山頼有斯人道消息赤心照日青眼明與君一見輸生平君去摩天學孤鳯我今飲海盤長鯨雲車􅀈兮風馬休呼兒乞取千金裘明朝有句道不得黄葉滿庭無限秋行路難江心蟠石蒼虬立山激江流浪頭急風昏月暗魚龍愁電掣雲奔鬼神入船頭星斗天爲低夜潮生寒洲渚移鳴舷鼓枻驚椘子危檣逺䌫號吴兒篙師咄咄自相語明發扁舟繫何許半月行江十日風寸歩家山隔秦椘黄衫年少金雕鞍日髙華屋春夢殘挿花走馬咸陽道世上空嗟行路難舍弟以詩貸粟邵叔暘次其韻於陵三咽不待糝重義輕身誠果敢首陽一死甘如飴未覺此身真壈坎丈夫有志窮益堅肯爲猩唇賤昌歜髙門下筯羅甘珍大臠觜拌不供啖吾儕朝飯不謀夕惟有生芻縁我斬富當學禮貧忌惻莫遺覊愁到顔色兩公雖槁道則腴毎食空多信何益縱令日興費萬錢大似鵷鶵見鴟嚇我今藜藿還苦併尚喜剛腸柰燒炙自營半飽固已勞忍取畿人重三尺去年避賊奔如流百區不易金一鈎縣官布徳速置郵奉行一律亡劣優但知捜粟逃身尤吁嗟富民思故侯獨宿昭亭山寺山寒六月飛霜雪樓殿夜深鐘鼓歇琅玗無風萬㦸閑屋角明河挂天闕龍牙七尺玉壺氷炯炯神清夢不成可憐幽絶無人共卧㸔雲頭壁月生子美士曹送示梅花似表弟有詩因次其韻春花先到詩翁家融和入木生妍華攀條不减隴頭贈與我病眼増空花輕綃襯雪香未透月中妃子新來痩意態輕盈總不如孤芳雅合羣花右速令解盎傾彫胡叩門換酒呼長鬚對花劇飲百不問此身如視秦人臞一枝相惱已如許況及秀發連根株春工日夜正剪刻東鄰缺好公知無㑹湏空腹貯好語醉中要㸔雲烟書丞㕔後圃雙梅一枝發和似表弟韻漫游蹤跡成浮家一身四海驚年華不禁草木競時節忽見雙幹排新花曉雲生寒日未透南枝半肥北枝痩就中一枝最先發浪蕊浮花敢居右山翁渉世如狼胡功名日逺霜凌鬚與花同是江南客一笑爲解東陽臞吟哦遶樹正百匝未放零落空殘株春風雜花儘明媚此君風味懸知無雨中着子尚不惡可堪老葉繙虫書嵗後三日與羅叔共二郡似表弟席上分梅花年後多韻得多字刻燭成春風一夜如鳴鼉殘香暗粉驚辭柯新春三日駒隙過花前百罸寜辭多男兒莫遣兩髩皤舉觴不飲理則那酒酣不用呉姬歌短鬚尚足供吟哦坐中鮑謝偕隂何語如韶濩參鳴珂鏗鏘入耳痊沉疴豈獨使我衰顔酡我今官閑得婆娑遲明更上梅花坡春日同逰梅花坡分韻賦詩坡字春江曉鼓收更鼉筍輿催上西城坡嵩陽散人藍田吏紫髯參軍三語羅機雲兄弟更竒絶杖藜雜沓行逶迤孤芳冷蕊正明媚却笑桃李空繁多卑枝横路靄香陣逺樹山林揚素波石腸冷淡老眼暗對此不忍空樽犧四賔衮衮飲翻河扳花覆盞自起歌語劇嗔眉動輕皺酒薫笑臉生㣲渦跳丸背我何太急誰爲返斾追羲和商量嫩蕊暫留駐後來載酒無蹉跎過魯公觀牡丹戯成小詩呈席上諸公昨日花間風送雨淚臉凝愁暗無語今日花間天色明向人艶冶百媚生雨中多思晴亦好日日㸔花被花惱人間絶色比者誰漢宫飛燕開元妃輕顰淺笑各有態淡粧濃抹俱相宜傳聞姚魏多黄紫醉紅不似當筵枝移樽洗醆苦不早明日春光暗中老西齊居士心已灰也向花前狂欲倒虞仲通判以溪聲名軒約同賦山根出泉㵼鳴玉上有蒼崖擎佛屋無風水石自撞觸不盡潮音發寒谷宰官不是雲間陸舊識南泉生䖏熟當軒大榜與名目平地重翻偃溪曲曲中時轉三妙語一一音聲談佛祖喧豗噫視十方鼓萬壑風雷送烟雨此聲不屬聞中取六鑿相攘竟誰主後來紛紛何足數五乳峰頭曽賺舉山翁有耳百不聞團蒲曲几窮朝暮何時沿溪掬寒緑掃葉煎茶睡初足夜宿昭亭寺舍弟以公事歸城中與梅公澤邵公序昆仲待月山亭取酒共飲明日舍弟有詩次其韻解衣夜泊靈山巔胡床待月松風前已令圓頂具白氊更促方屨收青編茶甌過眼見樽俎蔬筯放手羅廿羶清逰逸興在一舉騎鶴大勝揚州仙吾家小弟困薄領到䖏鳬鶩長摩肩歸途遇酒成歎詠飛奴持送空聨翩絶知勝境外塵躅誰可浪得麻姑鞭詩梅易邵真二妙手拈羣書類蝸涎拉枯拾芥真戯事不待萬選知青錢賸傾醇酎澆舌本要取金印纍纍懸客誦故人劉立道梅花詩有懐用其韻以寄之桑柘如錢栁如雪南村北村欲蠶月老翁飯飽摩腹行白鷗自隨閑喚鉄扳花正恨顔色亁哦公七言毛骨寒惜花不似愛詩苦即遣愁海回狂瀾公今爲郎尚黒髮仕路不應嗟歇滅江頭官閑來雁多莫使故人書斷絶春風歩馬芳蘭臯思如哀鴻獨求曹㡬時懐抱相對盡桂漿酌㪷供詩豪秋夜枕上偶成七月西風捲殘暑砌外蕉梢响寒雨青蠅歛翼蜩收聲樓上逢逢夜將午徽絃信手酒自傾一杯一杯宫羽成醉頭着枕百事置夢殘睡足天未明趙彦術於姑熟倅㕔作寄傲軒請予爲詩寄之王孫自古豪而迂五鼎不換一束書江城别駕轅下駒升斗未足回清臞曉衙吏退誰與俱傍砌燕雀來將雛室中塵凝生白虛竹色照座花連株南忩曲肱凈籧篨軒忩勇往羲皇初淵明雖逺㡬類拘輕去彭澤思吾廬人生泛如風中桴況復蜕視千金軀公家舍屋爲補苴政成訟簡日有餘斗酒近局聊相娯三年官滿鵲棄居後來好事猶今吾至哉此樂陶不如邵文伯得玉蘭於昭亭持以見遺因求詩爲作長句羲和呼龍曉耕烟斗挹沆􅒭膏瓊田青女剪刻了不睡瑶草競秀爭春妍凝氷作膚露作臉蕙花蘭幹香蘅荃仙人掌中太華小上有玉井開叢蓮雲璈舞鳯醉妃子遺簮亂挿春風前蓂花含缺月皎皎琪樹弄影霜鮮鮮清氛皓態難比並世上草木誰能肩虞師老圃眼未識名字不着三墳編山翁何從得此種一日萬口人爭傳我慙形穢敢居側熟視眩轉心茫然遥聞嗇夫訪竒秀忍使抱恨蓬蒿邉天衢五城白銀闕複道小苑通如纒何人移植備採撥珊瑚碧樹根株連重瞳一顧雨露偏薫爲叶氣被八埏家家擊壌歌豐年不但洗我沉疴痊將至徽川道中作平生愛山老山間行山怕盡去復還兹遊深入衆山囿一日㸔盡平生山頗聞黄山最竒秀紫翠六六堆孱顔端如啖蔗及佳境快意不復嘲天慳我生目力固有限應接不暇愁躋扳要令胸次洞表裏掃盡礧塊羅烟鬟山行遇雨滄溟四乾青虬立碧雲摩霄髙嶪岌六丁夜挽天河傾石骨無塵露蒼濕長風吹雨不成絲飛鞚衝山帶烟入羲和回馭還青冥布榖催耕喚春急黄山在歙郡之北雄麗傑出可與嵩少爭衡世傳黄帝與浮丘容成公鍊丹其下功成仙去南有紫陽蓊欎相望唐景雲中仙人許宣平舊隱也伯氏來倅之始鋤荒聚礫爲臺數仞攬二山之秀既成予自宣來乗髙四顧飄然有凌雲意思電旌風馭朝夕往來其間作歌以招之云髯龍飛空去雲急雨翁蹋雲挽龍入猩啼鶴怨凝春愁三十六峰黛鬟濕紫陽照空天夜明棲烟採玉唐宣平碧桃自熟人自逺千秋月露含凄清璜臺十成架蘭芷花風吹樓蔓香起青霓叩閽帝下逰挹斗扳箕荐瓊醴南山北山朝莫青關岫幌開鱗鱗衆真胡爲駕凌冥寄言流星盍歸只宰官自是騎鯨李夏日邀客飲月下偶作晴空倒挂秋江平仙人攜盤上青冥珊瑚無根倚霄漢影落夜水魚龍驚流金焦土天六月腹欲生茵頭生蝇恍然坐我風露下濯以三峽吞層氷稍收𤓰李入飣餖凍酎照盌玻璃明呉歈始作蛙蝇閙巴管一洗鸞鳯清孤光當天萬象出斥去不御悲長檠人生重如參與商短鬚數挽驚飛霜但願月明酒如江與君急管催羽觴酒酣㧞劒起爲夀劒光稜稜入牛斗不放浮雲變蒼狗夏日登臺晚雲層疊若衆山狀伯氏令賦詩因成長韻陽光潑血汗交頤晚日政與長空宜海神逰戯出霮䨴風伯退聽停嘘吹初如炎官火傘動漸若寒露氷壺欹九烏堕翼天地暗六鰲矯首山川隨飛來一峰横突兀競秀萬壑排參差岱宗坡陀太華小少室破碎終南低深谷婉麗發春態髙骨磊落呈秋姿峰青盤螺綰新髻水碧分暈浮修眉鸞翔鳯翥露纎巧虎踞龍蟠驚崛竒觀臺彷彿隱仙聖樓閣縹緲生蛟螭誰於天宇弄顯晦力與地險論髙卑盪胸稜稜各騰踏翻手冉冉爭奔馳平生脚底識南北此日眼界迷東西身輿欲上白銀闕風馭不假青雲梯三薫三沐謝世事一丘一壑真吾栖捫參厯井不憚逺直恐夜半潛推移夏日同伯氏畢裕之守一程國材逰天寜登西山國材有詩次其韻遊輪走朱葢飛碧路如羊腸山虎脊竒觀似多多牛毛塵服輕於一狐腋禪房借枕空函丈野磴榰笻座盈尺隂崖日淡春杲杲老樹風悲秋索索丈人適意屢傾葢舍者㤀形或爭席已澆茗盌攬文字不捉氷紈凍絺綌飲中得仙思季真方外分曹笑無奕棊鋒未接已爭遁筆陣將收猶請益是日守一圍碁大勝國材作十六韻余請二十韻一生苦心太多事半日閑身要投隙急呼隔水破烟艇更着穿雲躡山屐晴巒隂障淺深畫斷渚連洲耦竒畫愚公百念久灰冷妄境多岐自氷釋閉門終欲老石經煮鼎無心轉金液舁籃二子已能歩對影三人不邀客蝇頭比富五頃田蝸角猶寛一區宅飽諳世態罷整冠脱略塵縁等遺舄已甘流落卧深林肯作紛紜踏長陌紫陽峩峩百歩近白水粼粼一溪隔床頭吟蛩已催候枝上鳴蜩行削迹相期日日曉脂車去待山頭霜月白遊龍潭秦山破碎天上來女媧仙去空崔嵬中懸鳴玉二千尺下有百尺青銅開居龍變化出嘘吸雨暗雲昏鬼神入我來坐石秋水閑雲影扶䟱落空濕浮丘容成不可俟摩挲青壁著名字兩翁下遊㑹有時訪我鍾陵五松寺風鴈行閩山蒼蒼江水長鴻鴈北去隨春陽天寒野暗烟樹濕雨急風髙驚斷行前飛一鴈鳴且顧後飛一鴈悲獨翔傷心極目暮雲碧兄弟南北俱相望蹈元作詩謂僕不當以蓮爲嫵媚而有偶有現空相之語復次韻以効齊物之説登天不登山觀海不觀水認苗須認根論士須論世君以空説蓮無乃渉𤓰李我以蓮喻色亦墮綺語戯二罪一狀領政坐各有以一以清淨觀一以富艶棄不知真色中即是大空耳物生天地間各以形自媚若云皆實相斯理恐無謂君詩如烏有我詩類亡是得失付之塞上翁對花大嚼金壺空僕和蹈元蓮竹之什意在譽竹於蓮有投䑕之嫌明復知縣有作姑兩可之他日蹈元邀客置酒花下予不得無媿復用前韻以謝花云藍田官舍碧山裏南北紅蕖照明水公餘喚客坐晚凉不獨桃源真避世舉杯欲酌還自愁退之慙花不御李却持巵酒起謝花我亦前言聊一戯就令嫵媚正不惡更向鄭公觀所以世情好惡苦不常富貴相親貧賤棄與花俱是天涯人萬事要同風過耳花聞我語爲觧顔一笑凝然作川媚主人有酒君但傾對花不飲竟何謂宰官况有弄丸手坐觧兩家歸兩是花神莫浪疑山翁翁心壁月當寒空再和明復蹈元之什湓江散吏來萬里借屋僧房冷如水支頤一束儻㑹心容膝數椽真傲世大而無用澗底松過者不顧道傍李賣刀買犢愧老農汲水埋盆作兒戯畫墁求飽人共嗤懐璧雖珍吾不以宰公政明一善收丞公聲同衆瑕棄酌酒時澆磊塊胷傳歌爲洗滛哇耳坐中氷雪囬冬臞句裡雲烟發春媚我慙匪報正羞縮君肯包荒過稱謂葛藤更與話短長菽麥安能辨非是但聞古來説龎公搬柴運水不談空㑹飲得助亭分韻得千字長松下䕃八尺椽四壁不礙萬里天水邉笙簧成兩部月裏山河收大千山中宰相塵中仙杯如流星酒如泉饑蟬暝鳥莫浪語淨掃緑苔共醉眠君用承事載酒筠谿上分韻得竹字髙荷蓋水臨風曲羙人却扇耀紅玉溪翁愛之㸔不足密竹隂中坐幽獨南鄰新醅手自灑貯以䲭夷轉山腹折松掃雲謝羇束近水亭臺晚香馥峰巒中央帖寒玉影落杯心卧山緑長瓶縱横醆未覆更遣長鬚隔籬贖酒酣歌罷睡已熟覺來星稀斗挿屋人間此景眼未觸只欠桓伊弄霜竹與何西仲秉燭飲梅下山茶著包大如繭初見寒梢一花展强將老眼趂年華日日芒鞋踏苔蘚花神似苦山翁催不問春風有深淺樹頭紛紛弄月明雪裡瓊瑶亂裁剪癡缺公事無了時與花拚作十日期闌風伏雨恐相逼夜傍花隂燒燭隨攀條嚼蕊興不盡滿把自摘香傳衣星星霜鬢簮不得小撚疎英翻酒巵兒童莫作呉歈聲山翁正與花神盟生愁一片風飄零留取北枝寛作程送鄒徳久還鄉在福唐作長松瑟瑟揺悲風方床冷枕鳴秋蛩短衾客子起孤悶平明歸思如春鴻我家君家各陽羨夢寐不聽閩山鐘自從敵馬飲江水去住彼此隨飛蓬那知萬里一樽酒碧雲落日聊春容野林秋淨山更逺樓殿突兀藏丹楓銀鈎玉筯光照座髙歌大笑聲摩空長亭著鞭莫太早愁色正在登臨中一身四海㑹面少况我與子俱成翁徑須留作千日醉坐㸔春風舒少紅諸公送行儒生自信一束書持以逰世觸事迂十歩倒行一歩立公家不辨私家臞壯無早計老更拙宜去不去饑所驅春風力回俗士駕政恐猿鶴譏逃逋燈前酌酒頼公等一笑未徹還送予飛接雙翼送好語似欲挽我聨冠裾那知物理有不可欲置萬里笞黔驢人言此雲無此雨安用吻舌勞分疎筠山如盤溪如愚區有𤓰芋水有魚頡羹赤脚踏長鬚醉歩密竹交相扶絶知君家一事無肯為老翁聊巾車古人命駕成斯須已催小槽壓真珠春送楊彦侯赴試建陽用曽南豐湖水碧韻人生不合留飛黄驪駒夜發生悲凉馬蹄着沙去莫挽一日萬里風雲翔月明霜枝挂秋香桂宫髙架辛夷梁長梯摘日豈憚逺世上不數瓊瑶光我今官閑賦江海老驥識路何由驤昻霄氣槩㸔公等金印入手真毫芒更謀濁酒盡清夜晚鼓徑欲催行装次韻碩夫池亭賞蓮胡床麈尾揮長柄風和入座花容靚乍開還合晚照中修竹佳人倚春暝此間此景樂最深世路好惡君酌斟下車何必笑馮婦投杼未免疑曽參江山信羙來者稀淵明獨與田父違誰云寜食艾三㪷不如杯行莫停手再次前韻玉井花開十丈柄天真不比鈆華靚長梯摘實埋金沙碧甃吹香徹朝暝風篁為我清夜吟拍浮酒泉不用斟酒酣喝月下寒緑玻瓈影底羅觜參江妃水仙間尚稀凌波挽客亦重違得錢何須問升㪷為君更試持螯手黎道人自長沙入閩觧石見之論易頗有所得自言居醴陵山中有田廬飬魚種竹可以卒嵗作取足庵義方堂優游其間藏書敎子甚樂也遽還求詩贈之兩脚不踏咸陽塵兩眼不逐瀟湘春胸中乾坤照萬古竒偶縱横何足數閉門有竹食有魚遺子有田家有書一生可了心自足世上紛紛謾榮辱次韻似表弟卜居惠山梁溪舊隱吾家紳石苔猶鎖松間門向來兄弟寄觴詠日月轉轂相朝昏自君之别各千里萬金誰與通寒溫棣華春遲風雨書雁字月冷蒹葭村似聞經作買山計歸夢已泊松江垠吾衰久矣尚能飯荷挿豈憚終嵗勤獨無頃田占負郭坐食病粟慙君恩平生一壑志願畢不求華屋装泉石僧忩到䖏即爲家柏子烟中聽鼻息子今白髪頭尚希未至閿鄉老王室背山築室不必多待我來鳴去前缺一字野蠶成繭真自纒黄蜂作脾爲誰力肱嘗三折飽更事肯信謀身有長䇿君不見子猷借居種竹聊自娯有屋大竒無亦得粹之載酒南山僕與子壻軰乗小舟烟雨中絶江而來飯罷復過東閣道舊論文頺然經醉歸時夜潮已平雖雲隂未觧而月白可鑑烟林水嶼盡在目中良久急雨繼作通夕不止欹卧紙帳中了不成寐因作海神逰戯千林昏近山楓櫟丹黄分船頭着䖏翠隂重屐齒一過留苔㾗鄰翁酌我苦短晝下夜為尊起為夀公榮可飲次公狂不假朱絲轉長袖燈前白髪懐抱開與子臭味今陳雷隙居勿起故時念一笑沙際邀春回密雲不陳霜月明枯樹欲沒江潮平歸來卧聽墻壁語萬壑松風㵼簷聲次韻葉觀文送杏花春風不與寒威爭輕雷自轉驚羣萌紛紛桃李厭開謝杏蕚一吐増雙明吾儕小人不敢觸走送夜閤浮杏傾平明七字爲題品蠻觸不戰收降兵哦詩正喜涵清氷攀條已恨飛紅英愛花不似愛詩苦世上餘物俱無情使君喚客有髙致半道未許杯盤成舁籃日月走臺皁不用二字邀門生長檠照席語傾座一笑轉我蒼顔頳更窮山水訪禪寂欲去政恐譏兼并和表之清隂亭作西山朝來多爽氣露沐風梳發新翠洩雲無力占山腰初日分光上山背逺山蒼茫近山紫四靣鐘魚談佛事人間那得山爲城玉亰聨錦互相似先生結廬待三顧道合寜論入宫妒肯為閩山得得來蠟屐深尋九霄路詩成逸興横太清平明更作支提行㑹須佳處吞八九歸去與君増眼明季申樞密設醴具素以待諸客表之有詩次其韻擊鮮舉白不厭深髙燒銀燭花成隂不如伊蒲雜棃栗數翁共話千古心夜闌相對如夢寐靜聽墻壁生潮音我方逃禪君莫斟歸來星稀月初沉題葉子寜林巢誰穿空翠開蜂房尺欄寸徑一肘墻主人官閑若避俗北忩髙卧追羲皇客來初騎果下馬側身却轉花邉廊新成桃李礙倚杖旋徹戸牖留飛觴欲眠姑去甘晝寂不醉無歸拚夜長使君早有冲天志畧展風翰無地試已知齊物觀世間小卜一枝聊自戯坐中香穗亂雲影睡起花甘攪禪味鷄蟲得失何足論鵬鷃升沉了無意昔人掩鼻恐不免天與公才那可置清霜萬里看横秋莫作南柯始封計案上梅天寜禪房作横枝當案雪未融夜忩印月影若空人憐太痩不奈冷自抱幽獨無愁容春風雜花豈不好一笑難與孤芳同寜來作伴管城子靜炷沉水聽號松送李仲和之泉南其子官所吾宗逹士人所嗤官居自視如雞棲十年借屋作僧夢魚鼓聲中長抱饑撑腸但有黄巻語壘磈盡掃胸中竒一朝起就綵衣飬喜氣已覺生鬚眉阿龍官清酷似父五斗未足供朝糜芝蘭正喜在階砌詩禮自可娯庭闈願言早試餐玉法富貴似與長年期我今衰白心更老結習尚餘傷别離薫風南浦欲分手菡萏未折凌波姿徑須痛飲破愁本酒醆旋折長荷絲寄題向伯恭侍郎企踈堂太冲扶䇿招隱士徳璋移文謝逋客欲分勝地髙世流未辨賢愚相什百薌林居士人中珍胸中不㸃元規塵平生絶口向阿堵能使地上流錢神紫荷曉直動天語晝日駢蕃不如雨急流乃作尺蠖盤唾手功名何足取歸來結屋清江干十十五五忩岩巒北忩岸幘夏日靜夜雨對客春杯寒漢廷宫傅計不早篤老辭榮身已槁那知黒髪踐亨衢脱身紛紜事幽討華堂未用標新目兩翁政自晞髙躅更從碧眼問入鄽却訪赤松求辟榖送族甥逰學臨安薫風未放槐花黄舉子技癢撩枯腸短衾不眠中夜起鷄鳴刷羽摩參商山行未盡趂落日夜榜欲去驚鳴榔男兒胸中小天下大笑鑿石分餘光君今懐璧自荐逹筆端娓娓陳虞唐明時三靣網英俊平地一日㸔騰驤青錢淡墨何足慕濶歩直入鴛雛行歸懸金印大如斗里官負弩驅旗槍向來絃歌久未効即遣士氣俱軒昻吾衰不能効犖确尚能扶履㩦壺漿和董端明大野漁父圖一葉扁舟漾廣津無心鷗鳥逺親人蘋蓼㟁静投綸危坐初無一㸃塵釣艇夷猶一葦横烟波萬頃寄餘生春雨歇暮霞明零亂溪花墮玉英撇棹歸來起暮凉樂哉誰復慕軒裳横短笛罷鳴榔紅藕花繁作陣香木落漁村載酒過緑波萍藻鱖魚多拚醉飲儘顔酡不負平生笠與簔玉樹瓊田瑩滑清短篷飄洒動吟情魚換酒樂升平聞道君王日聖明卧月眠風樂有餘蒹葭䖏處釣重湖斟魯酒鱠鱸魚一片家風入畫圖筠谿集巻十三
