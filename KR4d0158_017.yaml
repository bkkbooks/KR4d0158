body:
  text: 筠谿集巻十七宋李彌遜撰詩七十一首次韻康平仲侍郎從丞相張公登倚雲亭二首皂葢凌虛豈易陪捫參那復欲髙哉雲關缺處塵蹤斷松葢隂中寶地開戎幕冦平高卧鼓賔筵詩罷細銜杯笑談疑在青冥上坐近中天兩兩台相君題品到林泉大榜新書亦爛然雲護山根蔵小魯風攜人語動諸天放懐對客忘青白隨意傳觴任聖賢誰語甌閩甘逺俗他時物物待陶甄留題葉成父尚書山庵普光明堂三生調御潮音㑹樓閣隨方涌化城鳥樹有聲皆念法雲山多態摠忘情禪翁自得逃禪樂俗客猶沾避俗名但了心源秋月净刹塵何地不光明成父居士於普光明堂之東别建大閣榜曰妙嚴將家焉閣成李子過而賦之新成髙屋礙雲嵐下視諸方落二三妙喜不從他界斷惪雲今向别峰參按家便可超塵染喚客何妨到酒酣居士飽知名閣意為言童子不須南次韻葉成父尚書見留之什山外孤雲出寸岑營巢其下一枝深久從泛宅浮家伴未遂穿雲渡水心百里躋攀方着屐十年交舊欲分襟西風落日非無恨歸卧桑榆惜寸隂與老禪諸上人同遊鼓山靈源洞茶甌喚起清晝眠澗松岩竹談幽禪秋曦忽隨壯士臂暮景已入詩人肩塵縁咄咄魚吞餌勝事堂堂駒着鞭屐齒欲回還小立隔溪明滅見江船庚申季冬立春日還鄉公曄置酒孟園從容道舊有詩次韻孟園花色璨瓊瑰倦客隨春此地回靜院茶甌浮積雪深堂香鴨亂真梅得閑苦厭紛紜事畏病難禁㶑灔杯但掃晴忩鋪大字更將老眼為君來初歸筠荘蘇粹之以詩見貽次韻答之二首八尺茅茨老竹林細償南北故園心一溪止水清涵月三日行雲薄釀霖歸計欲成猶恨晩醉愁無頼正傷今喚回栢子香中夢屋角秋聲亂翠岑他年同上楚江樓花遶春城小謝州翻手雨雲人事改跳九日月嵗光流霜空暮落能鳴雁秋水風移不繫舟偶築一丘鄰勝隱杖笻衝雨亦來游和明甫南山用粹之韻尋源探穴上林丘宛似愚溪栁柳州樹擁千頭爭地出江分一股抱山流隂堂閣雨雲生屋晩浦收潮草泛舟幽興未窮留眼力將鶵結友更深游新成茅廬獨宿西山幕上寧容燕作巢土堦竹屋近誅茅深行樂地思招隱早悟危機欲絶交溪響隔溪來枕面月光先月到林梢為官拓落真吾事何用紛紛更解嘲再用前韻半生來去隔年巢垂老朝昏一把茅白酒黄雞時喚客碧梧翠竹舊論交身閑野雁無行跡妄盡霜林只戰梢賸欲細談真子喻誰能戯作少年嘲次韻公曄席上見贈即席和之酒邉着語見真情收拾應湏遣六丁戢戢甕頭堪一醉栖栖澤畔忍長醒湯盂茗椀香中泛藥圃蔬畦燭下經漏盡却隨江月去舞鷗迎我過寒汀與公曄飲西山坐上再和前韻了無一物可當情休數行年問丙丁世事於今渾似夢醉魂從此不湏醒江流帶月分清濁星漢無雲見緯經酒盡更謀湏稚子坐聽潮落響霜汀南山送客席上次明甫韻江北江南可避喧已甘丘壑寄餘年筠梢松葢一區宅蓮葉菱花二頃田秋到登山更臨水夜歸騎馬似乗船醉中不必分乘墜世事從頭一夢然次韻向伯恭侍郎世外營居絶㸃埃到身無地展全才行蔵曽許當年共翰墨能從異縣來海上梅花迎嵗落江頭桂子得秋開一樽風月何時對白髪思君首重回月夜攜家筠荘露坐池上分韻得誰字累石驪泉十丈圍週遭種栁未成絲溪童掬水得明月山客掃花安屈巵一榼團欒兒女語四更厯落斗牛垂攔街白叟笑相問倒着接䍦歌者誰池上對月捲蘆吹散一空雲天面明金掛側盆竹柏疎隂浮藻荇山河清影落乾坤習家池上酒初漉越女溪邉花正繁我醉欲眠歸未得紛紛身外不湏論夏日小集池上次韻明甫之作生怕㣲雲㸃太清籜龍莫作斷腸聲餘霞到晩銖衣薄滿月當空玉斧成已結松筠為老伴不縁蛙黽喚愁生但令有酒邀田父矍鑠何湏更一行苦早單練直似御重袍碧盌氷漿飲尚豪滿載驪珠思薏苡堆盤馬乳説蒲萄輕雷破逺喧鼉鼔小雨遮空簇蝟毛誰挽天河洗炎酷冷雲凉月助風騷贈碩夫此君風致似吾儂來伴筠翁晩徑笻世味毎於談際斷詩情尤向飲邉濃溪山寄語能相覓猿鶴論交肻見從共斸雲根結茅屋自鋤菜甲為君供池亭獨坐物華苒苒競芳新六月紅渠自作春走馬看花傳好句長梯摘實頼幽人雨餘門巷無留客月上池臺絶過塵爲約龜魚共清賞酒香花氣兩相親山遊遇雨杖藜尋勝復中休不比紅塵走燕騮幽趣未窮隨雨斷髙情無盡與雲浮冥冥深樹秋猶暗獵獵新蒲暖更柔老去行藏甘一壑不湏重廣畔牢愁送碩夫赴試禮部詞壘新收汗馬勞衝寒意氣九疑髙上書北闕真餘事拄頰西山湏汝曹世慮薫心工製錦時名唾手看連鼇哦君賸欲傳衣句為解千牛緑綺袍送舟過南山用琹韻二首喚起騎鯨玉樹埋江邉琢語亦佳哉眼看雲起山容改坐覺春隨花信來隔水村深尋徑入繫船門側待僧開箇中有句無人道更遣豐隆着雨催雪濤一葦意雄誇慣與灘頭雁聚沙年後臘前梅喚客山南水北竹為家蓬蒿影裏開三徑笳鼓聲中聽兩衙去住了無忻厭賞暮年心迹暮林鵶次韻陳泰定見贈二首月魄哉生望已幾豪華未厭老相隨放疎世故開黄巻銷盡塵心對紫芝急雨知寒催葉落斷雲乗晩截山低小槽早作酬春計又是梅花結蘂時偶語無人且復吞晝晴饒睡憇榕根鳥鳴幽谷何妨靜花發深林只自繁逸思共憐居有竹清隂誰伴酒盈尊非關興盡回船急剥啄那知客至門次韻葉碩夫南歸見貽二首未掛丹題雁塔中重來溪上覓筠翁相期老眼横遥碧莫着征衫走軟紅得失漫嗟蟬翼重才名合見馬群空三年小試驚人手未信朱衣也不公飛花無數上衣𥚑孤悶湏慿酒破除翻手作雲傷往事轉頭如夢欲捐書但知甘苦同薇蕨不問辛勤有屋廬後日錦衣行晝里肻來盤谷飯溪魚用碩夫韻述懐二首少年正墮塵網中晩歳臭味商山翁避喧苦厭俗眼白得酒徑借衰顔紅半生事業一經足是處生涯四壁空故人白髪音書斷傾葢交情獨見公黄塵工染寒士裾造物不與相乗除君愁盡冩杜陵句我老欲作嵇康書何門真是萬人敵近事不聞三頋廬端知駑馬戀棧豆水激自有溟南魚再用碩夫韻二首一丘一壑半生中旁舍小兒今老翁歸來賦就晩逕緑醉時歌罷春燈紅壯心欲盡孤雲薄昨夢不留寒月空茗盌粥盂能事畢四三朝暮付狙公北忩欹卧風引裾靜看燕雀沿階除攀縁已斷螘旋磨結習尚存魚蠧書一區未辦揚雄宅駟馬不過淵明廬蒼松翠竹湖邉趣至樂豈在真知魚筠磯待月偶坐松根送落暉竹風零露濕人衣亂螢㸃水只自照宿鳥赴林猶並飛玉塔㣲瀾秋月吐澄江净練夜潮歸好山不負平生約故傍吾廬翠作圍次韻林明甫言志老竹抽萌便出林焉知來者不如今但看杞梓終成棟不信潢汙解作霖久客謾撩蘇子恨中流應動祖生心乗桴從我君休笑政恐功名苦見侵同蘇阮二公晩春逰西溪二首力破愁城覓醉鄉蘇鳬阮屐共行藏觧吟䟱影思和靖忍見夭紅似洛陽禪客緩催梅子落騷人正咏牡丹芳酬花但促傳杯手氷炭君休置我腸喚客班荆雜亂言雀羅成日罷張門自縁貧病無過轍可是疎慵不出村阮子何人對青白韋郎幾日寄寒溫北枝留得瑶香在更約文尊此地論再用粹中韻各賦牡丹梅花二首曽倚沉香作好粧竹籬茅屋肻深藏天寒翠袖留空谷歳晩長眉閉上陽投轄尚能來好事着鞭應恐並餘芳廣平賦罷詩肩瘦不為梅花惱石腸寒花入眼亂紛紛髙卧袁安雪塞門春透交枝才照座風揺斷蕚已飄村返魂香細寧辭折自暖杯深不待温爲約竹君同我老交情此外更誰論題子陽監丞見一庵雲間幽好許誰參十畆林園擁舍南隱几獻花真不二舉杯邀月但成三着鞭有路非吾樂彈鋏無求只自甘吾亦營巢老深竹肻分華榜共名庵樸上人訪筠翁於筠溪草堂袖詩為贈雨中告别將有雁蕩之行屢挽不肻留索詩甚急以偈送之一壑翛然聽雨眠君來着語破雲烟肻隨鷗狎清江上欲趂虹飛白日邉童子不應多一指學人正自少三拳急行㗖蔗逢佳境春笋出林啼杜鵑仲宗訪我筠溪出陪富文粹之遊天宫詩見索屬和次韻作伴山翁覓轉春净坊俱現宰官身蘭亭夢想如三月蓮社追逰少一人雨磴勞君鳴屐齒風軒為我掃衣塵應憐野老聞韶後旋束蔬腸學練津山門晩歸毗耶香飯壑源春午枕聊分百億身旋落澗泉髙下語自鳴山鳥送迎人雲山往嵗真成癖觴咏一時俱絶塵已辦歸途踏山暝試捫髙壁上星津仲宗許過我甚久一見便有去意戯用春字韻留之麥秋數盡稻花春六尺茅茨百懶身散策騎驅聊永日繫舟剥啄定幽人關心有念真形役過眼無根俱客塵肻着青鞋從我老阿香徑遣斷歸輪與粹之逰支提九日仲宗以詩酒見寄次韻荅之蛇徑回環織女機足間欹石礙雲飛西風短髪欺烏㡌落日清尊走白衣病眼逢山寒水净妄心更事逺烟㣲掃除磊磈装懐地為載千岩萬壑歸次韻葉成甫有懐見寄來轅去棹亦勞勞晩嵗丘園避俗陶問事不知三語掾閲人無意九方臯交論金石窮猶見詩得江山老更豪清夢摠能追蠟屐雨聲偏傍夜牀髙丞相張公築室湘江之上若欲逺人間事盡心於山水之樂以奉夀母而末章以忠孝詔諸來者寓意深矣索詩寄之二首蕙櫋蘭橑濕青紅衡嶽湘江一望通曉日雲烟隨几杖春風花草近房櫳赤松未結忘機伴緑野聊從避俗翁更欲將心何處盡山河全露妙明中堂前蘭玉走斑衣堂上塤箎樂夀巵永晝牙籖紛簡帙深庭豹尾卧旌旗笑談自有江山助勲業從來草木知許國尚餘忠鯁在此心還與嵗寒期次韻平仲侍郎移居見簡不寄斜封嵗已餘那聞異縣更移居覊懐易動野馬也歸夢自成胡蝶與有宅一區如子少受薪十束見予踈遥知富有千頭橘奉乞當年種樹書和平仲侍郎再用移居韻雲屋潭潭百尺餘入簾燕雀賀新居人皆役役何為者君獨欣欣而樂與巵酒覓懽那得再筒詩傳恨未全踈絶交定笑嵇中散雁足來時肻繫書題明叔郎中海月吹笛圖天上星郎騎省孫興隨孤月到無垠浮槎夜入魚龍宅横竹秋生海嶽雲控鯉丹成終獨往騎􅚪仙去杳難群紛紛世上知君少畫茟猶能續異聞次韻林褎然知縣留題筠荘因寄之二首何人着脚傍岩幽好事無過竹務猷妙語徑追盤谷序輕舟獨信剡溪流牛刀小試知多暇鶴板遲來坐不謀欲寄一行安否問朔風覊雁正淹留世路人心比太行此君真可共徜徉霜凝勁節明朝塢月落寒梢散夜堂可但七人供笑詠要令千畆作隂凉只愁捲地西風裏幽夢圓時與子妨未明出東門將入聖泉戯呈住山蒙庵老人覿靣峰巒碧障天東方精色破昏烟草頭露下元無雨衣角風生徑欲仙行樹排宵髙展畫孤雲掛壑薄披綿寸田暫喜捐塵慮不着蒙庵一縷禪和淵老妙現之什乾坤渺渺一浮尊萬象分明水四濵虎脊横空山作隊魚鱗倒影海成紋老僧詩罷閑欹竹幽士餘齋正卧雲妙現鏡中無一事世間從此罷揮斤送蕭惪洪赴試建安鴻鵠不作三年飛乗秋逸興髙九疑去尋岩桂香中路趂得御栁風前期青錢立登天上選黄絹共賞人間辭漢庭苐一公家事平歩凌雲要及時和仲宗判監與世浮沉半醉醒結廬人境晝常扄㣲吟松竹風無定着色峰巒雨乍經方簟北忩身是夢瘦藤斜照影隨形豈無曳尾泥中計政恐腸刳不自靈次韻天寧通老見貽病餘真是獨醒人還在僧忩自在身竹杖芒鞋尋勝趣齋盂禪板悟前因江山臭味如相覓猿鶴家風碩卜鄰更有髙人來着語交㳺不怕白頭新題福唐郡園清閟亭公餘自種南堦竹好事風流今未聞但得七人來結友何湏千畆比封君風梢不定㣲藏日雨葉初乾薄帶雲自是甘棠人愛惜不憂寒谷遇樵斤題薛直老府園萬象亭斷取方壺壯郡壕鈎連野色上亭臯星移日轉天容麗江净山明地軸髙下榻筵賔供歗咏凝香罷寢助風騷使君八九吞雲夢小展風烟遺我曹次韻薛帥萬象亭山上非烟靄四隅山前稉稻緑成區留雲有計低簷額得月從多徹戸樞直是春臺熙逺族聊為夏屋試宏圖公來日出千林逈却笑新亭咏小湖次韻道夫待制萬象亭不見三秋若望霓寒亭今得共攀躋眼中逺樹兩行直脚底孤烟百尺低幻出璜臺輝舊觀旋安銀榜快新題細聽屋角風雲聚誰謂天髙不可梯次韻季申樞密萬象亭丈人手筆與心通㸃化虚無若轉蓬妙寄千言千嶂外全收萬象一簷中深堂細篆觀澄水落日危欄數去鴻更壓小槽囊古錦共臨髙處待春風送趙二十一觀察蜀中迎親失母三十年今得之得意那知行路難板輿行處蜀江邉慈顔未拜心先往樂事乍聞人共傳新製衣裳文錦縀重頒雨露間花牋回思三十年中别長願兒生有母憐次韻趙道夫待制放魚之作出門忽見鯉城市脱爾寧捐一粒貲就使烹鮮真可口誰能結網更臨池斜風送浪回頳尾淺水平沙走素鰭勿謂寰中底么魔三生恩怨不能欺題張仲宗鷗盟軒寄語沙頭不下鷗詩翁新葺面江樓早知世事翻覆手更覺人生起滅漚念盡不應書咄咄身閑何用榜休休徑湏来結㤀機伴春水浮天不繫舟陪大慈老登古院林影横榰折脚床禪翁喚我坐斜陽諸天共説無生話萬壑同薫不盡香茗椀泛雲醒逺目藜羔煑玉閙枯腸逢人若問峰頭事翠竹隂中菊正黄次韻粹之通判九日之作柏子香中閉净坊為君着屐弄秋陽老來見事如無事節裏隨鄉且入鄉但可炊糜傾兎褐何妨撚菊泛鵝黄九仙坐想群賢集不數龍山事渺茫仲宗過筠荘作詩見招且有借庵之意次其韻横山留我正青眼不是歸心久更㣲病後團蒲隨地隐望中落木故園稀一區巳辦雲為葢四壁但從山作圍不厭是中無一物徑來相就老禪扉病後戯呈謨老禪師霜髭病起若相侵銷盡平生未了心一事關身俱是夢萬縁彈指已非今月林清影元無定山路幽香不可尋喚取湯休共清夜靜聽簾雨冩鳴琴送仲宗之建安老翁更事幾河沙苦愛溪頭管物華種竹成林心未足買船載月思無涯黄鶯喚友非多事白鷺窺魚更可嗟念子藍舁晚山裏可能來共拾餘霞比見帥憲禱雨甚䖍枕上聞簷聲為之不寐因成兩公精意與神交平地能令水滿篙雲氣逺收晴嶂合雨聲偏傍夜床髙轆轤未暇分甘井舴艋應知避怒濤願受一㕓湏及早秋成猶得飽兒曹筠溪集巻十七
