body:
  text: 筠溪集卷二十三宋李彌遜撰祭文祭劉文中奉文嗚呼士尚同以脂韋睨直道而不趨官殉利以詭隨指民事為闊迂公忿俗而逺慕將古人之並驅行寧撓而不屈言寧拙而不諛位寧卑而不干迹寧晦而不沽駕義軏以蹈危身任民之瘠腴方墨綬而出宰發積廩以起痡請免官以補過帝省牘而曰都觸當路之背憎將洗垢而剝膚持寸莛以排奡勢纍纍兮莫扶傍觀愕其股栗公燕歌以自娛既名達而官遂屢易節而改符事隨至而隨舉民隨至而隨蘇肅偷惰而崇善鋤強梗而矜愚力抗章而交止孰弊瘼之不除方聖賢之相逢登俊良以連茹意公材之凛凛抑廊廟之時須俾明目以張膽幸遺直之不孤嗟蓋棺之奄忽躓其程於半途惟獨行之易蹶宜於世而跂胡何造物之報德與其壽而不餘嗚呼哀哉昔我先子之於公迹未接而巳孚公亦知我於未識以其子而妻諸顧聲同而氣類雖楚越而一區既登門而共席遂韜瑕而匿瑜接從容之情話或待旦而忘晡至劇談之擊節起推食而笑呼分則尊而義友孰形骸之可拘傷其道之不行曰從我而乘桴嵗戊戌之南下載見公於江隅洗孤憤以一笑若解懸而噓枯憫窮途之酸寒贈僕飯與馬芻旋睽離於異方道且長而嵗徂悵魂夢之尚隔時解顔於尺書懷隱憂以未寫庶後會之可圖豈一訣而不返遂長遊以昏衢想聲容於耳目恍如在而倐無氣憑憑兮填臆涕漣漣兮墜襦雖然公之病也示疾而不癯公之死也瀝酒告語順化而不虞其視去來猶夜旦之常易於脫屣之與棄繻則余獨尚何悲兮悲夫斯人之萎矣好古特立之士將孰行而與俱欲拊棺以大慟兮中流亡楫而隆車無輿寄一觴以千里兮嗟我哀之莫如祭黃待制文嗚呼元暉江東之秀直秉於躬義信於友悟主以誠君曰足手牧民以悌人曰父母十年仕途鵬激驥驟一罹險艱萬里南走韜竒藴能百未一究方觀其來云胡不壽嗚呼哀哉惟我弟兄識公最舊學也同席仕也聯綬如莠如稂日就藝耨竹柏異心芝蘭同臭間闊胡越久幸一覯朅來新安公則出守尺書告歸引我心脰孰謂一朝往拜公柩蕭蕭秋原晝響猩狖丹旌言還閭里驚湊顧豫友生匍匐敢後一子纍然泣進號仆酸風射眸傾落莫收惟公精爽胸列百宿死當不亡如在左右魂兮來些鑒此觴豆嗚呼哀哉祭蔡侍郎文嗚呼謂天道與善兮直行者每跋疐而不通謂人事好乖兮當壽者或付畀之不豐以公之剛毅廉正行固備矣而疏明博達才何適而不充諫垣二卿凛凛自表兮讒諛側目下石而不容六易郡符所至稱治兮優遊琳館亦笑傲以自供聖賢相逢登崇俊良兮盍縱壑而從龍何斯人也才如是行如是不永其年兮奄然而告終人耶天耶吾不得而致窮嗚呼哀哉昔公在朝提衡多士兮收我於範鎔十年一别兩遭逐北兮相遇於大江之東傷也悼屈忘形爾汝兮欣一笑之始同公之視我蒹葭之玉兮蓬蒿之松我之從公蚍蜉之樹兮寸莛之鐘義尊勢隔大非偶兮公則抑高而降崇琢磨針規善則與兮疣贅之是攻風舟月輿葛巾笻杖兮有適而必從長歌曼舞漏盡斗轉兮抵掌而杯空綢繆姻婭以結好兮將嵗寒而益隆我駕既東懶以解顔兮寫懷抱之短封神輿心斾往來公側兮驚嵗月之轉蓬念兹仰止情耿耿兮冀後會之可重嗚呼哀哉今我之來公則逝矣登公之門草樹悲風拜公於堂縞素在縫庭有鵲啄几有鼠蹤想聲容其如在氣憑憑兮橫胸拊棺大慟莫究哀𠂻魂兮來些訣此一鍾代伯氏祭蔡侍郎文惟公挺挺竒稟河秀嶽靈奧學雅思淵蓄雲蒸發䇿壯嵗際時休明攄忠諫省率屬二卿牧守師帥所臨見稱吏有師表甘泉老成浩然退間宴處鍾陵築室蔬圃若將遺榮坐上客滿咄嗟甘馨肥家有田教子有經公初見我至自浮光念我無廬招致連墻好及兒女願言靡忘相歡不足我徂武昌雛鳳搴舉於門有光越來結縭和鳴鏘鏘我還北闕公召自東一見未欵斥逐靡容上東門外欲挽無從弦月三彀尺書再通謂當還家樂與昔同如何訃來失聲拊胸嗚呼哀哉才雄萬夫百藴一施方需復起福我黔黎天不憗遺有識共悲寒門騃女獲奉帚箕甫見於廟未勤婦儀今其往也葛屨榛筓哀與恨偕痛何窮時執紼拊棺念阻此期薄奠齎誠千里一辭嗚呼哀哉祭山塘虞部諸墳文自昔國博君出守毗陵殁於官遂葬其州之橫山厥後四世留寓它邦俯仰百年祭省有闕某念去國之悲日微嗟世路之虞方棘秋八月始自毗陵擕孥南歸水陸之行三千餘里道路之日凡百有竒以十一月癸丑至縣境稅鞅之初恭拜墓下宰木可圍封草不剪顧瞻遺迹泣涕莫收載惟某父祖兄弟纍世並仕逮及庸愚亦通朝籍名浮於實職過其能皆吾祖之遺澤其何以仰答神庥某方將受廛邑井聯居宗族以奉春秋之祀子子孫孫繼承無斁惟明靈其保佑之祭公述六叔翁文昔侍先君拜翁早年逮籍賢關翁為登先我時尚幼翁視子然慰我孤悶嬉笑挽牽開我童蒙琢磨雕鐫我官於朝翁與計偕移樽晚席解榻夜齋自冬徂春雍容歡諧出祖東城期以後來一别永訣掩兹夜臺嗚呼哀哉我昔北遊爰自先世去國百年浮家萬里翁勸我歸杖屨許侍我今歸矣翁則我棄及境興懷有淚雨墜嗚呼哀哉我昔在逺族裔莫分次譜辨世翁與我言乃祖乃父孰子孰孫今拜於堂畢集卑尊獨不見翁失聲復吞嗚呼哀哉翁之云亡我方南北殮不臨棺葬不執紼瀝酒墓下痛將何及想翁音容如左右立薦此哀誠魂其來挹代兄長祭墓文我家於閩爰自遊擊其後三世出從官檄有子有孫南北異適歸心旌搖道阻且逖頻年江淮冦至接迹衣冠駭奔半落鋒鏑脫身南來如救焚溺一枝故林飢馬赴櫪峩峩蒼山千仞立壁餘二百年芘此窀穸載掃楸松載集疏戚肴核在豆酒醴在幂緬惟先靈鑒兹誠赤念我千里肩未及息屏除後艱保之無斁祭蔡子強學士文嗚呼哀哉惟余子強挺拔諸彥才兼百能學妙一貫容德淵止高義雲煥英特之氣粹然見面承家孝友移及疏賤陽城居晉人以遷善四十專城抑強扶懦黃霸治頴民以除患朅來故廬築室其畔超然逺俗以道出盥若將終身蛻視纓辨人曰不然國欲戡難君出而仕唾手可辦圖功凌煙拭目斯見云何蓋棺在此一旦嗚呼天道茫茫兹理孰判念我結友爰自弱冠聯姻於門並䇿漢殿二人同心蘭臭金斷一行參商嵗月奔電我歸自北訪我鄉縣皤然兩翁驚顧三嘆夜語更僕晝席銷篆共追一笑牢結冰泮方將蹇驢百竭不憚訃音遽來疑駭魂亂頻年友朋雕喪過半奪我良戚天亦可怨百里拊棺蘋藻自薦衣裳在寢簡編在案想君音容零淚若祼尚期九原鑒此觴奠祭林時敷舍人文惟公抱英特不世之才負閎逺有為之志皇皇華國之文諤諤濟時之義偉擢秀於詞林實蜚英於蚤嵗方握蘭於華省繼簪筆於清陛爰待命而劇遷俄分符而閫寄惟嶢嶢與皓皓冝入朝而見忌雖喜慍之不加而薦紳惜君子之居外謂將躡青雲而坐廟堂扶聖人之至治何不憗此一老奄衣冠而永棄嗚呼哀哉嗟賤子之登門辱顧遇之特異摳衣汶水之生斂板蓬山之吏接謦咳於三餘獲周旋於兩紀悵契闊之十年絶音書於萬里何一訣而終天慘臨風而酸鼻念舊盟之可尋幸庶幾公之有子豫託姻好於松蘿俾蘋蘩之是祀兹有事於窀穸屬涓辰之將至雖女子之有幸傾婦儀之未備生不服勤於箕帚葬不致恭於賵禭敢陳奠於椒漿寫餘哀於一誄噫德何臧而年胡不長才何大而仕胡不遂意餘芳而賸馥流後昆與來裔冀精誠其有知永毋忘於下庇祭李伯紀丞相文嗚呼哀哉天生忠良必有所付公仕於朝逢國多故奮身百僚易人所難入告之謀轉危為安既登鈞衡遂總兵柄老師宿將俯首聽命金人叩關衆曰去之彼都人士微公則夷建炎龍飛公位冢臣誅鋤逆徒王道以尊視彼冦讐弗與共戴義在必報一置成敗嗚呼公乎有國有君以身衛之有社有民以身任之有兵有戎以身令之姦回憸佞退而抑之忠鯁端毅之士則爬羅剔抉進而激之道之將行國之將興天其或者佑此老成胡不憗遺上為列星棟折榱崩何以支傾義士忠臣心摧涕零武夫悍卒拊髀失聲噫公視僕總角之交久而益親貴而不驕五十年間若出一朝向來見公濁酒我澆願言卜鄰同老漁樵它年北歸有些可招哀哀我心鬢白為雕雖然公之生也不有其身至大之氣塞乎宇宙不倚之節信乎鬼神令問廣譽極榮於儒者獨行特立追美於古人其遊乎世如長􅀢大翼乘風奮迅不可得而親至其死也不病不恟不恐不怖屈伸臂頃奔逸而絶塵夫死生知不足以纍公則僕尚奚悲乎而緘詞千里寫此一慟者公之云亡有國有君孰與衛之有社有民孰與任之有兵有戎孰與令之姦回憸侫孰與抑之而忠鯁端毅之士孰與激之耶嗚呼哀哉祭黃若沖大夫文嗚呼若沖余之年友也嵗在巳丑與公同登後三四年識公弟晜省臺瑣闥昻霄於雲公獨不鳴若駒在轅一官金陵不以自卑我時卜居清溪之湄風舟月輿朝從暮嬉間闊十年復見於兹蒼顔白髮頽然兩翁一笑念舊尊酒屢空行不由徑仕不背公它山之石有過必攻國人曰賢若出一口我老而迂賴此良友十日不見僮僕系走訃音遽聞匍匐莫救嗚呼若沖聳壑之材終於陸沉黃絹雖賞朱絃絶音有見於古不見於今隱居好學逺近慕之其陽亢宗之流乎不慕官榮優遊卒嵗其馬少遊之儔乎孰跋其行而嗇其位乎孰豐其德而不與其齡乎抑造物者量長較短乘除而折中之乎將根深未茂而在其子孫乎夫死生去來一漚之起滅爾以公之窮不慍老不怨而死不懼則余尚奚悲乎巵酒彘肩以訣平生公其知不知乎祭漳倅宗周賓學士文嗚呼周賓氣剛不撓才高不羣䇿名賢科爰自妙齡自信不移與物多忤間關仕途百不一遇我昔見子風神灑落濯濯之柳昻昻之鶴朅來南漳如駒在轅不解其縛胡求其全日者冦攘驟犯吾圉凶熖西來劇於豺虎躬督戰士進逼賊營授指方略尅日徂征既病且亟或言旋歸瞑目語難毅然不回男兒死耳寧死於國誓無生還必破此賊士方平居無以踰人盤根錯節乃見其真嗚呼哀哉人孰不死死必大怖子實易之以徇國故有賢若此我輩厚顔謂當崛起以濟時難云乎不弔奪我良士天耶人耶莫究所自豈造物者有意於斯人以成其名使全軀保妻子之士聞而知懼某老而無能濫守兹土針規藥石賴子以助子今往矣莫我肯顧瞻彼遺像有哀曷訴酹此一觴以寫情素祭蔡子應郎中文嗚呼子應才可以濟時而命不得自騁也文可以華國而窮不能自達也現宰官身而深得呵佛之機也示居士相而獨高離世之行也其生也浮雲暫住而其死也浮漚無迹也嗚呼哀哉余之於公以情則親而義則友也少則同師紛詩書而并席也仕則同朝鏘環珮而接武也老則同歸探丘壑而共樂也相望數舍飛奴翼而書筒系主也大江東橫不能獨往而夢寐見之也訃音遽來泫然流涕而不能自巳也公深入不二死而不亡而余尚奚悲也悲夫蒼顔白髮隻影自憐而知我者為誰也祭趙道夫待制文惟公少篤於學老篤於行慈仁之言入於人心靖退之節根於天性泛然與物而能同確乎臨事而不諍十年挂冠致安車之三聘兩居詞掖席未暖而告病四易郡牧之符政教行於不令宿儒故老善類之宗欲方駕其誰並胡不憗遺俾貪榮徇利者聞風知懼而奄兮忽兮閟夜臺而長瞑嗚呼哀哉公來自南邂逅相遇兮欣一笑之屢同清尊華髮星聚簪盍兮寫懷抱於一中更移斗轉命駕宵遁兮雜恢諧以舂容十日不見長鬚遰走兮傳孤悶於詩筒俄然示疾裹飯食之兮期藥石之必功訃音遽來匐匍莫救兮湧清淚於無從嗚呼哀哉公之生也有德有年有子而賢有經可遺有業可傳其死也不怖不恟屈伸臂頃超然離人而反乎天則吾屬尚何悲耶寄哀𠂻於觴豆悵永訣於九泉祭葉成父尚書文嗚呼公之云亡孰如我哀也與公生同鄉仕同時老同隱於江湖之上也與公性同迂術同疏志同逺於世俗之間也公之在禁嚴純明靖直不阿不忮見義必為無所顧避於艱難中足國大計我則不敢望公也我之在林壑卑謙靜默以道自治如不繫舟泛然於世流行坎止付之一視而公則與我酷似也嗚呼公之云亡孰如我哀也豈無朋友觴豆笑語利害毛髮莫窺肺腑唯公與我聞風而悅既見則喜松柏堅而金石固也公於妙高現普光界邀我同入纎塵絶礙而公恍然遊於别峯使我躊蹰其下而不得見也我長過公延我别墅忘形爾汝我醉君去今登其門不見其人塵昏舊席鼠走而雀聚也我有弱女公則婦之結此兩翁百年之期公今逝矣他日奉箕儼對遺像痛何及而涕淚也嗚呼公之云亡孰如我哀也雖然公之生無一善之不備死無一恨之可遺也官八座而壽踰七十妻偕老而子可與立也歸棲一丘遊泳佛海幾三十年超然塵垢之外而世莫及也天不憗遺奪我良士我非古人誰復是似杳然聲容氣橫臆而淚溢眥也嗚呼公之云亡孰如我哀也路祭葉成父尚書文嗚呼成甫公平居時十日五日一見公於香嚴之上也及公之亡猶覬拊棺大呌而公有聞於九原之下也公今體魄歸土矣不復與公相見相聞於天地之間也嗚呼哀哉余老且病不能送公三百里從執紼之後以寫我哀也瀝酒道旁一慟永訣公其知不知也祭葉子寧文惟君才可轉物智足有為彈冠蚤嵗厥聞四馳人皆謂君稱其家兒比參蓮幕百蘊未施謂冝雍容婉畫出竒韜涵器業將際明時夫何蓋棺一止於斯嗚呼哀哉死生壽夭其孰主尸天耶人耶莫測其涯君之云亡春秋未衰親則埀白女或尚筓禍福倚伏豈人所期賓蓋方集設虡盈墀曽不俄頃弔者及帷豈造物雖靳其所享而於死生之際脫然而無疑達人大觀庸何得知嗚呼哀哉我於君家姻締則冝惟尚書公友敬所推君之有子我實妻之庶幾百年青松兔絲我老且病君忍我遺有肴在几有酒在巵酬以薦辭孰如我悲音容未逺知乎不知筠溪集卷二十三
