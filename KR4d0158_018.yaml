body:
  text: 筠溪集卷十八宋李彌遜撰詩九十首次韻談彥成學士早春五首花蕾催紅欲囀鶯新愁偏傍鬢毛生猶憐稚子能賖酒爛醉春盤碧澗羮幽棲不寄絶交書車馬從喧賣酒壚卧轉午隂春睡足却尋峰樹數花鬚十二樓臺白玉成雲車翻日上觚稜太平何許同民樂天闕雙龍護一燈渺渺家山水四涯秋風曾憶醉黃華馬頭不識南塘路又看咸陽二月花風絮縈寒晝擁爐枝頭猶得暗香餘折來不擬供尊爼靜對翛然一榻書方池獨步度栁穿莎一徑通曲堤初詠舞雩風我來似與春期約南陌東畦到處紅六六軒秋雨已分千壑間午天初放一軒晴撥開三十六峰翠為洗老人雙眼明可師止庵踏盡東西散勝岩却提隻履過江南逺人若解真常位不礙攜庵到處參面壁庵敗壁縱橫銷翠煙巖花猶落舊庵前從來說法無人㑹寂寞空山謾九年宿光陵懷少章煙斷伽藍欲報昏竹梢風雨亂紛紛懸知借枕山腰舍魂夢巳隨超化雲已亥季秋至淨居思大智者道場因瞻二士相三日㑹天大雨不得探險絶而以詩記之四首三蘇岩壑連雲秀二士門庭匝地新帶雨山光無限思一時分付境中人香斷寒爐古廟空金毛一去了無蹤分明曽得真消息猶有參天十萬松雨華隨步到天關逺目才分繚繞山風馬不馳前景斷更於何地覓無還白霧蒼烟暗九秋殷牀金吼抱山樓為霖未必渾三日似有間雲伴我留儀真道中三首過盡長淮未見山倦尋殘夢獨憑欄風烟漸欲回春眼不似蔣陵江上看長天漠漠水連空雲淡風微兩兩紅南北不知緣底事一生半落往來中旋搗香粳炊玉粒飽肥鮮鯽鱠銀絲他年虛費太官粟到得江頭已恨遲留題鑑逺樓三首表裏江山面靣來秋風此日偶徘徊塵埃閲盡山如鑑一到江樓眼為開慿虗瞰碧與雲浮只有間身盡日留更擬夢回還獨上來看殘夜水明樓霜天曉日鑑中新眼力由來未見真萬古茫茫一塵跡碧山無際水無垠舟師謁祠回天風已霽信若有感姑以二絶道其事長蘆山下隱龍宫瀝酒船回落照中已有龜紋為傳卜不勞烏尾更占風水底明河碧浸星琉璃不動一江平橫鋪十幅指東去坐看曉帆千里輕渡江二首沿江山斷水如天橫絶奔流一葉船身世自知同幻夢不應對此重茫然山形虎脊髙低去帆影魚鱗逺近來已到江南望江北更留青眼為誰開過嶽冠山二首嶽冠山下月黃昏石立波吞勢莫分回首風前魂欲斷東西南北水連雲駕潮風急浪翻磯舟子操舟不自持若使畏塗知勇退世間何處更乘危秋晚即事三首一水縈回兩岸鷗翩翩無數近行舟十年不見渾如舊有意隨人天際浮華髮鬅鬙一榻書舟移斜日似籧篨似聞載酒江邉寺更倒青錢留白魚霜樹今無一葉留日邉雲暗使人愁獨憐揚子灣頭岸猶有黃花戀晚秋和近思二首風帆十日轉長山為送間身到廣寒明月峰巒人境外溪聲一夜響前灘巖排緑樹石相重漲水交流失舊谼細覓向來行厯地十年塵跡轉頭空春日書齊偶成五首底急流光過眼頻斬新花蘂已成陳手携紅藥東風裡著意流連背我春漸老追芳苦厭勞團蒲欹坐首慵搔解將一笑醒人眼多謝紅稠屋角桃栁花才落未成綿海蘂初生半尚攀鵯鵊不鳴深院晝一床真夢不論錢桃紅半老杏紅衰亂委蒼苔况是梅不恨狂風取花去一樽寒食為誰開清氛逺俗推蘭友直節過人見竹君慰我山城長寂寞相期髙卧敬亭雲敬亭山寺多竹與蘭故云再用前韻長檠當晝知無用團扇經秋歎已陳我獨不才端有似五年澤國又逢春薄宦驅人不亦勞久紆章服礙􅐡搔何時歸卧鍾山石荷插長隨手種桃努力避喧遭掣肘强顔追好得嗔拳交情只有春風厚千里隨人不用錢今年春早未全衰社酒盤中不見梅快把霜刀倩天女燕忙時節有花開逢逢伐鼓水邉村狼藉春盤祝社君但願官曹皆魯卓不須南北稼如雲復用前韻來轅去櫂自驚頻七十無多半在陳寸步家山不歸去空留猿鶴占青春喚起春眠恨伯勞一簮華髮不禁搔緩尋新緑偏疑竹細數輕紅錯認桃急雨殘花絶可憐花如雞肋雨如拳千金倘贖花枝怨不為囊空惜一錢春半寒威不奈衰一畨細雨長青梅惜花院落從風掃待燕簾櫳徹曉開青精飯熟思留客碧澗芹香可獻君睡起茶甌風兩腋功名何啻等浮雲春雨濛濛烟雨網春暉南陌清明二月時細草養泥供燕子好花藏蜜待蜂兒石盎寺竹軒蛇行曲折度平岡亂竹疏松䕃佛場乞得曲肱方席地秋風送我上羲皇將至水西登漠山休休庵少憩遂過白雲偶到靈山最上頭出簷髙竹不知秋杖藜欲趂西溪月未放間身盡日逰天寧以雨復留借榻老僧禪室乞得禪房半日留卧看岩雨㵼清溝浮雲豈是塵中物又逐秋風天外遊自天寧泛舟還涇川岸梢濃染一溪青山影歸舟落葉輕欲學漁郎揚綸手雨簔月笛了平生舟中風雨梅公擇有不悅之色因用其韻與解之清於眀鑑緑於藍水色山容總一般遊子正懷羈旅思聊將目力解眉攢崇安寺謁歸雲老人不遇入寺又逢曦未來草荒庭院几生埃黃華翠竹無人問只得僧床一夢回留題曽丞道堂隂隂翠竹鎖虗堂竹外青山半出墻七尺龍牙消白晝便應題作小秋霜石菖蒲石根九節細相縈葉比龜毛照眼青邱壑生涯雖傲世引年終是笑豨苓游梅坡席上雜酬八首內六首五言知章不怕酒如泉莫遣花催蠟蠋烟明日宿雲生曉霧一畨風雨暗梅川風約疏梅蘸石泉山涵弱栁借厨烟竹籬茅屋傾樽酒坐看銀鈎上晚川一酒面風生纈紗巾日共斜醉鄉知路隱不復問吾家二醉帽迎風落春衣日徑斜花梢密藏路隱約見山家三白玉千株暗青雲一徑斜從來少車馬恐是阿環家四花擁山頭白雲翻日腳斜銀蟾已照路游客莫思家五夜飲寧辭醉春醒莫厭投有人重載酒後㑹不須謀六得路山方盡如歸館暫投春風供笑傲一醉豈人謀席上偶成二首羣玉裝成寶璐垂月扶疏影上餘杯莫言一醉驅愁得載酒須來一百回傷春早覺鬢絲垂誰遣飛花近酒杯青翼若能傳客恨莫教紅紫放春回席上次邵文伯韻月色漾明玉花光揚素波醉吟吾豈敢能賦屬隂何令尹王次虞許開小戶通縣圃仍為增植花木以詩促之連墻請謁敢辭頻鑿壁開扉肯見親聞說好花栽滿縣杖藜早晚共尋春次韻嵇仲春日二首猶挽餘芳近酒巵丁寧紅紫莫相違縱無風雨飄零去已是愁峰燕子歸花殘愛日惟愁盡病渴逢觴却厭多不分間中覺春老强搜詩句逐隂何登樓翻經興盡捲書帷獨上江樓送落暉人跡已隨雲影斷傍簷嘉月冷侵衣次韻王彥聲題梅氏草堂丘壑胸中自廣居數椽茅屋小蝸廬門羅莫謾驚烏鵲戶外曽來長者車次韻拾青軒詠竹論詩逺到二南風句裏波濤得意濃我亦賡酬還自笑真成魚目眩驪龍再和見示絶句一階春雨兩簷風冷枕青燈睡未濃欲斷新篇無好語喜君消息到黃龍春夜信筆書枝上紅殘遍地香沈郎瘦骨歎更長東鄰喚客笙歌閙琥珀杯空夜未央至化士自宣城歸蔣陵求頌書此以贈具足城中了勝緣毗耶座上供無邉却收心跡歸空洞莫著俱胝一指禪山路見梅筍輿行處及春回石裏橫斜亦見梅路細山長愁欲絶可憐一笑向人開送昭亭李道士歸閩昭亭髙隱倦淹留歸馭飄然下十洲我亦半生隨泛宅故園空憶洞庭秋過佛子嶺岡回嶺轉翠相重覓語酬山了未工却恐前生是摩結此身今落畫圖中觀月揚千寺門背山靈利兩松間待月松前覿靣山雲去月低松影落倚天唯有碧回環至華子嶺初見黃山天都峰華子嶺頭雲蕩胸秋髙木落萬山重巨靈擘石分南北扶出天都第一峰將至黃山寺細雨微雲戲作絶句呈一老禪詩試將千里看山眼來訪山中祖佛家已識黃山真面目主山猶放白雲遮次韻公顯宫教初見天都峰孤峰突兀現青虛喜若羈人望故都神馬已馳身尚逺却疑真有二文殊次韻公顯夜聞風作午夢肩輿轉斷岡日烘殘暑氣揚湯舌端時得氷霜句絶勝狂風作暮凉次韻叔孝郎中送遊黃山見一老之作二首居士逢場了世緣却尋機語調天然我來不問三三句剩覓康壺炷暖泉路斷人稀山正深隔林鐘鼓報新音已窮渡水沿崖力更盡眠雲坐石心游龍潭百念輕氷已著湯解纓何必濯滄浪欲收一滴寒潭水散作人間無盡凉留贈無諍堂湧泉利老戶外雙峰碧礙天定回香灺已收烟苦將峭語撩癡客借枕重參一味禪次韻瑀老忩間晴忩汲水養菖蒲誰識前身是佛圖竟日不知園外事耳明鐘鼓喚齊盂再用前韻簷下飛雲若可呼樹頭岩影暗浮圖不知人世路多少只見前山似覆盂筠溪集卷十八
