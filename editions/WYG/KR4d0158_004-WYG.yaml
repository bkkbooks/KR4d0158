body:
  text: 筠谿集巻四宋李彌遜撰外制翟汝文落致仕提舉臨安府洞霄宫國家當多難之時莫先於得士臣子處儉徳之世不㤀於愛君矧惟輔弼之良夙贊樞機之重義在捐軀而許國理無謝事以屛居具位某逺識見幾清規絶俗自信獨行之操髙人靖退之風志在黔黎治每優於共理忠存社稷言備罄於同寅蚤辭軒冕之榮深得江山之助然賊未授首非明哲保身之時士而懐居豈王臣匪躬之故諒久安於恬養亦深念於艱危其還神武之衣冠勉奉洞霄之香火亟祗眷渥益勵猷為倚聞告后之謀式副貪賢之望折彦質知福州朕嘉惠多方將責成於師帥敷求懿徳尤注意於老成倚予左右之臣殿彼東南之服肆頒明命允協師言具位某秉徳粹夷宅心剛大閎才可以經逺達識至於造微武略文韜夙擁元戎之節朱轓皂葢屢專方伯之權逮宻勿於樞廷實維持於王度亟辭機務久奉真逰眷長樂之巨藩為七閩之勝地故家按堵民知隴畝之安腐粟積倉官無飛輓之役盖不煩於卧治其勿駐於前驅用寛南顧之憂行俟東歸之命體兹明訓克邁逺猷席益起復知成都府朕眷坤維之重地方整於六師倚台輔之舊臣往䕶於諸將屬爾家庭之慼難於軍旅之容然義或可以斷恩經亦存於變禮具官某宏規經世邁徳降民謀猷罄於弼諧威惠優於綏撫自總臨於全蜀遂控制於强胡遽纒陟屺之悲願解剖符之務念腰絰金革之事既見於古人而坐籌帷幄之功允資於碩望其釋居廬之慕仍還制閫之權豈朕待遇臣隣乃欲奪人之孝惟爾悦安社稷必先許國之誠尚克移忠庶幾達節趙鼎觀文殿大學士太一宫使兼侍講朕順考古訓康濟時囏窮六經典要之辭庶明大道監厯代興亡之道用闡丕圗敷求一徳之良俾獲多聞之裕眷予舊弼允協師言具官某惇大而惠和深醇而直諒閎才經體周萬務以通明奥學逢原貫九流而博極節不渝於夷險身每繫於安危頃與政機旋登揆路新美百度熙帝載以奮庸張皇六師暢天威而震疊靖江淮之俶擾致華夏之底寧雖𤣥齡善謀必資如晦之斷惟張仲處内遂收吉甫之功相須而成同歸于正志恢土宇方陳闢國之謨力避鈞衡遽受擁旄之寄深鬱具瞻之望每馳側席之思其即鋒車來逰琳館冠清班於禁殿侍閒燕於經帷益尊所聞以輔台徳詠周王之頌緝熈將極于光明服商相之言終始敢㤀于遜敏尚勤入告式副虛懐張守資政殿大學士轉一官加食邑知婺州朕思濟多艱紹隆祖宗之業眷求同徳緝熈社稷之勲得視君腹心之臣俾作朕股肱之任台徳是輔民瞻所依既力請而抗章宜閔勞而均逸具官某閎規經逺恢量鎮浮不吐剛而茹柔豈澄清而撓濁頃居風憲非堯舜之道不陳於前兩預政機有謀猷之嘉則告于内允賴協恭之助遽形引疾之辭時雖急於念功士則難於知止勉從雅志實鬱公言峻祕殿之崇名分武陽之重寄併超秩叙増衍真封惟兹錫命之蕃庸示優賢之異終始之遇朕無替於臣隣進退之間爾曲全於禮義姑煩卧治尚倚逺圗唐重贈端明殿學士節義為天下之閑莫先於許國爵禄馭羣臣之柄可後於報功惟時共理之良能致見危之命肆加褒䘏庸示哀榮具官某蚤預英逰寖階膴仕望出周行之表位髙法從之聨淹厯嵗時踐更中外屬闗陜之分帥㑹胡虜之弄兵仗義不回嬰城自守率疲散之卒抗方張之師意輕犬羊身陷鋒鏑天其付之全節人亦髙其令名宜追賁於幽扃用増崇於祕殿以激懦夫之氣以教為臣之忠尚期有知服我休命張宗元樞宻都承㫖右府本兵之地西清次對之班掌出納以導王言備論思以賛國論惟職清而地近故任重而選髙必得時髦式符公議具官某静粹不撓通敏有為逺畧可以濟時餘事長於治劇蚤繇聞望寖被簡知入侍禁林久參帥幕宻賛運籌之策力陳前席之謨逮出撫於軍師實上寛於憂顧惟兹多績允協師言其陞清切之聨以宣宥宻之㫖親賢為務朕方佇於謀猷告后之誠爾毋㤀於夙夜往祗明訓益懋逺圗楊政換給右武大夫恭州團練使爵以馭貴初無予奪之私賞必眎功用為能否之勸允惟多績奚憚屢遷具官某許國以忠行師有律久振鷹揚之旅力摧蟻聚之鋒食肉寢皮志每存於去惡履腸涉血勇屢見於先登是為出類之勲可後非常之典載班命綍超進兵團以示眷隆以旌顯効克祗予訓益懋汝為趙令矜都官貟外郎尚書郎列屬中臺其選甚髙非疏明儒雅之士不輕以畀也爾公族之秀賢科入官而問學美身優於從政頃在靖康抗章論事有聞于時坐廢累年靖共自守便朝賜對占奏詳明其往踐秋官之聨思稱予遴柬之意葉宗諤江西運使大江而西沃壤豐俗縣官之所仰給然軍興以來月收嵗取陸走水運民力竭矣爾才術之優無施不可牧民治計咸見所長肆予命爾耳目之司足食足民悉以賴爾其酌取予之宜以寛公私之急惟官不委吏吏不縱姦則事辦治而民不告病矣金安節殿中侍御史朝廷自公卿大夫至於百執事凡幾品秩惟御史耳目綱紀之寄選任非他官比必奏言試功見賢焉然後用之以爾剛毅不回静重有守前席之陳深動予聽是用寘之監理之任閲時未久擢陞副端不幾乎不試而用乎夫朕之所待爾者如此其思所以勉之惟直道可以事上惟厲行可以律人俾庶政無闕而百工知儆則予汝嘉趙康直贈待制昔許逺之守睢陽以軍事聽於巡而與之嬰城卒生致於賊以死盖其忠憤所激不求茍免故身輕於羽而意有泰山之重朕其嘉之具官某解紛排難夙著顯庸隠然長城專予閫寄既遂及𤓰而代不為接淅之行鋒蝟斧螳敢肆凶逆見危之節庶幾古人嗚呼朕遭家多難謂國有人而求仗節死誼之士僅可一二數顧何惜美官不一旌其忠以為後勸哉西清之職肆以命爾尚期英爽服我哀榮王庻兵部侍郎朕求賢於詩書禮樂之間用賢以社稷民人之事厯考成績兼收實能遴柬之難庶幾得士而况予侍從之臣哉具官某藴可行之學負有為之才久賴折衝老於師帥威名憺乎西鄙聞譽達於中朝朕方登延羣材圗回庶政使其力安於逺俗曷若坐制於外夷是用趣回禁宻之班副予九伐五兵之任爾其深監前轍益攄壯猷冀聞借箸之竒遂成歸馬之効尹焞祕書郎兼崇政殿説書孔子之道軻死不傳學者不求放心而尊記問之師去古滋逺其誰使正之爾學有師承本於自得篤信力行不惑於世日者安車何止三反朕恨見之晚而髙卧益堅是用趣侍金華仍寘養材之地非特朕樂聞朝夕之益亦使後學知所模範焉戸部侍郎王俁落權字力久則工能善其事因任則人能盡其材朕率是道以馭羣工故雖侍從之臣亦或試而後進具官某才為世用學可致君蚤稽公言寖寘顯路自攝貳卿於民部亦將兩閲於星周載疇試可之功就錫維新之命方今師老財匱廟堂錢穀之問不勝其煩生財之道竭矣而理財之方不得施尚何術以濟之夫任既久則見益盡名既正則責益專獻可之猷勿俟朝夕吕本中太常少卿禮樂政化之所自出後世文勝道隠寖失聖人之㫖朕欲息邪距詖而反之正思得好古博雅之士以辨明之爾操履之正克世其家問學之醇不悖於道發為詞章炳然其華頃由柱史遽起丘園之興真祠均逸亦既踰年今予命爾以秩宗之事昔魯不棄禮而齊親之治亂一軌百世可循益尊所聞追還邃古之風以成予治朕之所以望爾顧豈鐘鼓玉帛云乎哉李光知洪州朕據險阻以制强胡倚循良以安逺俗眷豫章之重鎮實江右之名區非兼文武之資曷副兵民之託載疇在服允得其人具官某操行直方秉心端亮備罄匪躬之節屢陳告后之謀入冠六卿出當一面忠嘉自許見松栢之後彫威名所臨信藜藿之不採其往釐於南土以坐控於上㳺方淮楚環多壘之師章貢羣弄兵之冦先事而預防則近擾患至而無備則易危尚賴折衝用寛憂顧克祗明訓益狀逺猷任申先徽猷閣待制左右持槖之臣皆得以陳天下事而獻其可否惟克用常徳㒺非吉士則於予一人有盡規之義具官某名臣之裔端亮不渝自信獨行險夷一節朕起諸淪落之中寘彼薦紳之上載筆螭陛代言綸闈書法摛詞無愧前識踰年去國有鬱公言其還近班晉寓西清之直惟乃父正色立朝危言悟主遺風凛然久而彌著今朕亦以此望爾爾其益懋賢業勿替家聲以永無窮之譽辛次膺湖南提刑具官某頴考叔一言而施及莊公人心所同若執符契儻得其合孰不為之動聽爾才通而有守言髙而可行久司諫垣賴其朝夕之益將母之請實隠予懐朕方以孝治天下忍違其欲使不得致養於親哉寓直道山以為爾寵按刑湖外以便爾私若夫揚清激濁而厲在位布徳施仁而綏逺俗斯爾疇昔之所勉朕者尚奚多訓李公懋湖北提刑具官某書曰本固邦寧易曰厚下安宅朕履危思安稽于古訓凡立政造事必求所以厚下固本之道爾端勁不拔質直無華言必及民志先體國雖紀綱之地不可去賢然欲禁暴戢姦以除民害非有惠愛之術而深達朕言意者不能也湖湘之間殘於摽掠困於征求肆予命爾按兹祥刑一方之治悉所當察爾惟力行所見之學能踐昔日之言則朕於斯民復何慮焉任申先轉一官致仕虧盈益謙者天之道難進易退也士之常惟富貴貧賤不以動其心則用捨行藏皆能適於正具官某承家有端直之譽治已以㢘勁之規善刀而藏幾老於世韞玉而待卒聞于朝朕寘彼周行擢之法從雖陳蕃之志未遂而賈誼之言畧施逺攬抗章懇求謝事既獨髙於止足俾交養於智恬肆頒増秩之榮姑遂掛冠之逸冀無妄而勿藥庶厥疾之有瘳尚體眷懐勉思後効胡銓保守吉州轉通直郎乘障之功非所以責賢腐儒之説或至於敗事爾以文藝擢寘甲科下帷窮經十年不調當胡虜亂華蹂踐郡邑而能率衆仗義壊其機牙使姦不得發一方以寧朕甚嘉之其進官資以示褒寵閻亮等承節郎胡馬亂華列城震擾爾等被堅禦侮賈勇鏖戰具有勞績爰陞品秩再錫命書往服恩榮益思報効李光封贈故父朕大饗合宫受釐宣室誕布自天之佑普霑在服之臣具位某父某韞玉積躬籝金垂訓流風甚逺于公之門既髙種徳方興畢萬之後必大是生俊傑為予忠良屬兹俎豆之陳方倚藩維之寄肆頒茂典追賁幽扃慰其罔極之思示我無私之澤張俊封贈三代曽祖朕稽三代之禮文參九筵之遺制大饗上帝並侑祖宗用答神明之休均錫中外之福具官某潛徳不彰慶流後裔是生賢傑為予虎臣兹禋祀之克修宜厖禧之咸被進階帝保時國上公尚其有知歆此殊寵曽祖妣朕卜季秋之吉有事合宫爼豆既徹爰錫大賚矧予上將之先可後褒崇之禮某氏婦徳淑慎流福後昆有孫而才為朕信布是用延敷帝祉肆錫命書進加大國之封式示重泉之寵魂其不昧尚克欽承祖朕嘗膽艱難注意將帥廼者受釐宣室昭答神休念予推轂之臣不預執籩之事申及先世咸錫異恩某官慎行修身隠躬不耀惟時上將繫爾聞孫肆予饗帝之成廣霈榮親之澤位隆帝傅寵及九泉朕之待將帥之禮無不極矣尚祈精爽不昧欽承祖妣源深者流必長本大者末必茂國有上將功葢一時推榮其先可後褒典某氏徳配君子行著閨門遺芳流祉至孫而大兹者肇隆新禮均錫鴻禧爰増大國之封以正小君之位時為茂寵用賁泉扃父朕念饗親尊祖莫大于配天故綿蕞新儀參稽古制薦馨神靈上下昭格是用推親親之恩以慰天下之為人後者况予寄閫之臣乎具官種徳不遇為時遺賢義方之訓知以教子俾予登壇仗鉞之將憂君許國忠貫日月者其來盖有自矣逮兹毖祀宜亨神禧進位公師用昭異數精誠如在服我寵靈母朕思考叔之孝詠南陔之章則知人情生以養親為先死以顯親為重也故禮成太室澤浹在廷爰及幽冥悉加叙進某氏積行于躬克配令徳粤有賢嗣輔我中興兹大饗之既成宜洪休之咸被是用大湯沐之封渙夜臺之寵尚其不昧歆此恩榮黄積厚都官郎中列曹諸郎各有秩叙至於用人則無重輕之間然非不得已不使後來者居上也爾學行之懿自朕親擢優㳺省戸强敏有聞姑從次遷以俟褒識往欽乃事勿怠厥修吏部侍郎劉寧止落權字力久則工能善其事因任則人能盡其才朕率是道以馭羣工故雖侍從之臣亦或序而後進具官某才優而有濟學博而可行蚤稽公言寖寘顯路自攝卿貳於銓部亦將兩閲於星周載疇試可之功就錫為真之命方今仕流甚冗而朝或乏才官曹雖多而士或失職朕甚惑之夫任既久則見益盡名既正則責益專獻可之猷勿俟朝夕王綯贈官委質策名當盡匪躬之節飾終隠卒必崇歸厚之風愴予舊弼之良遽起哲人之嘆肆頒命典庸示褒懐具官某奥學造微閎才經世早赴功名之㑹遂登丞轄之司許國以忠亦艱難險阻之備至保身而退知用捨行藏之有為朕方體大舜之同人稽成湯之圗舊亟聞淪謝良用䀌傷錫以崇階用追賁於泉壤禄及後嗣將益大其門閭尚克有知服我休命押馬毋丘㢘轉一官爾馳驅王事道阻且長能使牧人去其害馬進官一等以旌汝勞彭大節補承信郎毀家以紓國難麟經褒焉爾祖以貲奉公軍用不乏一官及汝以報其忠往服寵休益務恭恪范璿樞宻院檢詳國家多事而來政令賞罰自右府出較之中臺或相倍蓰故張官設属必得明慎通練之吏庶幾事舉而姦弊不作以爾言行有則悃愊無華久於郎潜有藴未試往聨宥宻之屬凡政令之出納賞罰之重輕必致詳焉毋使善譽減於為郎尚慎之哉王迪左司郎官文昌天府衆務泉藪左右置屬分掌列曹凡事之出納皆得折衷之而聽於長得其要若挈裘領不然治絲而棼之不勝應矣爾才可剸煩知能撾伏彌綸省闥强濟日聞爰因其能就陞厥次並恭乃事以審法令以明辨訴以謹文事案牘之程度毋習故常憚於繩糾馴致庶政之弊則惟爾休魏安行大理寺丞漢朝先經術以用人仲舒本春秋以議獄爾文雅飾吏平易近民因其所長必能為朕持天下之平使刑不濫而民不寃廷尉之屬肆予命爾尚往欽哉知鄧州穰縣杜琮轉二官朕慎惜名器不以假人惟時戰功無小不録爾備吏百里廼於拔城䧟陣具有勞焉進官二級増氣三軍毋怠欽承往思報稱喬仲福贈正任承宣使張景正任觀察使劉承衡友遙郡觀察使朕以節義望天下士于今有年而見危致命求之薦紳尚不多得於吾行陣之間迺有人焉具官某勇冠三軍身鏖百戰夙賴干城之畧方遲敵愾之功屬叛黨背鼔衆不返而能懐忠守節義不俱生視死如歸不為國辱峻陟使名疏恩後嗣豈獨重義為九泉之榮盖將顯忠為三軍之勸尚其不昧歆此寵休郭沔閤門祗候祗事上閤出入禁庭右列髙選也爾勤勞王事茂著厥功肆予命汝是為異恩益務恪恭以思報稱楊舉直循一資昔者王師致討運營淮上飛芻輓粟人用告勞爾令行百里運不絶道使軍不乏而士益振以迄有成賞可後哉進資一等以示褒嘉王俁䕫路提刑朕欽慎庶獄寧失不經常恐一夫不被其澤必慎求於成徳以總治於祥刑以爾忠厚有餘靖共自守早冠多士嘗參邇聮久分剖竹之符屢下賜環之命謂不容於俟駕乃未聞於造朝爰錫命書按刑巴峽惟吏克知畏而民以不寃則為稱職尚往欽哉曽開中書舍人兩掖極諸儒之選中書本庶務之原宣徳意以形四方孚號令以鼓天下任人圗舊出命惟新具官某端靖不渝沖和無競辭有典要徳為老成忠節著於三朝威畧伸於兩鎮兹起真祠之秩來歸禁路之華惟坦明之文動於羣聽深切之論沃于朕心使老癃扶杖以期生悍武聞風而思奮時汝稱職助予圗功趙思誠中書舍人上詞同具官某學博而資深辭華而知要早擅翩翩之譽備輸蹇蹇之忠廉靖有常篤信無倦兹賜環於祠館歸持槖於禁林下詞同馬士存贈兩官與一子恩澤朕求節誼之士於戎馬以來固未多得盖處死之難人情所同爾許國以忠久從金革臨難不奪至於隕身可無褒榮以慰泉壤晉官二級禄及後昆尚克欽承毋㤀結草霍興贈承信郎捨生取義知命者所難而爾能體國奮忠殞身王事錫官一等追賁九原魂其有知歆此殊寵章承祖循一資千里饋糧師不宿飽其責甚重頃者淮壖轉餉為急飛輓之事爾或有勞進資一等姑以示勸尚其勉之燕仰之大理評事萬方之獄决於廷尉而左右平專可否於情理之間一失其當死者不可復生矣爾以才稱習於法令往居是職可不慎哉䕫州通判崔仲通轉一官堅壁挫敵兵家所難雖曰金湯可恃而臨敵不懼失之毫釐民不堪命矣爾頃丞蜀郡多壘在郊禦侮之功克全千里其増命秩用勸為臣使知夫仗節死誼臨難毋茍免也李發轉三官爾忠勇自奮萬里一身能致敵情助我制勝夫責之難則報之重晉官三等是為異恩往服寵榮益思勉勵郭貴贈兩官成忠節春秋之法死王事加二等爾臨敵致命奮不顧身朕何惜不追進官資以為爾地下之榮乎尚其有知歆此殊寵陳珍轉一官爾比整舟師備禦海道淹留嵗月灼見宣勞進秩一階以示褒勸張安國換給承節郎爾以勞入官越時既久比加考覆載錫命書祗服恩榮益恭乃事衡州茶陵縣廣澤公封明靈廣澤公朕以道御世無間幽明有功于民必加崇奬爾威行千里惠及一方雨暘以時無禱不應雖民和降之以福惟正直則依人而行其錫隆名用旌靈貺益敷利澤以答寵榮曽慥湖北兼京西路運副襄鄧疆理之初荆湖剽掠之後瘡痍未合師旅荐興所以餉給而拊循之非通敏忠厚之吏不以輕付也爾蚤以材猷見推士類久司計漕績用有聞其進官聫兼荆襄轉輸之任俾惟新之俗民不告病既老之師士不阻飢時為汝職尚其勉之朱松校書郎朕寤寐求賢思得天下之士未見君子猶恐失之爾學行有聞達于予聽便朝賜對敷納可嘉肆頒命秩之榮分職書林之祕麒麟天禄爾所舊㳺勉副簡求益務涵養常明祕書省正字朕儲書中祕以萃羣英推擇成材出為時用爾績文種學望譽甚休爾雅之詞見於已試其往逰於藏室以縱覽於祕文藏器待時嗣有褒寵霍蠡總領荆湘財用轉一官朕宿兵邊隅坐制羌虜預為足食之計曲盡理財之方而吏或侵漁軍多冗濫致餽餉不繼於道征求荐及於民朕甚病之爾以才猷列于郎位將命以往知無不為力究弊原不畏强禦連營盡得其軍實列郡悉知其吏姦風力隠然濟以心計有臣如此朕何慮焉超進一官姑以示勸益恭乃事朕不汝㤀勾濤起居舍人朕統臨兆民若馭六馬言動之間㒺不抑畏故左右置史簮筆對仗分侍便坐繫日而書之所以警今垂後其任顧不重哉以爾老於文學辭華蔚然好是正直氣節不撓力求古人之心有意當世之務雍容省闥望重一時肆予命爾以記注之事往踐右省職清而地近其體東注之意益勵乃為嗣有褒寵李擢袁州李正民筠州筠袁之間盜賊連壤戸口耗於剽掠郡縣為之繹騷必擇循良之臣以施安集之政具官某嘉猷敏濟懋徳純成被遇兩朝罄獻納論思之益周旋一紀宣藩維屛翰之勞念方圗舊而與之赴功豈容遺賢而久於均逸往分郡寄共拯民艱廣漢之治在頴川力回獷俗龔遂之安於渤海坐致淳風其酌猛寛以圗治効蔣璨淮東運副朕疆理淮甸克復神州環冦之師殆將百萬致粟一石率當幾鍾維兹轉給之功必得開敏之吏爾儒雅自將材猷可倚總輓粟飛芻之任無傷財害民之譏奏言便朝灼見心計載頒寵數増重使華其上體於眷懐益務修於職業俾糧不絶道賦不加民而用度足則予汝嘉趙子巖廣東運判五嶺以南無慮數十百郡縣分命部使者察之惟時計臣雖摠轉輸而吏姦民隠皆得上聞實耳目所寄流惠于萬里者也爾蚤以材能寖被器使祥刑南服譽處甚休就易使華往按東道其奉詔條宣徳澤治財賦明刺舉毋以接荒徼而怠拊循毋以逺廷朝而畧法度靖共爾位稱朕意焉知荆南府王庶復徽猷閣直學士荆湘萬里實國上㳺師帥一方為時重寄爰擇西清之之望往綏南服之民善最既聞褒嘉可後具官某才猷敏濟氣節剛方洞明韜畧而本之詩書妙達權謀而由於法度肆疇嘉績作鎮鉅藩迨兹報政之優備著宣勞之効流庸自占仁風浹於遺黎桴鼓不驚威名憺於隣敵允資控制以寛顧憂載陞延閣之華用益帥旄之重雖爾舊物惟予茂恩勉圗終功嗣有休命長入祗候陳勝轉一資爾擁衞宫闈周旋羈紲勤勞備著褒典可忘増秩之榮仰思所報樓炤祕閣修撰知温州萃圗書於中祕獨髙論譔之班剖符竹於外藩尤重承宣之寄眷被永嘉之望輟予近列之良爾學有師承辭知典要握蘭省戸備罄猷為載筆宸廷時推廉靖方憂國賴忠言之告而愛親興志養之思有嘉錫類之誠肆頒從欲之命往分釐於便郡仍陞踐於華資爾其布政以揚王之休推恩以及人之老遂安逺俗毋㤀本朝丁則轉一官朕以閫外之事委之將帥而金商道阻民俗軍旅之利病難於必聞朝廷患之爾以材能効官帥幕馳驅王事千里而來見之便殿乃以民情軍實悉達予聽進官一等以慰爾勞其體朕所以待遇逺臣之意歸告而長益堅其忠以圗報効梁仲敏太府寺丞朕於養材如養木然拱把而上皆扶持封植之以遂其成爾種學績文未有所試雖丞於寺事皆在所察而無專責得以時暇亦朕養材之地也往居而職自公而退毋㤀所能鄧名世校書郎兼史館校勘朕念人材之難既得天下之士則樂與終始作成而器使之爾頃以材名擢居策府以憂去位終制造朝問學之工久而益粹其還讎校之職仍參筆削之官眷任之意思所稱焉王利見贈承務郎漢之狄山以博士乘鄣致殞其身雖其自取亦用非所長也爾實儒生以忠及難朕甚憫之肆頒命秩追賁九原魂其有知服我休寵冦逵起復淮西宣撫司將領墨絰以從軍事於古有之爾御衆有方久臨行陣以憂謝事曽未踰時比命將臣出師邊徼而抗章來上請汝以行其奪苫塊之情以從金革之事移忠之義視君猶親往服訓辭益思自効林季仲檢正諸房公事東西臺總萬方之務而丞弼以佐理為任非事重體大則為之屬者皆得以彌縫董正之其選顧不重哉爾學足以飭身智足以周事翺翔顯路聲聞藹然有意斯民力求自試朕舉能任官用分命爾列屬樞機之地其益殫乃心以佐而長使朝廷之上事無不理時汝之職我有好爵恭俟朕命趙渙江西提刑總按一道理察百司皆予耳目之官也擇人而付無閒内外爾質直好義不詭于行備官蘭臺百廢以舉方將試之言責以觀謇諤之風而抗章累來力求自便按刑江右其為朕行移爾紀綱輦轂之方以成澄清郡邑之治使朝廷威惠寖以及逺則為稱職董􅀢知嚴州守牧之任莫先惠養近嵗縣官急於調度吏茍逃責他置不問甚者頭㑹箕斂重為法而民不勝嗚呼豈古循良之治哉具官某學而文克傳家法仕優而果夙著能聲頃自綸闈出司琳館朕深軫黎元不安畎畝思見頴川渤海之風次對近班嚴陵上郡用起汝於閒散之地徳至渥也勿云吏道以法令為師惟行之以簡懐之以惠阜安吾民所以報朕韓彦直祕閣中祕儲書以待寒雋非所以賞有功也惟爾父有非常之功故報之以非常之典延閣之直肆以命汝朕之所以待將臣者至矣往服異恩益圗報塞浙西提舉茶鹽錢堪轉一官煮海之利食貨所先有司用是寛斂息民而足邦計爾頃將使指奉法不苛能致羨増以佐軍食朕信賞必罰小善不遺進一官以示能者之勸丁則太府丞外府貨財所聚丞實佐於事無所不掌以爾囊封論奏陳甚髙賜對治廷有言動聽朕欲觀汝能姑試以事往踐厥職以俟寵光筠谿集巻四
