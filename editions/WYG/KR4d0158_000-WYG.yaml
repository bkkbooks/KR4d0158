body:
  text: 筠溪集目錄别集類三宋巻一奏議巻二奏議巻三奏議巻四外制巻五外制巻六表狀巻七書啓巻八議古巻九議古巻十議古巻十一詩巻十二詩巻十三詩巻十四詩巻十五詩巻十六詩巻十七詩巻十八詩巻十九詩巻二十輓詩巻二十一雜著題跋巻二十二銘贊序記巻二十三祭文巻二十四墓誌銘塔銘附樂府臣等謹案筠溪集二十四巻樂府一巻宋李彌遜撰彌遜字似之連江人居吳縣與兄彌大弟彌正俱負重名大觀三年上舍第一髙宗朝試中書舍人再任户部侍郎以争和議忤秦檜乞歸事蹟具宋史本傳集首有樓鑰序稱其歸隠西山十六年不復有仕宦意詠詩自娛筆力愈偉朱子嘗跋其宿觀妙堂詩後亦傾倒甚至盖其人其文俱卓然有以自立矣彌遜自號筠溪子筠溪者其居連江時所居之地集中有筠溪圖跋序其始末甚明宋史藝文志載彌遜集亦名筠溪可以互証此本題曰竹溪集考諸家著錄皆無此名知為傳寫之誤今仍改題曰筠溪集以復其舊焉乾隆四十四年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀筠谿集原序士大夫種學績文孰不欲流傳於後資禀有厚薄用力有淺深固不可誣然須器度過人則自應髙勝有非勤苦之所能强進者此可與知者道耳筠谿先生以父兄之賢少有聲於太學一夕厠有同舍投繯於梁間公時年才十七八略無懼意亟解其繫卧而枕於股上親撫摩而嘘呵之㑹有後至者怪而問焉徐語其故馳報齋中羣士競篝火而來相與抱持而歸竟全其生即日名動京師弱冠遂為大觀三年上舍第一人繼登科其才固足以得此天報亦昭昭矣公之器度絶人逺甚如許加以問學之懿其發為文章顧豈淺見者所能及也政和間以南宫舍人使契丹擢左史用訐直貶宣和末知冀州獨能堅壁以抗虜暴靖康漕江東平叛卒之變入紹興為饒吉二州七年復立左螭尋掌書命雄深之文黼藻王度四方傳誦之論事封駮皆人所難又以力闢和議益與時忤遷戸簉匄外補去國之際猶拳拳以立國待夷狄之大計為言竟請祠以歸隠福之連江西山凡十六年不復有仕宦意哦詩自娛筆力愈偉居間憂世著議古數十篇雖汎論古事而皆關於當世利病深切著明有范太史唐鑑之遺風乃心王室惜乎用之之不盡也迨今將一甲子公之孫珏以郎曹典大藩今居江西憲臺方迎奉老親而當寇攘驚危中竭力不少顧避琪以上舍魁决科克繼大門為京口貳車皆有時名有以知公之澤未艾也二孫以鑰㳺從之厚出公遺文二十四巻求序鑰晚進何足以測識前輩所藴以平日慕用之誠幸託名於不腐敢謹書之公諱彌遜字似之晜仲六人文字為一門之盛兄尚書彌大弟太史彌正俱負重望筠谿則公自號云嘉定四年閏月初吉正奉大夫參知政事兼太子賓客樓鑰序
