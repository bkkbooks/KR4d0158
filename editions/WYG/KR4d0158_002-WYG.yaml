body:
  text: 筠谿集巻二宋李彌遜撰奏議戸部侍郎轉對劄子臣嘗觀唐太宗問創業守文之君而房𤣥齡以創業為難魏徴以守文為難臣愚以為創業守文雖不為易而中興為甚難也盖振頽綱補弊政易風俗集流亡政之可因者悼前轍而或廢事之可革者守膠柱而不移欲其成功誠甚難也易曰有過物者必濟故小過之後受之以既濟自古人君非有大過人者不能回衰亂之俗以為安平之治也惟周宣王以任賢使能而能復古漢宣帝以信賞必罰而致中興光武以總攬權綱造漢室肅宗以治兵討賊復唐祚元帝以虛心下士收一時之望以保江左至於區區勾踐尚能苦身焦思滅强吳尊周室以復其國則天下之事未有力行而不成亦未有不為而能成者也降是而往雖有願治之君而終不能成其紹復之業者政事之間害成者多而不能去故也將帥雖衆而失控御之術害成也財用雖足而失均節之道害成也立政者茍一朝之利而不為經逺之計害成也在位者懐自安之私而無許國之志害成也有是數者而欲成中興之功是猶農夫不去草萊而望苗之興顧不難哉仰惟國家之難曠古未聞陛下宵衣旰食坐薪嘗膽凡政事之得失生民之利病人材之賢否與夫任將帥練兵卒豐財用一有補於中興之治者莫不深究而力行之然蹙國未復强敵未殄豈規摹未定而害成者未去乎今黠冦留屯中原資糧畿甸分兵淮泗觀時伺釁窺我中國其志甚大未肯輕舉兹忠臣義士所以流涕而芻蕘搢紳每為寒心者而朝廷方且崇大體務鎮静狃目前之安㤀善後之計如秦人越人端視而不加恤臣愚所未喻也臣聞孟子論當務之急易經著随時之義君子見幾不俟終日又聞賁育之不戒童子之不抗魯雞之不期蜀雞之不支若計謀不先定將帥不協力士卒不素練饋餉不預備玩嵗愒日不早圗之一旦秋風髙胡馬鳴後時之悔若噬臍焉殆將何及臣願陛下斷以乾剛照以離明體當務隨時之訓如救焚拯溺之急馭將以道節財以理變茍且之政以為逺圗懲自安之私以勵臣節力去此害成者然後任賢能如周宣王信賞罰如漢宣帝總權剛如漢光武掃大憝如唐肅宗下取元帝勾踐之事以為規監將見中原不足復黠冦不足破誠宗廟社稷海㝢元元無疆之休臣不勝憂思忠憤激切屛營之至乞置使積粟劄子臣聞陸贄有言晁錯論安邊之策要在積穀充國建破羌之議先務屯田故其於興元平賊之後猶力請罷嵗運水脚擇人充使委以平糴盖師行之際足食為先不易之理也國家用武十有餘年軍餉日滋終嵗所入才可給目前仰食之衆水旱盜賊之備不與焉一有非常之役不取則不足以濟事功取之則民不堪命長慮却顧者於此寒心也臣每於敷奏之間躬聞聖訓以國用不給為甚患以民力既竭為甚憂臣仰體陛下宵旰勤恤之意蚤夜以思祖宗之法有便於國利於民可行於今者發運一司是也其制始於太宗淳化間而備於仁宗皇祐之後大槩不過權六路豐凶以行平糴之法災傷州郡則减價而收之值豐熟州軍則増價而糴之以補當輸之數每嵗轉般以實中都亦可謂便於國利於民也然今日之宜比昔少異不必盡循舊制當師其意損益以行之臣愚謂當於經費之外别給糴本數百萬緡復置一司廣行儲積分毫不得取供近用唯以待陛下經逺恢復之須積之一年必見其效三年之間當有一年之蓄加以數年倉廩有豐實之漸田畝有休息之期公私之利不可勝言然方省官之時而欲増置吏貟方匱闕之時而欲樁辦糴本方目前仰給之時而效乃在數年之後議者必以為非盖興事者難於謀始慮逺者不求近功今捐緡錢數百萬増官吏十數人而可以朝廷長久無窮之利何憚而不為孟子謂有七年之病求三年之艾茍為不蓄終身不得臣謹條具發運司建置廢罷及今日可以依倣置使之目隨此繳進伏望陛下特加聖覽參酌利病斷以不疑而力行之不勝幸甚乞置使積粟畫一一太宗皇帝淳化年間剏置至道初始以都大發運使為額真宗皇帝以三司不見外方茶鹽利害特設制置一司其後制置發運兩司通而為一一舊來所掌職事每嵗先以朝廷降到糴本於諸路豐熟去處増價收糴米斛就真州泗州轉般倉收樁諸路上供斛㪷係發運司逐年用所糴米斛先次代發應副中都其諸路合發米數却於真州泗州轉般倉下卸以備本司起過之數逐年視六路豐凶災傷去處難得本色則令減價納錢豐熟去處榖賤傷農則令増價收糴以補合發之數其贏則歸本司謂如災傷地分㪷米五百即折納四百文豐熟地分㪷米二百即増作三百文收糴其贏猶有一百文歸本司之類拘催檢察諸路上供錢物坑治市舶等事按劾諸路上供稽違每嵗攢造錢帛斛㪷文帳以上省部一自政和二年内罷轉般諸路額斛經發上京下卸并拘收糴本以為羨餘内外不復更有儲積而發運司之職名存實亾止是催發綱運一紹興二年間縁發運司别無職事將官屬權罷案牘架閣饒州并湖州以備照用一今來用武之際兵食為先理合依祖宗舊制專置一司攽降糴本廣行收糴儲蓄糧斛以備不測之用庶幾不至臨時有取於民一置使一貟或使副各一貟并所置使名置司去處自乞朝廷指揮一今來措置糴本為先且即以米價每㪷約三百文計用六百萬貫可糴二百萬碩乞自朝廷剗刷支降如金銀見錢數少物帛之類但可變轉者給降充本若不敷上件數目且乞先次支降三百萬貫文其餘接續收樁支降一發運司舊係轉般諸路額斛應副中都今來置使專為於經費之外預行儲蓄以備非泛支用所掌職事難以盡用舊制理合増損措置下項逐年朝廷降到本錢盡數於六路豐熟去處置埸和糴樁管聽候朝廷指揮支用逐路合納税賦並從本司相度豐凶委是災傷去處許減價折納見錢並撥歸本司却令本司認起合發上供之數諸路上供斛㪷並令漕司依舊認發仍聽朝廷科撥唯災傷州縣既折納見錢令本司將所納到錢於豐熟路分收糴米斛補發合納之數餘錢惟許増添糴本外並行封樁本司不許别行支用檢察諸路失䧟錢物許拘收充本每季具數申戸部注籍六路年額上供錢物不以科名合起發之數並行拘催如有稽違隠落並聽奏劾一今來所措置到錢米並令沿流諸軍樁管嚴立法禁不許分文移用朝廷亦自遵守不可那撥應副目前支用一官属人吏並取朝廷指揮比倣舊數量行差置候就緒日申請増減一乞先次選差使員其本司合行事件並聽所差官具畫一申取朝廷指揮答和議奏准紹興八年十一月十九日樞宻院劄子三省樞宻院同奉聖㫖大金遣使至境朕以梓宫未還母后在逺陵寢宫闕久稽汛掃兄弟宗族未得㑹聚南北軍民十餘年間不得休息意欲屈已就和在廷侍從臺諫之臣其詳思所宜條奏來上各限一日進入右劄付臣准此臣近於今月四日陛對嘗具奏陳金人遣使請和事當緩而圗之謀以致之必底有成至於先事致屈有大不可者伏䝉陛下聽納以謂當然兹承温詔明諭聖意至於屈已就和臣仰體陛下孝慈哀痛有不得已者不知涕泗之下也陛下欲還梓宫迎母后修陵寢宗廟之奉復兄弟宗族之懽以與軍民休息之期誠臣子之深願天下之至望也然敵情險詐姦謀詭計未易測度應之得其道則不必致屈而陛下之欲可得應之非其道則雖屈已從之求吾所欲未必可得而後日之患不可不慮也金人之擾中國十有餘年豺狼蠭蠆不足喻其毒殘我人民毀我城邑貪婪凶暴莫知窮極而一旦欲舉土地宗族以與我是大可疑也謂其衆離勢分為欵我之計則彼既弱矣尚何自屈之有哉謂其幣重言甘為誘我之策則屈已從之是墮其計中也或云來使之辭以謂酋主厭兵欲施大恩以釋前日之怨狼子野心萬無是理設或有之但當復我土地歸我宗族休兵息民不相侵伐而已何至先之以難從之禮責我必從而後議哉陛下受其空言未有一毫之得乃欲輕祖宗之所付託屈身委命自同下國而尊奉之是倒持太阿以授之柄也授人以柄而危已之國謂之和可乎借使敵人姑從吾欲假以目前之安異時一有無厭之求意外之欲從之則害吾社稷之計不從則釁端復開矣是今日徒有屈身之辱而後患良未已也陛下痛念梓宫不返母后未還不顧一身之屈求和異類彼乃先持割地之説以邀陛下使真得之陛下能與三軍百執事共守之耶不過分兵遣將以疆理之爾是未必為我大利已能致陛下之屈則梓宫母后兄弟宗族相繼以邀陛下何所不至必得其欲而後已其可不預防之耶國家之禍曠古罕聞陛下冒犯險艱取神器而有之四海之内欣戴聖徳無有窮已者誠以祖宗流澤入人之深天下皆知忠於君上為不易之大節今陛下率在廷之臣以君北敵後何以責其盡忠哉况三軍之士四海之衆視朝廷以為祈嚮而强之以其所不欲一夫不從則有不可勝慮者矣是又大不可者臣所謂應之非其道則吾之所欲未必可得而後日之患不可不慮者此也臣愚切料金人之失在於疑粘罕而廢劉豫粘罕疑則其國人之心離劉豫廢則中原之人不附所以恐懼自疑為求和之計而賊性詭誕變詐欲以自盖尚持强大之勢以惑我耳願陛下深謀逺慮緩而圗之不待屈已就和而可以得聖心之所大欲茍内懐欲速之心外示深畏之跡實啟其窺伺之意事未易可成也為今日計者莫若遣使境上從其割地之約俟其復我境土歸我宗族則重幣以報之必欲先屈我而後議其所以是將欺我也明矣則謝其使卑辭厚禮以遣之勿絶也陛下縱未遽興天討亦當申飭將帥厲兵秣馬固守疆埸俟釁而動然後修徳布政下至誠惻怛之詔動人心激士氣使皆有報讐强敵之志則國威日振戎事日修彼將聞風震讋求附之不暇陛下端拱南面梓宫可返母后可迎宗族境土可得而保一舉而二善成不亦可乎臣所謂應之得其道則不必致屈而陛下之欲可得者此也陛下聖孝懿恭痛念宗社若以謂必先屈已而後和議可成則十年之間陛下之屈亦甚矣敵人所以報陛下者如何尚復可以有加耶懐王絶齊以和秦而商於之地終不可得太公吕后之歸乃在項羽食盡少助之後果在於致屈以求之耶此又往古之明監也安危存亡之機實在於此伏惟聖慮詳擇再論不當先事致屈劄子臣昨對日面奉玉音訓諭金人許歸梓宫還母后兄弟宗族事臣不勝感歎欣幸之至數日以來竊聞朝廷計議禮儀未定兼使人之説多不可從臣以所聞反復思之有不可先事以致屈者願為陛下陳之仰惟陛下聖孝之至不顧萬乘之尊求和異類而金人且以畫地講和為辭初不及母兄宗族也是豈可先事以致屈耶敵人狂悖吞噬混一之名故以陛下之所大欲邀陛下今信其空言遽從其請彼既得所欲則尚復何求而以土地宗族歸陛下耶是又不可先事以致屈也金人敵國也卿士大夫國人所賴以為國者也陛下欲為親而屈使梓宫至母后還猶有口實以慰國人今事未一得而坐失四海之心不可不慮是又不可先事以致屈也臣所陳三事於今日和議利害甚明甚切者倘陛下篤於愛親盡排羣議内懐欲速之心外示自弱之狀以謂必先致屈而後和議可成臣恐啟敵人窺伺之意别生無厭事愈難從反害和議也臣願陛下厚禮使人館之闕下先遣報謝使致所以謝之之禮因令致書道廷臣國人衆情未孚强以難從慮或生釁有害兩國之歡請致梓宫母后兄弟宗族于近地卜日可迎然後議所以禮之則不失敵人之情而陛下之欲可得也臣自草萊累被親擢沐天地之恩異於倫等蚤夜思所以上報陛下者唯盡忠而已茍或嫌黙顧避知而不言致陛下墮敵人之計失國人之心以貽後患則臣之罪不容誅矣故敢以狂愚上凟睿聽伏望陛下少寛萬死察其拳拳之忠而採擇焉臣無任恐懼激切屏營之至取進止乞罷莫將送伴使狀伏覩近降指揮差新除起居郎莫將充送伴使臣契勘比者金人遣使畫地講和旬月之間禮儀未定中外惶駭人情不安賴陛下聖度剛明曲從羣議斷以不疑致使人屈服致書而去國人欣悦萬口一詞天下幸甚將輕儇不端素無所守揣摩迎合僥倖一時意為身謀不恤社稷之計而使將與賓客言深恐將遂非文過姦諛不悛觀望反覆隂搖敵情上負陛下聖孝愛親之念况將越次而遷已咈公議遽委使節俯示曲全為將計則善矣非國家之福也伏望陛下更加聖慮罷將送伴使别選忠信之人協濟國事臣職在論思茍有所見不敢緘黙冒凟聖聰不勝恐懼戰越屏營之至應詔薦郡守監司狀准尚書省劄子勘㑹已降指揮令侍從官選可為監司郡守之人不限員數具名以聞其兩史官未有該載閏十月二十一日三省同奉聖㫖起居郎起居舍人並依侍從官已得指揮施行臣今恭依聖㫖指揮保舉下項須至奏聞者一貟佐朝散大夫新差權知信州軍州事梁澤民吏才敏彊更練民事曽任知平江府崑山縣無為軍廬江縣治聲藹然為衆所服通判建州權州事治兵禦冦措置有方繼以提舉福建茶事被㫖權本路提刑戢吏恤刑一道賴之一貟右朝散郎新差權發遣筠州軍州事葉擬智識疏通長於吏治更厯州縣前後十餘任備見才能曽任知湘州臨漳縣平易近民有循良之風雍容濟事無苛刻之政一貟左朝奉郎權發遣邵武軍趙子木文采政事皆有可稱曽任知饒州樂平縣愷悌恤民而能辦治任滿而去縣人繪像祠之臣昨任知饒州備見其事其後知臨江軍邵武軍所至有聲縉紳之間咸知其能一貟左朝奉郎新差監左藏西庫陳定國識量宏逺操履剛正通達治體而不忽細務吏事財計皆其所長曽任知惠州河源縣縣人至今稱之如䝉采擢必有可觀一貟佐宣教郎大理寺丞魏安行儒雅飾吏愷悌牧民曽任知信州弋陽縣吏服民愛治績顯著諸司列薦賜對陞擢考其才能可以任用寘之棘寺未究所長一貟佐朝散郎新差饒州通判軍州事陳洙剛毅自信不畏强禦戢吏愛民所至稱治曽任知信州鉛山縣猾吏重足不敢肆姦百姓實被其惠宣諭使劉大中薦之于朝嘗被褒典一貟右通直郎添差通判䖍州彭合㢘靖疏明達於吏事前任知䖍州信豐縣縣居盜賊淵藪素號難治示以至誠人樂其政相率輸官禦冦嵗課以辦而盜不入境前後帥守監司屢嘗列薦賜對陞擢治績顯然一貟左宣教郎新差知邵州府邵陽縣事劉安國廉正有守剛方不回好學多聞練達吏事曽任衡州耒陽縣民安其政人稱其能臣知吉州日本官為郡判官悉心郡事知無不為處之要劇必有可採筠谿集巻二
