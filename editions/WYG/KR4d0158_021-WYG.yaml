body:
  text: 筠谿集巻二十一宋李彌遜撰雜著九首中書省試閻夏䇿題問言治道者貴可行趨近用而昧於致逺則因循茍且不足以定大議信古説而乖於適今則迂闊荒唐不足以識先務非篤論也國家自艱難用武葢踰十年主上憂勤當宁公卿大夫聚謀而力行羣黎百姓疾首以思治而方張之敵未殄闢國之勲未集是以坐薪嘗膽博詢逺採以為善後之圖未嘗終食而忘也今欲暢威鼓勇以收功於一戰則敵堅而無釁或致先時之悔欲列屯固壘以圖安於萬全則師老而財匱或貽自困之憂欲増飭兵衛以壮國勢則郡縣力屈於供億懼根本之或揺欲簡法卒乘以惜民力則江淮地接於虜偽俱扞禦之無備將以定致逺之畧權適今之宜於斯四者何施而可耶生通達國體明洽治道其考古酌今而備陳之庶以禆廟堂之末議母忽漳州移學上梁文漳溪古郡閩嶺名區萬井鱗鱗攬江山朝揖之秀多士濟濟喧鄒魯弦誦之聲操觚待試者踰二十人摳衣善問者幾三百軰家皆有塾鋤或帯經詩書貴甚於籯金青紫信同於地芥惟此民風之厚率由士氣之淳舊有學宫旁連州治甲庚先次土木浸隳縁相治之不工致藏脩之弗利乃復文明之位載新輪奐之規諸福咸宜羣情胥悅掄材累土悉從士子之經營荷挿揮斤不假縣官之餉給雲興百堵虹架脩梁敢勤里巷之歡謡來相鄉閭之盛事兒郎偉抛梁東偃武脩文萬㝢通聲教本無南北異薰然洙泗與同風兒郎偉抛梁西榕影歌欄晩色低一似孔林殘照裏十圍櫰木䕶榱題兒郎偉抛梁南望外仙山秀出藍賸闢軒楹照爽氣雲車風馬曉相參兒郎偉抛梁北泮水無風淨如拭夜潮來往接天池㑹見摶空起鵬翼兒郎偉抛梁上殿角三堦明兩兩但令郡國廣賢居從此太平知有象兒郎偉抛梁下豈但崇高居可詫百川學海要必東九仞及泉戒多暇伏願上梁之後青衿日盛絳帳常開聞禮聞詩列聖門之高選拔翹拔楚作王室之良材仕與學而並進善將福以借來祈雨祝文維紹興九年嵗次巳未八月戊申朔初四日辛亥具位李某謹以清酌庶羞之奠敢昭告於英烈忠澤顯佑公維神聰明正直惠此一方千里之人頌神之庥如一口所以奉神者惟恐其後也今旱既太甚苖將盡槁老稚愁嘆之聲聞於阡陌奔走致告凡九日矣神尚坐視不一垂手救之乎惟守與神實被其責謹率郡僚叩謁祠下神其不待轉晷上叩帝閽俾豐隆阿香駿奔就職霈為三日之霖庶垂死之根獲更生之賜以慰千里雲霓之望則神之徳益彰守亦依神得以逃責不然守且失職而神於斯民亦有負矣尚饗又維紹興九年嵗次巳未八月戊申朔十一日戊午具位李某謹以清酌庶饈之奠敢昭告於英烈顯佑公漳居山陬負販者不至食齒之衆仰耕以給一有水旱則為患滋甚紹興巳未秋不雨民有憂色守曰吁兹其敢遑乃帥郡執事徧走羣祀者十日八月辛亥告於某神請不停晷為霖三日以蘇民憂䕶蕭酌醴祼而降正晝日赤赫微雲興焉有頃雷動風行若飜江河而下一郡大駭且喜明日又大雨又明日亦雨如約乃止嗚呼守與神語若鐘應若響合若叩門而求水火然神之依人未有如是昭昭者也守則不徳顧何以得神之休神其曰千里之人徳我我豈負千里之人哉惟神佐佑斯民其終庇之有求必應有受必除勿替自今之惠守尚能白神之功登於聞侈神之靈詔於後以永神無窮之聞尚饗本命設醮青詞叢霄垂象下臨萬彚之生綿宇流形咸禀一元之性惟誠可格有感必通敢致潔於蘋蘩用求哀於雲漢伏念某早而憂道老巳忘機忠義為閑雖進觀而無愧情塵俱障或寡過而未能深虞無妄之災馴致有身之患屬運一同於甲子而嵗復值於元辰星曜交臨木金互勝儻隂陽之有沴當齒髪之既衰藐爾何堪惕然是懼豈曰死生之有命但知疾痛以呼天是用嚴奉具科恭陳淨供雲車風馬上祈有極之尊璧月珠星旁叩無邊之衆伏願神功不宇帝道無私回寶馭於須㬰鑒丹𠂻於咫尺琅音降福羽衛除殃大開宥過之門廣闢取新之路念福莫長於無禍俾以平康唯夢可以與齡錫之仁壽闔門受祉終嵗迎休庶永保於天年敢希求於世福回定書鴈塔聯榮契莫敦於三世鳳占協吉姓宜合於兩家重於納采之儀俾踐于歸之約伏承令孫登仕駿驚千里學志五車而某第四女子識昧知琴才非詠雪仰恃潘陽之舊好敢親王謝之高風執贄雖㣲垂纓敢後大非吾偶豈徒圭篳之光善與人交益佩金蘭之義其為感荷曷罄敷陳問親書言念合二姓之好禮莫重於人倫論平生之交義必存於久要敢借絲蘿之譜益堅金石之盟某猶子某近發䝉童未熟伯魚之訓伏承令女二小娘子少聞女戒巳高道韞之風援既慕於相門姻亦聯於世契蚤繇心許似是昔縁曽無媒妁之師觧盡畧隂陽之俗忌魚軒象服豈敢期異時家室之榮竹杖芒鞋便可結兩翁山林之伴請岳老住漳州淨衆疏達摩半渡念稍轉即差如来一指禪不言巳喻欲明真實事要識向上機何須把纜放船正好逢場作戱岳公和尚先登彼岸親到别峯承圜悟之祖風正雲門之宗派桃花開後笑臉難囬梅子熟時酸心未改惟丹霞首顧於龎老方建塔有待於戒公願啓淨居來臨法㑹鳴鐘擊皷大開福地之門庭揮麈談經一洗昬衢之眼目宣城水西道中雜言曷山之北亂山間有大澗水深僅尺許闊可數丈兩峯嘴向下沙磧間中流清澈涓涓不已靜聽有絲竹聲四顧無人惟石上倚一笠子頭拄杖芒鞋是必老農人尋幽而忘返者也喜其有物外趣獨立澗上以俟其還久之不至僕笑告予以日暮遂行然直相來亦可以想見也右自宣臧之往川過曷山發崇丘将下石嘴逺識南陵諸峰翹然特立綿亘數十里雲疊浪湧隂晦萬態下有丘陵平陸草樹澗壑逺近映帶目不暇應接令人莫可名状因思夫瑰異偉特競秀爭雄不特如是噫是孰為之而然哉夫累土以為臺鑿深以為池合衆爪掌之力玩嵗愒日曽不充仞人力固不能為也而造物者亦何為而上下其手哉或曰一氣之運融為江河結為山嶽或其自爾然天地定位之後結者未嘗見其融融者未嘗見其結是又未必然也嘗試以浮圖氏書考之其説以謂世界之建立由四大之相持覺明空昧相待或揺故有風輪因空生揺堅明立礙故有金輪風金相摩火光上蒸故有水輪地性滿空而水盈其間風以蕩之火以爍之水不得自已也水既流動則地之起伏積散去來高下惟水之從及其既止水行地中而衆不同形陳列於天地之間高者為山嶽下者為丘陵平者為原隰䧟者為川澤通者為江河雖有神禹不能損益於其間由是四生十二類充塞矣是説也不其庶幾乎且以是觀之川流之暴莫甚於河至其决則丘壠溪谷遷變於俄頃之間者不可勝計况其尤者乎是又可信也余於是釋然悟既明乎山澤之所自始而又知夫浮圖氏之説平昔以為驚異而難信者皆真實語也琴溪洗雨澗之間可五六百步南北枕渚流夾路脩竹䕃翳可庇風雨東西之深不知幾何中有農夫之居室舍稀少籬落深固人跡不接於外唯聞相舂聲甚急亦可樂也但其間必無王子猷未免負此勝致耳晩泊琴溪溪横松竹間衆山之水競注日夜不息上有絶壁特起傾聳欲墮徐步溪岸訪琴高生坐磯但見兩巖環繞山曲悠然忘返獨坐水濱石上須㬰雲散月出風樹披拂水石吞激䇿䇿不巳四無人跡亦復不知有我因撫然自笑自身真今日之琴高生也何必尋故基悼遺跡悵赤鯉之不遇哉予自琴溪歩過巖壠寺至岐無所問塗遇一道者自後至項下長髯髪漆黑目中炯炯有光前揖予曰此巖壠路也遂相與行自宋世吳人不畜妻子唯貨藥以給朝暮且道琴高生事甚詳問其姓輙言它予因異之而未暇究其所得至澗濱告還予强之亦不肯渡既行又使人反招之云官人先行頃且至矣而竟不來噫異人也抑高世之士耶人言琴高生仙去已數百年其雲駕風御去來故棲或與世俗接而人不識也予之所遇孰知其非歟不然山林泉石之勝冝有得道者游息其間殆非塵埃中人也賞溪岸多竹水流亂石間方秋夜月清明寒光下燭溪聲竹色亂人耳目乃知竹影金𤨏碎泉音玉琮琤真古今絶唱也琴臺自西而北一徑曲折前通兩澗皆清淺可涉又其西大溪横流結竹為筏以渡溪上數峯屹然特立下有巖深可十丈兩穴相通儼若户牖其形如覆盂其紋如累卵旁作僧居半隱巖底榜曰巖壠寺意古龍宫佛室列仙高士之所棲息而無銘碣可考又寺僧復不能通一二惜哉白雲寺東峯亭旁有季公墩唐永泰中季廣琛破石埭賊聞㨗張燕是亭其下有劉遺民釣臺遺民晉人避世離俗終老於此是二人者靜躁殊執不啻氷炭而身名同隱於百年之後余以自比之臧榖而復嘆莊生之博逹也夜宿五松寺與慈覺淵禪伯徐步乘月而西行歌立談度嶺尋壑至白雲寺由小徑下臨賞溪則曵杖逍遥觀水月相復登東峯亭環視羣山雲聳玉立微風過之徑欲仙去不謂是身乃在人寰也八月十五日夜四更與卲暘叔自涇縣東城泛舟絶溪而西夜氣澄肅月出衆山間天容水色上下映燭毛髪可鑒中流倚櫂顧謂暘叔曰月方秋夜將旦清明之至也士大夫孰能於此時徜徉溪山間而漁工水師得之不自以為樂因誦少陵永夜角聲悲自語中天月色好誰㸔句非深得是中趣不能道也至大寧寺遇二樵者短小癯瘠而甚精悍自言善搏虎且曰搏之有道不可以力勝也方與虎遇在安其身藏其器靜以待焉雖然必有以發之而勿亟也使其跳梁跑躑氣索力憊不能有為也然後迫之得勢焉然後搏之則無遺虎矣故予之搏虎二十有餘年所遇者何啻百虎而未之失也一有失則反為之斃奚暇議虎哉它人視之則虎而予視之則䑕也此無他任理而不任力故也嗚呼余聞其言而得所以行焉故書以紀之南陵崇教寺後有草庵小而潔嘗與縣官同游或請予為誌一日而至僧者頗不豫予因為言釋氏以布施忍辱為行雖頭目手足皆在所捨况外物耶今子施我以壁或施子以字共作佛事尚復何吝僧有慚色即起親為掃治壁間取筆研授予使書予復謂曰僧徒每以教化為業但知受而不知施受者甚易施者甚難子異時受諸檀越供尚無忘施此壁時一座抵掌竟書壁而還題跋跋卲暘叔詩後二浙文物之富甲於天下而常獨冠諸郡卲氏於常為顯族熙寧癸丑暘叔父兄同日釋褐集英者四人衣冠榮之先子亦以是年擢進士第故其後每譽卲以訓諸子又十九年暘叔繼登甲科又十三年余始見之金陵侍子鴈列蘭玉相照有孫方能言眉目明秀酷有食牛氣余固疑卲氏世不乏人乃如此及讀刺史公行事録始知累徳有自矣暘叔又出其兒時所作詩章云先夫人嘗手授諸孫以勸其學余於是益知凱風之助不特樂有賢父兄也暘叔亷靖有守官以不遂然名字藉藉縉紳間意其烜赫盛大必在嵗寒必在其後後之人將勉於學無負於吾暘叔之世其先監諸斯可也題胡霈然書後霈然與胡英衛秀等並習右軍書昔人論其工不及懐仁而賢於蕭森踰唐𤣥度之徒逺甚惜乎不得盡見數家書跡以定其優劣也隋僧智果作字硬健煬帝時謂得右軍骨予於胡亦云書杜祁公帖後祁公嘗云四方訊問雖甚疎逺必親荅若盡委之筆吏與不答等故其簡牘好事家間有之而此數帖乃晩年所作未易得也公在慶歴中居相位纔期月而遺風凛凛於今如在殘章斷簡猶能使人改心正容對之肅然况於親炙之乎書蔡君謨帖後李陽氷云逸少十五年攻永字訣其後書入神品本朝以書名家得八法之妙者前軰獨推蔡公是帖真可貴也書富韓公與王龍圖帖後晉唐書帖遣辭簡少而情致有餘韓公好義善交翰墨中綽有古人風度雖不及形識面龍圖公然韓公端人也觀其取友則公之名徳可知矣跋周越書王龍圖柳枝辭後周氏書宛十巻歴叙古文篆𨽻而降凡五十四種古今能書四百九十餘人筆法論叙二十餘家字畫之變畧盡於此及觀其真草二體書婉媚遒勁皆中規矩信其書之不徒作也龍圖王公柳枝辭格韻超逸追古作者不然周書豈浪得耶書陳瑩中贈韋處士詩後僕自兒時知誦右司陳公名及觧事則知敬之後二十年始得拜公金陵明年公亡嗚呼僕也幸而見公之早得以想風采於既没不幸見公之晩不得從遊於朝暮也深道生亦後公數十年居之相距若在是越乃能交以道義久而彌親使公愛之形於言詠其好賢樂善之誠豈僕所可跋及哉書蔡耕道學士詩後蔡耕道余外舍之戚屬也聞其風葢久未及與游而亡明年邂逅莆陽郭仲隱出其詩章數十清麗超軼有不羣之思余以是益知其才惜乎不見用於時也耕道為人慷慨自許尚氣節不少屈於人而仲隱乃能相與久要死猶敬之賢矣哉書朱道者傳後世言神仙之説者術而已未聞所謂道也故其論近誣而事寡要至終身行之不見成功朱翁神遇心契一夕而覺率以仙去道之所在果多乎哉跋先翁贈余仲勉詩後徳興在山水間地俗簡僻異時軍旅不作官曹退食蕭然無一事元符間先君自太僕出筦縣庫日與里人論文賦詩以自娯由是逺近競造户外之屨滿矣獨於仲勉尤所愛厚者是篇之作乃在初相見時至久而敬之豈特文字間而已後三十年某來備郡守員仲勉以外郎謝事高卧里舍言來出手澤若新讀之感涕噫仲勉不負人所知有如是哉跋仲兄書靈寶石經後伯氏宣和間書靈寶度人二經刻之浮光道院軸帙數百本散之未十年余家所存盡於兵火浮光今為盗區矣此本固不易得而感事傷時重為悵然也跋趙見獨詩後山谷以水清石見為音家秘宻藏雖其宗派中人有不能喻見獨作語平淡高古不類近世詩家者流飄然有晉宋風味余三復終篇了不見其關紐抑自有秘藏耶跋蔡君謨白蓮帖後書家論承字法遲澁峻疾要使筆峯行字畫中如人骨骼既立雖豐瘠不同各自成體近時臨書方盡力㸃畫間圓銳斜直唯恐失之奚暇議筆行何如耶持此為騐真偽不足辨矣蔡君謨公白蓮帖已久歸李正臣家後人得贗本珍重印刻更相傳玩至今不悟如貧家子見他寶器不知其所可寶也是非之能亂人乃爾嗟夫跋張嵇仲樞宻遺墨靖康改元冬金人犯順要盟城下樞宻張公自南道提兵轉戰入衛及自大駕北征遂留守京師公手自草牘請立趙氏兒十往返竟以身從噫古所謂社稷之臣歟昔杵臼為趙死後世以謂賢不及程嬰葢死易立孤難耳公以天下計為所甚難者其賢於嬰又萬萬矣公給事東省僕以左史從後三十年復瞻遺墨凛凛有生氣涕泗拜之又右樞宻張公遺帖葢公末後語也房相國佐唐功居第一病且亟猶奏疏以止東伐司馬長卿居心不淨素易繩檢没有遺封禪書忠佞之性至死不移公奮不顧身斧鉞在前猶以大節自任英風義氣可以立貪懦而激忠直百世之下公之平生想見矣跋王才元少師詩後世謂貴游文字中多作富貴語葢其境習使然少師公長於詩如雲曵山容改逺墅炊煙近却皆林下士旬月煅煉之句了無一㸃膏梁氣味無已云學詩如學仙時至骨自換真知言哉跋王才元少師所收尚書兄墨跡少師公嘗與先兄尚書同朝後二十年僕始識公於長樂見其所収先兄尚書遺墨雖斷簡隻字具在又出古律詩燦然盈軸語意精到林下士旬月煅煉有不能及其所與酬唱皆一時詩家名流也僕與少師公游固未久觀其趣尚清逺風義敦至固巳使人歎仰不暇餘可知也跋東坡書中秋詩後山谷云東坡書隨大小真行皆嫵媚可喜世間所見墨跡固多妙處各各不同余舊得公自書吉祥寺詩於齊安何所舉乃其帥錢塘時所作筆力尤更豪放此帖雖應規入矩而中有絶塵超逸之思政復大佳山谷真知言哉跋東坡書石鐘山記後自東坡作石鐘記好事者過之往往回旋其下未必有所遇僕往嵗自廬陵赴建業道由彭蠡亦浮小舟繫岸石良久但見水石吞吐風激之鳴不聞所謂噌吰鏜􅝅之聲也廼知山靈水仙出竒發藴必有所付非其人可浪得耶跋張仲宗先世聘書後合姓古所重必厚幣忱辭以先之禮也近時風俗靡薄雖細大軸飾以繡繪徒為兒女態過目輒置不省仲宗老而慕古得先世聘書於六十年後猶表綴以貽子孫可謂孝而知禮矣跋微上人徑山賦後惠宗參寥妙於琢句至用儒生語如士大夫說禪便有敗闕處微上人作徑山賦瀏亮工體物雜取衆言苦不見瑕纇更能以古為師遣辭嚴平立意深切置之才士述作中孰知其為僧語跋張仲宗刻其祖手澤後士而尊祖所當為之也今之學者類喜近名而不知為所當為於吾仲宗不得無愧劉殷少孝於祖母神賜之粟七年仲宗行且老矣而方諱窮造物其終報之耶跋蘇粹之所藏王摩詰畵維摩文殊不二圖王輞川以凝碧詩見知當世餘事丹青亦造神品晩年長齋刻意空門學室中唯繩床經案退朝之後焚香獨坐大有所契證三復斯畫知其不茍毗耶一㑹儼然目中觀者要當於黙然處驚海潮春雷之作始不負渠跋錢服道畫潮出海門圖丘光廷著潮汐論盡闢王充盧肇軰說自立巳意以謂水不能為盈縮直以地有動息上下致海有潮汐是大可笑世界依水建立而海環之水行地中東涌西没西涌東没與氣升降如有脉之周一身至於逢高遇温小遏大决則騰躍奔放變恠異態此理之自然而人或未之考錢侯乃能於筆墨間同功造化置萬里波濤於一掌之上其進乎技者耶跋徐穉山所作智道者偈智道者以大悲願能行難行憫諸衆生墮於苦海欲以慈力援之其所遊行何止五十三城所功徳乃至羙數所不能及穉山居士作偈稱讚為説方使波羅宻至善惡俱冺罪性皆空功徳又遇是人比丘百千億倍僕識居士於秣後將三十年平時慕其厚識英俊以為勝巳不見纔數寒暑爾其性理超詣乃如此也吕子明云士别三日即更刮目相待其善言哉跋予與馮濟川侍郎書後紹興庚申予守臨漳置此書於友人馮濟川濟川以授智平長樂後六年在福唐平復以示予昔殷洪喬不為置書郵悉投之江今此書數年間往來萬里若有羽翼然事有可笑乃爾耶跋濟川侍郎贈平老詩後濟川方弱冠時不學自悟始求證於昭覺勤今七十餘精進不退可謂聞而能脩行觧一如者論其詩可知其人矣書尚書兄墨蹟後嗚呼此余季兄尚書公末後語也余少學於兄其後相繼登進士第又相繼賜對改秩為校書郎又相代為南宫舍人左書言兄自史官即遷三字歴𤨏闥貳卿三部尚書出領守帥中外翺翔二十年余始復為起居郎紫薇舍人户部侍郎其揚歴大不及兄而出處畧相似亦兄之力也尚書為人敦厚方嚴言行有法則立朝行已挺特不羣可以任大事權佞嫉之林居十餘年憂國愛君之志尺寸不得行惜哉紹興已未嵗余自臨安得清漳巖過信上拜兄於懐玉山居尊酒道舊喜見顔色相約買田集室同老此山之下兄自壯留意鍊養年踰六十神髪俱鮮長髯過腹郁然無一莖白人皆曰福壽未艾也既别一年以疾告逾月而愈得此書其詳至猶如此又兩月而訃至嗚呼艱難以來兄弟隔絶蒼顔白髪相望千里者十餘年一别永訣竟負平生之約此恨寧有窮巳因其絶筆追思性行出處之畧哀痛莫極握筆大慟書授珍藏之跋趙超然契聖録後如來為衆生不請之友故其立教多背塵異俗之言凡夫下士未必所樂聞葢世界依五濁而立人生其間以業為本舉心動念即是業因如來方便絶其未萌禁其已作所以信受悟入之難也超然居士趙公夙植善根以諸佛心施於行事固已不可思議而欲攝諸有情共進此道乃作契聖前後二編載其所見所為普勸而詳説之傳云諸方作將來缺無一言不當於禮無一事不歸於善至於違情而逆耳力詆而切中初不合於流俗而皆足以感動人心抑世間不請之友歟使聞者能信信者能行則舉世薫其徳而善良居士之言其利溥哉筠溪子聞風而悅之非曰同參亦擇其善而從之者也跋筠溪圖後李子倦游歸自秣陵至連江曰吾祖之舊隱也遂家焉得湖隂依山之地百畝可佃可漁因以築室念衛公之平泉愿之盤谷伯時之山莊皆吾宗故事乃誅茅茨而籬落畔種竹萬竿結廬其間客有過曰非也為富之道先求田田之不治而營巢可乎予應之曰富如可求執鞭可為之如不可求從吾所好柳子厚依愚溪東坡依觀皆將終身焉予何人也請從其後落成飲客以此中有真意為韻賦以侑觴得意字詩曰離離頷下髭短白不可薙焉能老行路結屋聊自庇溪横衆山繞左右松竹翳山華如幽人獨秀不取媚客來飲以醴累觴亦復醉欲眠子姑去自占十畝翠不為溝壑憂不作子孫計旁觀大笑之不觧箇中意客慚而退因圖之以俟知者云筠谿集巻二十一
