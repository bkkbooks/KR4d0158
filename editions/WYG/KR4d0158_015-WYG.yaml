body:
  text: 筠谿集巻十五宋李彌遜撰詩七十三首觀儺寳厯迎新露莢殘水晶宫殿曉光寒日陪僊仗溫風轉雲護神驅瑞靄盤葦㦸載頒均帝祉桃弧一射致民安威容曽許雲中見又對彤墀得細㸔駕還觀燈琳宇風㣲寳輅還春隨人意却餘寒金堤花擁華芝蓋銀漢雲扶白玉盤宴及臣鄰三事協歡均區宇九夷安年年端闕龍燈試萬嵗聲中拜舞㸔角樓錫宴春風樓閣燕需頒歌近雲霄挂魄寒翠羽釵光輝蠟炬紫霞杯影動鵰盤天心首慶三時樂國歩知同九鼎安午夜燭龍明别觀傳呼猶許萬民㸔次韻司業兄方池詠蓮秋水芙蓉四檻凉淨臨明鏡試晨粧露凝月面濃施粉日照缺五字預覔還蘧蒢缺二字地卧㸔池頭日脚忙次韻陳君實先生二首閱世端如木偶人不須離妄始逢真功深夜鼎三時火候轉秋河萬里銀可笑侏儒空飽粟猶憐痀僂解凝神他時應見鞭鸞鳯老去浮藜不夜辰騎馬長安漫踽凉幾畨桃李艶晨粧目官厭閱是非海心地不聞知見香九轉未能超北陸一㕓終待老南塘㑹令堅白消同異世事秋碁玉石忙南塘在連江乃吾家松楸之地和少章罌粟湯旋烹雪粒勝瓊漿撲鼻香浮繞夜忩甘比玉蓮開太華色分秋練凈澄江魔軍戰睡猶堅壁筆陣催詩欲納降已聽鏗鏘驚俚耳强顔猶把寸莛撞秋月逥文霜盤玉隠倒團金逈水秋天碧野侵光掩半扉寒夜永影分踈竹翠軒深長空逺岫歸雲捲古木髙風浥露沉凉袂客愁應夢楚長城曉角夜悲吟出汴過淮有作十年猶愧飽侏儒却到淮山識舊途一櫂輕於堂上芥此身閑似水中鳬受風㠶影隨南北弄日雲容自有無不用乗桴泛滄海半生全欲老江湖次韻待制兄題孔園芍藥二首紅藥開時春可憐爛雲明錦破晴烟雍容近侍千花右綽約翻堦四戸前不分栁條開白眼直愁榆葉散青錢我來偶落東風後只有鮫綃䖏處傳絶勝河陽滿縣香淡粧濃抺巧相望七言逺逼能詩謝萬朶今聞好事黄繡幕羅幃雲冉冉風裳水珮日央央紫薇花底根株在寂寞山城亦自芳將到金陵投宿烏江寺閱世真成一夢闌塵埃誰復共開顔辛壬癸甲常為客南北東西只問山縈樹逺雲髙作蓋護田流水曲於環秋風送我江邉寺凖擬如今到䖏閑晩泊江口令小舟汲江心水烹葉璵雲谷碎氷散歩岸滸顧望躊躇飄然有物外趣因成小詩云不到鍾山二十年江邉獨立思茫然故園如夢南歸客明日好風東去船白鷺一雙輕照水青鵶萬㸃逺漫天何須痛飲排孤悶一酌清甘勝酒泉守風𤓰歩戯成古語行船遇打頭此言端可作予羞平生漫起江山興勝䖏偶為波浪留敗肉腐魚三日醉斷蘆衰栁十分秋蔣陵秀色應凋盡造物還能借便休用陸元覲韻自笑愚翁老一溪鬢絲庭草共萋萋愁邉日永人思睡花上春濃鸎亂啼十事未陳身已逺三鍾無補首空低年來灰冷人間念惟有葵心日日西和舍弟簡公序百計踈慵一味閑杖藜無日不尋山着鞭毎到羲皇上扶履欣同季孟間寸歩思君勞逺夢七言驚我動衰顔定無戞玉醻人句拙速猶勝隔嵗還夏夜宿廣敎寺風月清甚思李白敬亭詩有懐用似表弟韻衆鳥髙飛雲去閑相㸔只有敬亭山孤標尚想風塵外佳句長留天地間影落金牛撩客恨手摩玉兎練仙顔故山風月非人世何事騎鯨去不還與公序避暑石盎方晝欲寢聞林間禽鳴甚樂因得小詩云一林啼鳥不知名應怪山翁此地行化蝶與周俱是夢游魚知我久㤀情胸中丘壑真餘事世上功名畏後生但得盈樽供自酌何妨人境卧淵明胡文恭倅宛陵距今將百年其後來官是邦者三人至士曹公下車始訪遺跡得石刻扵城北㑹勝寺即龕置官舍新棟宇於其上命曰紹堂屬余爲詩因以貽之前賢不復夢逢迎晩嵗於公識典刑肯子規橅誇錦繡傳家翰墨炳丹青碑存峴首長懐惠學冨韋門總帶經㑹見卿材從楚徃芝蘭不獨秀堦庭次韻暘叔見示伽陀無形何用强安名只麽騰騰信脚行一事到頭猶是幻萬縁無䖏可留情雲歸夜壑空難狀月落秋江影自生唯有龎家老居士不將塵境礙虚明冬雪呈太守張嵇仲三首夜氣凝空作暮寒平明積雪欲藏山定知近臘連三白已喜先春見一斑神力巧將人意改物華隂逐嵗功還憂民太守鈴齋暇想對壺觴正解顔控鶴縁雲上廣寒囬㸔明玉鏤羣山鋪簷漠漠魚鱗合入壟離離虎脊斑整馭炎官方退聽將妃白帝肯言還豐年預作田家喜不獨三鍾慰病顔挿簷冰筯長新寒薄日欺雲到屋山見晛半消梅額粉因風猶染鬢毛斑書生閉戸眠仍稳遊子扁舟興欲還客裏情懐逢嵗晚麴生邀我一開顔邵暘叔用寒字韻作詩見貽復次韻答之世徳金蘭久未寒交情傾蓋有如山天衢尚歛摶風翼澤國難留隐霧斑夜棹月溪成莫逆春輿蓮社訪無還逢塲戯事多應暇詩酒頻過陋巷顔次韻陸虞仲學士塗中詠雪二首可笑無氊老鄭䖍甘寒忍喜詠豐年飛花穿樹春疑早秀麥分岐瑞有先白玉樓成迷萬井青雲路繞認雙川輕縑窘幅終難狀却借騷人好句傳嵗行去似客程兼詩債新隨雪陣添唱絶郢人誇潔白舞低趙女鬬輕纎寒威瑩骨勝三沐爽氣薫心解六黏險語賡酬難自勉旋乾吟筆盡更籖次韻似表弟喭梅之作萬㸃隨風更是愁從敎停雪破除休蓬萊花使漫青眼姑射神人新白頭待價瓊環聊可擬聞風桃李亦増羞㸔殘紅紫氷霜後一笑春前解百憂春近風日漸佳與似表弟開小戸縱歩後庭圍爐人散長寒煤暖日還催墐戸開春近郊原思夢蝶雪殘池館見真梅客愁宛轉凌雙鬢嵗律侵尋寄一杯試繞小欄尋翠甲履痕猶占舊蒼苔次韻邵暘叔秋日懐歸天將物色助詩鳴秋日吟肩句倍清欲爲鱸蓴修故事喜聞鴻雁寄先聲脱身鞅掌謀須早過眼紛華夢已成他日柴桑許同社為君漉酒具南烹次韻王彦聲贈梅公擇詩梅傲世獨深居氣與孤雲共捲舒客轍每逢樽有酒劒歌休嘆食無魚鯨波坐隔三山外鵬翼終騰萬里餘冠玉圍金真戯事醉髯聊復一軒渠送王彦聲歸苕溪二首盛世英才偶未逢寄身無地轉如蓬詩親東野窮尤壯賦擬相如老更工鵰鶚不飛行奮迅璠璵未獻要磨礲㑹須自要唐衢薦誰與吹嘘借便風相逢華髪兩星星舊事邯鄲一夢驚舌底雌黄諳世味眼中青白見交情餘杯更覔論文具好樹休啼喚客聲後夜扁舟苕霅路半輪寒月一溪横奉陪趙彦術登疊嶂還飲陵峰梅竹間春曉飛花一尺圍旋㸔風力屑瓊瑰廣寒宫殿千門啟羣玉峰巒四面開直節自强深笑竹清姿堪竝絶知梅使君賸有延枝意收拾寒光上酒杯似表弟之錢塘約嵗前歸愆期不至以詩寄之雪泥斷路屋生雲暗坐陵陽一月春黄犬有知空寄恨青氊無夢獨傷神急行已一作莫負梅花約漸老長思棣蕚親盡吸西湖來着語莫􅂸風月付勞薪復用前韻簡叔共文伯公序三友老覺身名雨後雲靜㸔人事臘前春愁邉痛飲真長䇿詩罷髙歌覺有神逺想兩生如可作晩從三子更相親北山剰欲招逋客未用皇皇歎積薪春雨不止復用前韻書懐呈諸友時序驚人翻手雲不禁風雨破除春岸容故故留花使野色明明助稼神異縣逢人思故舊長年作客見疎親窮途自喜多閑日虚費公家十束薪寄題陶氏一經堂金牛勝氣未全無朝挹江山近結廬避席青衿家有塾下帷皓首腹多書階庭早見芝蘭秀門巷於今燕雀疎傍舍不應多種栁後來駟馬要囬車送邵文伯歸溧陽盍簮異縣亦三年浮木逢龜信偶然忙裡詩筒長遣客靜中酒戸不妨禪酸寒溧尉君今似枯槁湘源我自憐别後彈冠應不免着鞭莫遣祖生先僕與公采戸曹奉議有先世之契又舊從其伯仲逰今復相遇於此前日偶過西鄰不知嘗辱車馬承貺佳什次韻爲謝縛柴窄窄晝常關剥啄髯參興盡還不聽髙譚如屑玉强酬好句似登山論交此地逢三益識面他時熟兩難更憶金蘭家世舊公餘能復共開顔次韻邦直通判少尹題普現堂見簡之作飽知世路厭陳人分得僧忩寄此身載月筍輿成獨往縁雲藜杖許誰親足間優鉢藏千界掌上菴摩等一塵頼得詩翁來着語五松從此有知津席上分韻賦梅花得知字寒梅獨笑野人扉只有春風許自知蠟屐追芳輸我輩着鞭持酒記他時白霓行處玉妃從明月光中寳璐垂更與丁寜後來秀醉中來折最髙枝雲門道中晩歩層林疊巘暗東西山轉崗囬路更迷望與㳺雲奔落日歩隨流水赴前溪樵歸野燒孤煙盡牛卧春犂小麥低獨繞輞川圖畫裏醉扶白叟杖青藜渡横溪百尺滄浪兩岸沙肩輿徒渉歩欹斜溪聲猶帶夜來雨山色漸分雲外霞㟁畔斷林開鳥道水邉疎竹近人家塵埃何䖏尋真境試逐寒流認落花陪五馬諸公逰西山泛舟待月而歸偶作鳥烏聲樂報新晴起覔鄰翁作隊行愛日葵心傾爛熳尋春蝶夢去縱横人歸髙屋山逾碧船到平灘月巳生客裏不諳風景好欲將此夕竝登瀛留題新安幕府聚秀軒星聚群賢上幕賔層軒髙敞枕溪漘一時盧駱王楊軰望重東西南北人句裏江山端有助學餘民社政須親青冥接跡他年事晋地卿材半楚臣次韻畢裕之喜雨急雨翻盆破鬰蒸疎簷氷簟正關情維摩示疾原非病庾信裁詩老更清逰戯雲生春浪勢吉祥風動夜潮聲麥秋未飽千畦潤更遣豐隆為一行曹溪道中呈何公顯筍輿訪古出家原山網重重護石田水接桃花源上路人行巫女峽中天要令陶冶誇盤谷何必丹青貌輞川寄語能詩何水部筆端應許見雲烟次韻子才曹溪道中偶脱塵纓百慮寛更窮目力快遐觀旋謀濁酒招强伴行拾落英供晚餐樹擁山根張密幄雲隨雨脚是驚湍試追健筆難何似倒䇿駑駘上石巒次韻舜選大夫客舍中秋命駕星郎獨感時興隨孤月到雲涯當天飛鏡空撩恨永夜明樓謾攪詩後閣深藏桃葉女前驅須趂菊花期與君更卜東隣醉放盞車輪又北馳次韻國村送逰黄山之作二首雨足郊原長稻孫竹輿去路踏秋芬近村籬落低臨水直面峰巒半出雲晚徑無人重着履夜堂有酒更論文兹遊清絶羲皇上少借風烟為沐薫雅道於今久寂寥規橅君肯到祈招鯨牙浪濶傾三峽鵬背雲髙負九霄但覔圖書供閉戸不憂勲業誤題橋七言起我黄山興若第詩功不愧蕭次韻子才湯泉出浴泉出靈沙氣可蒸滌除那復數冰清九陽晞髪塵纓淨七日煉形僊羽輕煖沃丹田催進火隂消神谷助長生雲龍儻借凌空便徑謁南臺季偉兄偉長知縣奉議年兄作别十年邂逅於此復有數百里之隔以詩見寄輙次韻為謝對着青衫下帝宸十年不與並爲仁憐君卧困千金骨笑我行摧四角輪老眼相逢俱作客新諸逺寄底驚人書來更數無多語賸欲招㩦白水濵白水城中勝逰也東崗晚歩飯飽東崗晚杖藜石梁横渡緑秧畦深行徑險從牛後小立臺髙出鳥棲問舍誰人村逺近喚船别浦水東西自憐頭白江山裏囬首中原正鼓鼙和似表弟次呉江路入呉江眼倍明長谼雨立萬缺二字仙翁曽下遼天鶴詩老猶傳跨海鯨夜榜風蒲嗟去國秋山雲履趂尋盟慿誰剪取半江水要聽寒潮枕底鳴和小君逰靈隱寺俗子叢中暫撥忙團蒲中夜擬禪房淵頭巖穴仙都邃石上軒楹佛土香宿雨生秋醒客夢霽雲囬日借山光歸塗芳物酬佳興白菊丹楓試晚粧次韻學士兄富陽道中長江送客靜波瀾路入囬溪第一灣石瀬横陳潮力減風檣陡轉櫓聲閑驅除方寸無窮事領略平生未識山自笑踈慵似中散政冝拓落水雲間將至澤溪護溪疊嶂隱長城直下寒流泯泯清背水人家認雞犬隔林佛屋聽鐘鯨山根合䖏客㠶過日脚斷邉漁火明投老一身無地着欲憑雙槳寄浮生至玉山謁尚書兄以九日復告别途中寄之小隱精廬占一丘趂行覊雁逺相求豺狼當道誰青眼兄弟他方俱白頭問舍終同茅屋老榰車聊共菊花秋碧雲落日又分手路細山長人更愁和士特韻程進道舍人旌斾光華走皁輿斑衣星使奉安車尊罍方薦龜蓮夀雨露交馳鶴板書三釡及親真可樂一經教子未全疎馬蹄又踏春風去勲業君㸔縱壑魚和李相園亭二首軒户新成紫翠邉花光竹色借厨烟詩人莫浪誇盤谷畫手無工貌輞川何必吾廬在丘壑要令是䖏有林泉此心正恐無人㑹把酒南山一笛前肯將戯事擾虚懐草木知名一様裁不放寸隂隨手過自開十畆待春來花邉未許楚狂醉江上應憐野老哀賸欲着鞭陪勝賞扶顛正急萬牛材訪雪峰真歇禪師紅塵白髪不相投來就僧房借板頭大士法中龍象貴老翁心外缺一字雲浮長蘆江靜千山月枯木巖寒一葉秋别後相逢重着語牧童横笛倒騎牛王巖起樂齋漫浪行地一舟虚神手逢場樂有餘客裏縱令懐舊國公家何必愛吾廬飽知世事同分鹿肯爲時名更羡魚吏退晴忩春睡足牙籖狼籍滿床書次韻錢申伯山堂之詠淨坊秋色老蒼官簷額飛雲細可攀客夢偶隨踈雨斷僧㳺長帶暮鐘還似聞遺錫藏銀地親見髙人住骨山愁絶寒江歸去路亂峯青䖏望雙鬟和錢申伯逰東山聖泉偶脱塵中一夢闌欲窮幽事遍尋山靜憐人境雞虫擾老愜僧忩枕簟閑十里秋香隨屐齒四更山月上簾顔登臨物色催詩興未信天於我輩慳題汪祖義桂林堂彼蒼曽不與人期勝事由來徳所基閉戸一經真有子傳家三世定逢時摛詞自得江山助種學寜求燕雀知寄與諸郎飽黄巻桂林還見長孫枝和判宗展鉢之作公子曽修凈飯因齋魚聲裏悟前身累觴肯緩持螯手一鉢不勞行炙人對境禪心秋澗月放懐俗慮曉江塵渺茫漫笑神仙事何用金盤薦擗麟上已日陪徽守逰白水寺繼登西山繼白堂晚飲曉衢初日動逰人疊嶂囘溪緑黛新自偃松篁如喚客後開桃李尚留春笑談懐逺西山上觴詠追時白水濵五馬行春從此始更驅風伯淨車塵晚登昭真亭雲霧不見黄山因以述懐莫放㣲雲㸃太清欲將逰目泫孤亭十年去國心長赤一月㸔山眼未青多病情懐千日酒窮途生事五侯鯖謾逰蹤跡隨方寄更覺輕扵水上萍奉懐羅仲共叔共二友征衫一着宛溪東結友何人繼兩龔寸歩相期偶胡越尺書不斷見心胷吟邉快覩推三語吏退冥捜想二松别後并吞幾雲夢錦嚢收拾付賔鴻夏日遊連江石門坐林下有虫咂膚視之僅可分有無疑蚋也以詩嘲之么麽何從到上方敢將唇吻犯堂堂但知射影求隂中可笑當年不自量鱟目苦遭蚊喙聒象蹄猶畏䑕牙傷須㬰性命隨翻手蠻觸應難望故鄉次韻頴仲蘭室之什黄巻青燈寄佛場孤髙如在逺林芳下帷誰識傳經董載酒時過尚白揚華髪同心猶有臭青衿入室自知香公卿本是堦庭物莫遣行藏異素王筠谿集巻十五
