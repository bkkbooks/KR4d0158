body:
  text: 筠谿集巻七宋李彌遜撰書一首上丞相張魏公書某竊觀歴代帝王建都金陵必固守淮南以為國衛伏覩近降手詔駐蹕建康以察天意雖聖謨宏逺未即寧處然六飛所臨萬乘畢從不可不固藩維而崇屏翰也况叛臣負固尚未授首南接宿亳西連陳蔡皆要害之地在今日天下之勢淮南為重而荆襄次之爰自去嵗以來兩路興師將帥同力奏功獻捷敵氣消沮㡬於殄滅者由相公親承王命撫視軍士諭以方略皆知奮竭以成此勲中外逺邇不意旬月之間有是舉也近者伏聞都督併歸行府官吏悉還舊治西南諸軍未有統一深慮閫外之事懸制於中緩急有失機㑹萬一將士解體敵人乗間少乖隄防不惟有害萬全前功可惜建康恐不得奠枕也區區之愚謂宜於前宰執中擇威望素著為諸將所信服者崇以美名加以厚禮分董淮南荆襄兩路軍事擇地開府以䕶諸將許時赴闕奏議相公當軸處中宻贊廟謨授以成算如左右臂以衛心腹如此則將師有所統敵人知所畏逺近必聞内外相應上可以寛西南之憂顧而相公可以坐籌巖廊不勞而成非常之功誠為上計某迫於憂國之深忘其狂瞽伏乞垂察而加擇焉啟十五首賀趙右丞啟伏審宸廷渙號台席登賢共惟驩慶竊以才大而出逢乎辰仕優而得行其道取功名瓴建之易當春秋鼎盛之時世所共榮人或難致仰資盛徳實異前聞伏惟某官宇量陂涵風儀嶽峙直心許國景行端朝温温君子之容蹇蹇王臣之節英華内發方含章而不居謀猷孔嘉屢懷忠而入告天心克享帝念在茲果備諮詢入參宥宻鯤池激水回觀萬里之程鳯閣昻宵坐見一飛之翼矧任重喉舌股肱之寄則體均腎腸心腹之親左右有為安危所繫不待築巖而得說僅同維嶽之生申倡九牧以阜民將蒙于膏澤宅百揆以熙載側聽於明綸某舊獲登門久乖望履聞風而悦敢自許於彈冠飲徳之和庶相期而鼓腹謝宣州解元啟伏審文場較藝賢籍登名衆推卓爾之能首應裒然之舉伏惟解元先輩英才發秀懿行成純益壯詞鋒人將賈其餘勇資深學海力可回於狂瀾用志有累丸之專收功信拾芥之易一朝鬻技權輿已重於百金三月聚糧稅駕必期於千里某坐稽慶牘荐枉賢車聞金玉之好音至於㤀味念瓊瑤之匪報徒有汗顔感荷之深敷宣罔既代賀韓侍郎啟伏審肅奉綸恩峻陞槖禁得賢之慶多士所同恭惟判部侍郎稟識疏明受材雄驁濟美勲賢之世逢辰熙洽之朝天府先聲已孚於彈壓水衡帥屬屢致於澄清載疇心計之優徃㕘錢貨之柄踰尊踰戚所以待縉紳非常之才足食足兵斯乃為朝廷當務之急惟寵異則任益重而力裕則功易成比屋財豐賦歛不加於郡縣太倉粟腐錢糓不聞於廟堂佇觀嘉績之多用膺蕃錫之庶某頃㕘吏幕恩容止許以登車逺佐郡章趨走莫遑于賀厦徒欣依庇竊幸聞風春序方深生經惟重冀順迎於諸福以茂養於至和賀張􅄁政啟伏審光奉綸言入陪機政人惟求舊共知獨斷之明道之將行孰謂中興之晚廟堂增重海宇蒙休竊以吳㑹天臨順動六龍之御淮壖電掃力摧九虎之軍注意方隆協恭有賴政將焉往聳夷夏之傳聞事有至難快神人之宿憤進禆國論允屬宗工恭惟某官業懋經邦義存許國懷文抱質時推君子之儒效信納忠可見仁人之勇附清光於日月􅄁宻契於風雲周誥商盤蚤專潤色房謀杜斷久賛經綸未攄補衮之逺猷咸仰輕裘之餘裕晉公舊徳難安緑野之逰謝傅重名果慰蒼生之望虜氣坐消於鶴淚王師益奮於鷹揚増六七作之重光賴一二臣之同徳副南山詠何待於旬時收東周功尚遲於期月某侵尋老境漂泊孤蹤方歸棲芋粟之區獲久借帲幪之蔭㳺揚過實汲引居多則聞渙號之頒獨陪輿情之喜高岡鳴鳯願賡吉士之歌大壑縱魚請作賢臣之頌回劉侍制啟蒼顔白髮久負耒於丘園皂蓋朱轓偶分符於民社知難弗避撫已増羞伏惟某官宇量淵澄風神嶽秀望出荐紳之表知深旒扆之衷宣室陳謨早雍容於禁槖承明厭直久㳺泳於直祠某間闊十年馳驅千里承流宣化方懷出據之憂事賢友仁竊有踰捱之喜曽未修於問牘辱先枉於緘封愧荷之誠敷宣罔既回劉通判啟上詞同伏惟某官儒雅飭身智謀周事兼文武之兩器信仕學之並優澤國乗軺屢秉光華之虎節江城半刺尚淹游泳於牛刀眷是劇邦適丁饑嵗地近操戈之衆誰能去兵俗傳挿筆之風必使無訟顧兹孱陋實藉維持方馳問之未遑遽貽書之先及感銘之至敷叙奚殫謝生日詩啟身名無取悵蒲栁之近秋嵗月可驚適桑蓬之在旦伏惟某官仁風逺及徳宇兼容寓高興於七言文成製錦味過褒之一字意欲凌雲回壯志於已銷知頽齡之可制心乎愛矣敢㤀金玉之音巻而懷之愧乏瓊瑤之報賀沈樞宻啟伏審宸章播告宥府登庸夷狄震驚兵民鼓舞竊以時不可失㑹聖賢之相逢事有至難快神人之共憤蓋惟過物者必濟不待三年而有成故增重於本兵以敷求于舊德天下以安危繫於成敗朝廷以用捨視為輕重為文經世直節端朝隆隆明堂之傑材卓卓清廟之偉噐許國獨高於大節陳王宻契於上心言聽而行久參黄闥之政功成自晦早從緑野之遊屢勤宣室之夜思旋被康侯之晝接金華前膝方入侍於宸居玉帳借籌遂還陞於樞極允賴兼資之畧全收克復之勲坐運六竒上寛北顧之慮逺施三表盡清南牧之塵行聞選於衆而舉臯陶焉用求諸野而得傅説某登門未久辱遇最深喜上臣之有為聽下風而增氣屬紆郡紱阻曳賔裾瞻望門闌不勝欣抃依歸之至賀張丞相啟伏審誕告大廷登崇碩輔爰舉非常之典用彰不世之勲夷夏聳聞君臣胥慶竊以時不可失㑹聖賢之相逢事有至難快神人之共憤蓋惟過物者必濟不待三年而有成收淮蔡之功始於能斷郤淝水之衆孰謂矯情雖至今非得失所能重輕而天下以安危繫于成敗一人注意萬口同辭藹然嘉績之多允矣懋功之報恭惟某官明謨經世同徳承乾獨髙取日之能綽有回天之力心存王室逺寵利而弗居志在中原蹈險阻而不顧馭將於掌握之上致敵於樽俎之間借筯前籌嘆論兵之合我長纓係虜恨無官以酬公載疏赤舄之榮益懋黄裳之業仲父之在江左朝野皆傾心而來光武之下昆陽京師將傳首而至然養虎雖媚防其怒心逐獸既窮慮能反噬深謀者不戰而備乘勢則以速為神欲必取於萬全盍兼收於多算某効功無路辱遇有年識君子之所為聽下風而增氣屬紆郡紱阻曳賔裾瞻望門闌不勝欣抃依歸之至賀秦丞相啟伏審肅奉宸章寵陞宰路適契臣隣之詠遂專宥宻之司夷狄震驚兵民鼓舞竊以時不可失㑹聖賢之相逢事有至難快神人之共憤蓋惟過物者必濟不待三年而有成故增重於本兵以敷求於舊徳疇功不世晉位久虛雖至人非用捨所能輕重而天下以安危繫於成敗恭惟某官嘉謀經國懋徳承乾信行蠻貊之邦忠為社稷之衛功高杵臼力存趙氏之孤義重子卿身杖漢家之節十年神䕶萬里生還豈天用是彰周公使虜誠為眞漢相金甌定卜久冠於台躔玉帳借籌還登於樞極允賴兼資之器全收克復之勲坐運六竒上寛北顧之慮逺施三表盡清南牧之塵還風聲鶴淚之師安簞食壺漿之衆某効功無路辱遇有年識君子之有為聽下風而増氣屬紆郡紱阻曳賔裾瞻望門闌不勝欣抃依歸之至回黄少卿啟蒼顔白髮難陪英俊之遊皂蓋朱轓尚竊承宣之寄雖内慚於非據竊有幸於依仁伏惟宫使少卿宇量粹夷風猷凝逺道不直則不見勇見義而必為秀萃一門人謂徳星之聚望髙諸彦班聮卿月之榮既藏刀者十九年將激水而三千里惟義重金蘭之契致寵貽瓊玖之詞某半世艱闗十年間闊見君子而喜知望履之有涯事大夫之賢期掃門於異日其如感慰未易敷陳回王中大啟上同前伏惟宫使中大風度疏明天資粹美長才見於治劇厚徳可以鎭浮驥足不羣驚騰驤之莫及牛刀屢試見肯綮之未嘗尚迂鴛鷺之遊獨得江山之助聞風有素仰徳惟深比幸假於一麾遂得親於三徑見君子而喜知望履之有涯事大夫之賢期掃門於異日其如感慰未易敷陳回宗通判啟芝宇未瞻首拜瓊瑤之賜瓜時甚邇側聞車馬之音豈惟逺俗之交懽孰若懦衷之有喜伏惟通判學士清姿邁徃達識探微聳壑昻霄久擅出羣之譽盤根錯節共推治劇之能方韞匵而不沽顧割鷄之焉用少淹别駕倚俟徵車白髮蒼顔雖願資於善畫青藜紅藥恐難緩於髙縱幸望履之有期宜著鞭之及早其如傾頌未易敷宣賀樓樞宻啟伏審寵膺睿渥榮席鴻樞正人進而朝廷尊直道行而天下服聳百僚而胥慶敷四海以交欣恭惟樞宻端明性品淳明天資鯁亮高風足以振頽俗粹宇足以消塵心特立獨行慕古人之大體戴仁抱義見君子之所為深簡上知備殫臣節果自北門之選進膺西府之崇豈惟高頗牧之風規抑欲資良平之籌畫頃由政地逺暢皇威允符分陜之行誕布新周之命河南父老欣見漢官之威儀當代酋豪應想晉公之年貌上寛西顧力贊中興歸我侵疆顯著用儒之効賚予良弼倚觀迪后之謨某假守遐方竊依巨庇載念金蘭之契曾陪鴛鷺之班膏澤期民敢私九里之潤折衝敵國共崇四海之瞻賀薛集英知福州啟伏審疏榮宸陛易地侯藩陞華禁殿之班增重帥垣之勢羣情胥慰逺俗交懽伏惟某官達識探微宏材成務繩愆糾繆獨高盤錯之功激濁揚清屢報循良之政屬閩粤困緑林之擾致廟堂深赤子之憂選任實能促馳都竒蓋治效當求之已試而兵機貴在於及時安之勝之可使解刀劍而買牛犢逺者近者將見詠襦袴而為歌謠某夙預登門久乖望履知依仁之有幸顧修慶之敢先欣頌之私敷宣罔既筠谿集巻七
