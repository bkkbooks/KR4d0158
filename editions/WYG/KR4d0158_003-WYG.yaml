body:
  text: 筠谿集巻三宋李彌遜撰奏議繳王殏叙官狀准中書門下省送到録黄一道為王殏叙復元官事令臣書讀者臣看詳王殏元係提㸃龍徳宫盜沒本宫金一萬兩不見歸著有司檢閲王殏家貲皆太上皇帝服御之物數目甚多價直無算所犯至重罪在不赦元降指揮除名勒停送㢘州編管已為輕典據大理寺供到本人所犯合作竊盜贜罪流及取到吏刑部狀檢准紹興武臣應叙擬官格法武臣初叙正官依格合叙保義郎每再叙一官五叙止縁係情重合降一等四叙止合得忠訓郎即無叙復元官之文契勘王殏雖累經赦宥於今年四月内已奉聖㫖特與放令逐便至今未經數月若令盡復元官不惟有害成法兼恐漸啟僥倖使貪汚姦盜之人無所畏憚如經今來恩赦自合叙理乞下所屬遵依見行條法檢舉施行所有録黄臣未敢書讀行下繳連在前謹録奏聞伏候勑㫖繳翰林司修葢營寨指揮狀准中書門下省送到録黄一道為翰林司奏審臨安府修葢本司營寨事十二月十日奉聖㫖依得指揮令臣書行者臣契勘除日近書行過提舉修内司取到聖㫖下臨安府隨宜造作几筵小殿貳座縁上件事體至重理合預行措置外别無即目未發官司特降聖㫖預行營繕去處及取到翰林司見管將來合起人兵止有四十餘人吏人三兩名兼亦不係近上𦂳切官司恐不合紊凟聖聽專降指揮預下臨安府修置屋宇兼臨安府昨自移蹕之後其係官舍屋地基往往别行移用即目未必空閒切慮因此致其他官司縁例申陳指占别到搔擾紊煩朝廷伏乞睿慈收回已降指揮止令尚省將來遣發日依其它官司例措置安泊不管闕悞施行所有録黄臣未敢書行謹録奏聞伏候勅㫖小帖子臣前後書過内降白劄子施行事件内有差舟船一兩隻兵士十數人亦係紊凟聖聽特降指揮徑下所屬事雖甚㣲有傷大體臣竊詳六飛順動其百司庻事有司所當遵奉前期祗備豈有御前事務必待陛下親降特㫖然後施行之理伏望聖慈申飭在内諸司除遇事干𦂳切臨事取㫖外其餘有合措置事件並令逐司預申尚書省先次疾速應辦施行繳劉光世免差科狀准中書門下省送到録黄一道為劉光世置到田産乞依張浚例免差徭科配借徣正月五日三省同奉聖㫖依張浚已得指揮令臣書行者尋取㑹到戸部狀開具條法下項一乞免借徣今檢坐紹興勅諸官司非遇聖節輙借以和雇和賃為名同人戸什物陳設器用人舡車乘者徒一年雖應借而以民間所無之物或多抛數目及令装飾諸色人者准此即借而不還并因請納乞取財物者加二等長吏知而不罪者與同罪不覺察杖一百按閲將兵官奏裁一乞免科配今檢坐紹興二年二月十四日勅節文戸部狀臣寮上言本部今勘當欲依臣寮上言權令應官戸除依條免差役外所有其他科配候將來邊事寧息日却依舊制施行貴得稍寛民力以副朝廷恤民之意伏候指揮二月十四日三省同奉聖㫖依戸部勘當到事理施行仍令本部鏤板行下一乞免差徭今檢坐紹聖常平免役令諸前代帝王之後法應得贖及官戸謂品官其亡歿者有廕同若旌表門閭之家勅書見在并非技術賜號處士或進納陞朝官其色役聽免右臣契勘差役之法既有官戸許免明文不應更降指揮借徣既有專法禁止今來若降指揮許免一人即顯餘人可以借徣有此相妨止有科配一項係是紹興二年二月十四日因臣寮上言特降聖㫖官戸編戸一等均配見今天下守以為法法者上下所共遵當自貴者始也若因人而廢則紀綱不立夫人得以干之矣所有録黄臣未敢書行謹録奏聞伏候勅㫖繳王氏改封郡主狀准中書門下省送到詞頭一道為行宫吏部狀明惠恭淑大長帝姬駙馬都尉王銑第五女思平郡夫人王氏乞􅀈宋氏例改封郡主依縣主請給尋取索看詳王氏所乞當時初封因何不作郡主今來再乞改封郡主因依去後據吏部狀稱案牘已發往臨安府即今在院無慿檢照兼王氏乞􅀈宋氏例改封郡主係是本人自稱亦無慿據所以命詞未得欲乞朝廷候到臨安府别行照驗詣實明降指揮以慿命詞行下所有元將到詞頭一道今隨狀繳納前去伏候勅㫖繳王問改正復官狀准中書門下省送到録黄一道為右宣義郎王問乞改正追官事十一月十二日奉聖㫖依所乞改正令臣書行者右臣尋取㑹到建炎二年元降指揮討論事目内一項節文進書頌不繇科舉而命官之人合該審量契勘本官元命官因依正礙前項指揮雖稱係朝廷取索縁當時不因權倖無以自達兼本官係元佑寮臣之家不能守其父母之業追逐時好僥冒恩賞所授官資比之前後體例委是過優若不量行追降無以厭服衆議所有録黄臣未敢書行謹録奏聞伏候勅㫖繳賈安宅奏薦狀准中書門下省送到録黄一道為賈安宅依朝議大夫以下理初遇大禮法放行䕃補尋取索得吏部狀勘㑹官員若係侍從官赦前落職責降宫觀遇大禮即不該䕃補若後來自陳宫觀官依得中大夫以下奏薦法許䕃補及未責降以前若曽經奏薦即合自責降後來曽經自陳宫觀再經兩遇大禮許行䕃補臣契勘賈安宅責降後來曽經自陳宫觀縁係初遇切慮合理作空閒一遇有此因依未敢書行所有元送到録黄草子二件隨狀繳納伏候勅㫖戸部乞禁銅器劄子契勘自來鍮石銅器法令私有非不嚴宻而民間鑄造販賣滋甚且以銅錢一百文足為率變造成器物十兩賣錢僅一貫獲利至厚如淛東路紹興府温台明州浙西路臨安平江鎮江府湖秀常州江東路建康府句容縣信州福建路福泉建州江西路䖍吉州豐城縣臨江軍新淦縣等處鑄造銅器尤盛銷毀見錢不可勝計若不早行措置為害愈大今相度欲乞將諸路見存鍮石銅器物除道釋功徳像鐘磬鐃鈸鈴杵及士庶之家照子腰帶􅀈鑻鞍轡結束真古器及髙麗之物偽造者非諸軍所用銅鑼鈴鐸見存者許令存留後來更不許鑄造其餘銅器仰指揮到日限一月拘收並於逐州軍資庫樁管具數申取朝廷指揮如首納違限或尚敢隠藏鑄造販賣即許人告捉依法斷罪如州縣容庇並仰監司按劾至如民間不可闕用之物乞倣舊法及斗科等例就官鑄造給賣施行辭免中書舍人狀臣准尚書省劄子節文十二月二十三日三省同奉聖㫖除臣中書舍人者聞命震驚㒺知所措伏念臣一介之士寸無所長筮仕踰三十年曽乏㳙塵上禆聖治比䝉召自䟽外躐寘螭陛日侍冕旒之側賜對便座至于再三聖度并容褒諭開納曲示優眷臣竊自念螻蟻之微負荷天地大徳莫知所以報稱朝夕惶懼不敢自安今乃復使處論思之地備詞命之官臣義當上體生成之賜勉其不能以承恩命捐軀盡力以竭其愚而臣言詞朴野素不學文才術迂疎懵不更事自知甚明豈敢冒居是職雖陛下乾坤之度力加扶持實恐寵踰其量致速官謗上累陛下知人之明所有誤恩臣未敢祗受伏望聖慈特賜追寢以安愚分謹録奏聞伏候勅㫖辭免户部侍郎第一狀右臣今月二十八日准尚書省劄子三省同奉聖㫖除臣戸部侍郎日下供職臣聞命震驚㒺知所措伏念臣昨者䝉恩召從疎外誤被聖朝特達之眷擢寘從班蚤夜以思不知所以圗報曽未三月復膺寵除退惟駑蹇之材一無所長僥冒若此雖欲自竭將何以副陛下委任之意而况地官之職準平萬貨均節百司寛假則容姦刻􅈔則生患邦計所係豈容濫居顧臣何能可備兹選省于私心揆之公議不勝大懼伏望聖慈察臣危懇特降睿㫖追還成命以安愚分謹録奏聞伏候勅㫖辭免戸部侍郎第二狀右臣准尚書省劄子奉聖㫖除臣戸部侍郎尋具辭免今月原空日准詔不允臣螻蟻微生敢犯天聽陛下不加斧鉞之誅賜以温詔過形褒誨臣恐懼感泣不知所措義當駿奔就職夫復何言然臣反復自揆有不得不以控告於君父者竊惟國家多事十有餘年軍食日衆資用日出盜賊水旱之備不與焉茍理財之官不得其術則下徒弊於疲甿逺不救於飢士恢復之圗未知攸濟利害至重豈可輕以付人而臣智能短淺學術空疎家世業儒不辨菽麥乃使繆當財賦之司以應錢糓之問曠官失職自取悔咎在臣固不敢辭至於上悞朝廷大計則雖加投殛何補於事伏望聖慈察臣誠切之詞志在憂國特回渙渥改授能臣以允僉議臣不勝瞻天望聖激切屛營之至謹録奏聞伏候勅㫖戊午八月乞罷戸部侍郎劄子臣輙有危懇上干天聽伏念臣昨被誤恩召從疎外期月之間躐寘從班濫司劇部叨踰之甚非臣所宜義當糜捐上報天地生成之賜而臣才術荒淺論議闊迂難用少成不切於事在官半年有餘曽乏絲毫之效日夜皇懼不能自成兼臣舊苦痰眩之疾每至發作動輙昏仆比縁積憂過計乃復増劇豈容冒居錢穀繁雜之寄若不揣分自引必至顛隮有誤國計上辜陛下委任之恩伏望睿慈特賜矜憐罷臣戸部侍郎除臣一小郡庶幾竭盡犬馬以圗報效取進止戊午八月乞罷戸部侍郎第二劄子臣一介之賤仰祈聖聽温詔下頒曲形諄諭義當上體眷隆駿奔就職然臣竊惟擇地而安雖非臣子所當為不能者止抑亦古人之深戒臣昨者誤被親擢俾貳計曹臣於是時銜戴重恩思自奮勵不敢固辭冀盡犬馬之力少酬乾坤之造而才薄任重迄無所施載念方時多艱資用百出既不能力求生財之道又不能力陳節用之方若或因循嵗月以幸無事一有緩急無以支梧則臣之罪不勝誅矣况臣憂患之餘衰病頓作心神昬憒志慮彫落雖欲自竭終恐有妨伏望聖慈哀憐察臣危懇實非避事罷臣户部侍郎選命能吏庶幾螻蟻之生得以自全朝廷之事期於有濟不勝幸甚已未正月乞出第一劄子臣輙有危懇上干宸聽臣一介無能誤蒙柬眷濫居劇部將及一年曽無毫髪之功少禆國計上負陛下所以委任之意懐憂抱愧日夕不安兼臣舊苦痰眩復得引飲之疾日漸加劇有妨職事伏望聖度矜憐除臣一小郡俾免曠敗之責亦得稍就安養倘未死亾誓當捐軀以圗報效臣冒犯天威下情不勝悸懼戰越之至取進止已未正月乞出第二劄子臣近具劄子奏乞罷戸部侍郎除臣僻逺一小郡今月二十三日准詔不允螻蟻微誠敢干天聽訓詞温厚未賜允從感極涕零㒺知所措伏念臣昨者召從逺服躐寘近班繼䝉誤恩委之邦計皆出聖神特達之遇在臣宜竭犬馬倍於稠人少收微勞上酬鴻造豈敢輕去朝廷輙求自便然臣智識短淺學術迂疎黽勉職事不為不久竭其所能迄無成效方時多虞恐防有誤國事中夜以思若負芒刺但以錢榖之任疑於辭難不敢無故有請數月以來疾病交攻心慮衰耗若復冒居官次日復一日必更曠敗在臣自訟尚不能安揆之公言罪豈可逭伏望陛下推天地育物之仁隨其分量曲賜保全未報之恩責之異日特降睿㫖俯從危懇罷臣戸部侍郎除臣僻逺一小郡庶安愚分伏候勅㫖辭免徽猷閣直學士狀右臣准尚書省劄子以臣陳乞罷戸部侍郎除臣一小郡正月二十九日三省同奉聖㫖除臣徽猷閣直學士知筠州臣近者屢貢忱辭以臣疾病曠廢職事懇求外補伏蒙聖慈察臣急迫之情特賜矜憐曲徇其私假以民社使臣自擇無以過此拜命銜恩感深隕涕至於延閣榮名職清地近朝廷異時非優賢報功不以妄授顧臣虛庸豈當濫受伏望陛下増重名器慎於假人特降睿㫖收還已行之命庶協公言以安愚分謹録奏聞伏候勅㫖漳州乞宫觀狀臣輙有危懇干犯天聽臣草芥寒士遭遇聖明獲備侍從之末頃縁病力乞置閒散上恩深厚未忍棄捐假以民社之寄臣自到郡至今一年有餘力求民瘼仰副陛下仁民愛物之意偶自今春以來䖍冦犯境千里騷然臣種種備禦僅保城邑今則逺去州界人民各已安業而臣任非其才勞而無効心神衰耗疾病日増深恐妨廢職事伏望陛下廓天地兼容之量俯賜矜憐除臣一在外宫觀差遣稍休疲悴螻蟻微生倘未填於溝壑誓收晚節以酬未報之恩臣無任誠惶誠恐激切屛營之至筠谿集巻三
