body:
  text: 筠溪集卷九宋李彌遜撰議古張騫使月氏張騫建元中為郎時胸奴降者言胸奴破月氏王以其頭為飲器月氏遁而怨胸奴無與共擊之漢方欲事滅胡聞此言欲通使道必更胸中乃募能使者騫以郎應募使月氏經胸奴得之傳詣單于留騫十餘嵗豫妻有子然騫持漢節不失後亡鄉月氏至大夏竟不能得月氏要領復從羌中亡歸漢拜騫太中大夫初騫行時百餘人去十三嵗惟二人得還騫身所至者大宛大月氏大夏康居而傳聞其旁大國五六具為天子言其地形所有騫曰臣在大夏時見卭竹杖蜀布問安得此大夏國人曰吾賈人往市之身毒國身毒國在大夏東南可數千里其俗土著與大夏同而卑濕暑熱其民乘象以戰其國臨大水焉以騫度之大夏去漢萬二千里居西南今身毒又居大夏東南數千里有蜀物此其去蜀不逺矣今使大夏從羌中險羌人惡之少北則為胸奴所得從蜀宜徑又無寇天子既聞大宛及大夏安息之屬皆大國多竒物土著頗與中國同俗而兵弱貴漢財物其北則大月氏康居之屬兵彊可以賂遺設利朝也誠得而以義屬之則廣地萬里重九譯致殊俗威德遍於四海天子欣欣以騫言為能乃令因蜀犍為發間使四道並出出駹出冉出徙出卭𤏡皆各行三千里其北方閉氐莋南方閉嶲昆明昆明之屬無君長善寇盜輒殺略漢使終莫得通然聞其西可千餘里有乘象國名滇越而蜀賈姦出物者或至焉於是漢以求大夏道始通滇國初漢欲通西南夷費多罷之及騫言可以通大夏乃復事西南夷議曰漢武好大喜功外事西夷張騫鑿空以開西南之役自是遣誅求之使興問罪之師殆無虛嵗中國殊方并受其弊闢草萊任土地罪不至是也然騫身所至者五六國留胸奴十有餘嵗持漢節不失不為不難矣向使移其賢勞奉國之誠敦恭儉本仁義內正君失外除民患垂紳正笏為社稷臣與其捐軀絶域以萌後患相距豈不懸絶哉欲為臣盡臣道在所擇而已嚴助請救東甌漢武帝建元三年閩越舉兵圍東甌東甌告急於漢時武帝年未二十以問太尉田蚡蚡以為越人相攻擊其常事又數反覆不足煩中國往救也自秦時棄不屬於是嚴助詰蚡曰特患力不能救德不能覆誠能何故棄之且秦舉咸陽而棄之何但越也今小國以窮困來告急天子不振尚安所訴又何以子萬國乎上曰太尉不足與計吾新即位不欲出虎符發兵郡國乃遣助以節發兵㑹稽㑹稽守欲距不為發兵助乃斬一司馬諭意指遂發兵浮海救東甌未至閩越引兵罷議曰甌粵在漢居中國之外俗悍喜鬬臣叛反覆有急則請救天子田蚡之䇿固未為失而助力陳必救之說者豈不以王者無外尺地一民皆在所保不可以逺而遂棄乎茍不推恩以及四海則屛翰之邦幾何而不資蠻夷腹心之地幾何而不惠盜賊今日棄一邑明日棄一城舉咸陽而棄之不為異也日蹙國百里詩人所以為大壞之刺可不懼哉公孫𢎞禁民毋得挾弓弩公孫𢎞武帝時為丞相奏言民不得挾弓弩十賊彍弩百吏不敢前盜賊不輒伏辜免脫者衆害寡而利多此盜賊所以蕃也禁民不得挾弓弩則盜賊執短兵短兵接則衆者勝以衆吏捕寡賊其勢必得盜賊有害無利則莫犯法刑錯之道也臣愚以為禁民毌得挾弓弩便上下其議吾丘夀王對曰臣聞古者作五兵非以相害以禁暴討邪也安居則以制猛獸而備非常有事則以設守衛而施行陳禮曰男子生桑弧蓬矢以舉之明示有事也孔子曰吾何執執射乎大射之禮自天子降及庶人三代之道也詩云大侯既抗弓矢斯張射夫既同獻爾發功言貴中也愚聞聖主合射以為教矣未聞弓矢之為禁也且所為禁者為盜賊之以攻奪也攻奪之罪死然而不止者大姦之於重誅固不避也臣恐邪人挾之而吏不能止良民以自備而抵法禁是擅賊威而奪民救也竊以為無益於禁姦而廢先王之典使學者不得習行其禮大不便書奏上以難丞相詘服焉議曰始皇殺豪俊銷鋒鏑以固萬世之業而陳涉起阡陌偏袒一呼天下嚮應斬木為兵揭竿為旗以亡秦烏在其兵甲堅利耶為國者茍德教足以感人刑政足以制衆雖賞之不竊不然欲禍亂之弭難矣公孫𢎞為相不知出此而欲禁挾弓矢以除盜夀王謂是擅賊威而奪民救也誠哉腐儒之術乖疏一至於是而後世語治者尤而效之抑又甚焉如寓兵於農三代之政也而曰勤民於野盜賊必蕃玩近代之弊而廢纍古不易之法亦可謂不知務矣徐樂言土崩瓦解之勢徐樂燕無終人也上書曰臣聞天下之患在於土崩不在瓦解古今一也何謂土崩秦之末世是也陳涉無千乘之尊疆土之地身非王公大人名族之後鄉曲之譽非有孔曽墨子之賢陶朱猗頓之富也然起窮巷奮棘矜偏袒大呼天下從風此其故何也由民困而主不恤下怨而上不知俗已亂而政不修此三者陳涉之所以為資也此之謂土崩故曰天下之患在乎土崩何為瓦解吳楚齊趙之民是也七國謀為大逆號在稱萬乘之君帶甲數十萬威足以嚴其境內財足以勸其士民然不能西攘尺寸之地而身為禽於中原者此其故何也非權輕於匹夫而兵弱於陳涉也當是之時先帝之德未衰而安土樂俗之民衆故諸侯無境外之助此之謂瓦解故曰天下之患不在瓦解由此觀之天下誠有土崩之勢雖布衣窮處之士或首難而危海內陳涉是也况三晉之君或存乎天下雖未治也誠能無土崩之勢雖存彊國徑兵不得還踵而身為禽吳楚是也况羣居百姓能為亂乎此二體者安危之明要賢主之所留意而深察也議曰天下者大器也置諸安則安一失其平則欹欹而不已則傾傾而不已則覆矣故聖人持以三綱範以四維防微杜漸害政者必去懼其蔓之難圖秦有土崩之勢豈一朝一夕之故哉使七國之患不已瓦解之勢不收將不至於土崩乎而樂曰天下之患在於土崩不在瓦解吾未之聞也吾丘夀王奏起上林苑漢武自初即位招選天下文學材智之士待以不次之位四方多上書言得失自衒鬻者以千數上簡拔其俊異者寵用之嚴助最先進後又得吳人朱買臣趙人吾丘夀王蜀人司馬相如平原東方朔吳人枚臯濟南終軍等並在左右每令諸大臣辨論中外相應以義理之文大臣數屈焉然相如特賞賜終不任以事也朔亦觀上顔色時時直諫有所補益是嵗上始為微行乃私置更衣從宣曲以南十二所夜投宿長楊五柞等諸宫上以道逺勞苦又為百姓所患乃使太中大夫吾丘夀王舉籍阿城以南盩厔以東宜春以西提封頃畝及其賈直欲除以為上林苑屬之南山夀王奏事上說稱善時東方朔在傍進諫以為三不可夫商作九市之宫而諸侯畔靈王起章華之臺而楚民散秦興阿房之殿而天下亂臣逆盛意罪當萬死上乃拜朔為給事中然遂起上林苑如夀王奏議曰惟士長於應變而或貪功以過舉賢者可以勵俗而或靜退以緩事故艱難之時則急於智謀持守之際則尊尚德義隨時濟務不得不爾至於士之飾文采富辭章長辨論雖粉澤王猷羽儀士類世不可無其或專信偏聽付以重任鮮不敗者漢武喜用儒術而其所簡拔雖號一時俊異類非忠厚方正之士豈特於將順匡救有所不足而持論不根競自衒鬻伺意邀寵啓其非心為害深矣以帝之睿智英特方初踐阼勇於為治若泉之始達東決東流西決西流善惡可致也使左右之人陳謨納誨皆知根本帝王之道以輔其德則異時窮奢黷武之習轉而為恭儉仁厚之風治功之隆將無愧於商周矣惜之哉何武召見廬江長史漢何武為揚州刺史二千石有罪應舉時奏其餘賢與不肖敬之如一是以郡國各重其守相州中清平初武為郡吏時事太守何夀知武有宰相器以其同姓故厚之後夀為大司農其兄子為廬江長史時武奏事在邸夀兄子適在長安夀為具召武弟顯及故人楊覆衆等酒酣見其兄子曰此子揚州長史材能駑下未嘗省見顯等甚慚退以謂武武曰刺史古之方伯上所委任一州表率也職在進善退惡吏治行有茂異民有隱逸乃當召見不可有所私問顯覆衆强之不得已召見賜巵酒嵗中廬江太守舉之其守法見憚如此議曰奉法繩吏刺史職也唯不屈於要權不移於親昵然後於職為稱武為刺史法行於二千石不輕召見一吏有所私問然終不能拒夀之託非以其要且昵歟巵酒固未足以示私而由是得廬江之舉謂之公可乎史稱守法見憚余於是惑之光武聽羣盜自相糾擲光武十六年郡國大姓及兵長羣盜處處並起攻劫所在害殺長吏郡縣追討到則解散去復屯結青徐幽冀四州尤甚於十月遣使者下郡國聽羣盜自相糾擲五人共斬一人者除其罪吏難逗留回避故縱者皆勿問聽以禽討為效其牧守令長坐界內盜賊而不收捕者又以畏懦捐城委守者皆不以為負但取獲賊多少為殿最唯蔽匿者乃罪之於是更相追捕賊並解散徙其魁帥於他郡賦田受廩使安生業自是牛馬放牧邑門不閉議曰盜賊之發始於貧窮乘法令廢弛之後至其蔓則難圖也自古衰亂之餘天下蜂起矣書曰撫我則后虐我則讎讎我則為寇后我則為民創業之君在於所以撫御之而已必曰鋤治之盡根株乃止是使無遺民也御之在制以法撫之在懷以恩爵祿固不可以人及給田受廩俾安生業還為吾民斯所以懷之也建武之詔其得撫御之方歟賈復與寇恂結友後漢建武二年賈復南擊召陵新息平之復部將殺人於潁川太守寇恂捕得繫獄時尚草創軍營犯法率多相容恂戮之於市復以為恥還過潁川謂左右曰吾與寇恂並列將帥而為其所陷今見恂必手劍之恂知其謀不欲與相見姊子谷崇曰崇將也得帶劍侍側卒有變足以相當恂曰不然昔藺相如不畏秦王而屈於廉頗者為國也乃敕屬縣盛供具儲酒醪執金吾軍入界一人皆兼二人之饌恂出迎於道稱疾而還復勒兵欲追之而吏士皆醉遂過去恂遣谷崇以狀聞帝乃徵恂恂至引見賈復先在坐欲起相避帝曰天下未定兩虎安得私鬬今日朕分之於是並坐極歡共車同出結友而去議曰國難未除王業未定忠臣義士所宜捐軀狥國公爾忘私之時而復以一朝之忿忘其非義以死報怨恂能不用谷崇之言屈於所辱以濟國事二子之賢否相去逺矣光武一言而兩家之難解折英雄之氣收豪傑之心真帝王略也寇恂斬高峻使皇甫文後漢隗囂將高峻擁兵據高平第一耿弇等圍之一嵗不拔帝自將征之峻猶不下帝遣寇恂往降之恂奉璽書至第一峻遣軍師皇甫文出謁辭禮不屈恂怒將誅之諸將諫曰高峻精兵萬人率多彊弩西遮隴道連年不下今欲降之而反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻皇恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也議曰皇甫文峻之腹心也懷不廷之謀抗方張之敵乘其不虞而誅之兵法所謂先人有奪人之心降之必矣夫利害之機常隱於衆人不見之地一投其㑹盤根錯節迎刃自解不能猶治絲而棼之後雖盡力難為工矣恂之智決矣豈諸將所能及哉岑彭水戰破蜀兵於荆門建武十一年三月帝遣吳漢等發荆州兵與岑彭㑹荆門彭裝戰船數十艘吳漢以諸郡棹卒多費糧穀欲罷之彭以為蜀兵盛不可遣上書言狀帝報彭曰大司馬習步騎不曉水戰荆門之事由征南公為重而已彭令軍中募攻浮橋先登者上賞於是偏將軍魯竒應募而前時天風狂急魯竒船逆流而上直衝桴橋而攢柱鈎不得去竒等乘勢殊死戰因飛炬焚之風怒火盛橋樓崩燒彭悉軍順風並進所向無前蜀兵亂溺者數千人長驅入江關令軍中無得虜掠百姓爭開門降引兵乘利攻破平曲收米數十萬石議曰主帥之權不可分分則號令不一籌䇿不專矣號令不一則下無所適從而紀律廢籌䇿不專則臨敵二三而機㑹失非制勝之道也故遣將謀帥古人所重非其才不以輕付一假之柄君命有所不受乃能盡其忠謀而責以成效荆門之事一由征南而吳漢不能間遂收破蜀之功光武可謂善將矣竇融等歸光武竇融等聞光武威德心欲東向以河西隔逺未能自通乃從隗囂受建武正朔囂外順人望內懷異心使辨士張𤣥說融等曰更始事已成尋復亡滅此一姓不再興之效也當各據土宇與隴蜀合從高可為六國下不失尉他融等乃召豪傑議之其中智者皆曰今皇帝姓名見於圖書自前世博物道術之士谷子雲夏賀良等皆言漢有再受命之符况今稱帝者數人而雒陽土地最廣甲兵最彊號令最明觀符命而察人事他姓殆未能當也衆議或同或異融遂決䇿東向遣長史劉鈞等奉書詣雒陽帝見鈞歡甚禮饗畢乃遣還賜融璽書曰今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重以此言之欲相厚豈有量哉欲遂立桓文輔微國當勉卒功業欲三分鼎足連衡合從亦宜以時定天下未并吾與爾絶域非相吞之國今之議者必有任囂效尉他制七郡之計王者有分土無分民自適已事而已因授融為涼州牧璽書至河西皆驚以為天子明見萬里之外議曰王者之興雖本天命必有威烈德惠感服人心使之向風內附不然四方萬里之逺同力同德未易悉以戰勝而攻取也融等內懷二心逺在西河之外慕漢威德決䇿東鄉顧可以力致哉向使號令不明兵甲不備有土地而日以侵削廢人事徇天時蕭牆之內將不能保欲以禦强制逺豈不難乎董宣殺湖陽蒼頭後漢董宣為雒陽令湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行以奴驂乘宣於夏門亭候主駐車叩馬以刀畫地大言數主之失叱奴下車因格殺之主即還宫訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖德中興而縱奴殺人將何以理天下乎臣不須箠請得自殺即以頭擊楹流血被面帝令小黃門持之使宣叩頭謝主宣不從彊使頓之宣兩手據地終不肯俯主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因敕彊項令出賜錢三十萬宣悉以頒諸吏由是搏擊豪彊京師莫不震栗議曰王者示天下以公而湖陽縱奴殺人釋而不治可乎宣下臣也乃能奉法盡職必行而後已殺之則不辭辱之則不可賜之金則頒諸吏真彊項哉光武豈不愛公主而惜一令蓋欲示公天下而杜撓法害政之漸爾號令之行多屈於親貴忠直之操多奪於高明使執法如董宣任下如光武何憂乎天下之不治乎光武徵周黨等至京師建武五年詔徵處士太原周黨㑹稽嚴光等至京師黨入見而不謁自陳願守所志博士范升奏曰伏見太原周黨東海王良山陽王成等蒙受厚恩使者三聘乃肯就車及陛見帝廷黨不以禮屈伏而不謁偃蹇驕悍同時俱逝黨等文不能演義武不能死君釣采華名庶幾三公之位臣願與坐雲臺之下考試圖國之道不如臣言伏虛妄之罪而敢私竊虛名誇上求高皆大不敬書奏詔曰自古明王聖主必有不賓之士伯夷叔齊不食周粟太原周黨不受朕祿亦各有志焉其賜帛四十匹罷之帝少與嚴光同逰學及即位以物色訪之得於齊國纍徵乃至拜諫議大夫不肯受去耕釣於富春山中以夀終於家王良後歷沛郡太守太司徒司直在位恭儉布衣瓦器妻子不及官舍後以病歸一嵗復徵至滎陽疾篤不任進道過其友人友人不肯見曰不有忠言竒謀而取大位何其往來屑屑不憚煩也遂拒之良慚自後連徵不應卒於家出資治通鑑議曰否之初六以其彚貞象曰志在君也夫士貴有所不為謂其能有為也光武中興漢業賢能並起是可為之時而數子者方牢辭逺引潔已自私不拔一毛以利天下美則美矣顧何補於治忽哉然方之釣虛名取大位忠言竒謀不見信於朋友抱愧以死尚庶幾焉至於子房取天下付高祖而為赤松之逰安石起東山之卧而晉祚賴以永久進退出處之間後世無得而踰矣班超斬虜使後漢竇固使假超與從事郎恂俱使西域超行到鄯善鄯善王廣奉超禮敬甚備後忽更疏懈超謂其官屬曰此必有北虜使來明者睹未萌况巳著耶乃召侍胡詐之曰胸奴使來今安在侍胡惶恐曰到已三日去此三十里超已閉侍胡悉㑹其吏士三十六人與飲酒酣因激怒之曰卿曹與我俱在絶域今虜使才數日而王廣禮敬即廢如令鄯善收吾屬送胸奴骸骨長為豺狼食矣超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使不知我多少必大震怖可盡殱也滅此虜則鄯善破膽功成事立矣衆曰當與從事議超曰從事文俗吏聞此必恐而謀泄衆曰善初夜超遂將吏士往奔虜營順風縱火前後鼓噪虜衆驚亂斬其使及從士三千餘級衆百許人悉燒死明日乃還召鄯善王廣以虜使首示之一國震怖廣叩頭願屬漢無二心遂納子為質因復使超使於置是時胸奴遣使監護於置王國超既至其王廣德禮意甚疏又其俗言巫巫言神怒欲求漢使騧馬祠我廣德遣國相私來就超請馬超密知其狀令巫自來斬其首送廣德因責讓之廣德素聞超在鄯善誅滅虜使大惶恐即殺胸奴使者而降超於是諸國皆遣子入侍西域與漢絶六十五載至是乃復通焉議曰班超提數十衆深入異域懸命它國而能斬使樹威俾兩國落膽內附遂通西域可謂不辱君命矣夫人各有能有不能任當其能則衆人所甚難且優為之超之功可致也茍非其才而責以重任雖天下之勢擁九有之師束手自持受制逺虜矣利害之相去何啻什伯耶李綘為憲宗言任賢豈容易哉信夫陳圭說魏武圖吕布袁術稱帝於夀春遣使者告吕布因求迎婦陳圭說布絶婚遣圭子登詣曹操㑹操遺布書深加慰納布大喜即遣登謝恩登見操因陳布勇而無謀輕於去就宜早圖之操曰布狼子野心誠難久養非卿莫究其情僞即增圭秩中二千石拜登廣陵太守令陰合部衆以為內應始布因登求徐州牧不得登還布怒拔㦸斫機曰卿父勸吾協同曹操絶㛰公路今吾所求無獲而卿父子並顯重但為卿所賣耳登不為動容徐對之曰登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如公言譬如養鷹饑則為用飽則揚去其言如此布意乃解議曰馬援嘗言於光武曰當今之世非但君擇臣臣亦擇君陳圭背吕布而結魏武可謂知所擇然借使布不足與有為去之可也至於勸其絶婚公路而陰贊魏武以圖之甚矣非人臣之所為也布既知為登所賣一言而釋之終不能去御下若此其能有濟乎此所以卒為人戮也筠溪集卷九
