body:
  text: 筠溪集卷一宋李彌遜撰奏議紹興五年被召上殿劄子三道臣聞光武起南陽一年而破新室肅宗起靈武一年而復兩京元帝起建康數月而君臣之禮定遂成東晉之基事雖不同皆謀深志定力行而不疑故功效之成如此其速也竊惟國家之患振古未聞天佑宋德陛下興起於艱難之中以陛下英睿神武何啻並駕漢唐之君而祖宗流澤入人之深比方數代何啻相什伯也然閲時滋久大勳未集者良由聖志未定廟謨未決上下無所遵承小大之臣無路以自效也爰自多事以來朝廷雖未嘗不以攘夷狄為急而前後議者各私其説以相矛盾主和者以征討為敗謀好攻者以守備為失計彼是而此非朝令而夕改紛紜殽亂上紊宸聽猶豫不決日復一日而已迫防秋之期矣故八九年間排難解紛之不暇其於恢復之圗初未有定計也求治效之成難矣哉夫千金之家為巨室者必先度方隅正基陛然後鳩工庀材藩垣而棟宇之則室成矣不然雖有良工無所施其巧也况天下之大不正其基址定其規橅而可為乎書曰事不師古以克永世匪説攸聞伏望陛下奮剛健勇智之德考前古已行之事酌今日當務之宜斷自宸衷定其規橅而力圗之姦言浮議排斥不用上志既定然後詢謀一二同心任之勿疑責以成效恢復境土嵗月可待也天下之事未有不為而成亦未有為而不成者也古人有言患莫大於以為不足為而不為願陛下早圗之臣聞易曰介于石不終日吉孔子曰茍有用我者期月而已可也三年有成天下之事方其臨機應變間不容髮朝聞而夕行猶恐失之至於恢逺圗振長策貽謀百世之後非先其根芽封植而長養之不能成功故不俟終日不以為速期月三年之間不以為久為國者不可偏廢也國家靖康之末法度大壞陛下繼紹丕圗日新庶政當如創業之初條舉而敘行之然夷狄盜賊無有寧嵗盡心力而為之僅急目前之急其逺者大者有所未暇此亦臨機應變隨時之義不得已爾而上下習熟便謂當然禦敵之外一切不議間有陳一説論一事利在嵗月之後者衆皆指為迂闊非笑而詆訿之朝廷因以為不急之務置而不問妨功害治莫此為甚也孟子曰猶七年之病求三年之艾茍為不蓄終身不得傳曰無三年之蓄曰國非其國也豈有為國而慮不及三年之近乎伏望陛下詔左右輔弼之臣禦敵之暇取社稷經逺之計治安亂危之所係者條具以進陛下少加宸慮審其先後緩急而推行之日滋月益必有成效上裨中興之治庶幾國有定安之期民有休息之望取進止臣聞圗治安者忘艱難險阻之為勞故終於逸樂而克成永世之基溺宴安者忽因循茍且之可慮故怠於間暇而馴致一朝之患在昔多事之時人君未嘗不欲求安而每至於顛隮離析者樂於茍且而倦於艱難故也仰惟陛下聰明睿智負興衰撥亂之才踐阼以來焦心勞思圗回治功是宜措天下於泰山之安矣然而國步未寧民居未奠一有小警上下騷動陛下不得髙枕於九重之中臣所未喻也豈尚或怠於間暇而救焚援溺之策不汲汲於朝夕耶何以言之臣竊觀纍年冦退之後中外熙然便謂無事朝廷有偃武之象將帥思歸馬之期一日無事幸一日之安一月無事幸一月之安欲求終嵗之安已不可得而求天下之安可乎賈誼居文帝時謂猶抱火厝之積薪之下而寢其上火未及燃因謂之安今日方之豈不為寒心哉易於萃除戎器戒不虞於既濟思患而預防之居安慮危猶不可緩而况欲轉危為安乎臣願陛下不以艱難險阻為甚勞而以因循茍且為甚可慮忘目前朝夕之娛為社稷萬世長久之計天下幸甚紹興七年自廬陵以左司召上殿劄子三道臣聞善為國者如持衡本末輕重常使適平無偏而不舉之患焉唐自中葉以還方鎮驕橫稔成禍亂至於五代益甚藝祖躬覩其弊懲前轍之傾故削州郡之權以尊王室而攬威柄誠得銷患救時之宜然當是時強兵徑卒悉屯京師及西北近畿往來更戍不絶於道百姓逸樂財用豐衍州郡奉行詔條得以無患其後承平既久兵制寖隳民益無聊而州郡之權益輕本末俱弱以致禍患此已然之明效也至於今日曽未少革帥守但持空拳兵寡民貧城池隳敝財賦悉以上供餽餉不足枝梧目前常不暇給平時稍為備守之計則羣議力沮之萬一有警拱手罔措賢者則甘心守節不肖者則奉身逃生雖誅竄失職之吏其害已不可勝道矣朝廷平時視州郡如越人視秦人肥瘠曽不曰王者以天下為家朝廷賴州郡以為藩維也州郡撓弱則朝廷之勢不固矣譬如千金之家知堂奧之可保而略其門廡不知門廡之隳堂奧其可安乎臣愚願慎擇賢材以任帥守假之事權使得竭才展效鎮安一方上寬顧憂下銷姦宄以效臂指之用昔董仲舒曰當更化而不更化雖有大賢不能善治今政解而更張之時也伏望睿慈留神擇中天下幸甚取進止臣伏覩朝廷比以兩浙江東西等路因被盜賊燒劫逃移人戶秋夏二稅並皆停閣纍年之間漸次復業仰見陛下仁厚之政惠養元元之意天下幸甚近因中外臣寮之請已降指揮夏稅兩浙路並復原額餘以紹興四年欠數為率江東權閣三分江西權閣五分餘數依限起發秋稅已經放免及五年十料之數並令輸納全稅臣契勘曽經燒劫逃移人戶如已是復業開墾了當自合依今來指揮輸納緣諸路被害州縣輕重不等其間有大段深重全未歸業雖已歸業未曽開墾去處若一槩立定分數及令復舊額委是無所從出切慮百姓虛被追擾致逃避流為盜賊而官司徒有虛數不濟實用若緣此一例與展年限又恐其間不無僥幸臣愚欲乞依今來檢放災傷條法令逐州委官同逐縣知縣遍詣原被劫人戶檢視田畝已未開墾數目詣實本州保明申轉運司差官覆實保明申朝廷其已開墾數目即依舊額輸納稅賦其未曽開墾去處並權倚閣委自令佐知通多方招誘歸業開墾逐年開墾到數申朝廷考其殿最而賞罰之庶幾數年之間民得安業而公家實得稅賦之利取進止臣竊惟泉貨之用於天下猶水之行於地中其出也有源則其流也不絶一窒其源則竭矣伏覩朝廷多事已來百費叢起其生之也未得其術而用之無窮雖有丘山之積亦日削矣且以一州一月計之不下數萬總天下一嵗之費可勝計哉不可不慮也况錢貨之積必有所在不在公家即在私室今國用不足百姓不足公卿之家盡於盜賊兼并之家盡於誅求雖比來郡邑所輸悉入諸軍而軍中非積錢之地往往變易輕齎以便携挈不知何自而往也訪聞多自淮南轉入偽境以資敵國之用兼川陜鐵錢地方近來公然行用銅錢及民間違法銷鑄以為器物如此泄之其患滋甚是欲實漏巵而大其罅也臣願陛下深究此弊申命計臣詳加講義廣所以生之之源思所以積之之術嚴所以泄之之禁誠今日之急務也取進止乞許內外職事官言事劄子臣聞廊廟之材非一木之枝帝王之功非一士之略舜有大功二十皆取諸人此有天下不易之理况艱難之時乎國家多事以來十有餘年大勳未集陛下深創前失力圗大計宸謨廟算固無遺策然萬幾至繁日不暇應千慮之外有當却顧而預防者或隱於尋常不見之地非賴衆智未易明也夫今日當務之急政事不可不修而自治之方未舉夷狄不可不備而善後之計未定有志之士所深慮也臣願陛下以此二事詔內外侍從官及見任職事官以上使得悉陳之陛下與一二大臣慎擇而力行必有以上禆聖聽助成恢復之功其在外官今於所在州軍實封投進行在官依面對例施行取進止乞薦舉武臣劄子臣聞天下危注意將方今國家恢復中原當務之急莫先於擇將而將之才能非倉卒所可知必使衆薦精選寖使屢試然後智愚勇怯無所逃緩急用之則却敵闢土無不如意竊見朝廷文臣每薦引賜對尋加識擢而武臣獨未及此臣愚欲望睿旨命諸大將於所統本軍偏禆中諸帥臣於所轄路分官吏中薦舉武臣智勇忠義可任將帥者不以官職髙下召赴行在內殿便坐賜以宴見稍略禮儀使得自盡觀其志意詢以謀慮如或可採即加試用俟功效顯著授以統帥之任庶幾能者咸得竭節事上以待拔擢無所妨蔽而朝廷折衝禦侮之材衆多共成中興之績取進止紹興七年嵗旱乞寬恤劄子二道臣照對紹興五年七月指揮因江西運判逢汝霖等申請昨因金人殘破羣盜燒劫歸業人戶已經放免稅賦及五年十料之外並令輸納全稅契勘除歸業已經開墾人戶自合輸納外其間有纍經殘破被害至重未曽開墾去處委是難以出備官吏上下重困人情不安伏覩近降指揮已將夏稅合納紬絹今年且依舊數送納自來年令提刑司核實已未開墾數催理切慮秋稅合納全稅指揮亦合依此改正施行庶使四方之民霑被實惠臣伏見州郡近年刑獄待報奏案例皆稽滯近及半年逺至踰年往往未下或緣刑寺稽違或道路不通遞中違滯所以至此其間多是情輕奏裁合貸命之人緣坐獄日久疾病死亡深可憐憫欲乞朝廷嚴立近限督責刑寺將四方案牘疾速結絶别作號驗附急遞下諸州庶幾一空囹圄以廣好生之德亦可收召和氣乞募土人守禦劄子臣契勘自淮以南與偽境相接地分守之即多事棄之即資敵當緩為計以圗之訪聞諸將下各有逐處土人願為朝廷招集鄉民耕種田畝置立堡寨以守一方如劉綱孫暉之類者甚多若因所欲更加選擇可委之人其上使之守州其次使守縣鎮不必須保故地但使自擇要害可守之所處之仍委逐地分將帥時出輕騎巡掠境上以為衛護萬一冦至則避冦退復保其所事初朝廷量行應副稍加就緒即使自給漸次措置人兵别無大段費用目前雖未見其利數年之後增一籓籬之固為利非輕伏乞聖慈更加詳酌可否施行乞募武臣及諸將諸軍子弟為衛劄子臣謹按厯代天子必有衛所以制六合威四夷固根本之地也承平日久寖以廢弛至於國家艱難用武以來亦復因循沿襲置而不講誠為今日之急務近者朝廷雖稍收四方之兵以聚中都然人數未多法制未備軍伍未成未足以為重臣愚欲乞朝廷措置或差或募或就委諸將選擇精鋭數萬人置帥以總之專衛王室别立親衛數千人倣古之制選募良家子便弓馬者及武臣子弟及諸將諸軍下子弟為之庶幾可以制近威逺以增重朝廷之勢如臣之説或者可採伏望聖慈特賜指揮施行小帖子臣竊聞日近有諸州揀到上四軍不應格之人盡是有事藝強勇少年其間多有般挈妻男在此不能復回原來去處大段狼狽若許於行在近下軍營收管留充禁兵之數實為便利乞治東南兵畫一劄子漢髙嘗用閩粵兵漢擊項籍閩粵王無諸及粵東海王搖帥粵人佐漢遂平項籍孝景嘗用東甌兵孝景三年吳王濞反欲從閩粵閩粵未肯行獨東甌從及吳破東甌受漢計殺吳王丹徒馬援嘗用湖北兵後漢五溪蠻夷反詔馬援將十二郡募土兵及弛刑四萬餘人征之蓋武陵十二郡兵也吕布嘗用川蜀兵董卓之亂卓故部曲李傕圍長安城吕布以叟兵守長安叟兵蜀兵也漢代謂蜀兵為叟兵劉表嘗用荆州兵建安中劉表為荆州牧劉備時在荆州衆力尚少諸葛亮曰荆州非人少也而著籍者寡可語荆州令凡遊户皆使自實因録以益衆備從其言故表兵遂強唐嘗用南蠻兵安祿山反廣平王為元帥僕固懷恩統南蠻大食等兵以討賊平之臣謹按自古有國皆隱兵於農降及近代兼用四方之兵亦以致勝國家用兵以來專尚西北而指東南為不足用今西北之兵日益少而東南無一人一騎可以為緩急應援者王綱不立國威不振首尾輕重之勢不均今日之大可慮者伏乞陛下深思獨斷而早圗之天下幸甚乞增重禁衛畫一劄子漢宿衛禁司有南北軍蓋唐所謂天子禁軍南北衙兵也南衙十六衛曰翊衛驍騎衛武衛威衛領軍金吾監門千牛各有左右凡十六皆衛兵也翊衛起於隋初驍衛起於開皇武衛起於魏文威衛起於龍朔領衛起於建安金吾起於太初監門起於隋文千牛起於後魏大將軍各一人將軍總三十人文則用腹心之士武則用功臣之世領軍則與左右僕射為一流中領軍則與吏部尚書為一流宿衛徒從之職兼焉北衙六軍曰羽林龍武神武各有左右凡六皆禁軍也羽林起於太初龍武起於開元神武起於至德大將軍各一人將軍各三人或選上郡良家子便弓馬者為之又取從軍死事之子為之又以征伐士勞苦者為之有以宰相領禁衛者吕祿解北軍印以兵授太尉周勃太尉入軍門行令軍中卒安劉氏有以宗室領禁衛者東牟侯朱虛侯宿衛長安共誅吕祿吕彥有以宿將領禁衛者李廣為未央衛尉程不識為長樂衛尉臣謹按厯代天子必有衛所以制六合威四夷馭諸將也方時無事猶不可廢至於用武之際則宜增重以固根本之地然必先嚴外禦厚藩維使內外相制而後有磐石之安茍篤近而忘逺自為窘束之計則唇亡齒寒兵雖重與孤軍等恭惟陛下酌古今之宜而審處之實天下萬世長久之圗取進止答聖旨條具當行事件劄子臣近準大臣宣諭聖旨令臣條具今日當行事件臣皇恐震懼罔知所措自惟空疏不識治體何以仰副聖訓輒罄愚衷少布犬馬之忱臣痛念國家多事十有餘年前後失圗屢有改作致誤陛下焦勞如此未見成效臣謹稽合公論參酌事宜今日規模當急為自治之計先令國勢日安日強以圗恢復方為萬全之策安強之術其目有六一曰固藩維以禦外侮二曰嚴禁衛以尊朝廷三曰練四方之兵以壯國勢四曰富國用以備軍食五曰收人心以固根本六曰擇守帥以責實效信能行此六者則一年而安三年而強然後資閩廣之利以守淮南積四川之財以窺關陜政事既修舉則必勝不然則按兵固守傳檄遣間逺者自至惟陛下用之爾然臣之所陳拯危救亂之策難以循守故常當如創業之初為之先須陛下聖慮深思熟計灼見利害確然不疑必欲力行不為浮議所搖方可擇人以任之數年之間可見成效良以國勢空虛危弱至此已甚不以持久不能有成若但應目前以為迂濶而不為孟子論三年之艾政可為比陛下既欲力行而又委任得人則於聽言之際尤不可不審也蓋興大利必有小害圗逺業必無近功類非衆人所能窺測兼立言者甚易立事者至難若事有小害輒罷人有小失輒廢一守前日之轍臣恐徒養小惠有害陛下安危大計日復一日事無立期加以數年天下有不可勝慮者矣臣冒瀆聖聰罪不容誅伏望聖慈察臣區區之忠不敢愛身上酬天地生成之賜貸臣萬死使得少圗報效臣不勝皇恐激切屏營之至取進止車駕南還舟行乞不乘馬劄子臣聞千金之子不垂堂百金之子不騎衡聖主不乘危不徼幸臣伏覩六飛連日履涉長道陛下叱去執御駷躍疾馳千乘萬騎追奔不及然山路髙下曲折不比苑囿間平夷寬曠可以回旋萬一銜勒有失左右不能致力將如之何臣不勝寒心恐懼憂惶之至竊惟陛下聖意不過欲以神武勇智激昻士氣數日以來已可聳動羣聽臣願陛下念宗廟社稷至重深加矜慎保衛聖躬思乘危之戒以防不虞天下幸甚臣又聞已降聖旨沿路皇帝乘馬宰臣以下並免從駕臣契勘以來乘輿所至扈從官以下皆合從行雖聖德優容寬假臣下如此豈有陛下不以馳驅為勞而臣子反雍容舟楫之間兼馬行至疾舟船不可追逐舉足便有數十里之隔而陛下左右大臣無一人之侍今居何等時乃可以如此伏望睿慈更垂聖慮毋忽臣言特降指揮令有司預行相度可以乘馬去處前期戒備許宰臣已下依例扈從以安衆情冒瀆天聽罪不容誅臣無任懇禱激切屛營之至伏候進止再乞增禁衛劄子臣比者屢被聖恩賜對便殿臣嘗一具奏陳兩具劄子乞增禁衛以尊朝廷雖蒙睿眷俞允以臣劄子付樞密院未見如何施行臣聞近日淮南稍有警報若旋行措置恐不及事伏望聖慈先以見有人兵早與增添分定禁衛人數使人心各有所歸或存留楊沂中一軍專充護衛以備緩急不可臨時一例差撥出入致令乘輿所臨兵衛單弱别致誤事蓋今日之勢不獨外患可備腹心之間亦當預防利害顯然不敢縷奏昔袁盎有言聖主不乘危不徼幸陛下不可以前日纍冒艱險幸而無虞習為尋常衆人所忽猶不可不慮使其過有關防固亦何害伏乞陛下長慮却顧深察臣言斷自宸𠂻早賜施行臣冒犯天威至于再三死有餘罪犬馬之忱不勝憂懼激切之至謹録奏聞伏候敕旨乞罷月樁錢劄子契勘以來諸路合用大軍錢糧除朝廷支降外係是轉運司拘催一路合得之數科撥支移應副昨自江東漕臣馬承家首創月樁之名乞從朝廷指揮逐月樁定諸州合出之數緣此多寡不均至有不能出備遂至科擾上下人情以為不便本部近取到紹興六年逐路一年應副過月樁錢名色止是追逐州經制上供係省等錢充數别無措置到錢物顯見前後虛稱督責州縣兼或州縣不得人却致並緣侵漁害及百姓不可不革本部今相度欲將諸路逐年取過名色並撥歸轉運司充月樁錢之數及更行撥與名色務令優足易於辦集令轉運司量度逐州多寡通融一路拘催應副不管少有闕誤所有日前逐州月樁錢並罷庶幾軍用以足而民無侵擾之虞東南募兵畫一狀臣面奉聖旨令臣條具募兵畫一今具下項一朝廷募兵事體至重合以十萬人為額契勘所招軍兵且以十萬為率分為十處駐劄即一軍當一萬人軍中自來合有輜重火頭疾病逃亡闕額之類其實可用出戰人兵不過六七千人况今來招募之初未能便足額數如朝廷以十萬之數為多即先令招募五萬候軍伍成就逐旋增收以足十萬之數更合取自朝廷指揮一所招募人兵專聽樞密院使喚不𨽻諸將合别置名號軍額今來所招募人兵係專切準備朝廷緩急使喚故合專𨽻樞密院别立軍額仍乞預降指揮不得諸處陳乞指占差撥一合分就帥府或控扼去處招收駐劄朝廷見有諸項大軍捍禦外冦所募人兵止合分就諸路招置招揀駐劄於見無兵處無事即鎮禦一方以張聲勢緩急追呼以為應援所有合屯兵帥府及控扼去處及所屯多寡人數更合取自朝廷指揮參酌詳議施行一軍兵駐劄去處合選置文臣帥守總領自古謀帥兼用文臣近代專用武將若軍勢稍盛即便凌侮州縣寖以難制今來若於招募之初委文臣總領即上下習熟各相遵稟異時易以控馭所有守帥須選委有才略名望知兵辦事曽經任用顯著績效為衆所知之人一合選置武臣統制以副文臣守帥契勘自來諸路州郡所有人兵雖依常法教閲其間亦有事藝精強之人至於臨敵未必可用蓋為不經軍中教習訓練望風退怯今來所募人兵務濟實用全藉統制官一切團結訓練使知隊伍出入次第須擇自來曽任軍中將佐之人以為統制竊見諸路見有小頭項主兵官如江西申世景李貴廣南韓京福建王進之類若就差於今來屯兵去處作統制官使於逐人見管人兵上增添招募庶幾新舊相習易以成就軍伍若萬一如前項等人不多即選自來曽作統兵官委有功效見今間廢之人充逐軍統制仍須於軍中逐處量撥與三五百人指教軍伍事藝其逐統制官下合差統領官許統制官自行踏逐具名申樞密院差其將官隊將使臣之屬依軍中體例條法措置差撥一招揀應招揀等式並依上禁軍法如委有事藝髙強之人不及上等及中等禁軍格人亦聽招先於逐路將兵逐州禁軍廂軍壯城巡檢司土兵內揀外應百姓諸縣弓手逃亡首身軍兵但少壯及等格人並許招收如編戶使臣之屬實有事藝願充效用亦許招收不得過正兵十分之一所揀將兵禁軍不得過元數三分之一存留二分與本將或本州使用揀過逐項人兵所闕額數令逐處依舊招填補足元數一利物契勘招軍利物合依上等禁軍量與增給預行指數别給一項錢物下逐軍招屯去處樁管立法不許别作支用如遇招軍限打刺訖當官畫時支給本軍不得尅留如違嚴置之法一錢糧契勘今來所招人兵若先令招募五萬人即所用錢糧不多見有酈瓊等舊來合用錢糧且約三萬人緣本軍請受係有官人若盡行拘收逐年所用數目自可均給新招募人五萬之數兼既分屯逐路就近給養即免般運水腳之費亦可助給軍食若將來增置人數别行措置未致妨闕一團結契勘軍中行師齊衆之方全在團結有法今來所招人兵分置諸處準備朝廷使喚緩急會合務要齊一合取軍中見今團結隊伍法式更加審擇立定攽下逐處一體教習庶得將來緩急會合使用便成一軍不至殽雜易於號令一教法契勘教閲自有常法外自來軍中利器唯是弓弩可以致逺取勝舊法春秋教閲取事藝髙強只以斗力等第比較不至大段適用近年曽降指揮逐州軍兵以八分教弓弩二分槍手並兼以射親比較髙強最為良法其後緣諸州疑執申明不一復依舊法今來合依前降射親比較髙強指揮更加優賞以示激勸不過年嵗皆為可用之兵一器甲今來增制軍兵預合修治器甲以備使用乞從朝廷逐軍各給一項錢物廣行修置所給錢數量度逐軍人數多寡增損仍於屯兵州郡許令措置本錢回易以所得息循環轉易盡充本軍增置器甲之用不得闕誤一賞罰今來招募之初理合明立賞罰以為勸沮欲立限一年內招填足數及不得招填不依格法合招之人不得虛增已招之數冒給請受不得招刺工匠手藝人虛占人數不得將所收人兵不因出戰捕盜輒有差使如能依限招足不犯前件法禁即帥守統制官優立賞格出限違法重加貶降仍旬具已招數申樞密院樞密院每嵗春秋兩季差官出按具將佐功過申行賞罰小帖子一契勘今來條具畫一係據某已見陳述切慮其間有與條法相妨及未盡未便事理及逐項看詳務要朝廷易曉亦有不可使上下通知事件如蒙施行乞不降出上件畫一只作朝廷措置小帖子二契勘今來招募軍兵欲為逺計須候年嵗間軍伍成就事藝精熟方可追集使喚若未成而用竊恐萬一敗事沮壞士氣有害經逺之計小帖子三契勘今來所行招募人兵全在文臣帥守及武臣統制官得人伏乞朝廷詳酌選擇施行筠溪集卷一
