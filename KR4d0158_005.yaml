body:
  text: 筠溪集卷五宋李彌遜撰外制劉大中禮部尚書朕眷有家之多難乘大業之將興敷求真賢共濟當務矧居常伯之任實髙法從之班允副疇咨孰先舊德具官某智周而密學富而通直諒之誠言斯可績剛大之氣見於有為早推吏道之師旋陟禁林之表繡衣諭俗問不及於狐狸皂蓋臨民名亦知於草木惟汲黯可攘於敵國而望之久去於本朝想間曳履之聲亟下賜環之命典朕三禮位豫六卿詢之僉言莫如汝作大事則從其長既不溺於情文衆美以效之君尚勿忘於啓沃益輸忠讜以迓寵光馮義由解圍畨賊轉兩官排難解紛見臣子保邦之節報功崇德為人君馭衆之恩爾素敦詩書晚從金革遭時多難報國一身有嘉乘鄣之功肆頒增秩之命保兹榮寵毋怠欽承胡舜陟買焉及額轉一官國家偃武之久歸馬不間興師有年折箠可渡而猶務益之將以制胡虜之長技非得已也具官某風猷敏濟器度閎深久踐禁林出分帥閫惟桂林象郡旁連多馬之野嵗取駿良厥有常數乃能率下應期不擾而集既富在坰之牧無煩請苑之師雖曰守官實為體國宜載加於命秩以昭示於渙恩尚服寵光益思忠藎劉公達轉一官仗節守誼者臣之忠信賞必罰者君之柄爾臨難有守不與賊俱姑進一階以為衆勸往服豫命益勵汝為程江軍使遊輔起復墨絰以從王事於古有之方時多艱禦侮之寄非人不可爾却敵摧堅有功百里以憂去位亦既踰時其奪苫塊之情勉從軍旅之政事君之義移孝為忠益勵逺圗佇觀來效張戒兵部郎官尚書郎朝廷之髙選近嵗官不必備率以他曹通掌非開敏博達兼人之才不以居是職也爾器識深閎操履純固頃繇儒館出領使華中臺武部之屬姑試之事以觀汝能其勵乃躬率乃職稱朕所以選任之意焉楊晟惇換給事中大夫直徽猷閣朕惟師老敵堅士苦於戰有功必録凡賞無常而况於發縱指示御衆制勝者哉爾素敦詩書深明韜略振斬將搴旗之旅收執俘獲醜之功比命相臣付以閫外之事而崇階華職併以命爾載疇勳庸良見忠藎肆頒綸綍之寵以為閥閲之光尚體眷懷益輸竒節陳師錫贈諫議大夫江河競注仰太華之彌髙玉石俱焚見精金之百鍊士有所守何獨不然具官某操尚端方風規峻整當先帝龍飛之運為中朝骨鯁之臣旋被謗傷遂連鈎黨惟人心之助信亦天道之好還念彼同升既追榮於禁路豈容遺直獨銜憤於幽扃是用寵以諫垣躋之法從嗟乎弗及見賈生而席前尚其有知從朱遊於地下諒惟英爽歆此哀榮淮西運判梁澤民直祕閣使臣以禮則忠有功見知則說朕於用人茍藉其才先之以寵而責其效可謂至矣爾儒雅飾吏從政有方比命從臣推擇實材而奏書來上僉曰汝能內閣圗書之府也往參其直朕之所以待汝豈特飛挽之事哉其體兹意益慎厥修張球等轉一官魯人以思斯才頌僖公能遵伯禽之業比命方伯市駿桂林象郡之間而爾令行千里勸督有方致其土地之宜相豫軍旅之事載嘉體國可後酬庸超進一階以示褒勸唐時轉一官朕詠鴻雁之章修安集之政慎選百里惠養元元以盡為民父母之道爾涖官江縣聲聞於朝部使者謂爾奉公潔已戢吏恤民徭役均平催科不擾有令如此朕於斯民無負矣何惜一官不為爾勸哉梁澤民淮西運判朕眷淮右瘡痍之餘蠲其賦斂飛芻他道以給軍食部使者之職惠養斯民安集之爾才學之優習於吏治周旋外服灼知民艱其為朕往撫雕瘵之方奉法繩吏去其害民使流庸自占經界復興庶幾還其舊俗克祗厥事嗣有寵嘉王震湖南運判朕撫御逺民如行宫庭之政異時遣使問俗休戚必聞時巡以來急調度而緩農事非朕意也爾才優敏强習於吏治周旋外服益見所長荆湘轉輸之任其為朕往惟奉法繩吏去其害民使下不擾而賦用足斯為稱職尚往欽哉朝謙之再任福建運判甌閩地偏而俗悍吏鮮奉法刺舉之任一不得人則民不勝其弊爾以才猷蚤見推擇繡衣虎節嵗滿政成吏姦民隱俱在目中矣是用因爾之能以順民望申命爾以轉輸之任爾其益勵逺業以繼前功毋以久於其官而怠乃事也蕭振浙西提刑朕禮遇庶工孝治天下欲為臣者必獲乎上懼為子而不得乎親用捨之間姑從其欲爾以端亮方嚴任豫耳目之寄而抗章有請以親為辭卻之復來志不可奪夫逺而有光華可以榮親必也使無訟乃能善俗其推錫類之誠以施及人之惠體兹明訓往務欽承魏永升換給武翼郎朕念師老敵堅士卒苦戰有功必録不以疑廢爾久於行陳纍賞得官執符而來不加考覆而易以真命可謂優矣其勉爾忠以圗報稱衡嗣興補承信郎仗節死誼知命者所難爾父忠勇帥衆至於隕身朕甚憫焉既峻其秩復命爾官恩則厚矣其思所以保之趙成之改合入官縣令近民而逺於朝廷劇責衆有功難於上達比遣信臣察其勤惰以聞而黜陟之爾效官百里實在盜區治狀卓然達於豫聽朕觀其所為主而又延見便朝益信其行矣錫之命秩非曰示恩亦俾爾識朕見知之意益自勵焉龎琳王宗等歸正朕惟中原染於腥膻軍士墜於塗炭寤寐以思不遑寧處爾守節仗義不變於夷帥衆來歸可見忠藎晉官三等庸示異恩往服寵榮益圗報稱勾龍如淵起居舍人朕惟廣延四方之俊列于庶位寤寐求之如勿及焉既拔其尤待以不次顧豈循尊卑疏戚之間哉爾周行之秀儒學之英久於郎潛挺然自表朕得之公聽試以實能擢居言動之司俾雍容殿陛得陳當世之務爾其追古良史之風載筆不隱善惡必書庶幾朕無過舉之虞汝亦有常德之譽常同御史中丞進正可以正邦舉直可以直枉豫欲繩肅於百僚表儀於多士俾正士之醇風俗之厚則夫中執法之官可非其人哉具官某直諒之風承家不替方嚴之操臨事不回佐邦禮於秩宗代豫言於詞掖踐履之素趨尚益堅兹密侍於燕閒既灼知其忠讜載稽朝論擢掌臺綱夫事有當為而難責速成之效才有可用而恥投求合之機於進退可否之間實治亂安危之繫罔違於道以酌厥中推汝所知助豫圖治仲湜贈少傅朕廣睦族之恩以本王化崇飾終之禮以厚人倫矧豫藩戚之尊夙奉濮園之祀豈無異數寫此永懷具官某深厚而粹和恪恭而清慎惟東平無富貴之纍若楚元閲禮義之多董治宗盟率憲章而勵衆視儀宰路謹言行以端朝有隆磐石之基克壯維城之勢方資夾輔奄歎考中介幘賢冠正聨班於帝傅金璽盩綬備儀物於王封追賁佳城併昭茂典尚欽承於休命以永保於後昆勾濤中書舍人朕眷中原之未靖嘉與卿士大夫力圗去危即安之策任子獻納之司必求通於古訓達於治體淹練博洽之士豈但取其文詞敏妙而已具官某端諒融明老於文學夙抱濟時之志屢陳闢國之謀載筆赤墀書法不隱是用擢置掖垣清切之地俾預論思行其所學爾惟監前世治亂之繇酌今日當務之急明以告朕至於坦明深厚之辭所以慰老癃而感悍武蓋汝之優為而已試者又奚訓焉知泗州劉綱特除遙郡刺史朕疆理淮甸控制邊陲眷惟屛翰之邦備先禦侮爰得爪牙之衛力可折衝爾沈毅有謀忠勇不懼夙賴干城之略坐銷多壘之虞事出萬全功存千里宜寵分於州刺用增重於兵權惟政簡可以安民師和乃能敵愾服豫休命勉赴懋功張子華軍器監丞除戎器於萃聚之時所以戒不虞而况用武之際乎爾將臣之子餘力學文往飭百工盡其審曲面勢之藝函人惟恐傷人矢人惟恐不傷人俾各善其事時汝之職張承司農寺丞農臣掌九榖之府收斂蓋藏以待振發足兵以來急於饋餉無復紅腐之積矣爾老于吏治更練詳密其往丞於寺事惟出納之吝俾廪有餘粟而嵗用不乏時汝之職趙不忙等轉官不變於夷古言其難爾脫身異域仗義而來嘉汝盡忠可亡報稱爰頒遷秩之恩以勸為臣之節李時雨上書可採轉一官朕闢忠讜之門以來踔絶之士庶資羣策用濟多艱爾馳譽儒林遊心兵略皂囊來上陳義甚髙已收堂上之竒何慮目中之敵肆增秩序用示寵光勉行所聞嗣有休命張深都大主管茶馬監牧公事秦蜀地連多馬之野俗富摘山之利異時置使貿易騋牝之蕃動以萬計近嵗官無專掌職亦隨廢而利不歸於州縣官矣爾通敏之才見於盤錯頃為使屬悉其利病比命有司分職建官一循故事而首以命爾蓋因任也其體朕意往究乃心俾在野之牧毋愧魯郊則惟汝嘉喻汝礪夔州路提刑朕欽慎庶獄寧失不經唯恐一夫不被其澤况門庭逺於萬里任豫耳目之寄可非其人哉爾早擅文聲夙推能譽惠愛之政及於所臨必能推恩狴犴之間俾無寃民以稱朕哀矜之意焉䕫峽之俗爾所習知按茲祥刑欽哉毋忽施廷臣監察御史司憲紀綱之地張官設屬選之重獨髙一時必惟常德之彥則在位化之有羔羊之風焉爾學積于躬行著于外粹然之色如玉在山天祿石渠久於涵養其輟校讐以司糾正之任異時明目張膽陳義於正色之地朕庶幾乎見之往祗明命益勵汝為劉岑知鎮江府京口東南之巨鎮接畛淮甸控扼江隅當髙壘之時為設險之地任豫鎮撫之寄安得折衝之才具官某早茂英聲發於文采夙推能譽見於事功尤髙杖節之風獨妙流錢之算輟從禁路出殿侯邦朕方按轡秣陵倚比郡為輔車之勢益兵除器以戒不虞詢于在庭肆以命爾其思預防之策益嚴馭衆之方力衛王室以安吾民勿云用武而忘綏懷之政斯朕所以命爾之意向子諲徽猷閣待制兩浙都轉運使朕縻好爵以待天下之士至於戚屬之近則非有異能顯績不以輕授示天下以公爾而况要官華職所慎惜者哉具官某士林之秀戚苑之英風采足以戢姦才猷足以濟劇總飛挽轉輸之事於艱難險阻之中榖不勝食民不加賦心計之善獨髙一時是用增重使權升華次對稽之公論非朕爾私豫欲足食足兵吏皆奉法民不告病何術以至此爾將命于外而居論思之職皆得以言之無負朕選任之意焉丁祀轉一官疆埸之事備於未然恃吾有以待之爾爾分符邊郡施設有方禦侮之功克安千里惟郡守增秩之命漢所以待循吏者今朕用以寵汝重疆事也其體異恩益輸竒節趙思誠知泉州朕視海隅蒼生若在王畿之內患乎德澤不能下究休戚難於上聞非得良二千石將何賴焉具官某端直之守信而力行廉靖之風易於勇退頃居禁掖屢形深厚之詞久寓他邦習知東南之俗必能布宣王靈軫恤民隱解刀劍而授襦袴易愁恨而為歌謡用是命爾殿彼溫陵就分師帥之寄夫待之既厚望之則深其推爾尊主庇民之心以成豫仁民愛物之政髙掞夔州路李觀成都路並運判國家分遣耳目之官將以澄清天下察民利病以告于上興師以來足食之餘悉置不問豈朕意哉爾治劇撥煩綽有能譽久於外服益見所長峽巴李觀云西川轉輸之命肆以命爾夫畝有常稅不可損也使出於私家入於公家無追胥侵擾之弊則民安作而士不阻飢毋縱吏逞欲隂取過制而曰吾不加賦於民服我休命爾尚勉之羅孝芬提舉湖南茶鹽摘山煮海之利嵗有常課非特操其贏資以佐軍興所以使田里無加賦之民而足調度也爾嗜可行之學熟未見之書必能達于義利之分而體建官立法之意故假之使華以總其事唯奉法謹度俾官不擾而吏不侵則為稱職無以朕之所以養人者害人也曹璉宗正丞朕網羅天下之士一善必録計官資之崇庳而處之以待用焉爾蚤以才名揚于士類回旋外服更練既多肆豫命爾往佐屬籍之治凡寺之事時汝之職克修厥官嗣有褒寵張絢殿中侍御史御史自副端而上皆與言天下事所賴以繩愆糾繆而適於正選用惟人蔽自朕志不因媒介而得所以責其報也爾以純明之資守堅正之操頃居言責忠謇有稱朝廷賴之以理搢紳悅聞其風去國而來恨不見之久將以輔吾不及焉其還舊物以繼前功爾惟力行所學知無不言俾厥后正百官肅庶事舉則有無窮之聞許世安左武大夫和州團練使士被鎧甲十有餘年凡賞視功無小不録而况御衆制勝積有戰多者哉具官某勇冠三軍身鏖百戰用昭顯績峻階橫列進職遙團朕之所以酬爾至矣爾其盡忠竭節十全之功以自效焉曽開刑部侍郎朕操爵祿之柄以馭庶功而以禮義廉恥崇天下士蓋非能則無以責實非賢則無以激貪懦之風朕得其人置之近列具官某端莊之藴本於自然剛正之行見其所養翺翔法從垂二十年閒劇屢更不易其守頃膺召節何止千里而來繼上懇章未踰三月而去止足之義輿誦所髙肆命促還禁嚴典朕小司冦之事非特表其廉退以示在服將使推所不為見之有為也體兹明訓益茂逺猷黃積厚福建運判漢郎官出宰百里不以內外為重輕况專一道刺舉之任而為朕耳目之寄哉爾開敏之才見於已試久於劇部以辨治稱議者欲通東南之貨以佐軍乏患不得其術則下徒擾而利不歸於上故命爾以七閩轉漕之職爾通於治道而愛民之深者其為朕察其利否求所以兼濟之策聞焉毋忽王和司封郎官銓綜髙於諸部封爵簡於他曹斯朝廷養賢之地為郎之清選也爾薰然慈仁濟以學問優遊省戶人無間言擢升髙簡之司以表靖共之操往服豫采益勵汝為廣西運判林師說再任廣右逺於朝廷吏鮮奉法刺舉之任一不得人則民不勝其弊爾以才猷蚤見推擇繡衣虎節嵗滿政成吏姦民隱俱在目中矣比命從臣旁招俊傑奏書來上僉曰汝能用申命爾以轉輸之任其益勵逺業勉繼前功無以久于其官而怠乃事也胡世將樞密直學士四川安撫制置使知成都府益州西南之都㑹地控全蜀勢連三秦險阻之深可備於他盜風俗之厚不犯於有司惟政令之去苛則郡邑以大治師帥之任必得其人具官某望重一時才兼數器文章可以華國直節可以端朝南土承流咸歌召杜之政北門視草屢陳頗牧之謨需作鎮於坤維用借賢於禁路樞廷寓直寵以久虛帥閫頒符擢之不次五十城之重寄兆已見於夢刀六千里之畏塗諒無難於叱馭力除宿弊留愛逺民昔文翁化行於禮樂之間張詠政成於兵革之後尚追前美以茂逺圗丁則朱斐大理寺丞聖人欽慎於獄君子盡心於刑朕若古訓其敢忽諸爾以能涖官多所更練知夫捶楚之下何求而不得往丞廷尉其審克之毋或一人之非辜以廣朕德則豫汝嘉石公揆直龍圗閣知撫州君之視臣如手足佐佑之助不可須㬰離而休戚之間義均同體豈責其所甚難者哉以爾清直自修審固不撓頃疇時望擢置憲臺期月之間厯遷三院豫欲振舉庶事繩肅百工觀其糾正之效而抗章纍來力祈間逺雖昔者疾而今愈亦閔其勞而重違河圗邃職臨川近郡併以命爾庶幾卧而治之副朕委任之意不以中外為間也夫執法尚於方嚴牧人先於慈惠易猛以寬而適於治知鄂州趙士􅢔職事修舉除直祕閣武昌接襄漢之上遊連荆湖之多盜急軍食則催科及於耕農緩民力則飛挽絶於糧道不擾而濟未見其人爾戚畹之英夙有才譽千里之治朞月而成有嘉爾能可為衆勸蓬萊道山之直儒者榮之今以命爾惟國之大事在兵與農爾其思所以固本之道勿專以辦治為務而害吾惠養之政湖北運判夏珙職事修舉特令再任艱難以來士或失職至於當更而留非有異能顯績惠及一方不以當是選也爾以才猷早見推擇為部使者而富民足食績用有聞是用因汝之能以順民望俾修舊職增重使權柬遇之優併以示寵爾其益勵逺業勉繼前功無以久於其官而怠乃事也建康府通判李宏應辦宣力特轉一官士有可用之才不求聞達隱於下吏朕欲聞而未得者爾為郡丞能竭其才以佐而長闔郡之事以辦治稱亦可嘉矣進秩一階既為爾寵亦所以勸有功李吉被衆驅擁過淮脫身歸朝轉一官日者蟻衆悖德迫脅忠良爾仗義來歸脫身鋒鏑雖薰蕕不可同器而玉石幾於俱焚超晉一官以旌爾節往膺寵渥益效忠勤王庶兵部尚書禮樂征伐所自出蓋天子之至權爼豆軍旅雖不同皆儒者之能事長是兵戎之職必資文武之才與其拔士以踰尊孰若因能而任舊具官某規摹閎逺局量邃深臨事之幾金百鍊而益勵履危之節水萬折而必東早接武於禁途久宣威於邊閫折衝制勝嘗不戰以屈人為大圗難屢有嘉而告后是用擢自二卿之列升之常伯之聨方上穹示轉禍之機而中原起來蘇之望兵戎弗戢師克在和爾其明自治之政以警豫庶幾收復古之功以垂世往服朕命尚啓乃心富直柔知衢州朕駐蹕江隅回輿浙部惟時西安乃在千里之內所以夾輔王室撫綏邦人非豫舊弼之臣疇足以寬朕憂顧哉具官某秉德寬裕宅心粹和懿行可以度人宏規可以經國朕以三朝元老故家遺澤尚有典刑舉而置之宥密之地而力辭政機歸棲真館側席之念于兹纍年其釋燕閒之居往分民社之寄非獨資於共理蓋亦便於告猷俾朝廷有屛翰之崇郡邑知巖石之重上下之治相須而成豈不休哉吕本中中書舍人朕寤寐中興焦勞庶事惟中書之地一日萬幾而內史之職於命令之將行皆得以可否而獻替之茍非其人則安能杜漸防微救過於未然哉具官某襲芳名胄濟以多聞粲然泉湧之文粹矣玉溫之質侍嚴香案議禮曲臺人物之優允符僉論其輟九卿之列來聨四戶之班夫事固有一言之非而駟馬弗及一日之失而終身為憂於號令出納之微係社稷安危之重其體兹訓知無不言毋使政事之行人得以議而朝廷有渙汗之譏所以望於爾者張澄集英殿修撰知臨安府漢三輔皆治長安而以二千石髙第入守京兆浩穰之地非通鍊敏濟之才不足以居其任爾才猷之美風力之强治劇剸煩雍容而辦分符持節屢試有成朕省方南還清蹕所臨無異輦轂是用移爾建業之風以成武林之治論撰之職併以示寵惟首善之地四方是式爾其惠養柔良彈壓姦暴以成中和之治則爾之休豈獨及於王畿之內哉任申先上遺表特贈四官朕求賢惟恐其不及用賢惟恐其不盡至於中道而失不能與之終始事功朕所閔焉具官某風節之徑問學之醇賁于丘園老而無悔日者起之閒散而置諸法從之舊班許之謝事而猶冀疾恙之可已朕於貪賢可以無愧蓋棺乃已亡之命夫進官四等以慰九原是為不次之恩以示有終之眷尚期英爽服我寵靈忠訓郎吳從捉獲僞劵冒請轉兩官鼠蠧肆欺冒僞契劵爾為小吏暴白其姦嘉爾之能進官二等益思報效以稱恩休承議郎李新元符中上書論政事闕失陳備防十事言辭切直特贈一官朕闢公正之門延忠讜之士一言之善無逺不褒爾當元符之間陳備防之策不顧時諱力排巨姦端亮有聞久而益著朕獨不得與此人同時哉一官之寵九泉之榮尚其有知歆此明命陳古直祕閣知興元府朕夙夜圗治焦心勞思念每先於赤子兵革未休軍須間出吏緣為姦誠不堪命慎選共理之臣以究其弊得人則害除而利興茍非其人患可勝道以爾詳於治民優於為政付以師帥之重往治漢中藝閣清名益隆寵任夫治道貴清靜不使逺民擾而無告則雖古循良無以過此尚勉之哉方庭實禮部郎官范振考功郎官陳槖司勳郎官中臺萬務之原分曹列屬相須而成譬諸作室殆非一木之枝爾庭實粹然之質有藴未施爾振行能之修濟以更練爾槖操履之固可以有為或端靖之節著于立朝或循良之聲見於為郡其推已試之效共成中興之功夫南省舍人時為清選司績主爵之任皆天官之劇曹往究乃心用觀汝績嗣有褒嘉之命張九成落致仕李絳有云知人誠難堯舜以為病然循其名驗以事所得十七朕體是道進退羣材於賢不肖之間以爾儒學之英名冠多士行義之潔善及一鄉蚤逰著作之庭髙尚其事未老而歸豫欲舉廉靖以勵士風豈借賢異代哉其還舊班以服新命亟彈冠而就道勿俟駕而有辭范沖知婺州烹鮮貴乎不擾止濁始於能定獄市之寄無以異此朕慎選牧守必先敦厚博碩之士將以安之爾具官某名臣之後清直承家踐更中外而達于事情綜貫古今而明於理義日者密侍經帷仍專史筆賴其講明是正之功而力求閒退以遂安恬有年于兹良鬱公議金華雖小然時豐俗富事省民醇今日之上郡也其為朕往撫循之夫惟簡可以臨下惟正可以率人惟去其害民可以成忠厚之俗皆爾所樂惟以及物者尚力行之馮康國直顯謨閣知䕫州朕以不忍人之心行不忍人之政治逺以近視民如傷曲思所以庇護之方與我共理者其惟良二千石乎爾憂國之忠濟時之策前席陳義朕既知之而持節外臺分職劇部厯試中外亦已十年其於御衆牧人蓋優為之雲安重地不達桑梓之邦輟從宰屬升之延閣而往釐之可謂寵矣爾其體朝廷之德意究風俗之利病以廣朕不忍人之術勿云居外而有遐心倚需政成嗣有褒命劉子翼廣東運判朕撫御逺民如行宫庭之政異時遣使問俗休戚必聞省方以來急調度而緩農事非朕意也爾才敏術强習於吏治試之要劇益見所長南海轉輸之任其為朕往惟奉法繩吏去其害民使下不擾而賦用足斯為盡職尚往欽哉章誼端明殿學士建康留守朕逺御中原時巡吳㑹眷金陵之近屛視京邑之陪都必資禦侮之雄用畀居留之重肆求邇列爰屬寶臣具官某德宇粹溫氣守沈毅夙持風憲輸面折廷爭之忠荐總計司著國富兵强之效受命不聞於擇事居官皆可以䇿勳兹輟侍於禁林往分憂於江表升華祕殿增賁侯藩大連城師帥之權專行臺管鑰之寄式勤逺略庸示眷懷昔蕭何以謹信委關中冦恂以文武守河內爾其固龍蟠虎踞之勢以為干城宣風聲鶴唳之威以恢土宇庶幾嘉績無愧古人周葵江東提刑朕嘉惠多方欽慎庶獄患乎德澤不能下究思得明習朝廷政體之士往宣明之其庶幾乎爾頃司風憲遇事必陳直諒純明介然有守是用命爾按兹祥刑大江之東實今要地耳目之寄付畀非輕儻吏不肆暴民以不寃法行惠洽各得其所治成如斯嗣有異寵知鄧州韓遹知筠州格禧措置有方各轉一官朕疆理襄漢以備不虞爾以才猷久分千里之寄控制外侮拊循斯民才術之優達于豫聽進官一等以旌爾庸往服茂恩益輸竒節土豪承節郎劉亶等轉一官頃者盜集海隅覬覦南下爾等體國奮忠有功扞禦陟官之寵時為茂恩其思所以稱此楊政換給川陜宣撫使補授十將至右武大夫恭州團練使付身朕慎惜名器不以假人而於將帥之臣率用優典所以勸有功也具官某沈毅有謀疏通知變久提師律備積戰多衆皆知其威名人將賈其餘勇顧何待於三錫俾盡從於九遷爰考舊勳載加新命益罄干城之略即成闢國之功劉子羽贈父韐少師朕稽三代之禮文法九筵之遺制大饗上帝並侑祖宗用答神明之休均錫中外之福某官才髙濟世望重蓋時厯嚴近於兩朝蹈夷險而一節功存寄閫有奮不顧身之忠義在平戎見誓不俱生之志是多賢嗣為時俊乂念風木懷陟岵之悲而詩禮本過庭之訓宜昭異數進位公師以旌追逺之恩以示顯親之意尚其精爽不昧欽承王珍轉兩官閣門宣贊舍人朕撫養軍士若保赤子十年于兹而乃者凶徒背德率衆叛亡天人所共憤也爾等懷忠許國不與之俱戮力誅鋤孤軍獨返克全大節可後褒嘉其進崇階賓贊上閣是為異恩非特旌爾亦以激三軍之氣使知吾甲胄之間有人焉孫政換給武翼大夫賞罰用命不用命所以勵衆而勸有功也爾久於行陳臨難不茍乃能賈勇鏖戰以張吾軍功在所勸者比加考覆申錫命書往服恩榮益思報稱筠溪集卷五
