body:
  text: 筠溪集卷十四宋李彌遜撰詩六十二首春雪繁雲初弄日纍靄漸韜霞夜色連空逈春英入望賖白霓分羽衛青女亂簮珈栩栩思輕蝶飛飛欲盡花瓊瑰才瑣屑龍鳯忽交加騁鋭邀難駐便輕去莫遮似因風伯力偏助水官夸闊布漫天陳低成匝地窪升階方浸潤投隙任欹斜雜遝爭排拶縱橫類攫拏怙隂方洶洶畏日尚譁譁遇坎寧辭險投荒忽匿瑕誰能問畛域何處辨隆窊眺逺眸增眩驚深吻盡呀勢包誇海若功蓋補天媧賦象隨形巧噓枯與物華黏枝拳宿鷺拆竹響翻鴉徑沒蟲書蘚灘平鳥篆沙缺池靜鳬鶩凍草伏麋麚著栁封腰束停莎老髻丫圓方雜圭璧牝牡失驪騧砌走馮夷蚌簷垂白帝蛇趨明驚吏愕唱曉誤雞啞表沴愁交積占豐信有涯平施入穮蓘餘潤到蓬葭穫早車應稇稌多壟看秅沽簾迎路矗賽鼓集祠撾梁苑曽延客藍橋正憶家劒歌悲雜缶陶飲樂勝汙更覔劉義伴相從詠雪車劉根道院仙去久不返遺宫仍倚嵩終疑白雲屋猶隱緑毛翁山曉水聚樹秋深霜影空它年結廬地千古想真風天封觀搖落秋山路煙留寶搆昏曽回翠華步不到紫虛門可鑑豐碑壯無知老柏尊勒功當日事寂寞更誰論和少章喜晴日暮馬行疾峰巒過眼頻雨階長若夜晴谷似逢春風月起歸恨江天思故人機心渾已盡唯有白頭新又和少章别非無山林意去住亦隨緣落日有歸翼亂山猶著鞭風簷依路濕煙樹著行圓清絶歸時思新詩句句傳發光林寺朝發光林寺﨑嶇渡復攀摳衣緣翠濕側足下蒼顔急雨欲平澗斷雲時見山祗應超勝地行路未嘗難瓜步阻風作二首西風趣秋去何日放船回不見澄江練唯聞捲地雷宦遊雙鬢改飄泊寸心灰落日乾坤裏微吟酒一杯牢落窮途暮扁舟水四涯十年長作客萬里得還家雲散山排仗潮生浪趂衙殷勤謝風馬為挂一帆斜次韻賁逺歸田四首歸去田園好春隨人意和竹根晴日卧牛角晚風歌漂梗空三徑虛舟信一波故人憐寂寞千里問如何又歸去田園好飢餐抵萬錢愁從身外散樂向酒中全蠶出柔桑緑秧齊小麥鮮一㕓何所寄華髮繞江天又歸去田園好秋還橘柚鄉稻梳縈帶水茅枕束芻篁絶迹公門步薰心佛土香此生真逆旅無慮可消忘又歸去田園好門羅樹外峰地偏羣燕雀江靜隱魚龍愁覔鄰家酒眠憎近寺鐘一春強半雨誰與問豐凶久雨阻逰昭亭有作浪迹隨方寄窮途觸事諳雨逢春甲子江滿地東南客鬢霜前落詩情酒外酣上方愁獨往藜杖許同參琴溪竹色千鐘靜溪光一鑑開巖隈宿風雨人迹老莓苔控鯉定何在騎鯨今不來空餘泉上月與我共徘徊世傳琴髙生釣於溪上其後控鯉仙去李太白酬崔十五詩云相招琴溪飲蓋其常逰之地秋霜閣十月水西寺興窮還為留淨坊深閉雨虛閣暗藏秋妄盡霜中葉身間水上鷗知幾傷太白五月念貂裘太白詩云五月思貂裘謂言秋霜落名閣取此意也緑竹閣草木盡改色孤標緑正繁曳雲扶徑節欹石護盤根靜者冝投迹髙人時避喧嵗寒松柏共何必在梁園春日雜詠九首春到陵陽市人家泊翠微南烹甘入筯北戶暖生衣花暗昭亭寺魚肥句水磯樂逰須結社倒著接㒿歸又幽棲足春事晴日若相催屐齒穿沙穩笻鬚礙竹回光風初轉蕙殘雪欲欺梅自是經過少柴門日日開又漸欲拋書卷行藏任轉蓬負暄㩦稚子抱熟覔鄰翁接葉猶妨徑拳芽未著叢主林真好事為我結新紅又役役炎涼態悠悠道路賖情懷知老大夢幻閲紛華攪思雲邉樹供愁雨外花生涯書一束到處即為家又憶昨金門侍晨參玉佩聲解纓青瑣闥束載錦官城日與長安逺春隨上苑生執鞭非所好獨抱戀軒情又不作觚稜夢長間地角身南冠欲從椘西笑敢懷秦鴻雁猶千里牛羊絶四鄰門羅今可設更恐白頭新又懶慢嵇中散寬間得自怡抱衾長恨晚倒屐不嫌遲網日蛛絲挂梳煙栁髮垂朝來被花惱浪走習家池又二月忽已破一春強半過提壺工喚客布榖巧當歌得酒先愁盡惜花翻恨多逢辰不為樂明日復如何又軒冕真成寄江山早見招懶從春後覺意别枕邉消竹色侵書靜松聲落耳遙妄心朝霧薄烏鵲莫相撩天慶道士何丹林作亭竹間方成豫名之以秀野因留小詩斫竹通圭竇開垣列畫圖乾坤藏小有日月近方壺樹色雲邉斷山形地外孤時來騁逰目更為剪繁蕪寄題徑川劉子先逸軒古縣溪山裏深軒城郭餘池清從近市朋好亦多車雲引尋山屐風翻插架書會看迎鶴版不獨愛吾廬彥術權郡大夫相邀昭亭以病酒不果往得所示佳句輒次韻呈五馬行春路松行舊不斜醉眠方夢草逰騎想穿花訪古千秋暗逃禪百慮賖歸來傳麗句字字敵春華早入昭亭與同逰散步山中自樵徑至水濵路窮還僧舍飯散䇿春岡曉樵蘇一徑長鈎衣藤挂石斷路水浮塘山靜竹生韻池清蘭自香禪房得深憩魚鼓正鳴廊山中遇雨卯酒催歸夢僧房借枕頭客愁三日雨山意十分秋鳴澗漲還落凝雲去復留陽烏肯回翼髙處卜深遊再遊龍潭密霧開深徑幽竒得重行水光沉樹色人語亂泉聲仙去山容寂龍遊雨陳輕誰能築雲室千古共凄清次韻舍弟遊本覺寺招提俯秋水畫手借王維霜磬遞風韻曉林翻露姿茶煙邀客佇帆影喚舟移他日成歸夢來興椘子悲池亭待月二首輕雷不成雨風砌旋搘床山亂雲行曲樓髙月路長柴門非故國戎馬尚他鄉笳鼓悲清暝關河思不忘又不寐池塘夜蕭蕭夏木重亭虛風趂客水淨月隨儂蛙喜鳴如吹蟬飢語似蛩一區真自足何地肯相容發桐廬江盡溪流合行舟落照催棹歌來月浦帆影上風桅路轉山容改潮平水色回兵戈滿天下飄泊壯心摧次韻學士兄桐廬道中溪水抱山曲輕舟趂落霞煙塵多戰壘冠蓋半浮家紫塞空歸翼黃河絶去槎從誰論此事心折莫雲賖次韻舍弟野望蒼崖望不極林際起孤煙漁笛蒹葭岸農歌䆉稏田青涵濠上水碧鎖峽中天客鬢愁邉改秋風又一年秋晚十詠倚杖倚杖看修竹晚林踈雨秋砧聲村逺近風力鳥沉浮愁鬢老前白間心物外休出門無伴侣小立看汀鷗瞑坐隱几北忩靜柏煙生鼎遲雨焦寒入座風竹暗侵籬貝葉談無相桃花現不疑叩床呼稚子憐到暮鐘時散䇿散䇿北岡路牛羊歸徑深水窮人小立山靜客微吟點點稻花雨團團榕葉隂田翁罷爭席明日共幽尋飲酒淵明不止酒屈原長獨醒一樽有妙理二子未忘形車上無垂墜眼中誰白青陶然醒醉外物我兩冥冥多病茗碗醒晝寢粥盂供晚餐支離慚受粟拓落笑為官幡影伽藍古鈴聲窣堵寒病多間步屐猶可據征鞍不寐不寐苦長夜起看天未明踈星微占曉宿霧冷遮晴人逐秋風老事隨朝日生南飛多過雁早寄靖邊聲晚望寒日倚江閣晚雲低可攀溪翁隨水上田婦赴虛還幻境夢占夢畏塗山復山乾坤有餘地間處著衰顔客至客至旋盥櫛出門驚兩翁山川十年隔風雨一軒同人事等飄瓦生涯各轉蓬時危命如羽憂樂酒杯中臨海觀望指極分南北觀瀾混濁清蕩胸金餅上覿面玉繩橫洲渚平漚發風雲一噫生神山端可往九萬作寬程懷逺去年别懷玉山淨覺秋髙嵗月頻思夢江湖多怒濤無書寄風翼有鬢著霜毛獨立寒汀暮忘言正鬱陶寄題陳氏尚遐亭結屋秋荷上塵心想坐忘露凝公子犖風曳野人章浪蘂終無實多花根不長知君有情尚千柄佇幽香和尚書兄留題興福殿閣羣峰合山根一水長簷楹接雲樹鐘磬雜風篁客枕愁花雨齋魚攪夢梁籃輿隔溪路目斷佛龕香次韻學士兄偶成炎涼豈天意四序自乘除畏暑漸退舍雄風時引裾據鞍慚類馬下榻喜迎徐吏退青燈裡猶能辨蠧魚次韻曽德明司理留題西山兼簡蘇宰二首層軒無礙石支徑曲穿林竹密催山暮松搖亂客吟琴書虛室冷鐘鼓淨坊深誰謂溪坡逺能來社與岑又手種南階竹關情一紀中倦遊憎眼白便靜脫塵紅放浪淵明酒浮遊禦冦風吳霜鬢如許何處覔還童大暑久不請謁登南樓望成父西菴慨然奉思因成小詩南郭子綦隱西郊杜老居風流知異代臭味本吾廬髙閣深翻貝虛堂靜散書經旬想顔色著雨問何如寄樞密富丈誤入衆香國山深人境移松筠秋色老樓殿午雲低東閣傳書密西郊去路遲須煩造化手為展菊花期夏日與妙現老堂二公晚步江臯露坐月下夜分乃歸老堂有詩次其韻二首步屧榕根晚明河九面橫兩禪方外得一笑坐中成雲去天逾碧星垂月自明寒江正留客倚杖看潮生又胡麻興不淺未肯庾公賢山意知秋近江聲到寺前夜涼新病後月色正愁邉可惜江南夢青燈照不眠葵藿傾太陽葵藿比君子卑棲亦自榮葉隨朱夏盛心逐太陽傾大象無私照孤黃不並生風稍輕轉影雲日淡留明連茹懷君志同根念舊情拾遺千古恨難奪戀軒誠次韻蘇粹之發幹見贈二首頽齡知有幾誰復問行藏散䇿蒼林靜拋書白晝長相呼山鳥聚自落澗花香此地無車馬真成物我忘又漂泊音書斷艱難會合遲那知休老地却數别君時嵗晚商山寂天寒楚水悲無言一杯酒懷抱各相知次韻王才元少師見贈清晝髙軒過巖髙得共攀蝦鬚深梵閣豹尾靜塵寰詞吐三江水胸開九夢山杯行不知夜留月伴公還遊雪峰將至大目溪造物隨人意輕帆百里間舟痕風力健客枕櫓聲間山合塵縱斷秋髙爽氣還望州相見處驀直透三關次韻仲宗天寧見懷月餘卧病橫山得其詩頗動念所以末句見意病逢木上坐㩦我曲欄行逺水兼潮濶層山帶角橫秋隨北雁到愁向暮蛩生正怯騷人句詩壇莫浪盟筠溪集卷十四
