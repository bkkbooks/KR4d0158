body:
  text: 先大夫歷事宣和蚤登兩省而以直節不容受知思陵既列二卿而以權臣坐廢蓋平生立朝之日常少居山林之日常多自弱齡冠多士年三十既位柱史流落中外出入讒惎年五十始再為史官歷詞掖版曹僅閲兩嵗身巳去國方宣政閒近幸欲致有時名者出其門少屈身則立致顯要及紹興力爭和議當國者啖以兩地皆褰裳去之若將凂焉所以白首丘園終老不悔夫先民之不朽者有行有言行事茍不盡見於時則斯文必亦有述於後大父既抱忠藎鬱而不伸至於遺藁復湮沒無傳實痛諸心大父發藻儒林即以文鳴其所居官蓬省蘭臺史職詞垣皆著作之事前後隱居數十年間寒窗窮檐青燈華髮手不釋卷閎博浩渺所發益肆烟林雲嶠幅巾杖屨趣深理到追軼風騷意寄高逺經淵史藪據古鑒今亂階治蹟貫穿敷陳忠誠洞見積其所述充篋溢笥大父捐館之日先君尚幼遺墨散失旋傳録於親友家所輯文槀僅有二十四卷其間脫誤居多先君辛勤裒稡粗成全書將傳於後力所未逮珏繆承墜緒始克鋟梓大參攻愧先生既光寵先世親染序文冠於篇端矣其遺事之詳具見家傳惟大父有行而不盡用有言而不盡傳撫卷追念蓋有感焉嘉定辛未孟夏既望孫朝請大夫直寶謨閣江南西路提㸃刑獄公事兼本路勸農提舉河渠公事珏謹書
