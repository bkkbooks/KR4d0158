body:
  text: 筠谿集巻十一宋李彌遜撰詩四十三首次韻學士兄發毘陵之作頻年走離亂忙苦落魄景浮家去復還生理紛不整有身著無處遇事到輒屏𡨕然如醉心閲嵗良未醒披衣坐愁夜月露共清永緬懷顔段流抱義心炯炯臨危快先登疾甚渉夷境全生豈不樂王事有綱領嗟今肉食謀捕賊如捕影王師苦摧傷敵騎困馳騁朝廷信多賢一死誰敢請不知覆轍改安得傾夏拯歸休及秋風墓檟痛瞻省念兹家國遙有淚漲清潁黄巾蔽行路闗户晝猶警何當收戈鋋禁暴但制梃林泉倘可卜名字忌丹柄自毘陵與兄弟避地南來約為連江之歸中塗各以事留遂成獨往念茲離亂易於隔絶作詩以寄之邊塵暗中原大駕巡江都春風遂南渡百辟咸奔趨衣冠困陵暴川陸紛舟輿微生本萍寄寧復安吾廬褰裳犯深險顚仆妻與孥懷恩痛未報無路先貔貙巖穴多遺賢天網固亦疎驊騮懼捐弃未數十駕駑銜悲望君門忍作永訣圖扁舟兄及弟去指東海隅夜榜亞修舳曉㠶趂横蒲如何忽參商行止分半途怡怡風月夕來若同隊魚慘慘霜露秋去如獨翔鳬嵗晏道路長隻影誰與俱但憂赤眉間能致黄耳無青燈攪寒夢起坐中腸枯載歌鶺鴒詩引淚零襟裾閩山我舊國下隱同姓居潮田嵗再穫海錯日兩漁荔子擘絳縠江瑤截氷膚家家潑春釀取醉不待沽木落於糞本兹言紳可書悲心久更微正坐簮紱拘次韻王得之禮部夜直有作緱仙勇於詩若醉得全者百川供微吟不復事杯斚五車載胷中萬巻生筆下一一成丹青遇物輒圖冩昨朝紫宸班裳珮雜魚雅捷書來九天為遣雨師灑公時青綾卧逸思動秋野霜風助凄涼露月供容冶坐令續貂人得語若乖寡猶如䇿疲駑倒步逐風馬未施歴塊功相望倚天社與同館晝㑹王公衡家分韻得瓜字秋曦上觀闕晨騶散蜂衙追隨我輩人偶到蓬萊家主人心逺塵門無車馬譁峰巒生几棐圗書亂籖牙午簟琅玕清蓴甌荐流霞坐令秋風思悠悠起天涯微官浪自縛霜蔓縈寒瓜愛子庭宇靜去官謝紛華寓意語成劇㤀機慮乃賒得酒且復盡昏林欲藏鴉同天隱少章逰嵩少懷元明秦公我輩士早踏翰墨場萬言若投石十年猶枯嚢若欲泛江海有親在高堂牢落京華春門無一壺漿長鞭䇿瘦馬送我古道旁憐我值險艱赤心冩摧傷鏗鏘五字句勢與鵰鶚翔感此坐矯首星星鬢成蒼西風小搖落雨洗烟嵐光嶂曉露孤秀野陰棲暗芳更攜鮑謝流履盡千巖霜搜竒得幽深訪古到𣺌茫月落潭影空清吟殊未央緬懷紫芝宇百憂繞迴腸三嘆已晡食十起中夜牀雲埋長安日䰟夢不敢驤茂苑富山水結廬予所嘗我欲放船下卜鄰俯滄浪耦耕種林田共掃三徑荒頭白青山裏長歌樂嵗觴嵗戊戌舟行宿泗間有持小石售於市者取而視之其大可置掌握峯巒鬱然若巖竇澗壑水落月吐雲影渺𡨕若逺若近皆有自然之勢乃以千金購之而為之名曰羣玉峰曰水月巖曰遙岑曰碧澗曰陰壑置諸座隅卧與對之且予少時南逰羌廬升紫霄以瞰九江東沿洙泗登泰山而徜徉大伾道鄴歴趙及燕而還今年責官羅城當走蜀問山於蜀人馮濟川每至佳處耳傾心愛恨不能一日千里也繼改命不得往遂自鄭適洛以窮溱洧兩河之源歴覽二室之趣方將踰淮浮江自放於世猶念深山大澤不能與有足者皆至偶於圖畫對之未嘗不慨然興懷今一旦得是數山坐四方之勝豈不幸歟吾將寓形其間而與之俯仰上下不知我之在丘壑丘壑之在我也世所謂毁譽榮辱窮達得喪喜怒哀樂不能投吾胷次矣雖然予非認而有之好事者將以予為過耶姑從而為之辭羣玉峰五城十二樓高下聳寒玉天空開翠微不受塵土觸半生嗟環轅萬事驚轉轂寄語山中人為占一峰緑水月巖明泉落巖隈滿月掛山額疎星淡月漢下與水光白了然心境空炯炯照闕宅鴻鳴夜更清欲卧已終夕遙岑宿雨洗空闊出此方寸岑聮綿翠光浮妙巧不可尋飛雲去未返慰我千里心誰為具徽絃有酒聊自斟碧澗蒼崖高鬱盤下有千仞傾當時捐珮侣寄此琤琮聲坐石風露晚心與秋月明滄浪若可濯勿負冠上纓陰壑春山秋亦佳霜樹風更落陰晴巻復舒氣象今非昨功名等浮雲文字懸高閣賸掃胷中竒還將貯丘壑贈浮光王教授剥啄誰氏子清晨過寒院瞭然雙瞳光偶坐肆雄辨自言同川裔世列金闥彦聲名重青錢文字妙黄絹挿架三萬軸撑腸五千巻八十朝明光好語動天眷遺芳落諸孫往往嗜經傳我獨甘悲辛敢負籯金諺藏刀十九年收霸在一戰猶紆從事衫局促類秋燕翻思訪梅福不待買陽羨鏗鏘七言贈字字經鍛鍊愛之忍去手喁噞日千轉黄鐘未雷鳴羞此釡與甗璠璵入磨琢㑹作清廟獻待價古或然毁櫝聖所唁明良羅雋英不命速邦傳胡為有遐心賸起林壑戀青𡨕閶闔開駃足謝媒援願持北闕書自效唐衢薦和何斯舉戒食牛饑腸慕羶腥如渇待拾汁雖窮爪掌勞不助唇吻濕屬厭能㡬何忍復貴難得三犧良可哀一割倘未急貪夫恣糜爛梁稻委鵞鴨鸞刀乆紛淪餘胾猶在羃寧思百畆間功大等黔赤翻令雜雞豚就死不見白置食為三嘆起坐或㤀幘若人妙箴規隱惻鬼神泣由儀見古風未使斯文缺藥石知良醫樂餌止過客仁言可紳書善應如響集淮陰遇風雨吾廬豈不好白日苦易夕如何芳嵗闌尚此千里役乾坤一虚舟浩蕩楚天碧江山已在眼道路修且隔風雨怕不休波浪蹴天擲船頭困九牛屢挽不進尺人生造化間有似風中翮偶去還復來胡為事形迹杜陵誅雲師韓子阻風伯我已兩㤀言引觴聊自適宿揚州城外舟横城郭繞缺月疎林杪窈窕一溪深微茫衆星小忘言對詩書適意親魚鳥幸此絶紛華行歌閲昏曉承天寺宿雨洗蒼骨峰巒發新秀尋幽躡竒蹤騰踏衆山囿層林鎖巖隈突兀見危構空高望浮黎靜聖逼靈鷲我來風雨秋白霧欲昏晝但聞百川赴鳴玉瀉寒竇岳示閟嶫峨路絶不得簉扳縁仰脇息坐右俯長溜帶露摘山芎披榛覔仙酎山光晚逾清雲壑若相授終期爛漫逰陽烏欲回咮更約十日留曾子緩蹄輳法王東庵吾宗丘壑資耿耿抱幽獨結構祗洹家縈回轉巖腹前川布黄金合嶂來蒼玉步出覺華天乗凌眩生目雲間起層林林際懸高屋斷砌滴疎泉微蹤隱深闕堂空貝葉昏苔封半堦緑朱幡久不來哀猿響秋谷五峰寺五峰如五城草樹皆秀發人間白玉京此土黄金刹長松蔭步武目改心已雪稅鞅罷言歸前山寫薇蕨碧霄泉山根出清泉云自九天落風潮帶江腥天黒魚龍泊何當寸雲敷一灑徧寥廓滄浪勿復歌吾纓久已濯杯渡㙮青松轉路頭白㙮枕山肋錫飛歸上方杯渡空塵跡真源不可取香火供晨夕客至亦㤀言荒庭秋草積秋居雜詠十首久懷簡書畏幸解紳笏束忘年効兒女適意揮僮僕植杖理新蕉埋盆養寒菊前除馴鵲烏近檻逰麋鹿遐觀時倚楹瞑坐或㤀燭門闌迹如掃我亦甘幽獨又薿薿庭前林離離夾中道靈柯結繁陰顔色四時好豈無霜雪侵不改凌雲操緬懷壯士心雅契幽人抱如何方寸搖懸若風中纛吾廬偶與隣聊擬七松號又青春背我去白日不吾謀霜飈驚草木寒威戒衣裘寓形復㡬時四序忽一周世路伏劍㦸中懷孕螟蟊營營事長久頽齡如置郵丘園倘未卜悟悅心自休又窮秋雜花逺眷此霜下傑明金委珞瓔寶璐綴環玦依依風遞蘭皓皓日穿雪若無夭冶姿不受衆目悅銜觴泛其英攬之腸為結誰能踵高門持以浣中熱又出門泥活活不聞車馬喧一身謝羈絆百事從弃捐坐曠非息慮逃空遂忘言青燈有餘燼妙香無續烟涓涓簷間霤獵獵忩上鳶夫物具成理胡為尚求筌又顒顒集癯仙娟娟羅靜女孤標與秀色翛然出環堵我來三二月離立僅成伍及秋新梢敷接葉庇風雨一日不可無幸兹共寒暑高枝有垂賞鳴鳯在何許又駕言出城闕行行陟崇山舒懷到昭曠未覺天地寛鴥彼離羣雁嘹嘹浮雲端嗟我逺兄弟千里同嵗寒舉頭不見日况復逺長安歸飛胡不早聽此彫朱顔又茅茨八九椽中有挿架軸琅函與貝葉落落皆在目閒依浄几繙緩繞疎篁讀困即抱之眠擁鼾寧厭熟不知老將至一時肯載腹此樂殊未央吾生亦云足又公園十畆餘日陟亦成趣浮陰未全收晴沙已勝步杖藜相與行童稚雜冠履枯魚泳微瀾悴菊飲晞露欣物各有時撫懷偶軒慮安得三徑餘誅茅種瓜芋又凝雲吐秋曦翳目眩晴晝扶行憩高堂恍若歴辰宿清涵城角池碧聳林端岫微茫縱遐瞻佳處時一覯冷風生襟裾俯仰小宇宙何必如雲翮超然追禦㓂春日種菊東籬顧叢蘭衰謝欲棄之因取以植牆下天公善轉物剪爪不停軫春工未削迹秋事已張本檀欒嘉菊叢戢戢露竒藴枝分要及時手植須著𦂳清晨東籬下畚挿自畦畛土膏入新萌秀色來衮衮歸休顧衰蘭面目吁可憫兒童互撏拏奴僕恣嘲哂敢望羣蕭艾棄置等朝茵即之粹而温忍死了不愠山翁飽經事遇物輒思忖理得心亦欣為發一笑􅀈向來芳深林孤潔玉在韞知音苦不多况此香色隕紉佩倘未遂焚膏眞可忍爬梳牆角陰樹之羅九畹好風動融怡新雨洗寒窘未甘五栁獨聊釋三閭憤炎涼循若環榮謝平可凖春風行復來萬彚發幽隱與羅邵諸公同遊陳氏園分江頭千樹春欲暗得樹字春風亦世情去我若馳騖北枝未破粉斷萼已飄素殷勤南郭綦邀我整冠履著鞭向晴原盤傳咄嗟具移樽晚色間醉入衆香聚花浮承露盤座繞臨風樹停杯憶昨遊香色尚深駐重來未旬浹頓覺心腹露後㑹雖可期稍稍迫遲暮酬花了無計一醉其殆庶如何競剪燭雕繪覔竒句願當百罰深肯效黄金注雪後詹伯尹周少隱見過置酒次伯尹韻春雪不禁風散作六花墮方庭截明玉純白不可唾枯腸索慳句喁噞空百過同襟得二妙敵我愁城破試酌扶龍鍾重觴念􅀢鬌伯尹詩有􅀢鬚之句故云西齋尚有氊庶足供雲卧壁間見三閭推枕為賡和壁間偶有屈子像故見末句次韻張嵇仲侍郎燕公提大筆萬象入陶冶公今眞似之信是渥洼馬當年動天眷愕睨肉食者珥貂漢廷臣往往富平下朅來楚江城百事聊復且傳聞九門開裳珮翼如也巖廊正需公料理及閒暇不然坐玉堂堵立看揮洒胡為尚居東一麾凡屢假憶昔從公遊端門正槐夏午騎聮輕肥晨班從魚雅頻年江淮卧隻影未為寡誰云若遺闕殆甚履中苴相逢屢解榻得句即邀社重追一笑歡百憂罷牽惹况陪賦文機不數分金賈青蒿倚長松懷抱肯舒冩殘枝到春歸風燈不留灺世人重虚名自視輕拱把獨醒竟何事空負月中斚及茲春尚餘得酒勿復捨和張嵇仲秋日病中見示浮生一虚舟流景半修夜塵勞互牽挽荏苒栢間麝晚從農圃遊徑欲老閒暇二年古陵陽邂逅穎川霸薫然君子風卧致此邦化公庭散鳬騖文字雜休假江山助悽惋句法妙曹謝客來飲以醇味語兼膾炙長風起百圍微日下三舎高秋攪羈懷遊子念歸駕身名兩將隱焉俟連城價譬之草木姿榮枯信冬夏公材可支顚乃復用苴罅天其遣鯨鯢慰我波濤下忠良人樂推正直神所迓㑹看擊南溟風雲生叱咤寄題蕪湖韋深道所居二首寄傲軒男兒騖功名浪起四方志轍環百年間正足消兩髀達人坐進此妙處不容喙巻舒周古今俯仰小天地南忩有餘清松菊爽朝氣豈獨傲世懷吾生真可寄獨樂堂韋郎江海士心與凡子各折腰卑小官不事干禄學觀身一牛毛閲世兩蝸角紛華豈不好名教自有樂虚堂巻書罷覔酒供自酌誰云苦幽獨秋風響猿鶴巖巄寺披榛得深徑漾楫過陰壑巖開雙牖户石立四壁落斕斑旁累丸空洞中懸槖誰於崑崙腹施此混沌鑿潜移蛟黿宫歘拂佛祖閣世無探穴公造化終𡨕漠東峰亭芒鞋著層丘甘若卧華屋了然非夢覺似是前境熟行行上青𡨕下視八荒促回溪綰文練叠障環羣玉厨煙起城隅逺借層林緑恍疑坐虚堂淡墨寫縑幅緬懷季與劉靜躁等臧榖寺有李公墩唐永泰中季廣琛袁參破石埭城賊聞捷燕於此亭其下有逸民劉遺民釣臺身名千載後巖影空遺躅霜林木葉下悲籟喧寒谷我如凌風翰不受世網束蒲團白氊帳清夜倘可卜更隨孤月來一洗昏衢目五松寺秋風吹客衣去路倚天碧躋扳一何苦政坐愛山癖人言五松下曽是瞿曇宅至今梧竹陰列屋栖禪寂塵纓得暫解俗駕聊可息怡顔巖間樹洗耳泉上石孤雲共還往窈窕去無迹道人粲可流獨步少林席客來了不言碧眼照庭栢希聲出鍾𣑽妙意生牆壁寒灰暗青燈偶坐遂終夕歸來人境空缺月挂山額大寧寺三山覆蒼鼎一澗走青蛇檀巒衆好樹宻䕶如來家當年契禪人虎御穿雲霞真蹤久不昧殿角峩金沙我來風雨秋脚踏繽紛華松忩歴高下石磴縁欹斜境靜心自逺山窮興徒賒歸轡不可留哀猿響清笳春日同伯氏遊問政山門意似表弟舊題用其韻先是嘗持書招之篇末并以見意晴妍入遐瞻佳處在林樾歸雲紛巻舒列岫互明滅偶從清都行遂與凡境絶輿肩俯清陰屣齒破苔滑坡陀度崇岡窈窕閟真闕燼餘見頽基紙上得遺碣紅白抹花臉嘲哳掉禽舌傷殘起孤憤感物動深悦稍羅肴核豐共弔泉石咽雲冠儼臧䕶電騎想飛越靈蹤尚儲休爽氣亦時發掃花步危壇引蔓探幽穴胎田倘可丹石髓未成鉄却思棠棣篇已換桃李節雁書當解封鹿駕定回轍兹遊約重尋晚笋政堪擷宿雲軒平生念丘壑著我胷中雲偶為山樊居白雲亂衣巾物類感濕燥人情異蕕薫竒峰靄朱夏擘絮浮陽春興來攬之游要觀塵外身晞陽軒山高竹栢陰得之近亭午兹軒揖朝暾精色快先覩濛濛勒花香十日九風雨羲和為返斾照我衣上縷眩然九陽遊誰云在環堵春日奉陪子安諸公遊后門提壺喚新晴病客春思攪茶甌曲肱罷聮屐事幽討叩門探繁香翠蔓花尚少却攜二三子深行出飛鳥羊腸走鳴泉鳯尾搖寒篠俯窺萬井烟笻聲響林杪湯休眞解事煮餅禪坊悄杯盤生晚澗落葉風自掃眼明玉華陰桃枝露紅小更傾樽中餘邀月下雲表澄江靜可鑑合嶂青未了石梁接樓居屋角掛參昴誰知人間世彷彿見三島烟塵暗中原懷抱鎮煎煼一行瘴海頭嵗月不知老金蘭有佳士相見獨不早青蒿得長松頗亦慰枯槁春風正顚狂日日被花惱懽來即相覔真處在草草身名兩姑置有酒為君倒次韻學士兄春日謾成飄泊悲生事人情翻手雲習閑眞似懶補拙謾知勤老作漁樵計夢觀鍾鼎勲成虧皆一戯不復問斯文筠谿集巻十一
