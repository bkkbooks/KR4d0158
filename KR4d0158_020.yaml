body:
  text: 筠谿集巻二十宋李彌遜撰挽詩四十七首楊貫之提舉挽詩二首當年接翼上天池舊事空存雁塔題豈有新詩來渭北謾令後學仰關西錦衣人逐驚漚散丹旐歌隨落照低它日扁舟江上路酸風吹淚過姑溪龍學許公挽詩二首粹惪山藏玉高標木秀林三朝侍楓禁列郡憇棠隂文翰家聲在規模國計深盖棺頭正黒空負濟時心二晩起故園興柴車歸鹿門營家無立壁愛客不空尊䘮亂長纓絶悲凉舊劍存不堪聽楚些無處可招魂碩人趙氏挽詩二首毓秀名臣裔來嬪上相家浮漚輕富貴朽木視鈆華曉日俄晞露春風自笑花仙蹤今不返望斷五雲車二命服從夫貴遺經易子成蘋蘩無失職琴瑟自和鳴巳嘆歸同穴猶悲夢兩楹旁觀灑清淚雙旐出寒城晉康郡侯碩人曾氏挽詩二首閥閲榮誇俗閨房秀出羣得賢推淑女有子賴嚴君臺栢憂時譽庭蘭奕世聞高名冩彤管異代仰清氛二身備難并福心明最上宗夜臺亡宿恨旦宅漫遺蹤塵暗魚機帳雲低馬鬛封酸風一襟涙哀入暮山松忠顯劉公挽詩二首活人憂國見生平晩節臨危志益明漢仗塵深逺宫闕胡裘風急半公卿千人致招竟不起萬户封侯卻似烹暮晉朝梁真可忍紛紛螻蟻尚偷生旤基媒孽自燕秦抗議如公有幾人軍旅未聞焉用試豺狼不噬豈宜親求魚縁木謾蠧國曲突徙薪翻殞身才大言深古難用忠良千載恨常新張柔直知郡挽詩二首世路狐狸正急賢並遊長恐着鞭先龔黄政術江湖上賈馬聲名雨露邊白髪空違三釡養青衿獨抱一經傳傷心才大難為用不為酸風亦泫然金蘭臭味百年期生死那知歘兩岐路斷束芻難寄恨封成掛劍謾傳悲向來不誦凌雲賦此日休歌薤露詩自愧千秋負良友剩留清淚與君垂故相少師李公挽詩四首天意康時難賢生葢世雄風流晉人上事業舜歌中許國回天力懐君貫日忠平生英爽氣凛凛未成空二國步乘陽九胡塵暗上京支傾隆大厦卻敵隱長城草木知春澤狐狸絶夜鳴雲臺瞻衮繡千古繼哀榮三去國頭方黒傷時鬢易絲徙薪謀獨騐擊楫志空悲尚想嘉猷告曽聞大政諮兩楹歌昨夢忍誦憗遺詩四白髪陳雷舊交情貴不渝詩牋留曉炬書鴈聚春蘆憂國言猶在知心道巳孤江臯一襟涙不復見夷吾門下大資顔公挽詩三首洙泗流風逺儀型世有人一經窺聖域三返得賢臣勲業艱難際聲名寂寞濱赤松歸有伴此道獨知津二不作鸞臺夢來尋鳳沼春劬勞知永慕壽考見深仁示疾元非病離人已反真生綃冩遺恨猶露衮衣身三求郡連牆日行藏二紀餘空留冡上劍不見枕中書山黒佳城閟堂隂旦宅虗悲心寄松檟哀韻擁輀車寶學連公挽詩二首男兒死爾未應悲可惜胷中尚有竒絶域英聲宜早嵗楚庭高議補明時壮懐自感中流楫舊愛今存峴首碑天獨不能遺此老葢棺兩鬢未全絲弱冠論交老更堅平生風義想前賢銀峯告政一千里鴈塔聨名四十年漫許赤心酬雨露終成白髪傲林泉酸風送子寒山暮鳴壑揺松亦泫然鄭尚明學士挽詩二首人物羲皇上塵中無此流高談悲管晏老手命曹劉室有芝蘭棄家餘鐘鼎收平生斷金約墮涙葢棺休四十才名重歸來白髪侵一官駒在谷有子鶴鳴隂賸著潛夫論今亡子敬琴送車知幾兩松壑助哀音陳氏太君挽詩二首淑徳嬪賢裔宜家有令人蘋蘩寒更潔繭績老猶親月館虛陶客雲阡失孟鄰悲風獵丹旐行路亦霑巾二之子榮親志長纓萬里歸如何晝錦地不見老萊衣誰謂松難老俄成露易晞平生三釡樂空使寸心違知郡鄭公挽詩拾芥聲名早嵗馳白頭有藴未全施向來茂草無留訟是處甘棠有去思才術舊聞優少贛交游賸欲賴當時誰知沱水歌來暮飜作西城薤露詩彭府君夫人羅氏挽詩二首擢秀芝蘭畹來嬪詩禮庭好羞貧更潔壽髪短猶青秦號封方寵蓬瀛駕不停天風助哀怨吹雨濕丹銘二始訝生兒異那知有母賢客無三至感家獨一經傳恨鎻魚機帳悲纒馬鬛阡他年陳五鼎清晝下雲軿郭君建挽詩藹藹聲華萬耳聞可憑詩禮大於門浮雲終負三餘學流水難追九逝魂朝有青衿懐舊徳室惟黄巻冨諸昆生平不對論文酒空使清鈆比涙痕蔡子應郎中挽詩二首獨秀聲名楚水東妙年騰踏俊游中文昌寓直風雲近神武歸來猿鶴同居士人非禪板寂少微星暗寶函空知心不必悲生死欲向何方覔是翁三生曽結在家因半世相從漸老身曲几團蒲分夜靜斜風細字寄情親伯牛命矣元非病桑户嗟來巳反真我亦無心趂哀樂每懐前事一傷神宫使待制舍人趙公挽詩三首秀出青徐野風移鄒魯鄉家聲齊丙魏人物到軒黄漫士從三已危機付兩忘並遊無此老誰與共行藏二曲突深時慮長裾鄙世流無書來北闕有意在東周曠逺嵇中散疎慵馬少游長松想風表千古閟山丘三憶昨司青𤨏公時對紫薇午軒評諫草曉殿綴朝衣金石平生契人琴此日非白頭情易感無涙與君揮彦節判宗觀察挽詩二首國步増磐石維城協夢熊風神龍種異才格馬羣空家訓惟知白官箴祇自公拊棺傷有徳天意或難窮二儉素師寒雋謙冲識老成養親公族化取友士林傾賀屨填門近靈輀赴壠輕悲歡反覆手揮涙濕銘旌許子儒寺丞挽詩二首隂徳仙官裔殊勲輔相家山川鍾秀麗人物見雄夸小試丞卿月卑棲屬使華葢棺何太早行路亦興嗟二壮嵗天衢上舂容伯仲間握蘭同省户持槖假朝班投老歸鄉縣從君卧故山並游零落盡回首一澘澘知郡韓公挽詩二首夫君抱清節獨秀不求知晉鄙多薫徳閿鄉早出竒功名天靳惜正直自扶持賴有仁風在朱轓兩郡遺二鴈塔聯名舊鹽車得路先凌雲曽誦賦縱壑願推賢繼剖龍溪竹同歸象骨田傷心老盤谷誰與序山川翊善余公挽詩二首弱冠聲名翰墨場一官小試活人方二王賓客推清介半刺規模與善良可但仁風薫晉鄙猶憐竒節老閿鄉康寧壽考獨餘事蘭玉堦亭久更芳白髪歸來一笑同舊遊長憶魯山東松楸地接螺江上兄弟名聨鴈塔中問舍蝸牛聊老缺缺書蠆尾不憂窮清芬千古無遺恨空使餘哀入暮風節使少師王公挽詩二首家聲許史舊弱冠近天墀權出諸公右官嫌二品卑多知縁好古得句舊能詩自怪文開後風流有此兒二晩嵗閩江上來從竹下賢肯為文字飲時訪祖師禪念舊藏遺墨先兄往還遺墨俱存忘形出近編忍傾一巵酒揮涙對新阡李徳脩提舉挽詩仙李盤根逺更芳妙齡雙桂㸔翺翔繡衣俗美澄清効墨綬民安愷悌方東閤揮金歡上客春田種玉燕諸郎年高七十通朝貴賸馥猶令畢萬昌范參議冝人高氏挽詩二首毓秀勲庸後來嬪詩禮家浮雲輕冨貴朽木視鉛華晩日俄晞露春風自笑花平生偕老志愁絶五雲車二蘭玉無偏愛衾裯不忍欺甘辛同逆旅生死獨先知馬鬛苔封合魚機寶帳遺酸風入松檟空作暮山悲筠谿集巻二十
