body:
  text: 筠溪集卷十六宋李彌遜撰詩七十三首初到連江和林公曄先輩投老身名信陸沉欲將白髮寄遙岑賦詩未敢施彭澤抱甕真堪友漢隂江靣飛橋誇壯麗山腰卧石閟幽深公才清絶參竒觀慰我長年去國心次韻林公曄見贈思君一日可當期敢意瓊瑶手自貽華髮乍回千里夢白眉重見十年知驚人句好供行樂遣客杯寬欲坐馳肯斸雲根同我老賸留觴詠醉花時次韻陳頴仲晚步見山青鞋布襪繞江湄矯首山房送日西小榼留人燈下覔短笻邀我醉中㩦峯巒過雨新塗澤草木逢春自品題投老歸來同逆旅好於此地斸愚溪和夷仲弟喜學士兄歸烽火叢中别弟兄獨看鄉月幾虧盈萬金信斷秋山寂千里人歸春草榮雨漲波紋催過艗風翻葉幄避行旌機雲入洛悲辛後誰似開華倒屣迎翁尉以詩送蓮并酒不復西河歎踽涼真成仙吏隱襄陽一生可了酒供座千頃平鋪花繞塘皓腕折香遮老眼長缺洗杓荐新嘗肯分臭味同衰朽好語猶驚得夜光學士兄還鄉之始會賔親石門寺以病不能往公曄頴仲有詩次韻群賢嘉會走輿臣乍喜郎星照七閩寺近南塘鍾秀麗筵開晚水荐甘珍放懷想盡百川飲留客應生四角輪我獨沉疴方靣壁愈風賴有兩騷人次韻陳蹈元見和之什漫逐江魚弔楚臣風騷今見出吾閩遺音思逺氷霜淡味語功深膾炙珍一壑我曹方稅駕九霄公等政推輪屏除堆案癡兒事肯著青鞋伴散人奉酬龍興益老伽陀居士心如出岫雲逢場作戲不求真桃花自落非關雨梅子半黃知是春此外更無身外事間中那得箇中人箭鋒相拄君休問千里同風始見親和陳頴仲題劉鞠祠山繞平湖緑四邉兩翁遺澤到今傳蘋風引釣魚隨艇榖雨催耕水拍田敗壁丹青悲落日荒庭紳笏想流年桐鄉不廢春秋祀簫鼓雞豚久更虔和頴仲山行即事平蕪新緑占封圻橫路遊絲網落暉山徑人稀藏窈窕禪扉春盡老芳菲緩行照水知魚樂隨意穿花見蝶飛二子舁籃今夜月龍鍾猶勝杖藜歸次韻隱者陳無隅二首柴門寂寂閉山光客至供糜有二方誰荐唐衢歸魏闕肯令王適老閿鄉藕塘待晚對幽壑竹院消間近寶坊用捨由時姑袖手豈無真樂在濠梁厯井捫參踏蘚苔山腰海角偶徘徊身從飄泊似浮水眼見紛華等濕灰共煮松風占乳信試尋香雪探芳媒笑談疑在蓬瀛上下視雲中兩兩苔次韻李伯紀丞相遊賢沙鳯池之作二首騎鯨破曉上崔嵬人識仙翁第一回杖屨不應塵外去旌麾早自日邉來黑頭半為憂時改青眼唯逢勝地開怪底尺書頻寄雁向來交味比陳雷幾日公來浴鳯池蹇驢陪乘偶參差羈棲自笑卧盤谷健句爭先誦渼陂世路吹虀無念到山遊啖蔗不言知細書倘遂雲根築肯與酸寒鄭老期似表弟始歸冦退之後置酒會親族坐客即席賦詩和其韻蓬轉生涯四十年歸來華髮舊山川驚魂僅免走三穴情話喜同傾四筵醉客毛吞憐海窄詩翁刀奏失牛全錦城不似還家樂姑置行藏莫問天病卧一春無復少況蹈元顧為尋山之行以詩簡之病與老期推復來十分春事苦相催干戈四海少間地寒暑一生能幾回止酒尊罍成説食空華風景亂真梅晴明強理尋山屐笑口逢君倘暫開復用前韻約蹈元時序驚人咄咄來榮枯畢竟為誰催風將滿地飛紅去日擁半天髙緑回顧我似嘗當道李渴君如望隔林梅一年春事無多子喚取提壺觸處開久隂聞督郵至縣奉簡蹈元驚呼雞犬督郵來想見文書手自催鼓枻黃頭罷田去傾囊黔首入苗回春盈半月傾盆盎夜雹前時落李梅已向茫頭望籠餅陽烏幾日放天開春雨久不止戲呈諸公蕉上雨聲無盡來龍疲應困阿香催竹萌出土囊錐見燕觜得泥風鷁回料峭侵衣猶帶臘亷纎昏晝已如梅愁邉酒盞都無力更著濃隂撥不開逰石門用前韻促陳丞詩昨夜濃雲潑墨來比鄰折簡小奚催印忩寒月曉前白尋壑春輿天際回盞靣緑浮新展葉杖頭黃礙半肥梅知君自掃松間徑古錦何妨此地開暇日逰石門用前韻曉御欲隨風腳來報晴烏鵲入簷催松幢竹蓋寶坊近石壁雲關塵境回山氣得春濃勝酒花光帶月冷過梅却收眼力尋歸路惜取餘青莫浪開西山獨步奉懷蹈元擺脫微官萬里來非關枝上子規催鏡中蒼鬢摘還滿花上青春喚不回我築一溪愚似栁君工五字老于梅哦詩肯傍水旁徑賸買長瓶為子開山居寄友人結廬人境經過少晚起長遭稚子催間處赤心憂國盡病中白首愛山回林泉可使居無竹風雨空嗟摽有梅不遣飛奴頻過我欲將懷抱向誰開次韻似表弟春雨漫成百念關身起蝟毛雨聲偏近夜牀髙正愁春事趂奔鹿更覺歸心折大刀擁鼻吟邉聊且遣枕肱佳處亦時遭麴生懷抱肯傾倒一酌忘憂賴爾曹近報陜右大捷又繼聞王師遂平建冦用髙字韻南北軍書走羽毛城頭喜見赤雲髙頗聞關隴盡歸馬不獨甌閩行賣刀壕吏捉人那復有田翁泥飲不辭遭會看四海收鼙鼓郡邑官行得坐曹杜甫石壕吏詩云暮投石壕村有吏夜捉人又遭田父泥飲詩云田翁過社日邀我嘗春酒與似表弟遊石門懷蹈元時中用髙字韻逼人塵事等牛毛袖手端須著眼髙䇿蹇倦追千里馬荷鋤安用百金刀病來避酒連三月春半尋山等一遭不見鞭鸞兩仙吏秪應上界亦分曹歸自筠莊得似表弟晚步髙字韻繼和一行作吏苦吹毛小隱非關索價髙懶傍月邉持玉斧靜看花上試霜刀近人魚鳥曽相識入眼溪山昔未遭誰與著鞭春色裏雁行風急正求曹新晴再用似表弟髙字韻踈林逺墅見秋毫破曉陽烏羽翼髙湖靣平於開匣鏡山稜光並發硎刀閉門聽雨寧論日散䇿尋岡莫數遭世上幾人能避俗簿書堆案想官曹筠莊李花正開雨不得往似表弟有詩次韻經旬長去聲雨暗春山小白枝頭正可攀賸欲叩舷浮緑淨未容著屐上蒼頑題詩過我工排悶載酒留人肯破慳要及花時酬老大筍輿從此不須間喜晴再用間字韻風掠遊雲露逺山長藤竟欲與君攀花神解作瓊瑶報野老心如鐵石頑千樹暗春難比富一枝照眼未應慳不須更作含羞態喚取張盧來共間退之李花詩云夜領張籍投盧同乘雲共至玉皇家久雨似有晴意繼而復隂作望晴一夜翻河落瓦溝平明山靄欲全收正疑礎潤雲生足直怕天明日探頭倐忽去來觀聚蟻現前起滅悟浮漚占晴不問黃衣使巳向鳥烏聲際求北人久雨作黃衣乘馬人指日厭勝之取土火之象以勝隂也久雨二首詩肩不奈曉風酸后土何時得暫乾石鼎飯餘茶乳細竹爐經罷柏煙殘龍遊未歇千山暗豹隱方深一塢寒白髮飄零江海上朔雲收恨赴長安榕根敗屋兩三椽客徑無人老更便地近東南多澤國雨逢甲子少豐年徑須酣飲六十日安用取禾三百㕓待得風頭風力缺梅花如雪月初圓德甫知丞過筠莊溪亭為待月之會戲呈席上諸友載酒何人過子雲傳呼雞犬亦驚奔門無車馬苔侵徑坐近池臺竹覆尊好月邀人留晚照疾雷催雨過前村獨醒楚子真多事共醉愚溪百尺渾待月久不至須臾雲破星露溪光發衆賔歡呼席上次德甫韻待月新亭興已慵眼花空亂燭花紅溪山路隔煙塵外觴咏身疑夢寐中却暑已煩瞋恚雨掃雲須賴吉祥風水光已報氷輪信一笑能令萬斛空巖起録云次韻張幹佳什輒和寄之以道山居之況前山立玉水縈羅徑竹當門一里過管子與豫成莫逆麴生邀我到無何老來鶴骨寒猶健病起霜髭短更多金印纍纍看公等已甘一壑寄蹉跎次韻岩起曉晴白衣蒼狗暗還明造物何心聽改更雨足龜魚方得計日髙蛙黽自消聲浮溪荇帶羅初展粘壁蟲書字不成正喜太清無點綴慘舒誰復較隂晴次韻徐持志見寄繡衣歸卧水雲鄉湛輩猶懷峴首羊似我鵠烏忘白黑知君牝牡失驪黃靜中禪縳應超脫别後詞鋒底激昻投老窮途各千里不須留頴見錐囊德甫知丞大夫惠詩見招次韻地勝官清人更幽公田政足辦槽丘吏情厭問可不可世事但從浮自浮緑蓋紅粧供客笑黃雞白酒為君留慣傾老瓦陪田父髙會端如飫五侯筠莊亭軒皆以筠名學士兄有詩次韻種竹營巢老自如渭川端不羡商于松行外護遮凡木蓮葉平鋪覆斷渠我輩方疑置丘壑此君可共樂琴書軒亭處處成清閟足了一生寧願餘次韻李丞相送行二首三年袖手卧江濵著眼終成出世人筆下風雲作時雨胸中丘壑作陽春買山塵外曽相見漉酒愁邉情更親惜取風騷等間句他時密膝詠臣鄰山畔孤亭一水濵歸來華髮巳欺人脫身異縣干戈地得意吾廬筍蕨春早著青衫成底事慣遭白眼欲誰親此君真有髙人節肯與山翁作近鄰自連江赴守鄱陽黃原道中作海角三年一夢成北來重聽偃溪聲凝雲帶雨留愁住茂樹隨山送客行粳稻沿崖畦上下茅茨枕谷路縱橫莫從馬腹消雙髀此地真堪老此生鄱陽四望亭觀雪瘴海三年雨不氷喜看萬木變瓊英眼中何處分銀界腳底從兹上玉京嵗序巳於芒尾見春風先向栁梢明飢饞病守存餘習欲和田家擊壤聲寄題福州程進道止戈堂二首不識威名擅漢廷雲仍今復見材卿萬家桃李栽培盛千里妖氛却掃清羽扇綸巾聊自適風聲鶴唳巳魂驚向來雪鍔櫜藏地賸築詩壇按酒兵一麾局促楚江東時喜鄰藩好信通坐厭文書朱墨裏靜思談笑聖賢中浮甌小試茶膏白照眼分嘗荔子紅想見髙堂散鳬鶩競追樂事賞年豐自鄱陽得請天台散吏解官就道恍然自適戲成平明解印暮投館公事已如風馬牛報政僅堪書下下結廬賸欲榜休休無名花草香隨路得計禽魚水滿溝袖取向來朱墨手按行松竹上滄洲題興教寺雲開岫幌隱禪扉髙屋慿虛靣翠微午枕有香清蝶夢晚林無路送鴻飛一丘一壑真吾事三沭三薰悟昨非山意有情留倦客樹頭誰道不如歸送陳頴仲赴試省闈木末揮斤玉未鐫清姿直節已飄然詩書插架嗤三萬文字撑腸富五千筆下行看吐黃絹選中應喜探青錢管城自有封侯相得路功名且著鞭和劉待制宦遊蹤迹信輿臺白首知非愧魯開詩卷雲煙舒復卷吏行鳬鶩去還來雨多風伯漫不省春半花神小有才誰為癡兒無樂事眼中秀句絶纎埃次韻尚書兄同遊青原暑風無力上襟裾雁序衝煙入翠虛小憩淨蓮開梵境偶聞密竹話真如倦遊政似知還翼便靜聊同得計魚不為尋思問心法是翁心外已無餘次韻和韓知剛見貽之什半生宦牒絆間身老惜跳丸過眼頻獨笑真成當去客相逢同是異鄉人靜中著語巳多事熟處忘情久自親他日君來序盤谷岩花溪竹是知津次韻羅偉正寺丞見遺之什雕鶚逢秋已恨遲公才如此尚誰羇江城樽爼未三月世路干戈方百為去馬便如千里别斷葭巳作十分披他年若下襄城路鞭影應能指具茨次韻劉寬夫春日有作時序驚人翻手雲一樽聊共駐青春惜花欄檻圍繒綺留客杯盤煮荇蘋愁外覔歡終淡薄吟邉得酒更清新休論二十年前事目斷長安陌上塵送似表弟還鄉話别幾年一月留離歌還起楚江樓往來笑子蟻旋磨得失顧豫魚中鈎雍齒且侯真戲事馮唐已老盍歸休慿君為掃筠莊榻要著南來新白頭次韻曽微言見贈二首是邦誰及大夫賢無地容才試十全側席賸聞求德友深居那得隱臞仙張羅永日無過轍解榻何人許對眠莫為時危間矍鑠要看走馬勒燕然自分人非日九遷一官民社敢妨賢脫塵未踏鄰虛地通籍猶分小有天餐玉近傳曽試法買山取足不論錢迹慵未似嵇中散會有斜封落雁前採蘋亭分韻得花字樓頭鐘鼓曉催衙吏散庭空日巳斜烽火望中常作客簿書叢裏偶成家隂隂密葉榴垂實剪剪新荷藕結花小立方塘一杯酒又傳歸恨到天涯次韻行父舍人有感飄飄文采照螭頭袖手功名未肯休易水渡愁隨一騎春風吹淚著雙眸向來但遣淮隂將異日寧論雍齒侯應笑江南誇仲父規模才可限升州行父和篇頗有過情之語次韻自敘以謝家在閩山最上頭大書髙屋榜休休按行松竹曽施屐應接江山不運眸漫道鶴書朝赴隴真成蟻穴夢封侯紫薇落筆非吾事撫字猶堪老一州過吳江次韻行父之作重來缺二字又成空舊榜今無卧綵虹故國平嗟缺二字礫新亭猶見濕青紅雁隨山逺情無缺二字與天窮勢自通盡道鱸魚寒不食缺二字祗合在江東巖陵道中禁路追隨又兩年長竿那可使魚緣壯心未展傷遲暮捷徑無工較後先軟飽三杯當去客橫蒲十幅得風船眼中有句無人道誰與收歸古錦編舟中對月悠悠乘墜寄舟車與世真成一夢蘧苦憶曉更鼉報鼓喜逢秋逺雁橫書江山似與詩人助水月應知靜者如投老得歸隨處樂獨醒尤笑楚三閭别業傅才儒壯嵗追隨鬢巳蒼誰將勳業問行藏憐公惜莫雞群鶴顧我凌兢虎質羊敗栁亦工喧暮雨寒花直欲賦秋霜更謀濁酒窮清夜明日山深木葉黃凝碧晚望秋來何必送將歸落日髙臺意自悲一壑未容追汗漫三鍾猶得飽支離黃花對客如相笑白髮尋人似有期時序不堪翻覆手每逢佳處亦開眉晚登齊雲閣窈窕僧忩十肘長解分眼界入他方塵襟偶脫公家事鼻觀重參佛土香寒日半收山著色晚風無力水磨光幽尋已覺滄洲近身外營營付一觴得仙亭隔水樓臺聳佛宫緣雲捫石得榰笻布金地主空遺像折桂仙翁失舊蹤人去逺山留夕照僧歸晚徑帶殘鐘眼中有句無人道欲寄丹青恐未工南樓百尺危樓枕水濵風煙入眼亂紛紛趂虛漁唱來成市入壠田歌去作群閣雨雲深山著帽駕潮風急浪翻雲寄言殘夜明樓月莫負胡床老使君晚飲東湖亭用碩夫韻秋後髙荷與砌行暫回眼白為君青哦詩太瘦真成癖對酒清狂不礙醒健筆縱橫那可繼醉歌悲壯亦堪聽如何借得南烹手更搗香橙為荐腥次韻漳州鄧教授二首綘帳初開識馬融尊罍聊共落新宫三千避席方懷古四十無氊獨見公尺璧未磨終可荐兼金久煉要加功男兒事業真堪戲莫把行藏問塞翁十年猿鶴共蕭蕭世事驅人肯見饒老態嶺雲風更急壯心爐篆日還銷催科政拙民猶病禦侮才疏盜正驕強拾陳言續清唱却慚橫槊按戎昭秋日同劉方明逰石師岩翠合峯巒萬葉稠雲擎佛屋出岩幽秋光不到庭隂樹曉日先明竹外樓戶牖髙低分世界川原逺近失汀洲陽休示我真消息更在靈山最上頭南樓晚望用葉碩夫韻海角長安望爾賖日邉雲影更橫斜身間夢覺俱成蝶眼病朝昏只見花可但陶潛能避俗不應范蠡便浮家君恩未報驚華髮目斷飛鴻水四涯筠溪集卷十六
